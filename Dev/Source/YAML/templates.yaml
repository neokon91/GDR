id: templates
version: 0.1.0
purpose: >-
  Azioni Templater globali (bottoni che operano su una nota esistente). I
  template di CREAZIONE delle entità sono ora dichiarati per-entità in
  entities/*.yaml (chiave 'templates'); render.load_templates() li raccoglie.
# Nessun template di creazione qui: vivono nei file-entità (entities/*.yaml).
templates: []
