# Liste ITALIANE per i generatori CONFIGURABILI di Fantasy Content Generator.
# render.py (write_fantasy_content_generator) le inietta nel data.json del plugin
# come override non distruttivo. REGOLA CHIAVE: il merge del plugin è SHALLOW
# (Object.assign DEFAULT_SETTINGS + loadData), quindi ogni gruppo override deve
# contenere TUTTE le chiavi che il generatore legge — qui replico la struttura
# esatta di DEFAULT_SETTINGS e cambio solo i valori. Non serve eguagliare le
# lunghezze (il generatore pesca a caso). Tutto MASCHILE per la concordanza.
#
# Ordine di composizione (dal reverse del main.js, fisso):
#   locande:  prefixes + " " + nouns + " " + innType   -> "La Taverna del Corvo Nero"
#             (innType qui è ripensato come AGGETTIVO finale)
#   bevande:  1-2 adj + " " + nouns                     -> "Dorato Idromele"
# NON tradotti (scelta utente, rinviati a QA): citySettings (ridondante coi
# toponimi homebrew), lootSettings/groupSettings/dungeonSettings (frasi/branching).
# NON traducibili (hardcoded nel plugin): nomi-di-persona per razza ed etichette.
id: fcg_it
version: 0.1.0
purpose: Italianizzazione dei generatori configurabili di FCG (struttura esatta, solo valori).

settings:
  # Monete: nome + rarità (la rarità pesa la frequenza). 4 tagli classici.
  currencyTypes:
    - { name: Oro,     rarity: uncommon }
    - { name: Argento, rarity: common }
    - { name: Rame,    rarity: common }
    - { name: Mithril, rarity: rare }
  currencyFrequency: 50

  # Locande/taverne. prefixes = "Articolo Tipo del"; nouns = animale/figura
  # MASCHILE (compatibile con "del"); innType = aggettivo finale MASCHILE.
  innSettings:
    prefixes:
      - La Locanda del
      - La Taverna del
      - L'Osteria del
      - Il Rifugio del
      - La Birreria del
      - La Cantina del
      - Lo Scrigno del
      - Il Boccale del
      - Il Riposo del
      - L'Albergo del
    nouns:
      - Drago
      - Corvo
      - Cinghiale
      - Grifone
      - Leone
      - Cervo
      - Lupo
      - Gatto
      - Re
      - Mago
      - Toro
      - Falco
      - Cavaliere
      - Nano
      - Gallo
      - Montone
      - Vagabondo
      - Boccale
      - Pony
      - Pellegrino
