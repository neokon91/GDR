    desc:
      - nel cuore della città, circondata da mercati affollati e vie rumorose.
      - in una campagna quieta, con vista su dolci colline e campi sterminati.
      - affacciata sul mare, con vista sull'oceano e una spiaggia poco distante.
      - all'incrocio di due antiche strade mercantili, sempre piena di viandanti.
      - addossata alle mura della città, all'ombra di una vecchia torre di guardia.
      - in fondo a un vicolo nascosto, lontano da occhi indiscreti.
      - ai margini di una foresta cupa, ultimo riparo prima del bosco.
      - sopra un fiume lento, con un pontile dove attraccano le chiatte.
      - in un villaggio di montagna, scaldata da un grande camino di pietra.
      - presso un valico battuto dal vento, rifugio di carovane e pellegrini.
      - in un quartiere malfamato, frequentata da ladri e mercenari.
      - vicino al tempio, tranquilla e ben tenuta, amata dai chierici.
    rumors:
      - Dicono che nelle cantine si nasconda un passaggio segreto verso le fogne.
      - Si mormora che l'oste sia un nobile decaduto in fuga da un debito di sangue.
      - Un cliente giura di aver visto luci danzare sulle paludi a nord.
      - Pare che una carovana sia sparita lungo la strada del valico la scorsa luna.
      - C'è chi sussurra di una stanza al piano di sopra che resta sempre chiusa.
      - Raccontano di un tesoro sepolto sotto la vecchia quercia all'incrocio.
      - Gira voce che una creatura rubi il bestiame nelle notti senza luna.
      - Dicono che il fabbro del villaggio venda armi a chi non dovrebbe.
      - Si dice che un mago errante paghi in oro chi gli porta libri antichi.
      - Pare che i lupi siano scesi dai monti più affamati del solito quest'anno.
      - Qualcuno ha visto un incappucciato lasciare un messaggio sotto un boccale.
      - Voci parlano di un fantasma che infesta il pozzo del cortile.

