id: gdr_system
version: 0.1.0
purpose: >-
  Globali del piano "regole" D&D 5.5e condivisi: registro dei campi di sistema,
  layout statblock e caratteristiche PG. Lo schema specifico delle entità di
  sistema (classe/specie/oggetto/incantesimo/...) vive in entities/*.yaml.
  render.py fonde tutto in un unico 'core'. Confine (validato da check): qui
  vivono scheda? no — scheda è per-entità; qui solo statblock/caratteristiche +
  i campi di sistema. Mai tavolo/assi_tematici/states (core.yaml).
# Registro campi di SISTEMA 5.5e (oggetti magici, incantesimi, insidie, classe,
# specie, background, talento, divinità). Stessa convenzione di core.fields; fusi
# nello stesso registro centrale. I campi condivisi/lore stanno in core.fields.
fields:
  # Oggetti magici
  rarita:         { label: Rarità,               widget: rarita }
  sintonia:       { label: Sintonia,             widget: text }
  # Incantesimi
  livello:        { label: Livello,              widget: number }
  tempo_lancio:   { label: Tempo di lancio,      widget: text }
  gittata:        { label: Gittata,              widget: text }
  componenti:     { label: Componenti,           widget: text }
  durata:         { label: Durata,               widget: text }
  classi:         { label: Classi,               widget: text }
  # Insidie (trappole/pericoli)
  tier:           { label: Livello di gioco,     widget: tier }
  minaccia:       { label: Minaccia,             widget: minaccia }
  prova:          { label: Prova,                widget: text }
  danno:          { label: Danno / Effetto,      widget: text }
  # Classe homebrew
  dado_vita:      { label: Dado vita,            widget: dado_vita }
  car_primaria:   { label: Caratteristica primaria, widget: text }
  ts_competenze:  { label: TS competenti,        widget: text }
  incantesimi:    { label: Incantesimi,          widget: incantesimi }
  # Specie
  taglia:         { label: Taglia,               widget: taglia }
  velocita:       { label: Velocità,             widget: text }
  tipo_creatura:  { label: Tipo di creatura,     widget: text }
  lignaggio:      { label: Lignaggio,            widget: text }
  # Background / talento / divinità
  car_background: { label: Caratteristiche,      widget: text }
  strumento:      { label: Competenza in strumenti, widget: text }
  talento_origine: { label: "Talento d'origine", widget: text }
  prerequisito:   { label: Prerequisito,         widget: text }
  ripetibile:     { label: Ripetibile,           widget: text }
  dominio:        { label: Dominio,              widget: text }
  simbolo:        { label: Simbolo,              widget: text }

# Statblock (Fantasy Statblocks): layout usato dal blocco ```statblock``` (creature
# + mostri SRD). I layout IT sono vendorizzati in statblocks/ e iniettati in FS.
# `layout` = resa 5.5e fedele (default, mostri SRD); `layout_5e` = resa classica 5e
# (secondo tab nel template creatura, stessa creatura via `monster:`).
statblock:
  layout: D&D 5.5 Layout ITA - Compatibile 5e
  layout_5e: Basic 5e Layout ITA

# Caratteristiche 5e per la scheda PG (macro scheda_pg). id = chiave frontmatter
# (INPUT[number]); il modificatore e' calcolato e SALVATO in mod_<id> (compute_into)
# cosi' e' interrogabile da Dataview e dalle altre note.
caratteristiche:
  - { id: forza,        sigla: FOR }
  - { id: destrezza,    sigla: DES }
  - { id: costituzione, sigla: COS }
  - { id: intelligenza, sigla: INT }
  - { id: saggezza,     sigla: SAG }
  - { id: carisma,      sigla: CAR }

# Le 18 abilità 5e (2024): id = chiave stabile (frontmatter prof_<id>), label =
# etichetta, caratteristica = abilità di base per il bonus. Usate dalla scheda PG
# (macro abilita_pg) e dal converter rules-engine (mappa prosa SRD -> id).
abilita:
  acrobazia:          { label: Acrobazia,          caratteristica: destrezza }
  addestrare_animali: { label: Addestrare Animali, caratteristica: saggezza }
  arcano:             { label: Arcano,             caratteristica: intelligenza }
  atletica:           { label: Atletica,           caratteristica: forza }
  furtivita:          { label: Furtività,          caratteristica: destrezza }
  indagare:           { label: Indagare,           caratteristica: intelligenza }
  inganno:            { label: Inganno,            caratteristica: carisma }
  intimidire:         { label: Intimidire,         caratteristica: carisma }
  intrattenere:       { label: Intrattenere,       caratteristica: carisma }
  intuizione:         { label: Intuizione,         caratteristica: saggezza }
  medicina:           { label: Medicina,           caratteristica: saggezza }
  natura:             { label: Natura,             caratteristica: intelligenza }
  percezione:         { label: Percezione,         caratteristica: saggezza }
  persuasione:        { label: Persuasione,        caratteristica: carisma }
  rapidita_di_mano:   { label: Rapidità di Mano,   caratteristica: destrezza }
  religione:          { label: Religione,          caratteristica: intelligenza }
  sopravvivenza:      { label: Sopravvivenza,      caratteristica: saggezza }
  storia:             { label: Storia,             caratteristica: intelligenza }

