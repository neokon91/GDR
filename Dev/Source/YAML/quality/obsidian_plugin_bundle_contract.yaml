id: obsidian_plugin_bundle_contract
purpose: Contratto di repo hygiene per plugin Obsidian dichiarati senza bundle vendorizzati.
version: 0.1.0
plugin_matrix: Dev/Source/YAML/json/plugin_matrix.yaml
plugin_contracts: Dev/Source/YAML/canonical/plugin_contracts.yaml
policy:
  mode: declared_external_plugins
  rationale: Il repository dichiara plugin, configurazioni e fallback, ma non versiona bundle terzi main.js/styles.css/theme.css. I bundle locali ignorati possono essere copiati nella ZIP finale; la repo resta YAML/Jinja/JS proprio.
  plugin_root: .obsidian/plugins
  theme_root: .obsidian/themes
  snippet_root: .obsidian/snippets
  allowed_plugin_tracked_files: []
  allowed_plugin_local_generated_files:
    - data.json
    - brat-migrations.json
  forbid_tracked_plugin_bundles: true
  forbid_tracked_themes: true
  forbid_tracked_plugin_config_json: true
themes:
  required: []
  allowed_tracked_files: []
snippets:
  required:
    - gdr-vault.css
  allowed_tracked_files:
    - gdr-vault.css
