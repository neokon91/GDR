id: naming_contract
purpose: Contratto per mantenere nomi di dominio stabili e impedire il ritorno di alias di milestone nel codice attivo.
version: 0.1.0
policy:
  scan_roots:
    - package.json
    - .github/workflows
    - Dev
    - Hub
    - Risorse
    - z.automazioni
    - z.engine
  text_extensions:
    - .js
    - .json
    - .md
    - .py
    - .yaml
    - .yml
  allowed_historical_paths:
    - Dev/CHANGELOG.md
    - Dev/Source/YAML/quality/naming_contract.yaml
  forbidden_active_terms:
    - term: m11
      match: word
      case_insensitive: true
      rationale: M11 era un nome di milestone; il dominio runtime canonico e continuita.
      replacement: continuity
    - term: check_m11
      match: substring
      case_insensitive: true
      rationale: I check devono esporre nomi di dominio, non milestone.
      replacement: check_continuity
    - term: renderM11
      match: substring
      case_insensitive: false
      rationale: Gli export Dataview devono usare nomi di dominio.
      replacement: renderContinuity
    - term: M7
      match: word
      case_insensitive: false
      rationale: M7 era un nome di milestone; le superfici attive devono descrivere giocabilita e continuita.
      replacement: playability
    - term: M6
      match: word
      case_insensitive: false
      rationale: M6 era un nome di milestone; le superfici attive devono descrivere continuita.
      replacement: continuita
    - term: M5.0
      match: substring
      case_insensitive: false
      rationale: M5.0 era un nome di milestone; errori e check devono usare nomi di dominio.
      replacement: template factory
    - term: m7_
      match: substring
      case_insensitive: true
      rationale: Le chiavi YAML devono usare nomi di dominio, non milestone.
      replacement: playability_
    - term: renderM7
      match: substring
      case_insensitive: false
      rationale: Gli export Dataview devono usare nomi di dominio.
      replacement: renderPlayability
