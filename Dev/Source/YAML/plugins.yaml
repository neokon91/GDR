# Callout GDR custom (Callout Manager): identità visiva delle note. render.py li
# inietta in callout-manager (callouts.custom). color = "R, G, B"; icon = id lucide.
# Degradano a callout standard se il plugin non è attivo.
callouts:
  - { id: tavolo,  color: "201, 64, 64",   icon: lucide-swords }
  - { id: gancio,  color: "191, 130, 42",  icon: lucide-anchor }
  - { id: segreto, color: "138, 74, 173",  icon: lucide-eye-off }
# Solo bottoni-azione: eseguono un file Templater su z.modelli/azioni/.
# I bottoni "Crea <Titolo>" sono generati da templates.yaml (id: crea-<id>).
buttons:
  - id: collega-nota
    label: Collega
    action: collega
  - id: marca-canonico
    label: Marca Canonico
    action: marca_canonico
  - id: archivia-nota
    label: Archivia
    action: archivia
  - id: applica-profilo
    label: Applica profilo
    action: applica_profilo
  - id: scatena-conseguenza
    label: Scatena conseguenza
    action: scatena_conseguenza
  - id: sali-di-livello
    label: Sali di livello
    action: sali_di_livello
