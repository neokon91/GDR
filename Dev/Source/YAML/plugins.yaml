id: obsidian_plugins
version: 0.1.0
purpose: Solo plugin fondamentali usati dai template.
# Allineati ai plugin realmente installati nel vault. NB: niente
# dice-roller / initiative-tracker / tasks (non installati).
plugins:
  - id: templater-obsidian
    name: Templater
  - id: dataview
    name: Dataview
  - id: obsidian-meta-bind-plugin
    name: Meta Bind
  - id: js-engine
    name: JS Engine
  - id: tabs
    name: Tabs
  - id: callout-manager
    name: Callout Manager
  - id: obsidian-5e-statblocks
    name: Fantasy Statblocks
  - id: metadata-menu
    name: Metadata Menu
  - id: folder-notes
    name: Folder Notes
  - id: obsidian-icon-folder
    name: Iconize
  - id: homepage
    name: Homepage
  - id: calendarium
    name: Calendarium
  - id: media-extended
    name: Media Extended
metabind_inputs:
  stato: INPUT[inlineSelect(option(bozza), option(pronto), option(in gioco), option(giocata), option(archiviata))]
  mondo: INPUT[suggester(optionQuery("Mondi"), useLinks(partial), allowOther)]
  connessioni: INPUT[inlineListSuggester(optionQuery("Mondi"), useLinks(partial), allowOther)]
  sessioni: INPUT[inlineListSuggester(optionQuery("Mondi/Sessioni"), useLinks(partial), allowOther)]
  pressione: INPUT[slider(minValue(0), maxValue(10), stepSize(1), addLabels)]
  testo: INPUT[text]
# Solo bottoni-azione: eseguono un file Templater su z.modelli/azioni/.
# I bottoni "Crea <Titolo>" sono generati da templates.yaml (id: crea-<id>).
buttons:
  - id: marca-canonico
    label: Marca Canonico
    action: marca_canonico
  - id: archivia-nota
    label: Archivia
    action: archivia
