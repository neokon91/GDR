  piano: "🌀"
  inbox: "📥"
# Callout GDR custom (Callout Manager): identità visiva delle note. render.py li
# inietta in callout-manager (callouts.custom). color = "R, G, B"; icon = id lucide.
# Degradano a callout standard se il plugin non è attivo.
# icon = nome Lucide SENZA prefisso `lucide-`: è il formato che vuole la variabile
# CSS nativa `--callout-icon` (verificato in-app). render.py la usa per gdr.css e
# riaggiunge `lucide-` per Callout Manager (che passa per setIcon).
callouts:
  - { id: tavolo,  color: "201, 64, 64",   icon: swords }
  - { id: gancio,  color: "191, 130, 42",  icon: anchor }
  # Impostazioni della nota (Meta Bind): stato/tipo/famiglia/canonico/visibilità/rivelazione.
  - { id: opzioni, color: "120, 120, 130", icon: sliders-horizontal }
  - { id: segreto, color: "138, 74, 173",  icon: eye-off }
  # Rivelazione per-sezione (player-facing, gated dal sito): una verità che si
  # svela col procedere della campagna. `[!rivela|<tier>]` (vedi build_site).
  - { id: rivela,  color: "56, 142, 142",  icon: eye }
  # Infobox stile wiki (macro identita_card): intestazione d'identità in cima alla
  # nota. Stile pesante in gdr.css; qui solo colore/icona (degrada a callout base).
  - { id: infobox, color: "90, 110, 140",  icon: scroll-text }
# Bottoni-azione: 'action' esegue un file Templater su z.modelli/azioni/ (serve
# anche l'entry in templates.yaml:actions); 'command' lancia un comando di
# Obsidian (nessuna azione-nota). I bottoni "Crea <Titolo>" sono generati da
# templates.yaml (id: crea-<id>).
buttons:
  - id: collega-nota
    label: Collega
    action: collega
  - id: marca-canonico
    label: Marca Canonico
    action: marca_canonico
  - id: archivia-nota
    label: Archivia
    action: archivia
  - id: applica-profilo
    label: Applica profilo
    action: applica_profilo
  - id: scatena-conseguenza
    label: Scatena conseguenza
    action: scatena_conseguenza
  - id: avanza-fronte
    label: Avanza fronte
    action: avanza_fronte
  # Motore A «Giro del mondo»: avanza TUTTI i Fronti di un passo per calore (i pieni scattano
  # con conseguenza in bozza + cascata), e scrive una cronaca. Il mondo si muove da sé.
  - id: avanza-mondo
    label: Avanza il mondo
    action: giro_del_mondo
  - id: sali-di-livello
    label: Sali di livello
    action: sali_di_livello
  - id: riposo-lungo
    label: Riposo lungo
    action: riposo_lungo
  - id: riposo-breve
    label: Riposo breve
    action: riposo_breve
  - id: usa-risorsa
    label: Usa risorsa
    action: usa_risorsa
  - id: aggiorna-encounter
    label: Aggiorna encounter
    action: aggiorna_encounter
  - id: genera-statblock
    label: Genera statblock dal GS
    action: scaffold_statblock
  # Generatore homebrew (italiano, a tema): bottone Templater -> tp.user.genera.
  - id: genera-locale
    label: Genera (locale)
    action: genera
  # Tira sulla tabella casuale attiva (pesi rispettati): meta_actions.tira_tabella.
  - id: tira-tabella
    label: Tira sulla tabella
    action: tira_tabella
  # Importa una mappa Watabou (SVG): imposta mappa/origine, crea luoghi dai toponimi e
  # genera i segnaposto (tp.user.importa_mappa).
  - id: importa-mappa
    label: Importa mappa Watabou
    action: importa_mappa
  # Import PROFONDO da Azgaar (FULL JSON): crea cultura/culto/regno/luogo + segnaposto
  # (tp.user.importa_azgaar).
  - id: importa-azgaar
    label: Importa mappa Azgaar (Full JSON)
    action: importa_azgaar
  # Turno di bastione (DMG 2024): registra un turno nel Registro dei turni.
  - id: turno-bastione
    label: Turno di bastione
    action: turno_bastione
  # World Board: genera/aggiorna il Canvas «a colpo d'occhio» del mondo dell'utente.
  - id: world-board
    label: Genera World Board
    action: world_board
  # Sito dei giocatori: esporta HTML statico spoiler-free DENTRO Obsidian (no Python/terminale).
  - id: genera-sito
    label: Genera sito giocatori
    action: genera_sito
  # Ponte Initiative Tracker: auto-popola il Party dai PG (così players: true risolve).
  - id: prepara-gruppo
    label: Prepara il gruppo (IT)
    action: inizia_incontro
  # --- Comandi-strumento (button con 'command'): aprono DIRETTAMENTE lo strumento
  # del plugin senza cercarlo nella tavolozza comandi né nelle impostazioni → tolgono
  # l'attrito di "dov'è la mappa / il calendario". NON richiedono un'azione-nota
  # (vedi action_buttons). Senza il plugin il comando non esiste: il bottone mostra
  # un avviso e non rompe la nota. ID-comando verificati sui main.js dei plugin in dist.
  - id: apri-calendario
    label: Apri calendario
    command: calendarium:open-calendarium
  - id: inserisci-mappa
    label: Inserisci mappa
    command: zoom-map:insert-new-map
  # autocreate-newtab (non -embed-on-current): crea+apre un disegno in una scheda
  # nuova, robusto in QUALSIASI vista (gli "insert al cursore" non funzionano in
  # Lettura, dove però si vedono le note del vault). Poi si collega nel campo Mappa.
  - id: disegna-mappa
    label: Disegna mappa
    command: obsidian-excalidraw-plugin:excalidraw-autocreate-newtab
  # Timbra la data in-game corrente del calendario al cursore (nota sessione, in
  # edit durante il gioco → l'insert-al-cursore funziona). Serve un calendario con
  # una data corrente impostata (vedi «Apri calendario»).
  - id: inserisci-data
    label: Inserisci data
    command: calendarium:insert-calendarium-current-date
