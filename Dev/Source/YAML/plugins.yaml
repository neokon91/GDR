  creatura: "🐾"
  incontro: "🎲"
  oggetto: "🎒"
  incantesimo: "✨"
  regola: "📕"
  sessione: "📅"
  insidia: "⚠️"
  classe: "🛡️"
  sottoclasse: "🎓"
  specie: "🧬"
  background: "📖"
  talento: "⭐"
