id: obsidian_plugins
version: 0.1.0
purpose: Solo plugin fondamentali usati dai template.
# Allineati ai plugin realmente installati in dist/GDR-vault (verificato dai
# main.js). NB: tabs = tab-panels; niente initiative-tracker.
# author/repo/license: attribuzione per THIRD-PARTY-LICENSES (verificato via API
# GitHub / package.json il 2026-06-04). Inclusi NON MODIFICATI come mera aggregazione
# (non relicenzia il codice MIT del progetto). GPL/AGPL: sorgente al repo.
plugins:
  # critico: il vault non funziona senza. `rompe` = cosa NON si vede (in italiano
  # semplice), mostrato dalla nota Diagnostica (views.renderDiagnostica) quando il
  # plugin è spento → l'utente non-tecnico sa quale riattivare invece di vedere codice.
  - id: templater-obsidian
    name: Templater
    author: SilentVoid
    repo: silentvoid13/Templater
    license: AGPL-3.0
    critico: true
    rompe: "I pulsanti «Crea» non funzionano: non puoi creare nuove note."
  - id: dataview
    name: Dataview
    author: Michael Brenan
    repo: blacksmithgu/obsidian-dataview
    license: MIT
    critico: true
    rompe: "La Home e gli indici (Atlante, Cast, Fronti…) restano vuoti o come codice."
  - id: obsidian-meta-bind-plugin
    name: Meta Bind
    author: Moritz Jung
    repo: mProjectsCode/obsidian-meta-bind-plugin
    license: GPL-3.0
    critico: true
    rompe: "I campi da compilare (slider, menu, testo) restano come codice grezzo."
  - id: js-engine
    name: JS Engine
    author: Moritz Jung
    repo: mProjectsCode/obsidian-js-engine-plugin
    license: GPL-3.0
    critico: true
    rompe: "I pannelli dinamici (radar, Stato del Mondo, questa diagnostica) non si disegnano."
  - id: tab-panels
    name: Tab Panels
    author: GnoxNahte
    repo: GnoxNahte/obsidian-tab-panels
    license: MIT
    critico: true
    rompe: "Le note a schede (Lore / Al tavolo / Collegamenti) appaiono come testo grezzo."
  - id: callout-manager
    name: Callout Manager
    author: eth-p
    repo: eth-p/obsidian-callout-manager
    license: MIT
  - id: obsidian-5e-statblocks
    name: Fantasy Statblocks
    author: Jeremy Valentine
    repo: Obsidian-TTRPG-Community/fantasy-statblocks
    license: MIT
    critico: true
    rompe: "Gli statblock dei mostri e il blocco incontro non si vedono."
  - id: metadata-menu
    name: Metadata Menu
    author: mdelobelle
    repo: mdelobelle/metadatamenu
    license: MIT
  - id: obsidian-icon-folder
    name: Iconize
    author: Florian Woelki
    repo: FlorianWoelki/obsidian-iconize
    license: MIT
  - id: calendarium
    name: Calendarium
    author: Jeremy Valentine
    repo: javalent/calendarium
    license: MIT
  - id: obsidian-dice-roller
    name: Dice Roller
    author: Jeremy Valentine
    repo: Obsidian-TTRPG-Community/dice-roller
    license: MIT
    critico: true
    rompe: "I tiri di dado sulla scheda e negli incontri non funzionano."
  - id: obsidian-tasks-plugin
    name: Tasks
    author: Obsidian Tasks contributors
    repo: obsidian-tasks-group/obsidian-tasks
    license: MIT
  - id: obsidian-excalidraw-plugin
    name: Excalidraw
    author: Zsolt Viczian
    repo: zsviczian/obsidian-excalidraw-plugin
    license: AGPL-3.0
  - id: zoom-map
    name: "TTRPG Tools - Maps"
    author: Jareika
    repo: Jareika/zoom-map
    license: MIT
  - id: obsidian42-brat
    name: BRAT
    author: TfTHacker
    repo: TfTHacker/obsidian42-brat
    license: MIT
  - id: homepage
    name: Homepage
    author: novov
    repo: mirnovov/obsidian-homepage
    license: MIT
  - id: initiative-tracker
    name: Initiative Tracker
    author: Jeremy Valentine
    repo: Obsidian-TTRPG-Community/initiative-tracker
    license: GPL-3.0
    critico: true
    rompe: "Il tracciatore d'iniziativa per i combattimenti non è disponibile."
  - id: folder-notes
    name: Folder Notes
    author: Lost Paul
    repo: LostPaul/obsidian-folder-notes
    license: AGPL-3.0
metabind_inputs:
  stato: INPUT[inlineSelect(option(bozza), option(pronto), option(in gioco), option(giocata), option(archiviata))]
  # Campi dei profili-sottotipo del luogo (gerarchia spaziale + edifici dell'insediamento).
  terreno: INPUT[inlineSelect(option(pianura), option(collina), option(montagna), option(foresta), option(deserto), option(costa), option(palude), option(tundra), option(sotterraneo), option(vulcanico), option(arcipelago))]
  taglia_insediamento: INPUT[inlineSelect(option(frazione), option(villaggio), option(cittadina), option(città), option(metropoli))]
  governo_locale: INPUT[inlineSelect(option(consiglio), option(signore), option(sindaco), option(teocratico), option(gilda), option(militare), option(anarchia))]
  servizi: INPUT[inlineListSuggester(option(mercato), option(tempio), option(porto), option(locanda), option(caserma), option(biblioteca), option(gilda), option(fucina), option(mura), option(molo), option(palazzo), option(prigione), option(arena), option(accademia), option(ospizio), option(banco dei pegni))]
  funzione_struttura: INPUT[inlineSelect(option(tempio), option(fortezza), option(ponte), option(faro), option(torre), option(mulino), option(diga), option(monumento), option(accademia), option(prigione))]
  stato_struttura: INPUT[inlineSelect(option(intatta), option(danneggiata), option(in rovina), option(abbandonata))]
  # Profondità città: ricchezza e sicurezza di un insediamento a colpo d'occhio.
  prosperita: INPUT[inlineSelect(option(misera), option(modesta), option(agiata), option(ricca), option(opulenta))]
  pericolosita: INPUT[inlineSelect(option(sicura), option(sorvegliata), option(malfamata), option(pericolosa), option(senza legge))]
  # Forma di successione (sottotipi di regno).
  successione: INPUT[inlineSelect(option(ereditaria), option(elettiva), option(per conquista), option(divina), option(nessuna))]
  # Esercito (consistenza = scala della forza; morale = tenuta in battaglia).
  consistenza: INPUT[inlineSelect(option(drappello), option(compagnia), option(reggimento), option(esercito), option(orda))]
  morale: INPUT[inlineSelect(option(in rotta), option(incerto), option(saldo), option(fanatico))]
  # Missione (stato d'avanzamento dell'incarico).
  stato_missione: INPUT[inlineSelect(option(proposta), option(in corso), option(completata), option(fallita), option(abbandonata))]
  # Calamità (gravità della sciagura).
  gravita: INPUT[inlineSelect(option(contenuta), option(seria), option(grave), option(catastrofica))]
  # Rango nobiliare/sociale del personaggio.
  rango: INPUT[inlineSelect(option(popolano), option(borghese), option(cavaliere), option(barone), option(visconte), option(conte), option(marchese), option(duca), option(principe), option(re), option(imperatore))]
  rivelazione: INPUT[inlineSelect(option(pubblico), option(incontrato), option(segreto))]
  mondo: INPUT[suggester(optionQuery("Mondi"), useLinks(partial), allowOther)]
  connessioni: INPUT[inlineListSuggester(optionQuery("Mondi"), useLinks(partial), allowOther)]
  sessioni: INPUT[inlineListSuggester(optionQuery("Mondi/Sessioni"), useLinks(partial), allowOther)]
  pressione: INPUT[slider(minValue(0), maxValue(10), stepSize(1), addLabels)]
  rarita: INPUT[inlineSelect(option(comune), option(non comune), option(raro), option(molto raro), option(leggendario), option(artefatto))]
  tier: INPUT[inlineSelect(option(1-4), option(5-10), option(11-16), option(17-20))]
  minaccia: INPUT[inlineSelect(option(moderata), option(pericolosa), option(letale))]
  scarsita: INPUT[inlineSelect(option(abbondante), option(comune), option(scarsa), option(rara), option(esaurita))]
  dado_vita: INPUT[inlineSelect(option(d6), option(d8), option(d10), option(d12))]
  incantesimi: INPUT[inlineSelect(option(nessuno), option(metà), option(piena), option(patto))]
  # Enum prima a TESTO LIBERO (set chiusi 5.5e): widget → picker su nota e (via
  # widget_options) nel wizard. padronanza = le 8 maestrie d'arma 2024 (combaciano con
  # system.yaml:maestrie_armi); tipo_creatura = i 14 tipi 5e (specie). car_primaria ha i
  # casi «o/e» → suggester con allowOther (scegli una o digita la combo).
  padronanza: INPUT[inlineSelect(option(Doppio fendente), option(Graffio), option(Colpo di striscio), option(Spinta), option(Fiaccare), option(Lentezza), option(Rovesciamento), option(Vessazione))]
  tipo_creatura: INPUT[inlineSelect(option(Aberrazione), option(Bestia), option(Celestiale), option(Costrutto), option(Drago), option(Elementale), option(Folletto), option(Gigante), option(Immondo), option(Melma), option(Mostruosità), option(Non morto), option(Pianta), option(Umanoide))]
  car_primaria: INPUT[suggester(option(Forza), option(Destrezza), option(Costituzione), option(Intelligenza), option(Saggezza), option(Carisma), allowOther)]
  # classi (incantesimo): chi può lanciarlo. Multi-pick dei 12 nomi-classe SRD + allowOther
  # (homebrew). VALORI in chiaro (NON link): l'import SRD scrive così e crea_pg/sali_pg li
  # leggono per sottostringa (lo spell-pool si romperebbe coi [[wikilink]]).
  classi: INPUT[inlineListSuggester(option(Barbaro), option(Bardo), option(Chierico), option(Druido), option(Guerriero), option(Ladro), option(Mago), option(Monaco), option(Paladino), option(Ranger), option(Stregone), option(Warlock), allowOther)]
  taglia: INPUT[inlineSelect(option(minuscola), option(piccola), option(media), option(grande), option(enorme), option(mastodontica))]
  dieta: INPUT[inlineSelect(option(carnivoro), option(erbivoro), option(onnivoro), option(spazzino), option(si nutre di magia), option(non si nutre))]
  genere: INPUT[inlineSelect(option(high fantasy), option(dark fantasy), option(sword & sorcery), option(grimdark), option(eroico), option(weird))]
  temi: INPUT[inlineListSuggester(option(politico), option(guerra), option(mistero), option(sopravvivenza), option(esplorazione), option(horror), option(intrigo), option(redenzione))]
  clima: INPUT[inlineSelect(option(temperato), option(arido), option(tropicale), option(artico), option(montano), option(costiero), option(sotterraneo))]
  portata: INPUT[inlineSelect(option(locale), option(regionale), option(nazionale), option(globale))]
  allineamento: INPUT[inlineSelect(option(Legale Buono), option(Neutrale Buono), option(Caotico Buono), option(Legale Neutrale), option(Neutrale), option(Caotico Neutrale), option(Legale Malvagio), option(Neutrale Malvagio), option(Caotico Malvagio))]
  stato_cosmico: INPUT[inlineSelect(option(attivo), option(dormiente), option(sigillato), option(disperso), option(distrutto))]
  fonte_potere: INPUT[inlineSelect(option(arcana), option(divina), option(primordiale), option(patto), option(innata), option(elementale))]
  accessibilita: INPUT[inlineSelect(option(aperto), option(soglie), option(rituale), option(sigillato))]
  stato_profezia: INPUT[inlineSelect(option(latente), option(in corso), option(avverata), option(scongiurata), option(fallita))]
  vitalita: INPUT[inlineSelect(option(viva), option(liturgica), option(franca), option(morta), option(segreta))]
  clock_dim: INPUT[inlineSelect(option(4), option(6), option(8))]
  gs: INPUT[inlineSelect(option(0), option(1/8), option(1/4), option(1/2), option(1), option(2), option(3), option(4), option(5), option(6), option(7), option(8), option(9), option(10), option(11), option(12), option(13), option(14), option(15), option(16), option(17), option(18), option(19), option(20))]
  legame: INPUT[suggester(optionQuery("Mondi"), useLinks(partial), allowOther)]
  # imageSuggester (come ritratto/banner): pesca l'IMMAGINE della mappa senza
  # digitare il path (il caso dominante: export PNG/SVG da Azgaar/Watabou in Media/).
  # renderMap risolve path/[[link]]/![[embed]]; il disegno Excalidraw a mano passa
  # dal bottone «Disegna mappa», non da questo campo (immagini-only).
  mappa: INPUT[imageSuggester()]
  ritratto: INPUT[imageSuggester()]
  banner: INPUT[imageSuggester()]
  segno: INPUT[inlineSelect(option(Ariete), option(Toro), option(Gemelli), option(Cancro), option(Leone), option(Vergine), option(Bilancia), option(Scorpione), option(Sagittario), option(Capricorno), option(Acquario), option(Pesci))]
  arcano: INPUT[inlineSelect(option(Il Matto), option(Il Bagatto), option(La Papessa), option(L’Imperatrice), option(L’Imperatore), option(Il Papa), option(Gli Amanti), option(Il Carro), option(La Giustizia), option(L’Eremita), option(La Ruota della Fortuna), option(La Forza), option(L’Appeso), option(La Morte), option(La Temperanza), option(Il Diavolo), option(La Torre), option(La Stella), option(La Luna), option(Il Sole), option(Il Giudizio), option(Il Mondo))]
  # Stili del generatore homebrew (genera.js): le opzioni DEVONO combaciare con
  # le chiavi di generatori.yaml:stili (validate lo impone, anti-drift).
  stile_nomi: INPUT[inlineSelect(option(romanzo, "Romanzo latino"), option(nordico, "Nordico"), option(silvano, "Silvano elfico"), option(montano, "Montano nanico"), option(tribale, "Tribale orchesco"), option(esotico, "Esotico arcano"))]
  testo_area: INPUT[textArea]
# Icone cartella (Iconize): chiave = chiave di core.folders, valore = emoji.
# render.py le mappa sul percorso reale e le inietta in obsidian-icon-folder.
