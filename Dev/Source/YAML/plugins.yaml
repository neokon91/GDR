id: obsidian_plugins
version: 0.1.0
purpose: Solo plugin fondamentali usati dai template.
# Allineati ai plugin realmente installati in dist/GDR-vault (verificato dai
# main.js). NB: tabs = tab-panels; niente initiative-tracker.
plugins:
  - id: templater-obsidian
    name: Templater
  - id: dataview
    name: Dataview
  - id: obsidian-meta-bind-plugin
    name: Meta Bind
  - id: js-engine
    name: JS Engine
  - id: tab-panels
    name: Tab Panels
  - id: callout-manager
    name: Callout Manager
  - id: obsidian-5e-statblocks
    name: Fantasy Statblocks
  - id: metadata-menu
    name: Metadata Menu
  - id: obsidian-icon-folder
    name: Iconize
  - id: calendarium
    name: Calendarium
  - id: obsidian-dice-roller
    name: Dice Roller
  - id: obsidian-tasks-plugin
    name: Tasks
  - id: obsidian-excalidraw-plugin
    name: Excalidraw
  - id: zoom-map
    name: "TTRPG Tools - Maps"
  - id: obsidian42-brat
    name: BRAT
  - id: homepage
    name: Homepage
  - id: initiative-tracker
    name: Initiative Tracker
  - id: folder-notes
    name: Folder Notes
metabind_inputs:
  stato: INPUT[inlineSelect(option(bozza), option(pronto), option(in gioco), option(giocata), option(archiviata))]
  mondo: INPUT[suggester(optionQuery("Mondi"), useLinks(partial), allowOther)]
  connessioni: INPUT[inlineListSuggester(optionQuery("Mondi"), useLinks(partial), allowOther)]
  sessioni: INPUT[inlineListSuggester(optionQuery("Mondi/Sessioni"), useLinks(partial), allowOther)]
  pressione: INPUT[slider(minValue(0), maxValue(10), stepSize(1), addLabels)]
  rarita: INPUT[inlineSelect(option(comune), option(non comune), option(raro), option(molto raro), option(leggendario), option(artefatto))]
  tier: INPUT[inlineSelect(option(1-4), option(5-10), option(11-16), option(17-20))]
  minaccia: INPUT[inlineSelect(option(moderata), option(pericolosa), option(letale))]
  scarsita: INPUT[inlineSelect(option(abbondante), option(comune), option(scarsa), option(rara), option(esaurita))]
  dado_vita: INPUT[inlineSelect(option(d6), option(d8), option(d10), option(d12))]
  incantesimi: INPUT[inlineSelect(option(nessuno), option(metà), option(piena), option(patto))]
  taglia: INPUT[inlineSelect(option(minuscola), option(piccola), option(media), option(grande), option(enorme), option(mastodontica))]
  dieta: INPUT[inlineSelect(option(carnivoro), option(erbivoro), option(onnivoro), option(spazzino), option(si nutre di magia), option(non si nutre))]
  scala: INPUT[inlineSelect(option(mondo), option(continente), option(regno), option(regione), option(insediamento))]
  genere: INPUT[inlineSelect(option(high fantasy), option(dark fantasy), option(sword & sorcery), option(grimdark), option(eroico), option(weird))]
  temi: INPUT[inlineListSuggester(option(politico), option(guerra), option(mistero), option(sopravvivenza), option(esplorazione), option(horror), option(intrigo), option(redenzione))]
  clima: INPUT[inlineSelect(option(temperato), option(arido), option(tropicale), option(artico), option(montano), option(costiero), option(sotterraneo))]
  portata: INPUT[inlineSelect(option(locale), option(regionale), option(nazionale), option(globale))]
  allineamento: INPUT[inlineSelect(option(Legale Buono), option(Neutrale Buono), option(Caotico Buono), option(Legale Neutrale), option(Neutrale), option(Caotico Neutrale), option(Legale Malvagio), option(Neutrale Malvagio), option(Caotico Malvagio))]
  stato_cosmico: INPUT[inlineSelect(option(attivo), option(dormiente), option(sigillato), option(disperso), option(distrutto))]
  fonte_potere: INPUT[inlineSelect(option(arcana), option(divina), option(primordiale), option(patto), option(innata), option(elementale))]
  accessibilita: INPUT[inlineSelect(option(aperto), option(soglie), option(rituale), option(sigillato))]
  stato_profezia: INPUT[inlineSelect(option(latente), option(in corso), option(avverata), option(scongiurata), option(fallita))]
  veridicita: INPUT[inlineSelect(option(vero), option(parziale), option(falso), option(ignoto))]
  vitalita: INPUT[inlineSelect(option(viva), option(liturgica), option(franca), option(morta), option(segreta))]
  salute: INPUT[inlineSelect(option(stabile), option(fragile), option(in collasso), option(rigenerante))]
  clock_dim: INPUT[inlineSelect(option(4), option(6), option(8))]
  gs: INPUT[inlineSelect(option(0), option(1/8), option(1/4), option(1/2), option(1), option(2), option(3), option(4), option(5), option(6), option(7), option(8), option(9), option(10), option(11), option(12), option(13), option(14), option(15), option(16), option(17), option(18), option(19), option(20))]
  legame: INPUT[suggester(optionQuery("Mondi"), useLinks(partial), allowOther)]
  mappa: INPUT[suggester(optionQuery("Mondi"), useLinks(partial), allowOther)]
  ritratto: INPUT[imageSuggester()]
  segno: INPUT[inlineSelect(option(Ariete), option(Toro), option(Gemelli), option(Cancro), option(Leone), option(Vergine), option(Bilancia), option(Scorpione), option(Sagittario), option(Capricorno), option(Acquario), option(Pesci))]
  arcano: INPUT[inlineSelect(option(Il Matto), option(Il Bagatto), option(La Papessa), option(L’Imperatrice), option(L’Imperatore), option(Il Papa), option(Gli Amanti), option(Il Carro), option(La Giustizia), option(L’Eremita), option(La Ruota della Fortuna), option(La Forza), option(L’Appeso), option(La Morte), option(La Temperanza), option(Il Diavolo), option(La Torre), option(La Stella), option(La Luna), option(Il Sole), option(Il Giudizio), option(Il Mondo))]
  # Stili del generatore homebrew (genera.js): le opzioni DEVONO combaciare con
  # le chiavi di generatori.yaml:stili (validate lo impone, anti-drift).
  stile_nomi: INPUT[inlineSelect(option(romanzo, "Romanzo latino"), option(nordico, "Nordico"), option(silvano, "Silvano elfico"), option(montano, "Montano nanico"), option(tribale, "Tribale orchesco"), option(esotico, "Esotico arcano"))]
  testo: INPUT[text]
  testo_area: INPUT[textArea]
# Icone cartella (Iconize): chiave = chiave di core.folders, valore = emoji.
# render.py le mappa sul percorso reale e le inietta in obsidian-icon-folder.
folder_icons:
  mondo: "🌍"
  cosmologia: "🌌"
  luogo: "🗺️"
  cultura: "🎏"
  fazione: "⚔️"
  risorsa: "📦"
  evento: "📜"
  lingua: "🗣️"
  personaggio: "🎭"
  creatura: "🐾"
  incontro: "🎲"
  oggetto: "🎒"
  incantesimo: "✨"
  regola: "📕"
  sessione: "📅"
  insidia: "⚠️"
  classe: "🛡️"
  sottoclasse: "🎓"
  specie: "🧬"
  background: "📖"
  talento: "⭐"
  divinita: "☀️"
  bastione: "🏰"
  epoca: "⏳"
  mito: "📖"
  culto: "🕯️"
  profezia: "🔮"
  regno: "👑"
  bioma: "🌲"
  ecosistema: "🌿"
  sistema_magico: "🪄"
  dominio: "🌐"
  legge_fondamentale: "⚖️"
  entita_primordiale: "🌑"
  piano: "🌀"
  inbox: "📥"
# Callout GDR custom (Callout Manager): identità visiva delle note. render.py li
# inietta in callout-manager (callouts.custom). color = "R, G, B"; icon = id lucide.
# Degradano a callout standard se il plugin non è attivo.
callouts:
  - { id: tavolo,  color: "201, 64, 64",   icon: lucide-swords }
  - { id: gancio,  color: "191, 130, 42",  icon: lucide-anchor }
  - { id: segreto, color: "138, 74, 173",  icon: lucide-eye-off }
  # Infobox stile wiki (macro identita_card): intestazione d'identità in cima alla
  # nota. Stile pesante in gdr.css; qui solo colore/icona (degrada a callout base).
  - { id: infobox, color: "90, 110, 140",  icon: lucide-scroll-text }
# Bottoni-azione: 'action' esegue un file Templater su z.modelli/azioni/ (serve
# anche l'entry in templates.yaml:actions); 'command' lancia un comando di
# Obsidian (nessuna azione-nota). I bottoni "Crea <Titolo>" sono generati da
# templates.yaml (id: crea-<id>).
buttons:
  - id: collega-nota
    label: Collega
    action: collega
  - id: marca-canonico
    label: Marca Canonico
    action: marca_canonico
  - id: archivia-nota
    label: Archivia
    action: archivia
  - id: applica-profilo
    label: Applica profilo
    action: applica_profilo
  - id: scatena-conseguenza
    label: Scatena conseguenza
    action: scatena_conseguenza
  - id: avanza-fronte
    label: Avanza fronte
    action: avanza_fronte
  - id: sali-di-livello
    label: Sali di livello
    action: sali_di_livello
  - id: riposo-lungo
    label: Riposo lungo
    action: riposo_lungo
  - id: riposo-breve
    label: Riposo breve
    action: riposo_breve
  - id: aggiorna-encounter
    label: Aggiorna encounter
    action: aggiorna_encounter
  - id: genera-statblock
    label: Genera statblock dal GS
    action: scaffold_statblock
  # Generatore homebrew (italiano, a tema): bottone Templater -> tp.user.genera.
  - id: genera-locale
    label: Genera (locale)
    action: genera
  # Turno di bastione (DMG 2024): registra un turno nel Registro dei turni.
  - id: turno-bastione
    label: Turno di bastione
    action: turno_bastione
