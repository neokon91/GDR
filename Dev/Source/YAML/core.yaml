      - strumento
      - oggetto magico
      - veleno
      - tesoro
      - veicolo o cavalcatura
  incantesimo:
    folder: incantesimo
    subtypes:
      - abiurazione
      - ammaliamento
      - divinazione
      - evocazione
      - illusione
      - invocazione
      - necromanzia
      - trasmutazione
  regola:
    folder: regola
    subtypes:
      - regola della casa
      - regola variante
  sessione:
    folder: sessione
    subtypes:
      - sessione
  insidia:
    folder: insidia
    subtypes:
      - trappola
      - pericolo naturale
      - effetto ambientale
  classe:
    folder: classe
    subtypes:
      - marziale
