id: gdr_core
version: 0.1.0
purpose: >-
  Globali del worldbuilding condivisi da TUTTE le entità: registro campi
  trasversali, superficie giocabile (tavolo) e stati del flusso. Lo schema
  specifico di ogni entità (tassonomia, scheda, assi, relazioni, wizard,
  template) vive in entities/*.yaml; lo schema di sistema 5.5e in system.yaml.
  render.py fonde tutto in un unico 'core'. Confine (validato da check): qui mai
  scheda/statblock/caratteristiche né categorie/relazioni/creation per-entità.
# Registro campi: unica fonte per label e widget dei campi editabili nelle note.
# I template Jinja li emettono via la macro field('<id>') (vedi Jinja/_macros.j2).
# widget: 'text' -> INPUT[text:<id>]; altrimenti nome di un template Meta Bind
# dichiarato in plugins.yaml:metabind_inputs -> INPUT[<widget>][:<id>].
# È un registro CENTRALE condiviso: i campi specifici di sistema 5.5e stanno in
# system.fields; un'entità può dichiararne di propri in entities/<x>.yaml:fields.
fields:
  tipo:           { label: Tipo,                 widget: text }
  stato:          { label: Stato,                widget: stato }
  mondo:          { label: Mondo,                widget: mondo }
  connessioni:    { label: Connessioni,          widget: connessioni }
  sessioni:       { label: Sessioni,             widget: sessioni }
  pressione:      { label: Pressione,            widget: pressione }
  prossima_mossa: { label: Prossima mossa,       widget: text }
  # Clock & conseguenze (Fase 2): un fronte traccia un orologio a segmenti che,
  # pieno, scatena una conseguenza nel mondo (vedi macro clock() + meta_actions).
  clock_dim:      { label: "Clock (segmenti)",   widget: clock_dim }
  clock:          { label: "Clock (pieni)",      widget: number }
  conseguenza:    { label: Conseguenza,          widget: testo_area }
  conseguenza_su: { label: Conseguenza su,       widget: legame }
  uso_al_tavolo:  { label: Uso al tavolo,        widget: testo_area }
  gancio:         { label: Gancio,               widget: testo_area }
  player_safe:    { label: Versione player-safe, widget: text }
  # Rivelazione progressiva (sito-giocatori): QUANDO la nota entra nel portale dei
  # giocatori. Asse temporale, ortogonale a `visibilita` (che è il «mai»: dm/meta).
  # pubblico < incontrato < segreto; il build del sito sceglie il livello (`--reveal`)
  # e include una nota se il suo tier <= livello. Default (assente) = pubblico.
  rivelazione:    { label: Rivelazione, widget: rivelazione }
  obiettivo:      { label: Obiettivo,            widget: text }
  apertura:       { label: Apertura,             widget: text }
  scena_corrente: { label: Scena corrente,       widget: text }
  quando:         { label: Quando,               widget: text }
  # Ponte Calendarium ('tempo del mondo'): chiavi fc-* lette dal plugin per far
  # comparire un evento sul calendario/agenda. 'quando' resta l'etichetta in
  # prosa (e alimenta la nostra timeline); fc-date è la data macchina nel formato
  # del calendario attivo (Gregorian: YYYY-MM-DD). fc-calendar/fc-category sono
  # opzionali (nome del calendario di destinazione / categoria-colore).
  fc-date:        { label: "Data (calendario)",  widget: text }
  fc-end:         { label: "Fine (calendario)",  widget: text }
  fc-calendar:    { label: "Calendario",         widget: text }
  fc-category:    { label: "Categoria evento",   widget: text }
  allineamento:   { label: Allineamento,         widget: allineamento }
  # Campi strutturati di lore (mostrati da scheda(), tipizzati in fileClass)
  epoca:          { label: Epoca,                widget: text }
  genere:         { label: Genere,               widget: genere }
  temi:           { label: Temi,                 widget: temi }
  clima:          { label: Clima,                widget: clima }
  popolazione:    { label: Popolazione,          widget: text }
  # Mappa collegata (luogo/mondo): link a un disegno Excalidraw, un'immagine o una nota.
  mappa:          { label: Mappa,                widget: mappa }
  portata:        { label: Portata,              widget: portata }
  pronomi:        { label: Pronomi,              widget: text }
  eta:            { label: Età,                  widget: text }
  # Tema natale (recupero #9, astrologia.yaml): segno → profilo derivato; arcano opzionale.
  segno:          { label: Segno,                widget: segno }
  arcano:         { label: Arcano,               widget: arcano }
  # Ritratto/immagine (infobox stile wiki): un'immagine del vault (Meta Bind imageSuggester).
  ritratto:       { label: Ritratto,             widget: ritratto }
  # Stile dei nomi (generatore homebrew): su cultura/specie sceglie lo stile da cui
  # genera.js compone nomi a tema. Opzioni = stili di generatori.yaml (vedi metabind).
  stile_nomi:     { label: Stile dei nomi,       widget: stile_nomi }

# Categorie il cui infobox mostra il selettore Ritratto (immagine): quelle "visive".
# Le altre (regole/concetti astratti) restano senza per non ingombrare.
ritratto_categorie:
  - personaggio
  - creatura
  - luogo
  - mondo
  - oggetto
  - fazione
  - regno
  - divinita
  - culto
  - bastione
  - mito
  - cultura
  - specie

# Entità "durature" che cambiano attraverso le epoche: ricevono la tab Cronologia
# (proprietà `tappe`, righe "quando | stato" → views.renderTappe). Il mondo NON è
# statico: un luogo si fonda/fiorisce/cade, un regno sorge e crolla. Le entità
# astratte/meccaniche/effimere (cosmologia/regole/incontri/eventi) restano fuori:
# un evento È un punto nel tempo, non un'entità che evolve.
tappe_categorie:
  - mondo
  - luogo
  - regno
  - cultura
  - fazione
  - culto
  - divinita   # una divinità evolve attraverso le epoche (venerata, dimenticata, sepolta, risvegliata)

# Categorie dove il MOTORE DI COERENZA (views.renderCoerenza) ha senso: hanno
# relazioni di RIVALITÀ/ALLEANZA same-type (assi condivisi per costruzione), quindi
# il confronto può davvero scattare. Sulle altre sarebbe sempre vuoto (gli assi con
# lo stesso id fra tipi diversi quasi non esistono) → niente pannello-fantasma.
coerenza_categorie:
  - fazione
  - culto
  - divinita
  - regno
  - personaggio

# Categorie che possono essere un FRONTE: attori con agenda/momento (sociale,
# politico, religioso) o principi cosmici che premono sul tavolo. Solo qui la
# superficie giocabile espone la macchina del clock (pressione + clock_dim +
# conseguenza + Avanza/Scatena + pannelli renderClock/renderPressioni). Sulle
# altre (bioma, lingua, mito, ecosistema, epoca, evento…) un orologio non ha
# senso: l'Al tavolo resta — Uso al tavolo, Gancio, Condivisione sono universali —
# ma senza il Fronte. NB: deve contenere il set COSMO di views.js (i principi che
# il grafo cosmico tratta già da Fronti), altrimenti il clock e le sue spinte si
# scollerebbero. Validato da check() (le categorie devono esistere).
fronte_categorie:
  - mondo
  - fazione
  - culto
  - divinita
  - regno
  - luogo
  - cultura
  - profezia
  - personaggio   # un PNG con un piano (o un PG sotto un clock personale: maledizione/corruzione) è un Fronte
  - cosmologia
  - dominio
  - piano
  - legge_fondamentale
  - entita_primordiale
  - sistema_magico
  - esercito   # una forza armata in campagna è un Fronte: il clock marcia verso la battaglia

# GRUPPI di entità: la mappa concettuale del worldbuilding. Ogni entità dichiara il
# suo `gruppo` (entities/<x>.yaml); render.py lo porta in core.categories[cat].gruppo
# e qui sta l'ordine + le etichette. Guida Home/indici (navigazione per gruppo) ed è
# il primo strato della tassonomia (sopra famiglia+tipo). NB: `mondo` è la CORNICE che
# contiene tutto il resto, non un pari di luogo; `regno` è POLITICO (popoli&poteri),
# non geografico. Validato da check() (ogni gruppo-entità deve esistere qui).
gruppi:
  - { id: mondo,     label: "La cornice",         icona: "🌍", descrizione: "Il mondo che racchiude e collega tutto il resto." }
  - { id: geografia, label: "Geografia & luoghi", icona: "🗺", descrizione: "Lo spazio: luoghi (dal continente al dungeon), biomi, ecosistemi, risorse." }
  - { id: tempo,     label: "Tempo & storia",     icona: "🕰", descrizione: "Il divenire: epoche, eventi, miti, profezie." }
  - { id: societa,   label: "Popoli & poteri",    icona: "👥", descrizione: "Chi agisce: regni, fazioni, culture, specie, personaggi, culti, lingue." }
  - { id: cosmo,     label: "Cosmo & metafisica", icona: "🌌", descrizione: "Il sacro e l'ontologia: cosmologia, divinità, piani, leggi, primordiali, magia." }
  - { id: regole,    label: "Regole 5.5e",        icona: "⚔", descrizione: "Il sistema: classi, incantesimi, creature, oggetti, talenti, bastioni…" }
  - { id: tavolo,    label: "Al tavolo",          icona: "🎲", descrizione: "La giocata: incontri, sessioni, appunti." }

# Superficie giocabile (IL differenziatore): ogni nota lore la espone, sempre.
# Single source renderizzato dalla macro tavolo(); i campi sono in core.fields.
# 'pressione' e' speciale: la macro aggiunge l'etichetta calcolata e prossima_mossa.
tavolo:
  - { field: uso_al_tavolo, callout: tavolo,  title: Uso al tavolo }
  - { field: gancio,        callout: gancio,  title: Gancio, fold: true }
  - { field: pressione,     callout: warning, title: Pressione }

# Stati del flusso (condivisi): Select 'stato' nelle fileClass e nell'identità.
states:
  - bozza
  - pronto
  - in gioco
  - giocata
  - archiviata

# Spunti di worldbuilding: domande per accendere l'idea davanti al foglio bianco
# (accoglienza stile World Anvil). Per categoria. Li pescano il tour «Crea il tuo
# mondo» e il callout 💡 Spunti nel tab Lore (macro spunti(), solo per le categorie
# qui elencate). Bastano poche frasi: il resto cresce giocando.
spunti:
  mondo:
    - "Qual è la tensione centrale che muove tutto? (chi vuole cosa, e perché proprio ora)"
    - Cosa rende questo mondo diverso da una terra qualunque?
    - "Genere e tono in una frase (dark fantasy di frontiera, eroico, weird…)."
  luogo:
    - Cosa c'è di sbagliato o di teso qui, proprio adesso?
    - Chi lo controlla — e chi vorrebbe strapparglielo?
    - "Cosa sta per succedere? (la pressione, la prossima mossa)"
  fazione:
    - Cosa vuole davvero, e cosa è disposta a fare per averlo?
    - Chi le si oppone? Con chi è alleata per pura convenienza?
    - Qual è la sua debolezza, o il segreto che non deve uscire?
  cultura:
    - Cosa venera o teme questo popolo? Qual è il suo valore supremo?
    - Un costume o un rito che a un forestiero sembra assurdo.
    - Come tratta gli stranieri, i morti, il potere?
  divinita:
    - Di cosa è dio/dea — e cosa chiede ai suoi fedeli?
    - "Come si manifesta nel mondo? (miracoli, segni, silenzi)"
    - Chi la odia, e perché?
  regno:
    - Chi siede sul trono, e quanto è saldo?
    - Qual è la minaccia che potrebbe farlo cadere?
    - Da cosa trae ricchezza e potere?
  specie:
    - Cosa la rende davvero ALIENA o memorabile (non «umani con le orecchie a punta»)?
    - Qual è il suo rapporto con le altre genti?
    - Un dono e una maledizione della sua natura.
  evento:
    - Cosa è successo, e perché conta ancora oggi?
    - Chi ne è uscito vincitore, e chi distrutto?
    - Quale ferita, o quale leggenda, ha lasciato?
  personaggio:
    - Cosa vuole, e cosa lo ferma?
    - Un segreto, una paura, una contraddizione.
    - Come può intrecciarsi con i personaggi giocanti?
  bioma:
    - "Cosa rende questo bioma diverso dal solito? (un fenomeno, una creatura, una regola che cambia)"
    - "Cosa vi attira gli avventurieri — e cosa li fa pentire di esserci entrati?"
    - "Quale risorsa o pericolo nasconde sotto la superficie?"
  ecosistema:
    - "Qual è l'anello debole della catena — la specie che, se sparisce, fa crollare tutto?"
    - "Cosa lo sta spezzando proprio ora, e chi se ne accorgerà per primo?"
    - "Cosa accade al mondo intorno se questo equilibrio salta?"
  lingua:
    - "Chi la parla — e chi NON deve mai sentirla o pronunciarla?"
    - "Una parola o frase usabile al tavolo: cosa significa, e cosa fa?"
    - "È viva o sta morendo? Chi la tiene in vita, e perché?"
  risorsa:
    - "Chi la controlla oggi — e chi la vuole abbastanza da uccidere per averla?"
    - "Cosa succede al mondo se sparisce, o se qualcuno ne ottiene il monopolio?"
    - "Da dove viene davvero, e cosa nasconde la sua filiera?"
  epoca:
    - "Cosa rese quest'era diversa da quella prima e quella dopo?"
    - "Quale evento la apre e quale la chiude?"
    - "Cosa di lei sopravvive nel presente?"
  mito:
    - "Chi lo racconta, e a chi conviene che ci si creda?"
    - "C'è un nocciolo di verità sotto la leggenda?"
    - "Cosa succede se qualcuno scopre che è falso — o che è vero?"
  profezia:
    - "Chi crede a questa profezia e chi la teme?"
    - "Cosa deve accadere perché si compia — e chi lavora per impedirlo?"
    - "E se l'interpretazione comune fosse sbagliata?"
  culto:
    - "Cosa promette ai fedeli, e cosa pretende in cambio?"
    - "C'è un'eresia o uno scisma che lo minaccia dall'interno?"
    - "Qual è la verità che solo gli iniziati conoscono?"
  oggetto:
    - "A cosa serve davvero, e chi lo vuole?"
    - "Ha un costo nascosto o una volontà propria?"
    - "Da dove viene — e perché è finito qui?"
  cosmologia:
    - "Qual è il principio primo da cui tutto discende — e cosa c'era prima?"
    - "Verso dove tende il cosmo: ciclo eterno, fine annunciata, rinascita?"
    - "Cosa di questo quadro è ignoto persino ai sapienti?"
  dominio:
    - "Di quale aspetto della realtà è la sfera — e cosa mette in moto?"
    - "Con quale dominio opposto è in tensione, e chi vince adesso?"
    - "Quali divinità o primordiali lo incarnano nel mondo?"
  piano:
    - "Che sostanza e che leggi fisiche ha — e cosa vi uccide un mortale?"
    - "Come si entra e si esce: soglia, rito, morte, sogno?"
    - "Come si fa sentire la sua presenza nel mondo materiale?"
  legge_fondamentale:
    - "Quali sono i due poli, e verso quale pende oggi la realtà?"
    - "Cosa accade — nel mondo, non in astratto — se la legge si spezza?"
    - "Chi o cosa la incarna, e chi sogna di infrangerla?"
  entita_primordiale:
    - "Quale legge incarna — ed è mente cosciente o forza cieca?"
    - "Dorme, è sigillata o desta? E cosa basterebbe a risvegliarla?"
    - "Cosa ha lasciato dietro di sé: stirpi, divinità, una ferita nel mondo?"
  sistema_magico:
    - "Da dove viene il potere — e che prezzo esige da chi lo usa?"
    - "Come si pratica: parole, sangue, patti, sigilli? E cosa va storto?"
    - "Chi può impararla, e chi è escluso o la teme?"
  regola:
    - "Quale frustrazione del regolamento standard risolve?"
    - "Rende qualcosa più rischioso o più fluido?"
    - "Vale per tutti o solo in certe scene?"
  creatura:
    - "Cosa la rende pericolosa al di là dei numeri?"
    - "Come caccia o si difende?"
    - "Che leggenda raccontano di lei i popoli vicini?"
  incontro:
    - "Qual è l'obiettivo della scena e la posta se va male?"
    - "Cosa nell'ambiente complica lo scontro?"
    - "Cosa vogliono davvero gli avversari — si può evitare il sangue?"
  albero_evolutivo:
    - "Cosa custodisce l'accesso al primo grado?"
    - "Che prova o costo separa un grado dal successivo?"
    - "Chi sono gli esempi viventi all'apice?"
