id: gdr_core
version: 0.1.0
purpose: Fonte minima per ontologia, campi e cartelle del vault.
folders:
  mondo: Mondi
  cosmologia: Mondi/Cosmologia
  luogo: Mondi/Luoghi
  cultura: Mondi/Culture
  fazione: Mondi/Fazioni
  evento: Mondi/Eventi
  lingua: Mondi/Lingue
  personaggio: Mondi/Personaggi
  creatura: Mondi/Creature
  incontro: Mondi/Incontri
  oggetto: Mondi/Oggetti
  incantesimo: Mondi/Incantesimi
  regola: Mondi/Regole
  sessione: Mondi/Sessioni
  # Sistema 5.5e — riferimento e homebrew
  insidia: Mondi/Insidie
  classe: Mondi/Classi
  sottoclasse: Mondi/Sottoclassi
  specie: Mondi/Specie
  background: Mondi/Background
  talento: Mondi/Talenti
  divinita: Mondi/Divinita
  bastione: Mondi/Bastioni
  inbox: Inbox
# Registro campi: unica fonte per label e widget dei campi editabili nelle note.
# I template Jinja li emettono via la macro field('<id>') (vedi Jinja/_macros.j2).
# widget: 'text' -> INPUT[text:<id>]; altrimenti nome di un template Meta Bind
# dichiarato in plugins.yaml:metabind_inputs -> INPUT[<widget>][:<id>].
fields:
  tipo:           { label: Tipo,                 widget: text }
  stato:          { label: Stato,                widget: stato }
  mondo:          { label: Mondo,                widget: mondo }
  connessioni:    { label: Connessioni,          widget: connessioni }
  sessioni:       { label: Sessioni,             widget: sessioni }
  pressione:      { label: Pressione,            widget: pressione }
  prossima_mossa: { label: Prossima mossa,       widget: text }
  uso_al_tavolo:  { label: Uso al tavolo,        widget: testo_area }
  gancio:         { label: Gancio,               widget: testo_area }
  player_safe:    { label: Versione player-safe, widget: text }
  obiettivo:      { label: Obiettivo,            widget: text }
  apertura:       { label: Apertura,             widget: text }
  scena_corrente: { label: Scena corrente,       widget: text }
  quando:         { label: Quando,               widget: text }
  # Sistema 5.5e — oggetti magici
  rarita:         { label: Rarità,               widget: rarita }
  sintonia:       { label: Sintonia,             widget: text }
  # Sistema 5.5e — incantesimi
  livello:        { label: Livello,              widget: number }
  tempo_lancio:   { label: Tempo di lancio,      widget: text }
  gittata:        { label: Gittata,              widget: text }
  componenti:     { label: Componenti,           widget: text }
  durata:         { label: Durata,               widget: text }
  classi:         { label: Classi,               widget: text }
  # Sistema 5.5e — insidie (trappole/pericoli)
  tier:           { label: Livello di gioco,     widget: tier }
  minaccia:       { label: Minaccia,             widget: minaccia }
  prova:          { label: Prova,                widget: text }
  danno:          { label: Danno / Effetto,      widget: text }
  # Sistema 5.5e — classe homebrew
  dado_vita:      { label: Dado vita,            widget: dado_vita }
  car_primaria:   { label: Caratteristica primaria, widget: text }
  ts_competenze:  { label: TS competenti,        widget: text }
  incantesimi:    { label: Incantesimi,          widget: incantesimi }
  # Sistema 5.5e — specie
  taglia:         { label: Taglia,               widget: taglia }
  velocita:       { label: Velocità,             widget: text }
  tipo_creatura:  { label: Tipo di creatura,     widget: text }
  lignaggio:      { label: Lignaggio,            widget: text }
  # Sistema 5.5e — background / talento / divinità
  car_background: { label: Caratteristiche,      widget: text }
  strumento:      { label: Competenza in strumenti, widget: text }
  talento_origine: { label: "Talento d'origine", widget: text }
  prerequisito:   { label: Prerequisito,         widget: text }
  ripetibile:     { label: Ripetibile,           widget: text }
  dominio:        { label: Dominio,              widget: text }
  allineamento:   { label: Allineamento,         widget: text }
  simbolo:        { label: Simbolo,              widget: text }

# Superficie giocabile (IL differenziatore): ogni nota lore la espone, sempre.
# Single source renderizzato dalla macro tavolo(); i campi sono in core.fields.
# 'pressione' e' speciale: la macro aggiunge l'etichetta calcolata e prossima_mossa.
tavolo:
  - { field: uso_al_tavolo, callout: tavolo,  title: Uso al tavolo }
  - { field: gancio,        callout: gancio,  title: Gancio, fold: true }
  - { field: pressione,     callout: warning, title: Pressione }

# Scheda di sistema: campi STRUTTURATI per categoria, mostrati dalla macro
# scheda(categoria) come callout di dati (Meta Bind). Single source; i campi sono
# in core.fields. È la controparte "regole 5.5e" della superficie giocabile.
scheda:
  oggetto:     [rarita, sintonia]
  incantesimo: [livello, tempo_lancio, gittata, componenti, durata, classi]
  insidia:     [tier, minaccia, prova, danno]
  classe:      [dado_vita, car_primaria, ts_competenze, incantesimi]
  specie:      [taglia, velocita, tipo_creatura, lignaggio]
  background:  [car_background, strumento, talento_origine]
  talento:     [prerequisito, ripetibile]
  divinita:    [dominio, allineamento, simbolo]

# Statblock (Fantasy Statblocks): layout usato dal blocco ```statblock```.
# Sostituisci col nome del layout installato (es. un layout 2024/5.5e).
statblock:
  layout: Basic 5e Layout

# Caratteristiche 5e per la scheda PG (macro scheda_pg). id = chiave frontmatter
# (INPUT[number]); il modificatore e' calcolato e SALVATO in mod_<id> (compute_into)
# cosi' e' interrogabile da Dataview e dalle altre note.
caratteristiche:
  - { id: forza,        sigla: FOR }
  - { id: destrezza,    sigla: DES }
  - { id: costituzione, sigla: COS }
  - { id: intelligenza, sigla: INT }
  - { id: saggezza,     sigla: SAG }
  - { id: carisma,      sigla: CAR }
