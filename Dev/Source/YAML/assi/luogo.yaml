# Assi tematici (formato ricco 1-5) per l'entità 'luogo'.
# Scorporati da entities/luogo.yaml; render.py li rifonde in core.assi_tematici.
id: luogo
assi:
- id: stabilita_spaziale
  nome: Stabilità Spaziale
  descrizione: Quanto lo spazio del luogo è fisso e misurabile, o mutevole e illusorio.
  valori:
    1:
      etichetta: Solido
      descrizione: Confini chiari e immutabili; geografia costante, coordinate affidabili.
    2:
      etichetta: Plastico
      descrizione: Alcune caratteristiche cambiano lievemente nel tempo o con le condizioni.
    3:
      etichetta: Anomalo
      descrizione: 'Anomalie localizzate: stanze impossibili, passaggi che appaiono
        solo a volte.'
    4:
      etichetta: Instabile
      descrizione: Si trasforma spesso o imprevedibilmente; la mappa perde validità.
    5:
      etichetta: Mutante
      descrizione: Nessuna forma definita; cambia con la volontà o la magia, spazio
        concettuale.
- id: coerenza_temporale
  nome: Coerenza Temporale
  descrizione: Come scorre il tempo nel luogo, se normalmente o alterato.
  valori:
    1:
      etichetta: Lineare
      descrizione: Tempo stabile e prevedibile; ore, giorni e anni scorrono normalmente.
    2:
      etichetta: Ondulato
      descrizione: Accelera o rallenta leggermente in alcune zone, senza conseguenze
        gravi.
    3:
      etichetta: Distorto
      descrizione: 'Varia in modo netto: accelerazioni, ripetizioni, ritardi o salti.'
    4:
      etichetta: Fratturato
      descrizione: Più flussi temporali simultanei; gli eventi non seguono un ordine.
    5:
      etichetta: Atemporale
      descrizione: Tempo assente o negato; il luogo è congelato, eterno, fuori dal
        tempo.
- id: presenza_magica
  nome: Presenza Magica
  descrizione: Quantità e densità della magia presente nel luogo.
  valori:
    1:
      etichetta: Nulla
      descrizione: Nessuna magia; gli incantesimi faticano o falliscono. Luogo morto
        sul piano arcano.
    2:
      etichetta: Debole
      descrizione: Magia latente; piccole reazioni o presenze residue.
    3:
      etichetta: Attiva
      descrizione: Risponde alla magia; può ospitare nodi, fonti o rituali. Effetti
        normali.
    4:
      etichetta: Densa
      descrizione: La magia permea tutto; oggetti si incantano, creature mutano.
    5:
      etichetta: Sovraccarica
      descrizione: Fonte vivente di energia; la magia si manifesta senza controllo.
- id: sacralita
  nome: Sacralità
  descrizione: Valore spirituale, mistico o religioso del luogo.
  valori:
    1:
      etichetta: Profano
      descrizione: Privo di significato spirituale, o impuro/blasfemo.
    2:
      etichetta: Neutro
      descrizione: Nessuna connotazione sacra o empia; solo un luogo fisico.
    3:
      etichetta: Rituale
      descrizione: Usato per pratiche religiose o cultuali, ma non sacro in sé.
    4:
      etichetta: Benedetto
      descrizione: Sacro per uno o più culti; reliquie, miracoli, presenze divine.
    5:
      etichetta: Axis Mundi
      descrizione: Centro del mondo, contatto coi piani; archetipo vivente, nodo cosmico.
- id: civilizzazione
  nome: Civilizzazione
  descrizione: Grado di presenza e influenza di civiltà intelligenti.
  valori:
    1:
      etichetta: Selvaggio
      descrizione: Natura primordiale, nessuna presenza intelligente; ambiente incontaminato.
    2:
      etichetta: Marginale
      descrizione: Piccoli insediamenti, ruderi o tribù; influenza civilizzata minima.
    3:
      etichetta: Colonizzato
      descrizione: Villaggi, rotte, campi o torri; presenza stabile ma dispersa.
    4:
      etichetta: Urbanizzato
      descrizione: Città, templi, fortezze; il luogo è plasmato da architettura e
        cultura.
    5:
      etichetta: Iperevoluto
      descrizione: Tecnomagia, città viventi, coscienze collettive; civilizzazione
        pura.
- id: pericolosita_ontologica
  nome: Pericolosità Ontologica
  descrizione: "Capacità del luogo di alterare, corrompere o minacciare la stabilità dell’essere, della mente o dell’anima."
  valori:
    1: { etichetta: "Sicuro", descrizione: "Nessun rischio particolare. Il luogo è stabile, integro, non influisce sulla realtà o sull’identità dell’osservatore." }
    2: { etichetta: "Alieno", descrizione: "L’ambiente ha regole insolite ma non pericolose. Stimola sogni strani, percezioni nuove o visioni simboliche." }
    3: { etichetta: "Instabile", descrizione: "Il luogo distorce la mente o l’essenza dell’individuo. Le leggi della realtà vacillano. Identità e tempo possono frammentarsi." }
    4: { etichetta: "Corrompente", descrizione: "Il luogo genera mutazioni, possessioni, paradossi. Ogni permanenza altera profondamente l’essere. L’accesso richiede protezioni rituali o sacrifici spirituali." }
    5: { etichetta: "Corrosivo", descrizione: "Il luogo annulla o riscrive l’esistenza. L’identità si dissolve, le memorie vengono risucchiate. È una “bocca cosmica” che devasta anima e realtà. Tipico di luoghi del Vuoto o dell’Abisso." }
- id: stratificazione_dimensionale
  nome: Stratificazione Dimensionale
  descrizione: "Livelli di realtà che coesistono o si intersecano nel luogo."
  valori:
    1: { etichetta: "Monoplanare", descrizione: "Il luogo esiste su un solo livello dimensionale. Non vi sono interferenze da altri piani o realtà." }
    2: { etichetta: "Semi-velato", descrizione: "Si percepiscono echi o tracce di altri piani (ombre, sogni, apparizioni). Alcuni rituali rivelano livelli nascosti." }
    3: { etichetta: "Intersezione", descrizione: "Il luogo è un crocevia. Due o più piani si sovrappongono parzialmente. Magie o creature extradimensionali possono emergere." }
    4: { etichetta: "Sospeso", descrizione: "Il luogo oscilla fra due realtà. Le leggi fisiche cambiano ciclicamente. Le entità sembrano appartenere a piani multipli." }
    5: { etichetta: "Multi-planare", descrizione: "Il luogo esiste simultaneamente su più piani. I confini tra sogno, realtà, spirito e magia sono dissolti. Ogni punto può condurre altrove. Tipico di Axis Mundi, Nexus, Sancta Cosmici." }
- id: risonanza_psichica
  nome: Risonanza Psichica
  descrizione: "Interazione tra coscienza dell’individuo e “mente” del luogo. Indica se il luogo è passivo o reagisce ai pensieri, emozioni, ricordi di chi lo visita."
  valori:
    1: { etichetta: "Neutro", descrizione: "Il luogo non presenta alcuna risonanza psichica. È materia inerte, priva di eco spirituale o coscienza." }
    2: { etichetta: "Memorizzante", descrizione: "Il luogo conserva echi degli eventi passati. Si manifestano sogni residui, memorie ancestrali, impronte emozionali." }
    3: { etichetta: "Suggestivo", descrizione: "Il luogo influisce su stati d’animo e visioni. Genera ispirazioni, incubi, euforia o inquietudine. La sua presenza condiziona l’esperienza soggettiva." }
    4: { etichetta: "Riflettente", descrizione: "Il luogo si adatta alla mente di chi entra. Modifica forma, colori o eventi in base alle emozioni. Ogni visitatore lo percepisce diversamente." }
    5: { etichetta: "Empatico", descrizione: "Il luogo ha una volontà psichica attiva. Comunica, seduce, manipola o giudica. Può fondersi con la coscienza, rivelando traumi, desideri o verità." }
