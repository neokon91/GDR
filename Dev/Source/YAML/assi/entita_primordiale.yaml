# Assi tematici (formato ricco 1-5) per l'entità 'entita_primordiale' (essere pre-divino).
# render.py li rifonde in core.assi_tematici → tab Carattere + radar.
id: entita_primordiale
assi:
- id: coscienza
  nome: Coscienza
  descrizione: Quanto è mente cosciente o forza cieca.
  valori:
    1: { etichetta: Cieca,     descrizione: "Forza senza mente né intento." }
    2: { etichetta: Istintiva, descrizione: "Reagisce, non ragiona." }
    3: { etichetta: Senziente, descrizione: "Consapevole, ma di logica aliena." }
    4: { etichetta: Volitiva,  descrizione: "Ha scopi, piani, una volontà lucida." }
    5: { etichetta: Sovrana,   descrizione: "Mente vasta che abbraccia ere e mondi." }
- id: risveglio
  nome: Risveglio
  descrizione: Lo stato di attività dell'entità nel cosmo.
  valori:
    1: { etichetta: Sigillata,  descrizione: "Imprigionata o spenta, inattiva." }
    2: { etichetta: Dormiente,  descrizione: "Assopita; sogna e mormora." }
    3: { etichetta: Stirante,   descrizione: "Si desta a tratti, smuove il mondo." }
    4: { etichetta: Desta,      descrizione: "Attiva e presente, agisce nel cosmo." }
    5: { etichetta: Scatenata,  descrizione: "Pienamente libera; ogni sua azione è evento cosmico." }
- id: potenza
  nome: Potenza
  descrizione: La scala del suo potere.
  valori:
    1: { etichetta: Diminuita,  descrizione: "Un'eco del suo antico potere." }
    2: { etichetta: Locale,     descrizione: "Potente in un luogo o ambito." }
    3: { etichetta: Maggiore,   descrizione: "Forza di scala continentale o planare." }
    4: { etichetta: Cosmica,    descrizione: "Rivaleggia con le leggi del mondo." }
    5: { etichetta: Illimitata, descrizione: "Il suo potere non ha confini noti." }
- id: disposizione
  nome: Disposizione
  descrizione: Il suo atteggiamento verso il mondo e la vita.
  valori:
    1: { etichetta: Protettiva,   descrizione: "Custodisce vita e ordine." }
    2: { etichetta: Benevola,     descrizione: "Favorevole, ma per fini suoi." }
    3: { etichetta: Indifferente, descrizione: "Il mondo non la riguarda." }
    4: { etichetta: Ostile,       descrizione: "Nemica della vita e delle sue forme." }
    5: { etichetta: Divorante,    descrizione: "Esiste per disfare, consumare, annullare." }
- id: tangibilita
  nome: Tangibilità
  descrizione: Quanto è presenza concreta o puro principio.
  valori:
    1: { etichetta: Concetto,     descrizione: "Puro principio, senza forma." }
    2: { etichetta: Presenza,     descrizione: "Avvertibile, senza corpo." }
    3: { etichetta: Aspetto,      descrizione: "Si mostra in forme transitorie." }
    4: { etichetta: Incarnata,    descrizione: "Ha un corpo o una sede fisica." }
    5: { etichetta: Onnipresente, descrizione: "La sua sostanza pervade luoghi e stirpi." }
