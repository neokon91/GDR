# Assi tematici (formato ricco 1-5) per l'entità 'personaggio'.
# Scorporati da entities/personaggio.yaml; render.py li rifonde in core.assi_tematici.
id: personaggio
assi:
- id: moralita
  nome: Moralità
  descrizione: Quanto antepone gli altri a sé stesso.
  valori:
    1:
      etichetta: Altruista
      descrizione: Si sacrifica per gli altri; il bene comune prima di tutto.
    2:
      etichetta: Generoso
      descrizione: Aiuta volentieri, ma bada anche a sé.
    3:
      etichetta: Pragmatico
      descrizione: Bilancia interesse proprio e altrui secondo il caso.
    4:
      etichetta: Interessato
      descrizione: Mette sé al primo posto; aiuta se ne ricava qualcosa.
    5:
      etichetta: Spietato
      descrizione: Usa gli altri senza scrupoli; solo il proprio tornaconto conta.
- id: lealta
  nome: Lealtà
  descrizione: Rapporto con regole, autorità e patti.
  valori:
    1:
      etichetta: Leale
      descrizione: Rispetta leggi e parola data; l'ordine è un valore.
    2:
      etichetta: Affidabile
      descrizione: Mantiene gli impegni, ma sa essere flessibile.
    3:
      etichetta: Indipendente
      descrizione: Segue il proprio codice; obbedisce se ha senso.
    4:
      etichetta: Insofferente
      descrizione: Mal sopporta regole e autorità; le aggira.
    5:
      etichetta: Ribelle
      descrizione: Rifiuta ogni vincolo; la libertà sopra tutto.
- id: temperamento
  nome: Temperamento
  descrizione: Come reagisce sotto pressione.
  valori:
    1:
      etichetta: Glaciale
      descrizione: Imperturbabile; nulla scalfisce la sua calma.
    2:
      etichetta: Calmo
      descrizione: Misurato; perde il controllo solo all'estremo.
    3:
      etichetta: Equilibrato
      descrizione: Reagisce in proporzione; emotivo ma controllato.
    4:
      etichetta: Impulsivo
      descrizione: Agisce d'istinto; l'emozione guida le scelte.
    5:
      etichetta: Volatile
      descrizione: Esplosivo e imprevedibile; un attimo e cambia tutto.
- id: socievolezza
  nome: Socievolezza
  descrizione: Come si pone con le altre persone.
  valori:
    1:
      etichetta: Solitario
      descrizione: Evita gli altri; sta bene da solo.
    2:
      etichetta: Riservato
      descrizione: Pochi legami scelti; diffida degli estranei.
    3:
      etichetta: Cordiale
      descrizione: Si adatta alla compagnia; né schivo né invadente.
    4:
      etichetta: Espansivo
      descrizione: Cerca gli altri; a suo agio in mezzo alla gente.
    5:
      etichetta: Magnetico
      descrizione: Calamita l'attenzione; trascina e influenza chi incontra.
- id: approccio
  nome: Approccio
  descrizione: Come affronta i problemi.
  valori:
    1:
      etichetta: Metodico
      descrizione: Pianifica tutto; niente lasciato al caso.
    2:
      etichetta: Riflessivo
      descrizione: Pondera prima di agire; valuta le opzioni.
    3:
      etichetta: Versatile
      descrizione: Pensa e agisce a seconda di ciò che serve.
    4:
      etichetta: Pratico
      descrizione: Impara facendo; preferisce l'azione all'analisi.
    5:
      etichetta: Istintivo
      descrizione: Si fida del proprio fiuto; decide nell'istante.
