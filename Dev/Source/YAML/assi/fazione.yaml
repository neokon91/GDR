# Assi tematici (formato ricco 1-5) per l'entità 'fazione'.
# Scorporati da entities/fazione.yaml; render.py li rifonde in core.assi_tematici.
id: fazione
assi:
- id: struttura
  nome: Struttura
  descrizione: Grado di organizzazione interna e rigidità della catena di comando.
  valori:
    1:
      etichetta: Orizzontale
      descrizione: Nessuna struttura fissa; decisioni collettive. Cellule, bande,
        reti informali.
    2:
      etichetta: Consiliare
      descrizione: Potere distribuito tra circoli; decisioni per consultazione. Alleanze,
        logge.
    3:
      etichetta: Semi-gerarchica
      descrizione: Capi e ruoli riconosciuti, ma con margini di autonomia. Gerarchia
        fluida.
    4:
      etichetta: Gerarchica
      descrizione: Catena di comando definita; gradi e responsabilità chiari, decisioni
        dall'alto.
    5:
      etichetta: Piramidale
      descrizione: Vertice assoluto; ogni ruolo per statuto o lignaggio. Ordini militari,
        regimi.
- id: scopo
  nome: Scopo Primario
  descrizione: Natura dell'obiettivo perseguito, da ideale astratto a interesse concreto.
  valori:
    1:
      etichetta: Ideale puro
      descrizione: Fine astratto o trascendente (giustizia, verità); sacrifica i risultati
        alla visione.
    2:
      etichetta: Visionario
      descrizione: Idealistico ma con piani concreti. Riformisti, ordini morali, rivoluzionari.
    3:
      etichetta: Equilibrato
      descrizione: Fine sia simbolico che pratico; l'ideale guida ma non è la sola
        motivazione.
    4:
      etichetta: Opportunista
      descrizione: Mira a vantaggi materiali con una facciata ideologica per legittimarsi.
    5:
      etichetta: Pragmatico
      descrizione: Solo sopravvivenza, espansione, guadagno. Gilde mercenarie, cartelli.
- id: metodo_operativo
  nome: Metodo Operativo
  descrizione: Grado di visibilità e trasparenza con cui la fazione agisce.
  valori:
    1:
      etichetta: Occulto
      descrizione: Esistenza segreta o negata; spionaggio, cospirazioni, riti nascosti.
    2:
      etichetta: Discreto
      descrizione: Nota a pochi; agisce via emissari o organizzazioni di copertura.
    3:
      etichetta: Ambivalente
      descrizione: 'Doppia faccia: identità pubblica rispettabile, fini alternativi
        celati.'
    4:
      etichetta: Controllato
      descrizione: Nota e riconosciuta, ma cauta; l'agenda completa non è pubblica.
    5:
      etichetta: Palese
      descrizione: Agisce apertamente, dichiara i suoi scopi. Governi, ordini, movimenti.
- id: legalita
  nome: Legalità
  descrizione: Status rispetto all'ordinamento politico e giuridico dominante.
  valori:
    1:
      etichetta: Illegale
      descrizione: Fuorilegge, perseguitata; i membri rischiano arresto o morte. Ribelli,
        congiure.
    2:
      etichetta: Tollerata
      descrizione: Senza riconoscimento, ma tollerata per convenienza o paura. Ai
        margini.
    3:
      etichetta: Semi-legale
      descrizione: Riconoscimento limitato o ambiguo; opera con vincoli o stigma.
    4:
      etichetta: Legale
      descrizione: Pienamente legale; sedi, insegne, potere negoziale. Non dominante.
    5:
      etichetta: Ufficiale
      descrizione: Organo del potere; coincide col governo o l'autorità religiosa/statale.
- id: etica_conflitto
  nome: Etica del Conflitto
  descrizione: Approccio della fazione alla guerra, al dominio e all'autodifesa.
  valori:
    1:
      etichetta: Difensiva
      descrizione: Conflitto solo per autodifesa; privilegia diplomazia e resistenza.
    2:
      etichetta: Reattiva
      descrizione: Accetta la guerra per proteggere alleati o ideali, in modo proporzionato.
    3:
      etichetta: Equilibrata
      descrizione: La guerra è un'opzione sempre disponibile, valutata caso per caso.
    4:
      etichetta: Dominante
      descrizione: Previene le minacce con la forza; conquista e deterrenza nella
        dottrina.
    5:
      etichetta: Espansionista
      descrizione: Il conflitto è sacro o glorioso; ogni ostacolo è nemico. Imperi,
        crociate.

# Archetipi: combinazioni di valori-assi -> tag coerenti (renderProfilo / applica_profilo).
- id: relazione_potere
  nome: Relazione col Potere
  descrizione: "Atteggiamento della fazione nei confronti dei poteri costituiti (regni, imperi, caste, chiese, corporazioni). Indica se agisce in autonomia, li sfida, li serve o li strumentalizza per propri fini."
  valori:
    1: { etichetta: "Indipendente assoluta", descrizione: "La fazione si tiene lontana da ogni forma di potere centralizzato. È autonoma, autarchica, spesso isolazionista. Rifiuta compromessi con autorità, leggi o sistemi dominanti." }
    2: { etichetta: "Ostile selettiva", descrizione: "La fazione è in conflitto con alcune autorità specifiche (un impero, una chiesa, una corporazione), ma non con il concetto di potere in sé. Può sostenere poteri alternativi o ribelli." }
    3: { etichetta: "Ambigua", descrizione: "La fazione collabora con certi poteri e si oppone ad altri. Mantiene una posizione fluida, a seconda dei contesti. Può essere alleata, nemica o neutrale. Spesso agisce come terza forza." }
    4: { etichetta: "Collaborativa tattica", descrizione: "La fazione si appoggia ai poteri dominanti per sopravvivere, influenzare o infiltrare. Cerca protezione, accesso a risorse o legittimazione. Spesso manipola le autorità dall’interno." }
    5: { etichetta: "Strumentale", descrizione: "La fazione è completamente subordinata o parte integrante di un potere superiore. È braccio armato, organo magico, casta servente o culto di stato. Agisce per conto di chi comanda." }
- id: coesione
  nome: Coesione
  descrizione: "Struttura interna della fazione in termini di interconnessione tra i suoi membri e cellule operative. Indica se agisce come una rete frammentata o come un corpo unitario interdipendente."
  valori:
    1: { etichetta: "Cellulare", descrizione: "La fazione è composta da cellule autonome, spesso ignare le une delle altre. Ogni nucleo opera in modo indipendente. Perfetto per movimenti clandestini, reti segrete, insurrezioni diffuse." }
    2: { etichetta: "Decentrata", descrizione: "Esistono più centri decisionali o nuclei regionali semi-autonomi. Le comunicazioni sono lente o filtrate. Le strategie possono divergere, ma condividono visione generale." }
    3: { etichetta: "Modulata", descrizione: "Le parti della fazione sono coordinate, ma mantengono una certa autonomia logistica o dottrinale. La coesione è funzionale ma non assoluta. Le divisioni tematiche o operative sono ben strutturate." }
    4: { etichetta: "Coordinata centralmente", descrizione: "Esiste un comando centrale che regola tutte le sezioni. La disciplina è forte, l’unità ideologica mantenuta. Le singole parti eseguono ordini ma possono offrire feedback strutturati." }
    5: { etichetta: "Organico", descrizione: "La fazione agisce come un singolo organismo. Ogni parte è perfettamente integrata. La volontà centrale è percepita e seguita in modo istintivo o mistico. Tipico di intelligenze collettive, fazioni guidate da mente-alveare o spiriti egemoni." }
- id: reazione_fallimento
  nome: Reazione al Fallimento
  descrizione: "Modalità con cui la fazione affronta la sconfitta, la perdita di potere o le crisi interne. Indica se nega, resiste, rimuove il trauma oppure se lo integra, trasforma e ne rinasce."
  valori:
    1: { etichetta: "Negazione", descrizione: "Il fallimento è rimosso dalla memoria o negato. La fazione insiste nella stessa via, ignorando gli esiti. Spesso riscrive la storia o si rifugia nel dogma per non cambiare." }
    2: { etichetta: "Rigidità", descrizione: "La fazione riconosce la crisi ma non cambia. Tende a irrigidirsi, incolpare esterni o rafforzare i propri principi, sperando in una rivalsa futura. Il trauma è visto come prova da superare senza mutare." }
    3: { etichetta: "Elaborazione", descrizione: "La fazione analizza la sconfitta, ne discute le cause, e cerca un equilibrio tra ciò che deve essere conservato e ciò che può essere riformato. L’identità si adatta senza perdersi." }
    4: { etichetta: "Rinnovamento", descrizione: "La crisi è accolta come occasione. Il culto rifonda sé stesso, cambia dottrina, simboli o leadership. Il passato resta, ma è rifuso in un nuovo inizio. Spesso si genera un “secondo culto”." }
    5: { etichetta: "Metamorfosi", descrizione: "La sconfitta è parte della fede stessa. La fazione muta forma, scopo e persino nome. Ogni crisi è una mutazione sacra. Nessuna identità è fissa. Ideale per fazioni legate al Vuoto, alla Rinascita o all’Inganno." }
- id: integrita
  nome: Integrità
  descrizione: "Quanto è fedele alla propria missione o ne è corrotta. Dimensione recuperata da `istituzione` nel merge SYS-2: vale per ogni fazione, non solo per le istituzioni formali."
  valori:
    1:
      etichetta: Corrotta
      descrizione: "Serve interessi privati; la missione dichiarata è una facciata."
    2:
      etichetta: Compromessa
      descrizione: "Clientele e favori ne piegano l'operato."
    3:
      etichetta: Pragmatica
      descrizione: "Scende a patti quando serve, ma tiene la barra."
    4:
      etichetta: Retta
      descrizione: "Fedele alla missione; gli abusi sono rari e puniti."
    5:
      etichetta: Esemplare
      descrizione: "Incorruttibile; incarna il proprio ideale."
archetipi:
- { id: gilda,        nome: "Gilda pragmatica",       quando: { scopo: ">=4", legalita: ">=4" },              tag: [gilda, lecita] }
- { id: cospirazione, nome: "Cospirazione occulta",   quando: { metodo_operativo: "<=2", legalita: "<=2" },   tag: [cospirazione, occulta] }
- { id: militante,    nome: "Ordine militante",       quando: { struttura: ">=4", etica_conflitto: ">=4" },   tag: [militante, espansionista] }
- { id: movimento,    nome: "Movimento idealista",    quando: { scopo: "<=2", struttura: "<=2" },             tag: [movimento, idealista] }
- { id: istituzione,  nome: "Corpo ufficiale",        quando: { legalita: "5", struttura: ">=4" },            tag: [ufficiale, istituzionale] }
