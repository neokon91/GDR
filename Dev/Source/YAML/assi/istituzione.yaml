# Assi tematici (formato ricco 1-5) per l'entità 'istituzione'.
# Autorati sullo standard FantasyWorld (adattati da fazione/civilta).
id: istituzione
assi:
- id: prestigio
  nome: Prestigio
  descrizione: Quanto l'istituzione conta nella società.
  valori:
    1: { etichetta: Marginale,   descrizione: "Quasi ignota o screditata; nessun peso reale." }
    2: { etichetta: Minore,      descrizione: "Rispettata in una nicchia, ininfluente fuori." }
    3: { etichetta: Affermata,   descrizione: "Riconosciuta; la sua voce conta in certi ambiti." }
    4: { etichetta: Autorevole,  descrizione: "Influente; condiziona politica o cultura." }
    5: { etichetta: Egemone,     descrizione: "Indispensabile; il potere passa da lei." }
- id: trasparenza
  nome: Trasparenza
  descrizione: Quanto le sue attività sono pubbliche o occulte.
  valori:
    1: { etichetta: Occulta,    descrizione: "Agisce nell'ombra; scopi e mezzi nascosti." }
    2: { etichetta: Riservata,  descrizione: "Pubblica di facciata, opaca nei fatti." }
    3: { etichetta: Discreta,   descrizione: "Opera alla luce, ma senza esibirsi." }
    4: { etichetta: Aperta,     descrizione: "Attività note e rendicontate." }
    5: { etichetta: Cerimoniale, descrizione: "Ostenta tutto pubblicamente; rito e visibilità." }
- id: rigidita
  nome: Rigidità
  descrizione: Quanto è formale e vincolata da regole.
  valori:
    1: { etichetta: Informale,    descrizione: "Pochi vincoli; si agisce a discrezione." }
    2: { etichetta: Flessibile,   descrizione: "Regole adattabili al caso." }
    3: { etichetta: Strutturata,  descrizione: "Procedure chiare con margini di eccezione." }
    4: { etichetta: Burocratica,  descrizione: "Tutto regolato; lenta ma prevedibile." }
    5: { etichetta: Inflessibile, descrizione: "Dogma e protocollo; ogni deviazione è punita." }
- id: integrita
  nome: Integrità
  descrizione: Quanto è fedele alla propria missione o corrotta.
  valori:
    1: { etichetta: Corrotta,    descrizione: "Serve interessi privati; la missione è facciata." }
    2: { etichetta: Compromessa, descrizione: "Clientele e favori ne piegano l'operato." }
    3: { etichetta: Pragmatica,  descrizione: "Scende a patti, ma tiene la barra." }
    4: { etichetta: Retta,       descrizione: "Fedele alla missione; abusi rari e puniti." }
    5: { etichetta: Esemplare,   descrizione: "Incorruttibile; incarna il proprio ideale." }
