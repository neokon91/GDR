# Assi tematici (formato ricco 1-5) per l'entità 'oggetto'.
# Scorporati da entities/oggetto.yaml; render.py li rifonde in core.assi_tematici.
id: oggetto
assi:
- id: natura_materiale
  nome: Natura Materiale
  descrizione: Livello di lavorazione e qualità della materia dell'oggetto.
  valori:
    1:
      etichetta: Grezza
      descrizione: 'Rudimentale, naturale o primitivo: un osso, una pietra, un ramo
        sacro.'
    2:
      etichetta: Forgiata
      descrizione: Tecniche tradizionali, lavorato a mano. Spade, bastoni rituali,
        talismani.
    3:
      etichetta: Fine
      descrizione: 'Alta qualità: ornamenti, bilanciamenti, iscrizioni, fattura eccelsa.'
    4:
      etichetta: Avanzata
      descrizione: Tecnica sopraffina, tecnomagica o alchemica; meccanismi invisibili.
    5:
      etichetta: Perfetta
      descrizione: 'Forma perfetta: geometria sacra, materia impossibile, forgia divina.'
- id: origine
  nome: Origine
  descrizione: Da dove nasce l'artefatto, dal mondo fisico ai piani superiori.
  valori:
    1:
      etichetta: Naturale
      descrizione: Nato dalla natura, trasformato solo marginalmente. Cristalli, pietre
        vive.
    2:
      etichetta: Umana
      descrizione: Forgiato da mani mortali; frutto di cultura, artigianato, tecnologia.
    3:
      etichetta: Alchemica
      descrizione: Creato con scienza mistica, infusione magica, manipolazione arcana.
    4:
      etichetta: Spirituale
      descrizione: Nato da entità sovrannaturali, spiriti, sogni; ha un'anima o memoria.
    5:
      etichetta: Divina
      descrizione: Creato da una divinità o principio cosmico; potere intrinseco,
        irripetibile.
- id: funzione
  nome: Funzione
  descrizione: Uso per cui l'oggetto è stato creato, dal pratico al sacro.
  valori:
    1:
      etichetta: Utilitaria
      descrizione: Uso quotidiano o funzionale; può diventare sacro solo in seconda
        istanza.
    2:
      etichetta: Arcana
      descrizione: Usato in rituali o incantesimi; scopo pratico in contesti soprannaturali.
    3:
      etichetta: Versatile
      descrizione: Sia strumento che reliquia; può essere usato e venerato.
    4:
      etichetta: Simbolico
      descrizione: Venerato come simbolo; esposto, onorato, valore rappresentativo.
    5:
      etichetta: Sacro
      descrizione: 'Non si usa, si custodisce: emanazione divina o reliquia cosmica.'
- id: potere_attivo
  nome: Potere Attivo
  descrizione: Grado di potere e autonomia d'azione dell'oggetto.
  valori:
    1:
      etichetta: Dormiente
      descrizione: Nessun potere attivo; serve solo come focus o supporto.
    2:
      etichetta: Attivabile
      descrizione: 'Poteri solo tramite atti specifici: comandi, rituali, volontà
        dell''utente.'
    3:
      etichetta: Reattivo
      descrizione: Reagisce all'ambiente o allo stato d'animo; può attivarsi da solo.
    4:
      etichetta: Semi-autonomo
      descrizione: Volontà debole; sceglie se attivarsi, comunica con sogni e impulsi.
    5:
      etichetta: Senziente
      descrizione: Ha coscienza propria; parla, sceglie, rifiuta comandi, ha uno scopo.
- id: legame
  nome: Legame Spirituale
  descrizione: Relazione vincolante tra l'artefatto e il suo portatore.
  valori:
    1:
      etichetta: Libero
      descrizione: Usabile da chiunque; nessun legame richiesto o generato.
    2:
      etichetta: Empatico
      descrizione: Legame simbolico; migliora con la compatibilità, ma non vincola.
    3:
      etichetta: Ereditario
      descrizione: Si lega a stirpi o eletti; può rifiutarsi di funzionare con altri.
    4:
      etichetta: Legato
      descrizione: Vincolato all'anima del portatore; rompere il legame causa danni.
    5:
      etichetta: Vincolante
      descrizione: Legame definitivo o consumante; il portatore è posseduto o trasfigurato.
- id: influenza_realta
  nome: Influenza sulla Realtà
  descrizione: "Descrive il grado in cui l’oggetto modifica l’ambiente, le leggi fisiche o i piani di esistenza con la sua sola presenza."
  valori:
    1: { etichetta: "Passivo", descrizione: "Non influenza il mondo circostante se non quando attivamente usato." }
    2: { etichetta: "Vibrazione magica", descrizione: "Emana un’aura percettibile solo da sensitivi o creature spirituali." }
    3: { etichetta: "Distorsivo lieve", descrizione: "Influenza lievemente la realtà circostante. Presenze evanescenti, suoni, sogni, variazioni atmosferiche." }
    4: { etichetta: "Distorsivo forte", descrizione: "La sua presenza altera il destino, l’equilibrio magico o gli eventi. Può causare prodigi o catastrofi involontarie." }
    5: { etichetta: "Alterante", descrizione: "L’oggetto modifica stabilmente la realtà. Piegamento dello spazio, apertura di fratture dimensionali, manipolazione delle probabilità o delle leggi cosmiche." }
- id: allineamento
  nome: Allineamento Intrinseco
  descrizione: "Natura etica o cosmica interna dell’oggetto. Esprime se è legato a forze di ordine o disordine, indipendentemente dall’uso."
  valori:
    1: { etichetta: "Caotico", descrizione: "L’oggetto porta instabilità, trasgressione o cambiamento radicale. Non può essere controllato completamente." }
    2: { etichetta: "Tendente al caos", descrizione: "Favorisce l’autonomia, la rottura delle regole o l’individualismo." }
    3: { etichetta: "Neutrale", descrizione: "L’oggetto non ha un orientamento etico o cosmico definito. Risponde al volere del portatore." }
    4: { etichetta: "Tendente all’ordine", descrizione: "Esprime armonia, regole, strutture. Funziona meglio in contesti rituali e gerarchici." }
    5: { etichetta: "Legale", descrizione: "Impone equilibrio, disciplina, coerenza spirituale o cosmica. Rifiuta l’uso improprio o deviante." }
