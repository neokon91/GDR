# Assi tematici (formato ricco 1-5) per l'entità 'culto'.
# Adattati da FantasyWorld assi_tematici_culto.yaml (sottoinsieme curato).
id: culto
assi:
- id: struttura
  nome: Struttura
  descrizione: Grado di organizzazione interna e rigidità della gerarchia.
  valori:
    1: { etichetta: Anarchico,   descrizione: "Nessuna gerarchia; fluido, spontaneo, decentralizzato." }
    2: { etichetta: Comunitario, descrizione: "Guide senza autorità vincolante; decisioni collettive." }
    3: { etichetta: "Semi-istituzionale", descrizione: "Struttura leggera; incarichi riconosciuti ma locali." }
    4: { etichetta: Gerarchico,  descrizione: "Gerarchia formalizzata, con margini di eccezione." }
    5: { etichetta: Dogmatico,   descrizione: "Piramide rigida; autorità centrale, sacra, indiscutibile." }
- id: rivelazione
  nome: Rivelazione
  descrizione: Quanto la verità sacra è riservata a pochi o aperta a tutti.
  valori:
    1: { etichetta: Iniziatico, descrizione: "Verità occulta, solo per gradi e riti segreti." }
    2: { etichetta: Filtrata,   descrizione: "Sapere parziale ai neofiti; le verità profonde celate." }
    3: { etichetta: Misto,      descrizione: "Molto pubblico, ma un nucleo segreto per gli iniziati." }
    4: { etichetta: Aperta,     descrizione: "Insegnamenti divulgati via predicazione e testi." }
    5: { etichetta: Universale, descrizione: "Verità per tutti; missionaria, nessun segreto." }
- id: trascendenza
  nome: Trascendenza
  descrizione: Quanto il divino è immerso nel mondo o separato e superiore.
  valori:
    1: { etichetta: Immanente,   descrizione: "Il divino permea tutto; sacro e mondo non si distinguono." }
    2: { etichetta: Diffuso,     descrizione: "Presente ovunque, ma non tutto è sacro in egual misura." }
    3: { etichetta: Ambivalente, descrizione: "Sia immanente che trascendente; si incarna e supera." }
    4: { etichetta: Separato,    descrizione: "Distinto dalla creazione; si manifesta in eletti." }
    5: { etichetta: Trascendente, descrizione: "Del tutto altro; piano superiore, accessibile per grazia." }
- id: legalita
  nome: Legalità
  descrizione: Posizione del culto rispetto all'autorità vigente.
  valori:
    1: { etichetta: Illegale,   descrizione: "Proibito e perseguitato; clandestino." }
    2: { etichetta: Tollerato,  descrizione: "Non legale ma tollerato, a profilo basso." }
    3: { etichetta: Riconosciuto, descrizione: "Riconoscimento limitato; status minoritario." }
    4: { etichetta: Accettato,  descrizione: "Pienamente legale e rispettato, non dominante." }
    5: { etichetta: Ufficiale,  descrizione: "Religione di stato, legata al potere politico." }
- id: motivazione
  nome: Motivazione
  descrizione: La spinta emotiva alla base della fede.
  valori:
    1: { etichetta: Paura,      descrizione: "Timore reverenziale; si agisce per evitare punizioni." }
    2: { etichetta: Placazione, descrizione: "Offerte e riti per mantenere la benevolenza divina." }
    3: { etichetta: Equilibrata, descrizione: "Timore e gratitudine insieme; obbedienza e fiducia." }
    4: { etichetta: Fiducia,    descrizione: "Si onora per scelta; la divinità è giusta e guida." }
    5: { etichetta: Amore,      descrizione: "Legame affettivo profondo; si cerca l'unione, l'estasi." }

# Archetipi: combinazioni di valori-assi -> tag coerenti (renderProfilo / applica_profilo).
- id: ordine
  nome: Ordine
  descrizione: "Rapporto del culto con l’idea di ordine universale. Esprime quanto il culto promuova equilibrio, ciclicità e stabilità, oppure alimenti disordine, mutamento e crisi come aspetti sacri del cosmo."
  valori:
    1: { etichetta: "Armonico", descrizione: "Il culto si fonda sull’armonia cosmica. Venera l’equilibrio tra opposti, la ciclicità naturale e le leggi immutabili dell’universo. Spesso promuove stabilità, moderazione e conservazione spirituale." }
    2: { etichetta: "Ordinato", descrizione: "Il culto valorizza la struttura e la coerenza, ma ammette forme controllate di mutamento. Il disordine è tollerato come eccezione da rimettere in equilibrio. Rituale e regolazione sono centrali." }
    3: { etichetta: "Neutrale dinamico", descrizione: "Il culto riconosce che ordine e caos sono entrambi necessari. Favorisce il cambiamento ciclico, la trasformazione bilanciata, e considera crisi e rigenerazione parti di un unico disegno." }
    4: { etichetta: "Sovversivo", descrizione: "Il culto abbraccia la trasformazione. Cerca la rottura degli equilibri attuali per rivelare verità nascoste o generare nuove realtà. La distruzione è vista come mezzo sacro." }
    5: { etichetta: "Caotico", descrizione: "Il culto è devoto all’entropia, all’instabilità, al crollo dell’ordine. Vede nel caos puro la verità ultima, e nel disfacimento la rivelazione. Perfetto per culti del Vuoto, della Follia o dell’Apocalisse." }
- id: missione
  nome: Missione
  descrizione: "Tendenza del culto a trasmettersi, propagarsi e convertire nuovi adepti. Esprime quanto esso si espanda attivamente oltre il suo contesto originario o preferisca restare confinato e stabile."
  valori:
    1: { etichetta: "Inerziale", descrizione: "Il culto non cerca espansione. È tramandato solo per tradizione familiare o locale. Non ha intenzione né struttura per diffondersi. Tipico di culti ancestrali, rurali o etnici chiusi." }
    2: { etichetta: "Conservativo", descrizione: "Il culto è legato a un territorio o a una comunità specifica. Può accogliere nuovi membri, ma non attivamente. La continuità prevale sulla diffusione." }
    3: { etichetta: "Opportunista", descrizione: "Il culto si diffonde quando possibile, soprattutto per influenza culturale o migrazioni. Non ha un vero proselitismo, ma si adatta e attecchisce in nuovi contesti quando le condizioni lo favoriscono." }
    4: { etichetta: "Propagandista", descrizione: "Il culto dispone di strumenti per diffondersi: predicatori, testi, emissari. Mira a crescere in modo controllato, senza imporsi con la forza. È spesso supportato da mecenati o autorità locali." }
    5: { etichetta: "Missionaria", descrizione: "La diffusione è un dovere sacro. Il culto mira alla conversione globale, anche tramite imposizione, crociate o annessione. Considera ogni non adepto come ignorante, corrotto o perduto." }
- id: contatto_divino
  nome: Contatto Divino
  descrizione: "Modalità con cui i fedeli stabiliscono una connessione con il sacro. Rappresenta il grado di immediatezza o mediazione nella comunicazione con la divinità o le forze spirituali."
  valori:
    1: { etichetta: "Diretto", descrizione: "Il contatto con il divino avviene attraverso esperienze personali: visioni, sogni, estasi, trance, possessione. Ogni fedele può accedere autonomamente al sacro senza bisogno di interpreti." }
    2: { etichetta: "Intuitivo", descrizione: "La comunicazione è ancora personale, ma filtrata da simboli, presagi, animali guida, segni della natura o pratiche rituali spontanee. L’esperienza richiede sensibilità o predisposizione spirituale." }
    3: { etichetta: "Misto", descrizione: "Alcuni accedono direttamente, altri tramite figure di guida (sciamani, profeti, oracoli). Il culto ammette forme parallele di connessione, combinando immediatezza e mediazione sociale." }
    4: { etichetta: "Mediato flessibile", descrizione: "Il contatto con il divino è affidato a ruoli specifici, ma non è necessariamente esclusivo. I riti ufficiali sono richiesti per le manifestazioni maggiori del sacro." }
    5: { etichetta: "Mediato", descrizione: "Solo tramite clero, testi sacri, liturgie o artefatti consacrati si può accedere al divino. La fede passa attraverso una struttura di mediazione istituzionale e rituale. Il fedele non può comunicare da sé." }
archetipi:
- { id: teocrazia,    nome: "Teocrazia di stato",   quando: { struttura: ">=4", legalita: "5" },        tag: [teocrazia, ufficiale] }
- { id: setta,        nome: "Setta iniziatica",      quando: { rivelazione: "<=2", struttura: ">=4" },    tag: [setta, iniziatica] }
- { id: proibito,     nome: "Culto proibito",        quando: { legalita: "<=2" },                          tag: [proibito, clandestino] }
- { id: popolare,     nome: "Fede popolare",         quando: { struttura: "<=2", rivelazione: ">=4" },     tag: [popolare, diffusa] }
- { id: mistico,      nome: "Misticismo estatico",   quando: { motivazione: ">=4", trascendenza: "<=2" }, tag: [mistico, estatico] }
