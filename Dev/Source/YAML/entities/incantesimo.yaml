# Schema per-entità: incantesimo. Single source di tassonomia, scheda, assi,
# relazioni, wizard e wiring template. render.py lo distribuisce nel
# modello globale 'core' (apply_entities) e raccoglie i template.
# I campi sono nel registro centrale (core.yaml/system.yaml).
id: incantesimo
folder: Mondi/Incantesimi
order: 12
templates:
- id: incantesimo
  title: Incantesimo
  default_type: evocazione
  target: z.modelli/Incantesimo.md
  jinja: spell.md.j2
subtypes:
- abiurazione
- ammaliamento
- divinazione
- evocazione
- illusione
- invocazione
- necromanzia
- trasmutazione
relazioni:
- field: sistema_magico
  label: Sistema magico
  category: sistema_magico
fields:
  rituale: { label: Rituale, widget: text }
scheda:
- livello
- tempo_lancio
- gittata
- componenti
- durata
- rituale
- classi
creation:
  fields:
  - field: tipo
    prompt: Scuola di magia
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo (opzionale)
    from: notes
    category: mondo
    link: true
    optional: true
  # Dati che rendono l'incantesimo GIOCABILE dal motore (crea_pg/sali_pg lo
  # fondono nel pool selezionabile del PG): livello + classi che lo lanciano.
  - field: livello
    prompt: 'Livello (0 = trucchetto, 1-9)'
    from: number
    optional: true
  - field: classi
    prompt: 'Classi che lo lanciano (es. Mago, Chierico)'
    optional: true
  # Stat-line di lancio (parità SRD: stessi campi degli incantesimi ufficiali; già
  # mostrati nella scheda, ora catturati anche dal wizard). Opzionali.
  - field: tempo_lancio
    prompt: Tempo di lancio
    from: list
    options: ["1 azione", "1 azione bonus", "1 reazione", "1 minuto", "10 minuti", "1 ora", "8 ore", "24 ore"]
    optional: true
  - field: gittata
    prompt: Gittata
    from: list
    options: [Personale, Contatto, "1,5 metri", "3 metri", "9 metri", "18 metri", "30 metri", "45 metri", "90 metri", "150 metri", "300 metri", Vista, Illimitata]
    optional: true
  - field: componenti
    prompt: Componenti
    from: list
    options: [V, S, M, "V, S", "V, M", "S, M", "V, S, M"]
    optional: true
  - field: durata
    prompt: Durata
    from: list
    options: [Istantanea, "1 round", "Concentrazione, fino a 1 minuto", "Concentrazione, fino a 10 minuti", "Concentrazione, fino a 1 ora", "1 minuto", "10 minuti", "1 ora", "8 ore", "24 ore", "Finché non viene dissolto"]
    optional: true
  # Rituale (2024): lanciabile come rito (+10 min, senza slot) se la classe ha il
  # Lancio rituale. La concentrazione è già codificata nella `durata`. Reso (📿) in
  # renderIncantesimi.
  - field: rituale
    prompt: Rituale?
    from: list
    options: [No, Sì]
    optional: true
  body:
  - field: effetto
    prompt: Effetto dell'incantesimo
    heading: Effetto
  - field: a_livello_superiore
    prompt: Ai livelli superiori
    heading: Ai livelli superiori
