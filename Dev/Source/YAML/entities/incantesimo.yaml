# Schema per-entità: incantesimo. Single source di tassonomia, scheda, assi,
# relazioni, wizard e wiring template. render.py lo distribuisce nel
# modello globale 'core' (apply_entities) e raccoglie i template.
# I campi sono nel registro centrale (core.yaml/system.yaml).
id: incantesimo
folder: Mondi/Incantesimi
order: 12
templates:
- id: incantesimo
  title: Incantesimo
  default_type: evocazione
  target: z.modelli/Incantesimo.md
  jinja: spell.md.j2
subtypes:
- abiurazione
- ammaliamento
- divinazione
- evocazione
- illusione
- invocazione
- necromanzia
- trasmutazione
relazioni:
- field: sistema_magico
  label: Sistema magico
  category: sistema_magico
scheda:
- livello
- tempo_lancio
- gittata
- componenti
- durata
- classi
creation:
  fields:
  - field: tipo
    prompt: Scuola di magia
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo (opzionale)
    from: notes
    category: mondo
    link: true
    optional: true
  # Dati che rendono l'incantesimo GIOCABILE dal motore (crea_pg/sali_pg lo
  # fondono nel pool selezionabile del PG): livello + classi che lo lanciano.
  - field: livello
    prompt: 'Livello (0 = trucchetto, 1-9)'
    from: number
    optional: true
  - field: classi
    prompt: 'Classi che lo lanciano (es. Mago, Chierico)'
    optional: true
  # Stat-line di lancio (parità SRD: stessi campi degli incantesimi ufficiali; già
  # mostrati nella scheda, ora catturati anche dal wizard). Opzionali.
  - field: tempo_lancio
    prompt: 'Tempo di lancio (es. 1 azione, 1 azione bonus, 1 minuto)'
    optional: true
  - field: gittata
    prompt: 'Gittata (es. 9 metri, Contatto, Personale)'
    optional: true
  - field: componenti
    prompt: 'Componenti (es. V, S, M (un fiore))'
    optional: true
  - field: durata
    prompt: 'Durata (es. Istantanea, Concentrazione fino a 1 minuto)'
    optional: true
  body:
  - field: effetto
    prompt: Effetto dell'incantesimo
    heading: Effetto
  - field: a_livello_superiore
    prompt: Ai livelli superiori
    heading: Ai livelli superiori
