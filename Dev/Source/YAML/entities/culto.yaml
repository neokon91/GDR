# Schema per-entità: culto (lore, religione). Religione organizzata: dottrina,
# clero, riti, fedeli. Distinto da divinità (l'entità venerata) e fazione
# (organizzazione politica). Assi in assi/culto.yaml. Seed FantasyWorld t.culto +
# assi_tematici_culto.yaml (mix curato).
id: culto
folder: Mondi/Culti
order: 26
gruppo: societa
templates:
- id: culto
  title: Culto
  default_type: religione
  target: z.modelli/Culto.md
# SOTTOTIPI con PROFILO: la FORMA del culto. Tutti sono Fronti (la fede genera trame →
# clock) che evolvono tra le epoche. NB: 'ordine monastico' (non 'ordine') per non
# confondersi con l'asse «Ordine» (cosmico) e col sottotipo 'ordine' di fazione.
subtypes:
- { nome: religione,        descrizione: "Fede organizzata e diffusa, con clero, dottrina e luoghi di culto pubblici.",                  campi: [dogma], clock: true, evoluzione: true }
- { nome: ordine monastico, descrizione: "Fratellanza chiusa votata a una regola: monaci, asceti, custodi; voti e disciplina.",         campi: [regola_monastica, voti], clock: true, evoluzione: true }
- { nome: setta,            descrizione: "Scissione eretica o segreta dal culto madre: dottrina deviante, riti nascosti, segni di riconoscimento.", campi: [eresia], clock: true, evoluzione: true }
- { nome: culto misterico,  descrizione: "Religione iniziatica a gradi: rivelazioni progressive riservate agli adepti.",                campi: [gradi_iniziazione], clock: true, evoluzione: true }
- { nome: fede popolare,    descrizione: "Devozione diffusa e decentrata: santi locali, superstizioni, pratiche quotidiane senza clero forte.", campi: [pratiche], clock: true, evoluzione: true }
fields:
  dogma:             { label: Dogma centrale,        widget: text }
  regola_monastica:  { label: Regola,                widget: text }
  voti:              { label: Voti,                  widget: text }
  eresia:            { label: Eresia / deviazione,   widget: text }
  gradi_iniziazione: { label: Gradi d'iniziazione,   widget: text }
  pratiche:          { label: Pratiche popolari,     widget: text }
# Portata/diffusione del culto (riusa il campo select condiviso 'portata').
scheda: [portata]
relazioni:
- field: divinita
  label: Divinità venerate
  category: divinita
  multi: true
- field: luogo_sacro
  label: Luogo sacro
  category: luogo
- field: capi
  label: Figure di spicco
  category: personaggio
  multi: true
- field: fazione
  label: Braccio politico
  category: fazione
# Culti rivali (rivalità dottrinale: eresie, scismi, fedi in competizione):
# alimenta il grafo e genera trame. Non reciproca, come gli altri 'rivali'.
- field: rivali
  label: Culti rivali
  category: culto
  multi: true
creation:
  fields:
  - field: tipo
    prompt: Tipo di culto
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo
    from: notes
    category: mondo
    link: true
    required: true
  body:
  - field: dottrina
    prompt: 'Dottrina: cosa insegna, cosa promette'
    heading: Dottrina
  - field: riti
    prompt: 'Riti e pratiche: come si onora il sacro'
    heading: Riti
  - field: gerarchia
    prompt: 'Clero e gerarchia: chi comanda, come si entra'
    heading: Gerarchia
  - field: tabu
    prompt: 'Tabù e peccati: cosa è proibito'
    heading: Tabù
  - field: presente
    prompt: 'Stato attuale: diffusione, alleati, nemici'
    heading: Nel presente
  - field: segreto
    prompt: Il segreto del culto (eresia, verità occulta)
    callout: segreto
    title: Segreto
    fold: true

guida:
  scopo: Una religione organizzata (dottrina, clero, riti, fedeli) — distinta dalla divinità che venera e dalla fazione politica.
  campi_chiave: '**Tipo** (setta, misterico, popolare…); **Divinità** venerate; **Portata** (diffusione); sul Carattere **Legalità** ne fissa il rapporto col potere.'
