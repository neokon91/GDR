# Schema per-entità: luogo. Single source di tassonomia, scheda, assi,
# relazioni, wizard e wiring template. render.py lo distribuisce nel
# modello globale 'core' (apply_entities) e raccoglie i template.
# I campi sono nel registro centrale (core.yaml/system.yaml).
id: luogo
folder: Mondi/Luoghi
order: 3
gruppo: geografia
templates:
- id: luogo
  title: Luogo
  default_type: sito di interesse
  target: z.modelli/Luogo.md
  jinja: luogo.md.j2
  primary: true
subtypes:
- regione
- insediamento
- sito di interesse
- struttura
- dungeon
- rovina
- landmark naturale
# Classificazione a 2 livelli: la 'famiglia' (natura del luogo, seed FantasyWorld
# luogo_cat) affianca il 'tipo' (forma/scala). Select + legenda auto-documentante.
famiglie:
- { nome: insediamento,      descrizione: "Luogo stabilmente abitato o urbanizzato, con strutture create da civiltà intelligenti." }
- { nome: rovina,            descrizione: "Resto di un luogo distrutto, dimenticato o caduto; custodisce eco di civiltà passate o cataclismi." }
- { nome: santuario,         descrizione: "Spazio con forte carica spirituale, usato per riti, culti o contatto con entità superiori." }
- { nome: confine,           descrizione: "Punto di transizione tra realtà, epoche o stati dell'essere: soglia, varco, non-luogo." }
- { nome: selvaggio,         descrizione: "Spazio non civilizzato, primordiale, vivo: natura pura o ambiente magico incontaminato." }
- { nome: onirico,           descrizione: "Luogo tra sogno, memoria e inconscio: sognato, astrale o condiviso psichicamente." }
- { nome: interdimensionale, descrizione: "Nodo tra piani, crocevia metafisico o intersezione ontologica; instabile o multistrato." }
- { nome: simbolico,         descrizione: "Non ha senso fisico: rappresenta concetti, leggi o archetipi. Esiste per significato." }
# Posizione sulla mappa: "x, y" (unità arbitrarie o pixel-mappa). Con mondo.scala_mappa
# (km/unità) renderDintorni calcola la distanza IN LINEA D'ARIA in km, complementare
# alla distanza per confini (BFS su confina_con). Editabile nella tab Mappa.
fields:
  coord: { label: Coordinate, widget: text }
scheda:
- clima
- popolazione
relazioni:
- field: regione
  label: Regione
  category: luogo
- field: controllata_da
  label: Controllata da
  category: fazione
- field: figure
  label: Figure
  category: personaggio
  multi: true
- field: bioma
  label: Bioma
  category: bioma
- field: cultura
  label: Cultura dominante
  category: cultura
- field: piano
  label: Piano
  category: piano
# Geografia spaziale: ADIACENZA fisica fra luoghi (confina_con, simmetrica:
# l'inverso esplicito è sé stessa). È il grafo da cui renderDintorni calcola la
# distanza in confini (BFS) e che alimenta la dashboard Geografia. Distinta dalle
# ROTTE (rotta_con, sotto): si può confinare senza commerciare e viceversa.
- field: confina_con
  label: Confina con
  category: luogo
  multi: true
  reciprocal: confina_con
# Economia: cosa il luogo PRODUCE e da cosa DIPENDE (inverso generico 'connessioni'
# su risorsa); le ROTTE commerciali verso altri luoghi (simmetriche → auto-reciproche).
# Alimentano la dashboard Economia e danno stakes materiali a Fronti/clock.
- field: produce
  label: Produce
  category: risorsa
  multi: true
- field: dipende_da
  label: Dipende da
  category: risorsa
  multi: true
- field: rotta_con
  label: Rotta commerciale con
  category: luogo
  multi: true
  reciprocal: rotta_con
creation:
  fields:
  - field: tipo
    prompt: Tipo di luogo
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo
    from: notes
    category: mondo
    link: true
    required: true
  body:
  - field: geografia
    prompt: 'Geografia: dov''e'', com''e'' fatto, cosa lo circonda'
    heading: Geografia
  - field: funzione
    prompt: Cos'e' / a cosa serve, perche' importa
    heading: Funzione
  - field: atmosfera
    prompt: 'Atmosfera: cosa si vede, sente, odora'
    heading: Atmosfera
  - field: abitanti
    prompt: Chi o cosa lo abita (popolo, fazioni, creature)
    heading: Abitanti
  - field: storia
    prompt: Cosa è successo qui (passato che pesa)
    heading: Storia
  - field: tensione
    prompt: Tensione o pericolo presente
    heading: Tensione
  - field: segreto
    prompt: Segreto del luogo
    callout: segreto
    title: Segreto
    fold: true

guida:
  scopo: 'Un luogo è dove succede qualcosa: lo collochi nel mondo, lo leghi a chi lo controlla e ai luoghi confinanti, e gli dai una tensione presente.'
  campi_chiave: '**Tipo** (forma) e **Mondo** per primi; poi **Controllata da** e **Confina con** per inserirlo nel grafo; **Clima**/**Popolazione** per il colore.'
