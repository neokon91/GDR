# Schema per-entità: luogo. Single source di tassonomia, scheda, assi,
# relazioni, wizard e wiring template. render.py lo distribuisce nel
# modello globale 'core' (apply_entities) e raccoglie i template.
# I campi sono nel registro centrale (core.yaml/system.yaml).
id: luogo
folder: Mondi/Luoghi
order: 3
templates:
- id: luogo
  title: Luogo
  default_type: sito di interesse
  target: z.modelli/Luogo.md
  jinja: luogo.md.j2
  primary: true
subtypes:
- regione
- insediamento
- sito di interesse
- struttura
- dungeon
- rovina
- landmark naturale
scheda:
- clima
- popolazione
assi:
- id: sicuro_pericoloso
  sinistra: Sicuro
  destra: Pericoloso
- id: prospero_misero
  sinistra: Prospero
  destra: Misero
- id: noto_segreto
  sinistra: Noto
  destra: Segreto
relazioni:
- field: regione
  label: Regione
  category: luogo
- field: controllata_da
  label: Controllata da
  category: fazione
- field: abitanti
  label: Figure
  category: personaggio
  multi: true
creation:
  fields:
  - field: tipo
    prompt: Tipo di luogo
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo
    from: notes
    category: mondo
    link: true
    required: true
  body:
  - field: funzione
    prompt: Cos'e' / a cosa serve
    heading: Funzione
  - field: controllo
    prompt: Chi o cosa lo controlla
    heading: Controllo
  - field: atmosfera
    prompt: 'Atmosfera: cosa si vede, sente, odora'
    heading: Atmosfera
  - field: storia
    prompt: Cosa è successo qui (passato che pesa)
    heading: Storia
  - field: tensione
    prompt: Tensione o pericolo presente
    heading: Tensione
  - field: segreto
    prompt: Segreto del luogo
    callout: segreto
    title: Segreto
    fold: true
