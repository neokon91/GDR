# Schema per-entità: luogo. Single source di tassonomia, scheda, assi,
# relazioni, wizard e wiring template. render.py lo distribuisce nel
# modello globale 'core' (apply_entities) e raccoglie i template.
# I campi sono nel registro centrale (core.yaml/system.yaml).
id: luogo
folder: Mondi/Luoghi
order: 3
gruppo: geografia
templates:
- id: luogo
  title: Luogo
  default_type: sito di interesse
  target: z.modelli/Luogo.md
  jinja: luogo.md.j2
  primary: true
# SOTTOTIPI con PROFILO: il 'tipo' è la SCALA/FORMA spaziale, dal continente al
# dungeon — una GERARCHIA di contenimento (continente ⊃ regione ⊃ insediamento/sito).
# Ogni profilo porta i SUOI campi (renderTipoProfilo li mostra in base al tipo), i suoi
# prompt-wizard, e i flag clock (è un Fronte?) ed evoluzione (cambia tra le epoche?).
subtypes:
- nome: continente
  descrizione: "Grande massa di terra che raccoglie regioni e mari: il livello più alto della geografia."
  campi: [estensione, terreno_dominante]
  wizard: ["Geografia d'insieme: rilievi, mari, clima dominante", "Cosa lo distingue dagli altri continenti"]
  clock: false
  evoluzione: true
- nome: regione
  descrizione: "Area che contiene insediamenti e siti: provincia, marca, valle, arcipelago, ducato geografico."
  campi: [capoluogo, estensione, terreno_dominante]
  wizard: ["Confini naturali e cosa la rende un'unità", "Quali popoli e poteri la abitano"]
  clock: false
  evoluzione: true
- nome: insediamento
  descrizione: "Luogo abitato, dal villaggio alla metropoli: qui i PG comprano, pregano, riposano, reclutano, indagano."
  campi: [taglia_insediamento, popolazione, governo_locale, prosperita, pericolosita, servizi, quartieri]
  wizard: ["Economia: di cosa vive", "Difese: mura, guardia, milizia"]
  clock: false
  evoluzione: true
- nome: sito di interesse
  descrizione: "Un punto notevole singolo: una sorgente sacra, un cerchio di pietre, un campo di battaglia."
  campi: [perche_notevole]
  wizard: ["Cosa ci si trova, e perché qualcuno ci verrebbe"]
  clock: false
  evoluzione: false
- nome: struttura
  descrizione: "Un'opera singola costruita: tempio, fortezza, ponte, faro, torre, mulino."
  campi: [funzione_struttura, stato_struttura, occupante]
  wizard: ["Chi l'ha costruita e quando"]
  clock: false
  evoluzione: false
- nome: dungeon
  descrizione: "Complesso esplorabile pieno di pericoli e ricompense: cripta, caverna, dedalo, rovina abitata."
  campi: [livelli, occupante, ricompensa]
  wizard: ["Origine: chi l'ha scavato/costruito e perché", "Il guardiano o il pericolo principale"]
  clock: true
  evoluzione: false
- nome: rovina
  descrizione: "Resto di un luogo caduto: custodisce eco di ciò che fu e, a volte, di chi vi dorme ancora."
  campi: [epoca_caduta, cosa_resta]
  wizard: ["Cos'era prima della caduta", "Perché è caduta — e cosa l'ha sostituita"]
  clock: false
  evoluzione: true
- nome: landmark naturale
  descrizione: "Una caratteristica naturale notevole: fiume, catena montuosa, foresta, vulcano, voragine."
  campi: [fenomeno, terreno_dominante]
  wizard: ["Il fenomeno o pericolo naturale che lo definisce"]
  clock: false
  evoluzione: false
# Classificazione a 2 livelli: la 'famiglia' è la NATURA (mitica/ontologica) del luogo,
# ortogonale alla scala-tipo. Niente più 'insediamento'/'rovina' qui (erano forme = tipo):
# restano le nature vere (mondano vs sacro/liminale/selvaggio/onirico/planare/simbolico).
famiglie:
- { nome: mondano,           descrizione: "Luogo ordinario del mondo materiale: abitato, coltivato o di passaggio, senza carica metafisica particolare.", assi: { civilizzazione: 3, presenza_magica: 1, sacralita: 2 } }
- { nome: santuario,         descrizione: "Spazio con forte carica spirituale, usato per riti, culti o contatto con entità superiori.", assi: { sacralita: 5, presenza_magica: 3 } }
- { nome: confine,           descrizione: "Punto di transizione tra realtà, epoche o stati dell'essere: soglia, varco, non-luogo.", assi: { stratificazione_dimensionale: 3, stabilita_spaziale: 4, coerenza_temporale: 3 } }
- { nome: selvaggio,         descrizione: "Spazio non civilizzato, primordiale, vivo: natura pura o ambiente magico incontaminato.", assi: { civilizzazione: 1, presenza_magica: 3 } }
- { nome: onirico,           descrizione: "Luogo tra sogno, memoria e inconscio: sognato, astrale o condiviso psichicamente.", assi: { risonanza_psichica: 4, stabilita_spaziale: 5 } }
- { nome: interdimensionale, descrizione: "Nodo tra piani, crocevia metafisico o intersezione ontologica; instabile o multistrato.", assi: { stratificazione_dimensionale: 5, stabilita_spaziale: 4 } }
- { nome: simbolico,         descrizione: "Non ha senso fisico: rappresenta concetti, leggi o archetipi. Esiste per significato.", assi: { stabilita_spaziale: 5, risonanza_psichica: 5, coerenza_temporale: 5 } }
# Posizione sulla mappa: "x, y" (unità arbitrarie o pixel-mappa). Con mondo.scala_mappa
# (km/unità) renderDintorni calcola la distanza IN LINEA D'ARIA in km, complementare
# alla distanza per confini (BFS su confina_con). Editabile nella tab Mappa.
fields:
  coord: { label: Coordinate, widget: text }
  # Campi dei profili-sottotipo: renderTipoProfilo li mostra secondo il `tipo` scelto;
  # si modificano dal pannello Proprietà di Obsidian (sono chiavi di frontmatter).
  estensione:          { label: Estensione,             widget: text }
  terreno_dominante:   { label: Terreno dominante,      widget: terreno }
  capoluogo:           { label: Capoluogo,              widget: legame }
  taglia_insediamento: { label: Taglia,                 widget: taglia_insediamento }
  governo_locale:      { label: Governo locale,         widget: governo_locale }
  servizi:             { label: Servizi & edifici,      widget: servizi }
  quartieri:           { label: Quartieri / distretti,  widget: text }
  prosperita:          { label: Prosperità,             widget: prosperita }
  pericolosita:        { label: Rischio locale,         widget: pericolosita }  # ≠ asse 'Pericolosità Ontologica': qui è il rischio MONDANO dell'insediamento (guardia/crimine)
  livelli:             { label: Livelli / aree,         widget: number }
  occupante:           { label: Occupante,              widget: legame }
  ricompensa:          { label: Ricompensa chiave,      widget: text }
  perche_notevole:     { label: Perché è notevole,      widget: text }
  funzione_struttura:  { label: Funzione,               widget: funzione_struttura }
  stato_struttura:     { label: Stato dell'opera,       widget: stato_struttura }
  epoca_caduta:        { label: Epoca della caduta,     widget: text }
  cosa_resta:          { label: Cosa resta,             widget: text }
  fenomeno:            { label: Fenomeno naturale,      widget: text }
scheda:
- clima
- popolazione
relazioni:
- field: regione
  label: Regione
  category: luogo
- field: controllata_da
  label: Controllata da
  category: fazione
- field: figure
  label: Figure
  category: personaggio
  multi: true
- field: bioma
  label: Bioma
  category: bioma
  reciprocal: luoghi
- field: cultura
  label: Cultura dominante
  category: cultura
- field: piano
  label: Piano
  category: piano
# Geografia spaziale: ADIACENZA fisica fra luoghi (confina_con, simmetrica:
# l'inverso esplicito è sé stessa). È il grafo da cui renderDintorni calcola la
# distanza in confini (BFS) e che alimenta la dashboard Geografia. Distinta dalle
# ROTTE (rotta_con, sotto): si può confinare senza commerciare e viceversa.
- field: confina_con
  label: Confina con
  category: luogo
  multi: true
  reciprocal: confina_con
# Economia: cosa il luogo PRODUCE e da cosa DIPENDE (inversi TIPIZZATI su risorsa,
# prodotta_in/consumata_da → il grafo economico è percorribile da entrambi i lati);
# le ROTTE commerciali verso altri luoghi (simmetriche → auto-reciproche).
# Alimentano la dashboard Economia e danno stakes materiali a Fronti/clock.
- field: produce
  label: Produce
  category: risorsa
  multi: true
  reciprocal: prodotta_in
- field: dipende_da
  label: Dipende da
  category: risorsa
  multi: true
  reciprocal: consumata_da
- field: rotta_con
  label: Rotta commerciale con
  category: luogo
  multi: true
  reciprocal: rotta_con
# Inversi tipizzati: editti in vigore qui (editto.luoghi) e miti del luogo (mito.luogo).
- field: editti
  label: Editti in vigore
  category: editto
  multi: true
  reciprocal: luoghi
- field: miti
  label: Miti del luogo
  category: mito
  multi: true
  reciprocal: luogo
# Inversi tavolo↔luogo (prep di sessione: «cosa c'è QUI»): gli incontri ambientati
# nel luogo (incontro.luogo) e le insidie/trappole presenti (insidia.luoghi).
- field: incontri
  label: Incontri qui
  category: incontro
  multi: true
  reciprocal: luogo
- field: insidie
  label: Insidie qui
  category: insidia
  multi: true
  reciprocal: luoghi
- field: ecosistemi
  label: Ecosistemi
  category: ecosistema
  multi: true
  reciprocal: luogo
- field: rotte
  label: Rotte che vi passano
  category: rotta
  multi: true
  reciprocal: estremi
- field: calamita
  label: Calamità in corso
  category: calamita
  multi: true
  reciprocal: luoghi
creation:
  fields:
  - field: tipo
    prompt: Tipo di luogo
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo
    from: notes
    category: mondo
    link: true
    required: true
  body:
  - field: geografia
    prompt: 'Geografia: dov''e'', com''e'' fatto, cosa lo circonda'
    heading: Geografia
  - field: funzione
    prompt: Cos'e' / a cosa serve, perche' importa
    heading: Funzione
  - field: atmosfera
    prompt: 'Atmosfera: cosa si vede, sente, odora'
    heading: Atmosfera
  - field: abitanti
    prompt: Chi o cosa lo abita (popolo, fazioni, creature)
    heading: Abitanti
  - field: storia
    prompt: Cosa è successo qui (passato che pesa)
    heading: Storia
  - field: tensione
    prompt: Tensione o pericolo presente
    heading: Tensione
  - field: segreto
    prompt: Segreto del luogo
    callout: segreto
    title: Segreto
    fold: true

guida:
  scopo: 'Un luogo è dove succede qualcosa: lo collochi nel mondo, lo leghi a chi lo controlla e ai luoghi confinanti, e gli dai una tensione presente.'
  campi_chiave: '**Tipo** (forma) e **Mondo** per primi; poi **Controllata da** e **Confina con** per inserirlo nel grafo; **Clima**/**Popolazione** per il colore.'
