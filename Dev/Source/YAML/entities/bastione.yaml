# Schema per-entità: bastione. Single source di tassonomia, scheda, assi,
# relazioni, wizard e wiring template. render.py lo distribuisce nel
# modello globale 'core' (apply_entities) e raccoglie i template.
# I campi sono nel registro centrale (core.yaml/system.yaml).
id: bastione
folder: Mondi/Bastioni
order: 20
gruppo: regole
templates:
- id: bastione
  title: Bastione
  default_type: bastione
  target: z.modelli/Bastione.md
  jinja: reference.md.j2
subtypes:
- torre
- fortezza
- santuario
- rifugio
- laboratorio
- avamposto
- tenuta
# Bastione 2024 (DMG): livello = PG minimo (5+); difensori = n. difensori del
# bastione. Le strutture speciali emettono ordini al turno di bastione (7 giorni).
scheda:
- livello
- difensori
relazioni:
- field: proprietario
  label: Proprietario
  category: personaggio
- field: luogo
  label: Posizione
  category: luogo
creation:
  fields:
  - field: tipo
    prompt: Tipo di bastione
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo (opzionale)
    from: notes
    category: mondo
    link: true
    optional: true
  body:
  - field: descrizione
    prompt: "Cos'è il bastione: aspetto, storia, ruolo"
    heading: Descrizione
  - field: strutture
    prompt: "Strutture (base e speciali): cosa sono, aspetto, ruolo (la descrizione narrativa)"
    heading: Strutture

guida:
  scopo: 'La roccaforte di un PG (regole Bastioni 2024): emette ordini ogni turno di 7 giorni e ospita strutture speciali.'
  campi_chiave: '**Livello** (PG minimo, 5+) e **Difensori** ne governano le regole; collega il **Proprietario** (PG) e la **Posizione** (luogo).'
