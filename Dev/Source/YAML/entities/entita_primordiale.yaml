# Schema per-entità: entita_primordiale (lore). Essere pre-divino che incarna una
# legge fondamentale e appartiene a un dominio; le divinità ne discendono. Distinta
# da divinita (venerata, attiva nel culto) e da creatura (essere del mondo). Seed
# FantasyWorld JSON/cosmologia/entita_primordiali.json (dominio/legge_fondamentale/
# stato/volonta/ruolo_cosmico/allineamento). Nodo del grafo cosmologico.
id: entita_primordiale
folder: Mondi/Primordiali
order: 35
gruppo: cosmo
templates:
- id: entita_primordiale
  title: Entità primordiale
  default_type: forza primordiale
  target: z.modelli/Entita primordiale.md
subtypes:
- nome: forza primordiale
  descrizione: "Un principio bruto del cosmo fatto essere: non pensa come noi — È, e tutto ne consegue."
  wizard: ["La legge o la forza che incarna", "Come la sua sola esistenza piega il mondo"]
- nome: titano
  descrizione: "Un colosso dell'era prima delle divinità: corpo immane, volontà antica, spesso incatenato."
  wizard: ["Cosa fece nell'era prima — e perché fu fermato", "Dove giace ora e cosa lo trattiene"]
- nome: entità del vuoto
  descrizione: "Ciò che viene da fuori, o da prima della realtà: nega, divora o disfa l'ordine."
  wizard: ["Cosa minaccia di dissolvere", "Quale segno ne annuncia l'attenzione"]
- nome: aspetto incarnato
  descrizione: "Una primordiale che ha preso forma e cammina nel mondo — in carne, idolo o avatar."
  wizard: ["In che forma si manifesta e cosa rivela di sé", "Cosa vuole, ora che è qui"]
- nome: dormiente
  descrizione: "Una potenza sigillata o assopita: la sua quiete è una conta alla rovescia."
  wizard: ["Cosa la tiene sopita — e cosa la sveglierebbe", "Quali segni precedono il risveglio"]
# Campi query-abili (stato nel cosmo + allineamento): "tutte le primordiali dormienti".
fields:
  stato_cosmico: { label: Stato cosmico, widget: stato_cosmico }
scheda: [stato_cosmico, allineamento]
relazioni:
- field: legge
  label: Legge incarnata
  category: legge_fondamentale
- field: dominio
  label: Dominio
  category: dominio
- field: divinita
  label: Divinità discese
  category: divinita
  multi: true
- field: luoghi
  label: Luoghi (prigioni, santuari)
  category: luogo
  multi: true
# Inverso tipizzato di sistema_magico.fonti: un primordiale elenca i sistemi che vi attingono.
- field: sistemi_magici
  label: Sistemi magici che vi attingono
  category: sistema_magico
  multi: true
- field: stirpi
  label: Stirpi generate
  category: specie
  multi: true
  reciprocal: origine_primordiale
- field: epoche
  label: Ere primordiali
  category: epoca
  multi: true
  reciprocal: primordiali
- field: miti
  label: Miti
  category: mito
  multi: true
  reciprocal: primordiali
- field: piani
  label: Piani di prigionia / dimora
  category: piano
  multi: true
  reciprocal: primordiali
creation:
  fields:
  - field: tipo
    prompt: Natura primordiale
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo
    from: notes
    category: mondo
    link: true
    required: true
  body:
  - field: ruolo_cosmico
    prompt: 'Ruolo cosmico: la sua funzione nell''ordine (o disordine) del cosmo'
    heading: Ruolo cosmico
  - field: volonta
    prompt: 'Volontà: cosa vuole, cosa muove la sua azione'
    heading: Volontà
  # «Stato attuale» NON è un body in prosa: è il campo-scheda `stato_cosmico`
  # (query-abile) + l'asse `risveglio` (Sigillata→Scatenata). Niente tripla cattura.
  - field: eredita
    prompt: 'Eredità: cosa ha lasciato (divinità, stirpi, luoghi, leggi)'
    heading: Eredità
  - field: manifestazioni
    prompt: 'Manifestazioni: segni del suo risveglio o della sua presenza'
    heading: Manifestazioni
  - field: segreto
    prompt: Il vero nome o la verità sigillata su di essa
    callout: segreto
    title: Segreto
    fold: true

guida:
  scopo: Un'entità primordiale è un essere pre-divino che incarna una legge e appartiene a un dominio; da essa discendono le divinità.
  campi_chiave: '**Stato** (sigillata/dormiente/desta, query-abile) e **Allineamento**; poi le relazioni **Legge incarnata** e **Dominio**; sul Carattere **Risveglio**.'
