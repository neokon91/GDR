# Schema per-entità: evento. Single source di tassonomia, scheda, assi,
# relazioni, wizard e wiring template. render.py lo distribuisce nel
# modello globale 'core' (apply_entities) e raccoglie i template.
# I campi sono nel registro centrale (core.yaml/system.yaml).
id: evento
folder: Mondi/Eventi
order: 6
gruppo: tempo
templates:
- id: evento
  title: Evento
  default_type: evento storico
  target: z.modelli/Evento.md
  jinja: evento.md.j2
  primary: true
# SOTTOTIPI con PROFILO: la NATURA dell'evento. Un evento è un PUNTO nel tempo (non un
# Fronte, non evolve): clock/evoluzione restano false; la catena causale vive nelle
# relazioni causato_da/conseguenze + renderCausalita.
subtypes:
- { nome: evento storico,      descrizione: "Un fatto accaduto nel passato del mondo, che pesa ancora sul presente.", campi: [], clock: false, evoluzione: false }
- { nome: evento di campagna,  descrizione: "Accade DURANTE il gioco, mosso dai PG o dal mondo: la giocata che fa storia.", campi: [], clock: false, evoluzione: false }
- { nome: conflitto,           descrizione: "Guerra, battaglia o scontro: chi combatte, perché, e come finisce.", campi: [belligeranti, casus_belli, esito], clock: false, evoluzione: false }
- { nome: conseguenza,         descrizione: "L'esito scatenato da un Fronte col clock pieno: l'evento che il worldbuilding ha prodotto.", campi: [scatenato_da], clock: false, evoluzione: false }
fields:
  belligeranti: { label: Belligeranti,      widget: text }
  casus_belli:  { label: Casus belli,       widget: text }
  esito:        { label: Esito,             widget: text }
  scatenato_da: { label: Scatenato dal Fronte, widget: legame }
# Classificazione a 2 livelli: la 'famiglia' (registro cosmico, seed FW evento_cat)
# affianca il 'tipo'. Select + legenda auto-documentante.
famiglie:
- { nome: cosmico,       descrizione: "Coinvolge l'equilibrio dell'universo: nascita o morte di leggi fondamentali, piani o entità primordiali.", assi: { risonanza: 5, reversibilita: 5 } }
- { nome: epocale,       descrizione: "Marca un prima e un dopo nella linea storica, aprendo o chiudendo un'epoca.", assi: { risonanza: 4 } }
- { nome: mitico,        descrizione: "Evento archetipico tramandato in forma simbolica o leggendaria.", assi: { controversia: 5 } }
- { nome: sacrale,       descrizione: "Implica un contatto diretto col divino o una trasformazione spirituale profonda.", assi: { risonanza: 4 } }
- { nome: catastrofico,  descrizione: "Evento distruttivo su scala vasta.", assi: { reversibilita: 5 } }
- { nome: fondativo,     descrizione: "Genera un ordine, una civiltà, un pantheon o un piano.", assi: { risonanza: 5, reversibilita: 4 } }
- { nome: transizionale, descrizione: "Segna un passaggio tra stati dell'essere, condizioni metafisiche o ordini narrativi.", assi: { reversibilita: 4 } }
scheda:
- portata
relazioni:
# Timeline CAUSALE: coppia direzionale evento↔evento. causato_da risale alle cause
# a monte; conseguenze scende a ciò che l'evento ha innescato. Inverso ESPLICITO
# reciproco (l'auto-derivazione è ambigua: entrambe puntano a evento). renderCausalita
# ricostruisce la catena nelle due direzioni.
- field: causato_da
  label: Causato da
  category: evento
  multi: true
  reciprocal: conseguenze
- field: conseguenze
  label: Conseguenze
  category: evento
  multi: true
  reciprocal: causato_da
- field: epoca
  label: Epoca
  category: epoca
  reciprocal: eventi
- field: luogo
  label: Luogo
  category: luogo
- field: coinvolti
  label: Coinvolti
  category: personaggio
  multi: true
  reciprocal: eventi
- field: fazioni
  label: Fazioni
  category: fazione
  multi: true
- field: miti
  label: Miti generati
  category: mito
  multi: true
  reciprocal: evento_storico
- field: divinita
  label: Divinità coinvolte
  category: divinita
  multi: true
- field: culti
  label: Culti coinvolti
  category: culto
  multi: true
# Inverso di profezia.evento: le profezie che predicono/riguardano questo evento.
- field: profezie
  label: Profezie collegate
  category: profezia
  multi: true
  reciprocal: evento
- field: calamita_innescata
  label: Calamità innescata
  category: calamita
  multi: true
  reciprocal: causato_da
- field: scene
  label: Giocato nelle scene
  category: scena
  multi: true
  reciprocal: genera_evento
- field: eserciti
  label: Eserciti in campo
  category: esercito
  multi: true
- field: regni
  label: Regni coinvolti
  category: regno
  multi: true
creation:
  fields:
  - field: tipo
    prompt: Tipo di evento
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo
    from: notes
    category: mondo
    link: true
    required: true
  - field: quando
    prompt: Quando (data del mondo)
  - field: fc-date
    prompt: 'Data sul calendario (opz., formato del calendario attivo, es. 1492-07-20)'
  body:
  - field: cause
    prompt: 'Cause: perché è successo'
    heading: Cause
  - field: cosa
    prompt: Cosa accade
    heading: Cosa accade
  - field: conseguenza
    prompt: Conseguenza per il presente
    heading: Conseguenza
  - field: eredita
    prompt: Cosa ne resta oggi (ganci vivi)
    heading: Eredità

guida:
  scopo: Un fatto realmente accaduto nel mondo, nodo della timeline causale (a differenza del mito, che è racconto).
  campi_chiave: '**Tipo** + **Quando** (data del mondo); **Causato da** / **Conseguenze** per agganciare la catena causale che muove la cronologia.'
