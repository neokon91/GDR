# Schema per-entità: evento. Single source di tassonomia, scheda, assi,
# relazioni, wizard e wiring template. render.py lo distribuisce nel
# modello globale 'core' (apply_entities) e raccoglie i template.
# I campi sono nel registro centrale (core.yaml/system.yaml).
id: evento
folder: Mondi/Eventi
order: 6
templates:
- id: evento
  title: Evento
  default_type: evento storico
  target: z.modelli/Evento.md
  jinja: evento.md.j2
  primary: true
subtypes:
- evento storico
- evento di campagna
- conflitto
- conseguenza
# Classificazione a 2 livelli: la 'famiglia' (registro cosmico, seed FW evento_cat)
# affianca il 'tipo'. Select + legenda auto-documentante.
famiglie:
- { nome: cosmico,       descrizione: "Coinvolge l'equilibrio dell'universo: nascita o morte di leggi fondamentali, piani o entità primordiali." }
- { nome: epocale,       descrizione: "Marca un prima e un dopo nella linea storica, aprendo o chiudendo un'epoca." }
- { nome: mitico,        descrizione: "Evento archetipico tramandato in forma simbolica o leggendaria." }
- { nome: sacrale,       descrizione: "Implica un contatto diretto col divino o una trasformazione spirituale profonda." }
- { nome: catastrofico,  descrizione: "Evento distruttivo su scala vasta." }
- { nome: fondativo,     descrizione: "Genera un ordine, una civiltà, un pantheon o un piano." }
- { nome: transizionale, descrizione: "Segna un passaggio tra stati dell'essere, condizioni metafisiche o ordini narrativi." }
scheda:
- portata
relazioni:
- field: epoca
  label: Epoca
  category: epoca
- field: luogo
  label: Luogo
  category: luogo
- field: coinvolti
  label: Coinvolti
  category: personaggio
  multi: true
- field: fazioni
  label: Fazioni
  category: fazione
  multi: true
- field: miti
  label: Miti generati
  category: mito
  multi: true
- field: divinita
  label: Divinità coinvolte
  category: divinita
  multi: true
- field: culti
  label: Culti coinvolti
  category: culto
  multi: true
creation:
  fields:
  - field: tipo
    prompt: Tipo di evento
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo
    from: notes
    category: mondo
    link: true
    required: true
  - field: quando
    prompt: Quando (data del mondo)
  - field: fc-date
    prompt: 'Data sul calendario (opz., formato del calendario attivo, es. 1492-07-20)'
  body:
  - field: cause
    prompt: 'Cause: perché è successo'
    heading: Cause
  - field: cosa
    prompt: Cosa accade
    heading: Cosa accade
  - field: conseguenza
    prompt: Conseguenza per il presente
    heading: Conseguenza
  - field: eredita
    prompt: Cosa ne resta oggi (ganci vivi)
    heading: Eredità
