# Schema per-entità: background. Single source di tassonomia, scheda, assi,
# relazioni, wizard e wiring template. render.py lo distribuisce nel
# modello globale 'core' (apply_entities) e raccoglie i template.
# I campi sono nel registro centrale (core.yaml/system.yaml).
id: background
folder: Mondi/Background
order: 17
templates:
- id: background
  title: Background
  default_type: background
  target: z.modelli/Background.md
  jinja: reference.md.j2
subtypes:
- background
# Competenze in abilità concesse dal background (2024: 2 abilità). Campo-meccanica
# che il ponte homebrew→motore (crea_pg) legge per renderlo giocabile.
fields:
  abilita_background: { label: Competenze in abilità, widget: text }
scheda:
- car_background
- abilita_background
- strumento
- talento_origine
creation:
  fields:
  - field: tipo
    prompt: Tipo
    from: subtypes
    required: true
  # Dati che rendono il background GIOCABILE e 2024-LEGALE (crea_pg li fonde nelle
  # opzioni PG). Nel 2024 OGNI background concede: ASI su 3 caratteristiche (a
  # creazione il PG sceglie +2/+1 o +1/+1/+1), 2 abilità, 1 strumento e un Talento
  # d'Origine. Sono quindi OBBLIGATORI: un background mutilo non è conforme al 2024.
  - field: car_background
    prompt: 'Caratteristiche d''origine — ESATTAMENTE 3 (es. Forza, Costituzione, Saggezza)'
    required: true
  - field: abilita_background
    prompt: 'Competenze in abilità — esattamente 2 (es. Atletica, Intimidire)'
    required: true
  - field: talento_origine
    prompt: "Talento d'Origine (2024: ne concede uno — es. Robusto, Iniziato alla magia)"
    required: true
  - field: strumento
    prompt: Competenza in 1 strumento (o un kit/strumento musicale)
    required: true
  body:
  - field: descrizione
    prompt: Chi era prima dell'avventura
    heading: Descrizione
  - field: equipaggiamento
    prompt: Equipaggiamento iniziale
    heading: Equipaggiamento

guida:
  scopo: Il background che, nel 2024, dà al PG le competenze d'origine e il primo talento — scegliendolo in creazione il motore lo applica.
  campi_chiave: 'Tutti obbligatori per essere 2024-legale: **Caratteristiche** (3), **Abilità** (2), **Talento d''origine** (1) e **Strumento** (1).'
