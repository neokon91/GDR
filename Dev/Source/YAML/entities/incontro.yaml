# Schema per-entità: incontro. Single source di tassonomia, scheda, assi,
# relazioni, wizard e wiring template. render.py lo distribuisce nel
# modello globale 'core' (apply_entities) e raccoglie i template.
# I campi sono nel registro centrale (core.yaml/system.yaml).
id: incontro
folder: Mondi/Incontri
order: 10
gruppo: tavolo
templates:
- id: incontro
  title: Incontro
  default_type: incontro
  target: z.modelli/Incontro.md
  jinja: encounter.md.j2
  area: gioco
  primary: true
# SOTTOTIPI con PROFILO: il `tipo` è la SITUAZIONE D'INGAGGIO (come parte la scena),
# ortogonale alla 'famiglia' (il contenuto/scopo: combattimento, sociale…). I dati di
# difficoltà (pg_livello/pg_numero/creature) restano per renderEncounter.
subtypes:
- { nome: incontro,      descrizione: "Scena standard: le parti si incontrano e la situazione si sviluppa, con iniziativa normale.", campi: [] }
- { nome: agguato,       descrizione: "Una parte sorprende l'altra: Furtività vs Percezione, sorpresa al primo round.",            campi: [chi_sorprende] }
- { nome: inseguimento,  descrizione: "Una caccia: chi fugge e chi insegue, con ostacoli e una distanza che cambia ogni round.",   campi: [preda, distanza_iniziale] }
# Classificazione a 2 livelli: la 'famiglia' (scopo/CONTENUTO della scena) affianca il
# 'tipo' (situazione d'ingaggio). NB: niente 'inseguimento' qui — è un tipo (la caccia
# è una situazione, non un contenuto).
famiglie:
- { nome: combattimento, descrizione: "Scontro: l'obiettivo è prevalere sul nemico." }
- { nome: sociale,       descrizione: "Interazione: persuadere, negoziare, ingannare, intimidire." }
- { nome: esplorazione,  descrizione: "Scoperta: attraversare, cercare, orientarsi nell'ignoto." }
- { nome: enigma,        descrizione: "Rompicapo: risolvere un puzzle, un indovinello, un meccanismo." }
- { nome: ambientale,    descrizione: "Sopravvivenza: l'ambiente stesso è la minaccia." }
# Gruppo di riferimento per il calcolo della difficoltà (views.renderEncounter).
fields:
  pg_livello: { label: Livello del gruppo, widget: number }
  pg_numero:  { label: Numero di PG,       widget: number }
  chi_sorprende:     { label: Chi sorprende,        widget: text }
  preda:             { label: Preda / chi fugge,    widget: text }
  distanza_iniziale: { label: Distanza iniziale,    widget: text }
scheda: [pg_livello, pg_numero]
relazioni:
- field: luogo
  label: Luogo
  category: luogo
- field: creature
  label: Creature
  category: creatura
  multi: true
# Combattenti dalla parte del gruppo (PNG alleati, evocazioni): aggiorna_encounter
# li emette con il flag `, ally` nel blocco encounter (Initiative Tracker li separa
# dai nemici nel conteggio difficoltà).
- field: alleati
  label: Alleati (PNG/evocazioni)
  category: creatura
  multi: true
- field: scena
  label: Scena
  category: scena
  reciprocal: incontri
- field: insidie
  label: Insidie
  category: insidia
  multi: true
  reciprocal: incontri
- field: bottino
  label: Bottino
  category: oggetto
  multi: true
  reciprocal: incontri
creation:
  fields:
  - field: tipo
    prompt: Tipo di incontro
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo
    from: notes
    category: mondo
    link: true
    required: true
  - field: luogo
    prompt: Dove avviene (opzionale)
    from: notes
    category: luogo
    link: true
    optional: true
  - field: creature
    prompt: Creature coinvolte
    from: notes
    category: creatura
    link: true
    multi: true
  - field: alleati
    prompt: Alleati schierati col gruppo (PNG, evocazioni)
    from: notes
    category: creatura
    link: true
    multi: true
    optional: true
  - field: pg_livello
    prompt: Livello medio del gruppo (per la difficoltà)
    from: number
    optional: true
  - field: pg_numero
    prompt: Numero di personaggi
    from: number
    optional: true
  body:
  - field: obiettivo
    prompt: Obiettivo della scena
    heading: Obiettivo
  - field: complicazione
    prompt: Terreno o complicazione
    heading: Complicazione
  - field: posta
    prompt: 'Posta in gioco: cosa succede se va male'
    heading: Posta in gioco

guida:
  scopo: Una scena pronta da giocare — scontro, agguato o inseguimento — col budget di difficoltà 2024 calcolato in automatico.
  campi_chiave: '**Creature** + **Livello del gruppo** + **Numero di PG** alimentano il calcolo difficoltà; la **Famiglia** (combattimento/sociale…) varia il ritmo.'
