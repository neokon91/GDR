# Schema per-entità: legge_fondamentale (lore). Principio cosmico assoluto, di norma
# una POLARITÀ (Vita/Morte, Forma/Distorsione, Luce/Ombra, Verità/Illusione...): la
# tensione fra i due poli regola un aspetto della realtà. Seed FantasyWorld
# JSON/cosmologia/leggi_fondamentali/*.json (9 leggi). Nodo del grafo cosmologico.
id: legge_fondamentale
folder: Mondi/Leggi
order: 34
gruppo: cosmo
templates:
- id: legge_fondamentale
  title: Legge fondamentale
  default_type: polarità
  target: z.modelli/Legge fondamentale.md
subtypes:
- polarità
- principio assoluto
- vincolo cosmico
# Classificazione a 2 livelli: la 'famiglia' (ambito di realtà retto dalla legge)
# affianca il 'tipo'. Select + legenda auto-documentante.
famiglie:
- { nome: esistenziale, descrizione: "Regge l'essere e il non-essere: vita, morte, presenza.", assi: { portata: 5, rigidita: 1 } }
- { nome: morale,       descrizione: "Regge bene e male, luce e ombra, colpa e redenzione.", assi: { equilibrio: 3, manifestazione: 2 } }
- { nome: causale,      descrizione: "Regge causa ed effetto, destino e libero arbitrio, caso.", assi: { rigidita: 1, portata: 4 } }
- { nome: formale,      descrizione: "Regge forma e dissoluzione, ordine ed entropia, identità.", assi: { portata: 4 } }
- { nome: temporale,    descrizione: "Regge tempo, durata, eternità e ciclicità.", assi: { stabilita: 1, rigidita: 1 } }
- { nome: magica,       descrizione: "Regge il flusso dell'energia, il vuoto e i limiti del potere.", assi: { rigidita: 4 } }
# Campo query-abile: i due poli della legge (es. "Vita ↔ Morte").
fields:
  poli: { label: Poli, widget: text }
scheda: [poli]
relazioni:
- field: dominio
  label: Dominio che la esprime
  category: dominio
- field: incarnata_da
  label: Incarnata da
  category: entita_primordiale
  multi: true
- field: piani
  label: Piani che la riflettono
  category: piano
  multi: true
# Inverso tipizzato di sistema_magico.leggi: una legge elenca i sistemi che vi poggiano.
- field: sistemi_magici
  label: Sistemi magici che vi poggiano
  category: sistema_magico
  multi: true
- field: legge_opposta
  label: Legge complementare / opposta
  category: legge_fondamentale
  multi: true
  reciprocal: legge_opposta
- field: divinita
  label: Divinità che la incarnano
  category: divinita
  multi: true
  reciprocal: leggi
creation:
  fields:
  - field: tipo
    prompt: Forma della legge
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo
    from: notes
    category: mondo
    link: true
    required: true
  body:
  # NB: i due poli NON sono un body-prosa (sarebbe doppione): vivono nel campo-scheda
  # `poli` (query-abile, "Vita ↔ Morte") + l'asse `Equilibrio` (verso quale polo pende
  # il mondo ora). Il body racconta il RUOLO (principio) e la dinamica (rottura/
  # manifestazioni), non ri-elenca i poli.
  - field: principio
    prompt: 'Principio: cosa regola, come tiene insieme la realtà'
    heading: Principio
  - field: rottura
    prompt: 'Rottura: cosa accade se la legge si spezza o si sbilancia'
    heading: Quando si spezza
  - field: manifestazioni
    prompt: 'Manifestazioni: come si percepisce nel mondo (fenomeni, presagi)'
    heading: Manifestazioni
  - field: segreto
    prompt: La verità che pochi conoscono su questa legge
    callout: segreto
    title: Segreto
    fold: true

guida:
  scopo: 'Una legge fondamentale è un principio cosmico assoluto, spesso una polarità (Vita↔Morte): la tensione fra i due poli regge un aspetto della realtà.'
  campi_chiave: '**Poli** (i due estremi) e **Famiglia** (esistenziale, morale, causale…); sul Carattere **Equilibrio** dice verso quale polo pende il mondo ora.'
