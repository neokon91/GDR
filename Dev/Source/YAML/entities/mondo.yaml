# Schema per-entità: mondo. Single source di tassonomia, scheda, assi,
# relazioni, wizard e wiring template. render.py lo distribuisce nel
# modello globale 'core' (apply_entities) e raccoglie i template.
# I campi sono nel registro centrale (core.yaml/system.yaml).
id: mondo
folder: Mondi
order: 1
templates:
- id: mondo
  title: Mondo
  default_type: mondo
  target: z.modelli/Mondo.md
  jinja: mondo.md.j2
  primary: true
subtypes:
- mondo
scheda:
- scala
- genere
- epoca
- temi
# Assi tematici nel formato RICCO (autorati sullo standard FantasyWorld, manca un
# seed 'mondo'): 5 assi su scala 1-5 con etichetta + descrizione per valore.
assi:
- id: diffusione_magia
  nome: Diffusione della Magia
  descrizione: Quanto la magia è presente e accessibile nel mondo.
  valori:
    1: { etichetta: Assente,    descrizione: "Mondo mondano; la magia è mito o non esiste affatto." }
    2: { etichetta: Rara,       descrizione: "Esiste ma è rarissima e temuta; pochi la padroneggiano." }
    3: { etichetta: Presente,   descrizione: "Conosciuta e usata da specialisti; parte della società." }
    4: { etichetta: Diffusa,    descrizione: "Pervade la vita quotidiana; tecnomagia, mercati arcani." }
    5: { etichetta: Onnipresente, descrizione: "La realtà stessa è magia; ogni cosa ne è intrisa." }
- id: tono
  nome: Tono
  descrizione: L'atmosfera emotiva dominante del mondo.
  valori:
    1: { etichetta: Luminoso,   descrizione: "Eroico e speranzoso; il bene tende a trionfare." }
    2: { etichetta: Avventuroso, descrizione: "Pericoli e meraviglie; il coraggio paga." }
    3: { etichetta: Ambiguo,    descrizione: "Zone grigie; scelte difficili senza risposte nette." }
    4: { etichetta: Cupo,       descrizione: "Mondo duro; la sopravvivenza ha un prezzo, la fiducia è rara." }
    5: { etichetta: Grimdark,   descrizione: "Disperato e spietato; la speranza è un lusso, vince chi cede meno." }
- id: ordine_politico
  nome: Ordine Politico
  descrizione: Quanto il mondo è stabile o nel caos.
  valori:
    1: { etichetta: Stabile,    descrizione: "Imperi saldi, pace duratura; l'ordine è la norma." }
    2: { etichetta: Ordinato,   descrizione: "Tensioni gestite; le istituzioni reggono." }
    3: { etichetta: Conteso,    descrizione: "Equilibri fragili; potenze rivali, conflitti latenti." }
    4: { etichetta: Turbolento, descrizione: "Guerre, crisi, troni vacillanti; il futuro è incerto." }
    5: { etichetta: Caos,       descrizione: "Collasso o anarchia; nessuna autorità regge davvero." }
- id: civilta_natura
  nome: Civiltà e Natura
  descrizione: Equilibrio tra mondo civilizzato e natura selvaggia.
  valori:
    1: { etichetta: Urbanizzato, descrizione: "Città ovunque; la natura è marginale o addomesticata." }
    2: { etichetta: Coltivato,  descrizione: "Civiltà estesa con frontiere selvagge ai margini." }
    3: { etichetta: "In equilibrio", descrizione: "Insediamenti e natura selvaggia si bilanciano." }
    4: { etichetta: Selvaggio,  descrizione: "Natura dominante; la civiltà è isole sparse e fragili." }
    5: { etichetta: Incontaminato, descrizione: "Natura primordiale; la civiltà è quasi assente o perduta." }
- id: eta_storica
  nome: Età Storica
  descrizione: A che punto del suo arco storico si trova il mondo.
  valori:
    1: { etichetta: Aurora,     descrizione: "Mondo giovane; popoli nascenti, terre inesplorate." }
    2: { etichetta: Ascesa,     descrizione: "Civiltà in espansione; scoperte, conquiste, crescita." }
    3: { etichetta: Apogeo,     descrizione: "Picco di splendore; grandi potenze al culmine." }
    4: { etichetta: Declino,    descrizione: "Decadenza; antichi splendori che si sgretolano." }
    5: { etichetta: Rovina,     descrizione: "Dopo un cataclisma; rovine di un'era perduta tra i sopravvissuti." }
creation:
  fields:
  - field: temi
    prompt: Temi della campagna
    from: list
    options:
    - politico
    - guerra
    - mistero
    - sopravvivenza
    - esplorazione
    - horror
    - intrigo
    - redenzione
    multi: true
    optional: true
  body:
  - field: tono
    prompt: Tono e atmosfera del mondo
    heading: Tono
  - field: conflitto
    prompt: Conflitto centrale
    heading: Conflitto centrale
  - field: geografia
    prompt: 'Geografia: continenti, regioni, luoghi-chiave'
    heading: Geografia
  - field: popoli
    prompt: Popoli e culture che lo abitano
    heading: Popoli
  - field: magia
    prompt: Ruolo della magia nel mondo
    heading: Magia
  - field: poteri
    prompt: Chi detiene il potere (fazioni, troni, poteri occulti)
    heading: Poteri
  - field: storia
    prompt: 'Storia: ere passate, eventi che pesano sul presente'
    heading: Storia
  - field: verita_nascosta
    prompt: La verità nascosta del mondo
    callout: segreto
    title: Verità nascosta
    fold: true
