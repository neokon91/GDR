# Schema per-entità: mondo. Single source di tassonomia, scheda, assi,
# relazioni, wizard e wiring template. render.py lo distribuisce nel
# modello globale 'core' (apply_entities) e raccoglie i template.
# I campi sono nel registro centrale (core.yaml/system.yaml).
id: mondo
folder: Mondi
order: 1
templates:
- id: mondo
  title: Mondo
  default_type: mondo
  target: z.modelli/Mondo.md
  jinja: mondo.md.j2
  primary: true
subtypes:
- mondo
# Scala mappa (km per unità di coordinata, vedi luogo.coord) e passo di viaggio
# (km al giorno a piedi, default 30): alimentano la distanza metrica (renderDintorni)
# e i tempi di viaggio (renderViaggio). Assenti → distanze in unità "u", passo 30.
fields:
  scala_mappa:   { label: "Scala mappa (km per unità)", widget: number }
  passo_viaggio: { label: "Passo di viaggio (km/giorno)", widget: number }
relazioni:
- field: cosmologia
  label: Cosmologia
  category: cosmologia
- field: sistemi_magici
  label: Sistemi magici
  category: sistema_magico
  multi: true
- field: regni
  label: Regni
  category: regno
  multi: true
- field: culture
  label: Culture
  category: cultura
  multi: true
# Un MONDO non si definisce con etichette astratte: si definisce coi suoi COMPONENTI
# (cosmologia, regni, luoghi, culture, specie, divinità, sistemi magici, epoche, fazioni
# — entità vere che crei e che si agganciano qui). Lo scheda resta il "sapore" della
# campagna (genere + temi); NON `scala` (era un mix assurdo di entità e sottotipi-luogo)
# né `epoca` (è un'entità, non un valore). I "pezzi" si gestiscono nel tab Componenti.
scheda:
- genere
- temi
creation:
  fields:
  - field: temi
    prompt: Temi della campagna
    from: list
    options:
    - politico
    - guerra
    - mistero
    - sopravvivenza
    - esplorazione
    - horror
    - intrigo
    - redenzione
    multi: true
    optional: true
  # Solo l'ANIMA della campagna (niente equivalente fra i componenti). Geografia/popoli/
  # magia/poteri/storia NON sono prosa qui: sono Luoghi/Regni, Culture/Specie, Sistemi
  # magici, Fazioni, Epoche — li crei nel tab Componenti.
  # NB: 'tono' NON è qui — è un ASSE del Carattere (slider Luminoso→Grimdark); metterlo
  # anche come campo-body creava una collisione (due input sullo stesso `tono`).
  body:
  - field: conflitto
    prompt: Conflitto centrale della campagna
    heading: Conflitto centrale
  - field: verita_nascosta
    prompt: La verità nascosta del mondo
    callout: segreto
    title: Verità nascosta
    fold: true

guida:
  scopo: 'Il mondo è il contenitore-radice della campagna: ne fissa genere, tono e conflitto, e da qui agganci tutti i componenti (regni, culture, cosmologia…).'
  campi_chiave: '**Genere** e **Temi** danno il sapore; sul Carattere imposta **Tono** e **Diffusione della magia** — definiscono atmosfera e quanto conta l''arcano.'
