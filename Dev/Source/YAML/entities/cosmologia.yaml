# Schema per-entità: cosmologia (lore). Single source di tassonomia, scheda, assi,
# relazioni, wizard e wiring template. render.py lo distribuisce nel modello
# globale 'core' (apply_entities) e raccoglie i template.
# Copre i principi cosmici del mondo: leggi, piani, forze primordiali, concetti.
# Arricchito da FantasyWorld t.piano.yaml / t.legge.yaml + assi_tematici_divinita
# con criterio "mix curato" (profondita' nelle sezioni body, fm leggero perche'
# entita' astratta).
id: cosmologia
folder: Mondi/Cosmologia
order: 2
gruppo: cosmo
templates:
- id: cosmologia
  title: Cosmologia
  default_type: quadro cosmico
  target: z.modelli/Cosmologia.md
  jinja: cosmologia.md.j2
subtypes:
- quadro cosmico
- concetto cosmico
- mistero cosmico
# Classificazione a 2 livelli: la 'famiglia' (questione cosmica affrontata) affianca
# il 'tipo'. Select + legenda auto-documentante.
famiglie:
- { nome: origine,    descrizione: "Come e da cosa nasce la realtà: principi e atti primigeni." }
- { nome: struttura,  descrizione: "Come è ordinato il cosmo: piani, leggi, gerarchie dell'essere." }
- { nome: forze,      descrizione: "Le energie e i poteri che muovono e reggono il mondo." }
- { nome: destino,    descrizione: "Dove tende la realtà: cicli, fine, rinascita, scopo ultimo." }
- { nome: mistero,    descrizione: "Ciò che resta ignoto o inconoscibile: enigmi e verità nascoste." }
relazioni:
- field: domini
  label: Domini
  category: dominio
  multi: true
- field: leggi
  label: Leggi fondamentali
  category: legge_fondamentale
  multi: true
- field: primordiali
  label: Entità primordiali
  category: entita_primordiale
  multi: true
- field: piani
  label: Piani d'esistenza
  category: piano
  multi: true
- field: sistemi_magici
  label: Sistemi magici
  category: sistema_magico
  multi: true
- field: luoghi
  label: Luoghi che la manifestano
  category: luogo
  multi: true
creation:
  fields:
  - field: tipo
    prompt: Tipo cosmologico
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo
    from: notes
    category: mondo
    link: true
    required: true
  body:
  - field: natura
    prompt: Cos'e' / come si manifesta
    heading: Natura
  - field: principio
    prompt: Cosa governa o definisce (il principio attivo)
    heading: Principio
  - field: influenza
    prompt: Come tocca il mondo mortale (magia, destino, vita)
    heading: Influenza
  - field: manifestazioni
    prompt: Come si vede nel mondo (segni, fenomeni, presagi)
    heading: Manifestazioni
  - field: abitanti
    prompt: 'Chi o cosa la abita/incarna (per piani e forze)'
    heading: Abitanti
  - field: accesso
    prompt: 'Come ci si arriva o vi si attinge (per piani, riti, soglie)'
    heading: Accesso
  - field: segreto
    prompt: Verita' nascosta
    callout: segreto
    title: Segreto
    fold: true

guida:
  scopo: 'La cosmologia è il quadro d''insieme di come funziona la realtà del mondo: lega in un nodo origini, leggi, piani, forze primordiali e magie.'
  campi_chiave: '**Tipo** e **famiglia** (origine, struttura, forze, destino, mistero) inquadrano la questione; le relazioni la collegano a Leggi, Piani e Primordiali che la incarnano.'
