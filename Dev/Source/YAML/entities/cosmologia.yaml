# Schema per-entità: cosmologia (lore). Single source di tassonomia, scheda, assi,
# relazioni, wizard e wiring template. render.py lo distribuisce nel modello
# globale 'core' (apply_entities) e raccoglie i template.
# Copre i principi cosmici del mondo: leggi, piani, forze primordiali, concetti.
# Arricchito da FantasyWorld t.piano.yaml / t.legge.yaml + assi_tematici_divinita
# con criterio "mix curato" (profondita' nelle sezioni body, fm leggero perche'
# entita' astratta).
id: cosmologia
folder: Mondi/Cosmologia
order: 2
templates:
- id: cosmologia
  title: Cosmologia
  default_type: legge cosmica
  target: z.modelli/Cosmologia.md
  jinja: cosmologia.md.j2
subtypes:
- legge cosmica
- piano o aldila
- forza primordiale
- concetto cosmico
# Assi tematici nel formato RICCO (seed FantasyWorld assi_tematici_divinita.yaml +
# autorati per i principi cosmici): 5 assi su scala 1-5 con etichetta + descrizione.
assi:
- id: presenza
  nome: Presenza Cosmica
  descrizione: Dove e come questo principio esiste nel cosmo.
  valori:
    1: { etichetta: Trascendente, descrizione: "Oltre il cosmo, non localizzabile né accessibile; puro principio." }
    2: { etichetta: Diffusa,      descrizione: "Presente in molti piani ma debolmente; ovunque e in nessun luogo." }
    3: { etichetta: Focalizzata,  descrizione: "Una sede principale, ma può agire altrove; dominio non esclusivo." }
    4: { etichetta: Ancorata,     descrizione: "Legata a un luogo, piano o popolo; fuori è muta o assente." }
    5: { etichetta: Immanente,    descrizione: "È il mondo stesso; ogni cosa è sua emanazione vivente." }
- id: attivita
  nome: Attività
  descrizione: Quanto questo principio agisce sul mondo o resta inerte.
  valori:
    1: { etichetta: Silente,      descrizione: "Non esercita volontà; osserva senza agire. Puro fondamento." }
    2: { etichetta: Risonante,    descrizione: "Presente ma non coercitiva; sincronicità, ispirazioni, segnali sottili." }
    3: { etichetta: Reattiva,     descrizione: "Interviene su invocazioni, sacrifici o squilibri cosmici." }
    4: { etichetta: Attiva,       descrizione: "Guida, premia, punisce; plasma la storia tramite segni ed eventi." }
    5: { etichetta: Interventista, descrizione: "Agisce di continuo; nulla accade senza la sua volontà diretta." }
- id: ordine
  nome: Ordine cosmico
  descrizione: Se il principio tende all'ordine o al disordine.
  valori:
    1: { etichetta: Caotico,      descrizione: "Forza di disordine e trasgressione; rompe ogni schema." }
    2: { etichetta: "Tendente al caos", descrizione: "Favorisce libertà, mutamento, individualismo." }
    3: { etichetta: Neutrale,     descrizione: "Senza orientamento definito; oltre ordine e caos." }
    4: { etichetta: "Tendente all'ordine", descrizione: "Favorisce armonia, regole, strutture." }
    5: { etichetta: Legale,       descrizione: "Impone equilibrio e coerenza; rifiuta la deviazione." }
- id: stabilita_cosmica
  nome: Stabilità
  descrizione: Quanto il principio è immutabile o in mutamento.
  valori:
    1: { etichetta: Eterna,       descrizione: "Immutabile da sempre; non cambia né può essere alterata." }
    2: { etichetta: Persistente,  descrizione: "Stabile, ma manifesta variazioni lente nel tempo." }
    3: { etichetta: Ciclica,      descrizione: "Si manifesta in fasi, epoche o intervalli ricorrenti." }
    4: { etichetta: Instabile,    descrizione: "Vacilla; può indebolirsi, eclissarsi o essere aggirata." }
    5: { etichetta: Morente,      descrizione: "In dissoluzione o già infranta; lascia il posto a un nuovo ordine." }
- id: percezione
  nome: Percezione
  descrizione: Quanto il principio è visibile o nascosto ai mortali.
  valori:
    1: { etichetta: Manifesta,    descrizione: "Evidente a tutti; le sue tracce sono ovunque, innegabili." }
    2: { etichetta: Nota,         descrizione: "Riconosciuta da culti e sapienti; documentata, studiata." }
    3: { etichetta: Velata,       descrizione: "Si intuisce da segni e presagi; richiede interpretazione." }
    4: { etichetta: Occulta,      descrizione: "Nota solo a iniziati; celata sotto miti o falsità." }
    5: { etichetta: Ignota,       descrizione: "Nessuno la conosce; opera nell'ombra del mondo." }
relazioni:
- field: divinita
  label: Divinita legate
  category: cosmologia
  multi: true
- field: luoghi
  label: Luoghi che la manifestano
  category: luogo
  multi: true
creation:
  fields:
  - field: tipo
    prompt: Tipo cosmologico
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo
    from: notes
    category: mondo
    link: true
    required: true
  body:
  - field: natura
    prompt: Cos'e' / come si manifesta
    heading: Natura
  - field: principio
    prompt: Cosa governa o definisce (il principio attivo)
    heading: Principio
  - field: influenza
    prompt: Come tocca il mondo mortale (magia, destino, vita)
    heading: Influenza
  - field: manifestazioni
    prompt: Come si vede nel mondo (segni, fenomeni, presagi)
    heading: Manifestazioni
  - field: abitanti
    prompt: 'Chi o cosa la abita/incarna (per piani e forze)'
    heading: Abitanti
  - field: accesso
    prompt: 'Come ci si arriva o vi si attinge (per piani, riti, soglie)'
    heading: Accesso
  - field: segreto
    prompt: Verita' nascosta
    callout: segreto
    title: Segreto
    fold: true
