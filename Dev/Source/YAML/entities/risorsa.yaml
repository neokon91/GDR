# Schema per-entità: RISORSA (lore + economia). Una merce/risorsa del mondo:
# ciò che si produce, si commercia, si controlla — il sostrato MATERIALE di
# politica e guerra. Reso giocabile dalle relazioni economiche sulle altre entità
# (luogo.produce/dipende_da/rotta_con, fazione.controlla_risorse) e dalla
# dashboard Economia. render.py distribuisce questi blocchi nel modello 'core'.
id: risorsa
folder: Mondi/Risorse
order: 37
gruppo: geografia
templates:
  - id: risorsa
    title: Risorsa
    default_type: materia prima
    target: z.modelli/Risorsa.md
# SOTTOTIPI: la FORMA economica della risorsa (profilo leggero, descrizione). La
# profondità sta in scarsità/fonte/usi + famiglia (funzione economica) + il grafo
# produce/dipende_da/controllata_da.
subtypes:
  - { nome: materia prima,       descrizione: "Estratta o raccolta grezza: minerali, legname, grano, pelli. La base di tutto il resto." }
  - { nome: bene lavorato,       descrizione: "Prodotto dalla manodopera: armi, tessuti, utensili, vetro. Vale più della materia da cui nasce." }
  - { nome: bene di lusso,       descrizione: "Voluttuario e di prestigio: spezie, gemme, sete, vini. Muove ricchezza e status." }
  - { nome: risorsa magica,      descrizione: "Sostanza o reagente arcano: cristalli di mana, essenze, componenti rari. Alimenta la magia." }
  - { nome: risorsa strategica,  descrizione: "Decide guerre e potere: acciaio, cavalli, polvere, un materiale-chiave introvabile altrove." }
# Classificazione a 2 livelli: la 'famiglia' (funzione economica) affianca il
# 'tipo' (forma). Aiuta a leggere cosa muove il mondo. Legenda auto-documentante.
famiglie:
  - { nome: vitale,       descrizione: "Necessaria alla sopravvivenza: cibo, acqua, sale, legname — chi la perde muore o si piega." }
  - { nome: bellica,      descrizione: "Alimenta la guerra: metalli, cavalli, salnitro, acciaio — chi la controlla detta i conflitti." }
  - { nome: arcana,       descrizione: "Carburante della magia: reagenti, reliquie, cristalli — rara, instabile, sempre contesa." }
  - { nome: voluttuaria,  descrizione: "Lusso e status: spezie, gemme, sete — muove ricchezza e desiderio, non necessità." }
  - { nome: simbolica,    descrizione: "Valore culturale/sacro oltre l'uso: ostie, insegne, materiali rituali — il prezzo è identità." }
fields:
  fonte:    { label: Fonte,      widget: text }
  scarsita: { label: Scarsità,   widget: scarsita }
  usi:      { label: Usi,        widget: text }
scheda: [fonte, scarsita, usi]
relazioni:
  # Inverso di fazione.controlla_risorse → chi la controlla. È 1:N (multi): una
  # fazione controlla molte risorse, e una risorsa può essere CONTESA fra più fazioni
  # (il motore di Economia / spinteFronte percorre il grafo da entrambi i lati).
  - { field: controllata_da, label: Controllata da, category: fazione, multi: true }
  # Inversi TIPIZZATI del grafo economico (luogo.produce/dipende_da, rotta.risorse):
  # così dalla risorsa si vede dove nasce, dove serve e su quali rotte viaggia — e la
  # dashboard Economia / spinteFronte percorrono il grafo da entrambi i lati.
  - { field: prodotta_in,    label: Prodotta in,    category: luogo, multi: true, reciprocal: produce }
  - { field: consumata_da,   label: Consumata da,   category: luogo, multi: true, reciprocal: dipende_da }
  - { field: trasportata_su, label: Trasportata su, category: rotta, multi: true, reciprocal: risorse }
creation:
  fields:
    - { field: tipo, prompt: "Tipo di risorsa", from: subtypes, required: true }
    - { field: mondo, prompt: "Mondo", from: notes, category: mondo, link: true, required: true }
  body:
    - { field: produzione, prompt: "Come si ottiene / si produce e dove", heading: "Produzione" }
    - { field: ruolo_economico, prompt: "Ruolo economico: chi la vuole e perché conta", heading: "Ruolo economico" }
    - { field: tensione, prompt: "Conflitto attorno alla risorsa (chi se la contende)", heading: "Tensione" }
    - { field: segreto, prompt: "Segreto della risorsa", callout: segreto, title: "Segreto", fold: true }

guida:
  scopo: 'Una risorsa è ciò che il mondo produce, commercia e si contende: il sostrato materiale che dà stakes concreti a Fronti e guerre.'
  campi_chiave: '**Tipo** + **famiglia** (vitale, bellica, arcana…); **Scarsità** e **Fonte** la rendono interrogabile; **Controllata da** la lega alla fazione che la domina.'
