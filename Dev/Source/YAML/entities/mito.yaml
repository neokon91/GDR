# Schema per-entità: mito (lore, narrativo). Racconto simbolico: origini, leggende,
# dicerie. Distinto da evento (fatto storico): il mito è narrazione, può essere
# falso o distorto. Assi in assi/mito.yaml. Seed FantasyWorld t.mito.yaml.
id: mito
folder: Mondi/Miti
order: 25
gruppo: tempo
templates:
- id: mito
  title: Mito
  default_type: leggenda
  target: z.modelli/Mito.md
subtypes:
- nome: mito di origine
  descrizione: "Racconta come qualcosa ebbe inizio — il mondo, un popolo, una legge — e ne fonda il senso."
  wizard: ["Cosa giustifica o legittima, oggi, questo inizio", "Chi avrebbe interesse a raccontarlo diverso"]
- nome: leggenda
  descrizione: "Storia di eroi e imprese, gonfiata dal tempo ma con un seme di verità."
  wizard: ["Il nucleo reale sotto l'esagerazione", "Cosa ispira o pretende da chi la ascolta"]
- nome: diceria
  descrizione: "Voce che corre di bocca in bocca: incerta, mutevole, viva proprio perché non provata."
  wizard: ["Da dove parte e perché si diffonde ora", "Chi ci guadagna a tenerla in circolo"]
- nome: dottrina
  descrizione: "Verità tramandata come fede: non si discute, si professa — struttura un culto o un popolo."
  wizard: ["Chi la custodisce e come punisce l'eresia", "Quale condotta impone a chi vi crede"]
- nome: sogno profetico
  descrizione: "Un mito ricevuto in visione, sospeso tra ricordo del futuro e simbolo da decifrare."
  wizard: ["Chi l'ha sognato e cosa ne è seguito", "L'immagine-chiave che tutti ricordano"]
# La «veridicità» del mito (quanto corrisponde alla verità del mondo) vive come ASSE
# tematico (assi/mito.yaml): slider 1-5 con legenda + radar, non un campo-scheda
# doppione che colliderebbe sulla stessa chiave di frontmatter.
relazioni:
- field: epoca_raccontata
  label: Epoca raccontata
  category: epoca
- field: divinita
  label: Divinità coinvolte
  category: divinita
  multi: true
- field: luogo
  label: Luogo simbolico
  category: luogo
- field: culti
  label: Culti che lo tramandano
  category: culto
  multi: true
creation:
  fields:
  - field: tipo
    prompt: Tipo di mito
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo
    from: notes
    category: mondo
    link: true
    required: true
  body:
  - field: narrazione
    prompt: La narrazione (il racconto come si tramanda)
    heading: Narrazione
  - field: nucleo
    prompt: 'Nucleo simbolico: cosa significa davvero'
    heading: Nucleo simbolico
  - field: interpretazioni
    prompt: 'Interpretazioni: ortodossa, eretica, esoterica'
    heading: Interpretazioni
  - field: presente
    prompt: 'Funzione nel presente: riti, simboli, ganci vivi'
    heading: Nel presente
  - field: segreto
    prompt: Cosa nasconde o distorce il mito (la verità vera)
    callout: segreto
    title: Segreto
    fold: true

guida:
  scopo: Un racconto tramandato (vero, falso o distorto) che dà senso e mistero al mondo — distinto dall'evento, che è fatto.
  campi_chiave: '**Tipo** (leggenda, diceria, dottrina…); sul Carattere **Veridicità** (quanto è vero) e **Vitalità** (quanto agisce ancora) ne fissano la presa al tavolo.'
