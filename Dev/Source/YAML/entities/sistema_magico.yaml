# Schema per-entità: sistema_magico (lore). Il "come funziona la magia" del mondo:
# fonte, metodo, costo, rischi. Distinto da incantesimo (effetto puntuale SRD) e da
# cosmologia (i principi). Assi in assi/sistema_magico.yaml. Seed FantasyWorld
# JSON/cosmologia/magia.json + assi_tematici_magia (mix curato). Nodo del grafo
# cosmologico: dominio · legge_fondamentale · entita_primordiale · piano.
id: sistema_magico
folder: Mondi/Magia
order: 32
gruppo: cosmo
templates:
- id: sistema_magico
  title: Sistema magico
  default_type: tradizione arcana
  target: z.modelli/Sistema magico.md
subtypes:
- nome: tradizione arcana
  descrizione: "Magia studiata e codificata: formule, scuole, biblioteche — il potere si impara."
  wizard: ["Dove e come si insegna, e chi ne ha il monopolio", "Cosa separa l'iniziato dal profano"]
- nome: disciplina elementale
  descrizione: "Potere attinto da una forza naturale o elementale e piegato col metodo."
  wizard: ["Quale elemento o forza canalizza", "Il prezzo fisico di tendere quella corda"]
- nome: arte proibita
  descrizione: "Magia bandita per ciò che esige o scatena: necromanzia, patti, sangue."
  wizard: ["Perché è proibita — chi l'ha messa al bando e cosa teme", "Cosa corrompe in chi la pratica"]
- nome: dono innato
  descrizione: "Potere che si nasce avendo, non si impara: stirpe, marchio, benedizione o maledizione."
  wizard: ["Da dove viene il dono e chi lo porta", "Come la società tratta i nati-dotati"]
- nome: tecnica rituale
  descrizione: "Magia lenta e collettiva: funziona col rito, il luogo e il tempo giusto, non a comando."
  wizard: ["Cosa serve al rito: tempo, luogo, offerte, numeri", "Cosa accade se è spezzato a metà"]
# Campo query-abile: "tutti i sistemi a fonte divina".
fields:
  fonte_potere: { label: Fonte del potere, widget: fonte_potere }
scheda: [fonte_potere]
relazioni:
- field: leggi
  label: Leggi su cui poggia
  category: legge_fondamentale
  multi: true
- field: dominio
  label: Dominio cosmico
  category: dominio
- field: fonti
  label: Fonti / risonanze
  category: entita_primordiale
  multi: true
- field: piani
  label: Piani di risonanza
  category: piano
  multi: true
- field: luoghi_nodo
  label: Luoghi-nodo
  category: luogo
  multi: true
- field: incantesimi
  label: Incantesimi del sistema
  category: incantesimo
  multi: true
  reciprocal: sistema_magico
- field: divinita
  label: Divinità fonte
  category: divinita
  multi: true
  reciprocal: sistemi_magici
- field: oggetti
  label: Oggetti magici
  category: oggetto
  multi: true
  reciprocal: sistema_magico
- field: specie
  label: Specie dotate (dono innato)
  category: specie
  multi: true
  reciprocal: sistemi_magici
- field: alberi
  label: Alberi / tradizioni di mastery
  category: albero_evolutivo
  multi: true
  reciprocal: sistema_magico
creation:
  fields:
  - field: tipo
    prompt: Tipo di magia
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo
    from: notes
    category: mondo
    link: true
    required: true
  body:
  - field: fonte
    prompt: 'Fonte: da dove viene il potere'
    heading: Fonte
  - field: metodo
    prompt: 'Metodo: come si pratica (parole, gesti, sangue, patti)'
    heading: Metodo
  # Dottrina: la visione del mondo che il sistema incarna (recupero FantasyWorld) —
  # distinta da 'fonte' (da dove viene) e 'metodo' (come si pratica).
  - field: dottrina
    prompt: 'Dottrina: la visione del mondo, l''etica o la filosofia che la magia incarna'
    heading: Dottrina
  - field: costo
    prompt: 'Costo e limiti: cosa esige da chi la usa'
    heading: Costo
  - field: rischi
    prompt: 'Rischi: cosa va storto, corruzione, ricaduta'
    heading: Rischi
  - field: manifestazioni
    prompt: 'Manifestazioni: come si riconosce nel mondo'
    heading: Manifestazioni
  - field: segreto
    prompt: La verità nascosta sulla sua origine o sul suo prezzo
    callout: segreto
    title: Segreto
    fold: true

guida:
  scopo: Un sistema magico descrive come funziona la magia nel mondo — da dove viene, come si pratica, cosa costa, cosa rischia — distinto dal singolo incantesimo.
  campi_chiave: '**Fonte del potere** e **Tipo**; sul Carattere gli assi **Fonte/Metodo/Costo/Rischio**, che insieme generano l''archetipo (dono, patto, selvaggia, accademica…).'
