# Schema per-entità: lingua. Single source di tassonomia, scheda, assi,
# relazioni, wizard e wiring template. render.py lo distribuisce nel
# modello globale 'core' (apply_entities) e raccoglie i template.
# I campi sono nel registro centrale (core.yaml/system.yaml).
id: lingua
folder: Mondi/Lingue
order: 7
gruppo: societa
templates:
- id: lingua
  title: Lingua
  default_type: lingua
  target: z.modelli/Lingua.md
  # Niente 'jinja' -> usa lo scheletro condiviso _entity_base.j2 (riempito da YAML+macro).
subtypes:
- lingua
- dialetto
- codice o gergo
# Classificazione a 2 livelli: la 'famiglia' (registro, seed FW lingua_cat)
# affianca il 'tipo'. Select + legenda auto-documentante.
famiglie:
- { nome: primordiale, descrizione: "Linguaggi originari, emanazioni cosmiche o divine anteriori alla realtà ordinata.", assi: { origine: 5, stratificazione: 5, complessita: 5 } }
- { nome: divina,      descrizione: "Idiomi delle entità divine o delle sfere celesti, spesso incomprensibili ai mortali.", assi: { funzione: 4, origine: 5, accesso: 4 } }
- { nome: planare,     descrizione: "Associati a uno o più piani; riflettono le proprietà metafisiche del piano.", assi: { stratificazione: 5, origine: 5 } }
- { nome: elementale,  descrizione: "Linguaggi naturali legati ai quattro elementi primari.", assi: { origine: 1, funzione: 2 } }
- { nome: ancestrale,  descrizione: "Idiomi di civiltà estinte o epoche dimenticate.", assi: { origine: 1, complessita: 4, accesso: 3 } }
- { nome: rituale,     descrizione: "Usati per scopi cerimoniali, religiosi o liturgici.", assi: { formalita: 5, funzione: 4, effetto_magico: 3 } }
- { nome: arcana,      descrizione: "Linguaggi specialistici per incantesimi, formule, sigilli e grimori.", assi: { effetto_magico: 4, funzione: 5, accesso: 4 } }
- { nome: segreta,     descrizione: "Codici cifrati e idiomi criptici di sette, ladri, spie o ordini iniziatici.", assi: { accesso: 4, stratificazione: 2 } }
# Campo query-abile: stato vitale della lingua ("lingue morte/liturgiche").
fields:
  vitalita: { label: Vitalità, widget: vitalita }
scheda: [vitalita]
relazioni:
- field: parlata_in
  label: Parlata in
  category: luogo
  multi: true
- field: culture
  label: Culture
  category: cultura
  multi: true
- field: sistema_magico
  label: Sistema magico
  category: sistema_magico
  multi: true
- field: divinita
  label: Lingua di (divinità)
  category: divinita
  multi: true
- field: piani
  label: Piani
  category: piano
  multi: true
- field: entita_primordiale
  label: Origine primordiale
  category: entita_primordiale
- field: derivata_da
  label: Deriva da
  category: lingua
  reciprocal: lingue_figlie
- field: lingue_figlie
  label: Lingue derivate
  category: lingua
  multi: true
  reciprocal: derivata_da
creation:
  fields:
  - field: tipo
    prompt: Tipo di lingua
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo
    from: notes
    category: mondo
    link: true
    required: true
  body:
  - field: chi_parla
    prompt: Chi la parla
    heading: Parlanti
  - field: suono
    prompt: Come suona
    heading: Suono
  - field: scrittura
    prompt: Sistema di scrittura / alfabeto
    heading: Scrittura
  - field: lessico
    prompt: Parole/frasi chiave usabili al tavolo
    heading: Lessico

guida:
  scopo: 'Una lingua dà texture al mondo: chi la parla, come suona e — se arcana o rituale — cosa può fare quando viene pronunciata.'
  campi_chiave: '**Famiglia** (registro: divina, arcana, segreta…) e **Tipo**; **Vitalità** (viva→morta) per le query; sul Carattere **Effetto magico** e **Rischio** se le parole hanno potere.'
