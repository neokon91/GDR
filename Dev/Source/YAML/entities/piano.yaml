# Schema per-entità: piano (lore). Piano d'esistenza / aldilà: un livello di realtà
# con proprie leggi, abitanti e accessi (astrale, elementale, onirico, spirituale,
# semipiano). Distinto da luogo (sito nel mondo materiale). Seed FantasyWorld
# JSON/cosmologia/piani_di_esistenza/*.json (origine/leggi/funzione_cosmica/
# caratteristiche/accessibilità/abitanti). Nodo del grafo cosmologico.
id: piano
folder: Mondi/Piani
order: 36
gruppo: cosmo
templates:
- id: piano
  title: Piano d'esistenza
  default_type: piano spirituale
  target: z.modelli/Piano.md
subtypes:
- nome: piano elementale
  descrizione: "Un piano fatto di una sostanza prima — fuoco, acqua, aria, terra o loro confini — dove un solo elemento detta legge."
  wizard: ["Quale elemento lo domina e come piega chi vi entra", "Cosa vi prospera e cosa lo attraversa soltanto"]
- nome: piano spirituale
  descrizione: "Regno di anime, dèi o forze morali, dove conta l'essenza più della materia."
  wizard: ["Quali entità o defunti lo abitano", "Quale legge spirituale o morale vi regna"]
- nome: piano onirico
  descrizione: "Il regno del sogno, della memoria e dell'inconscio: instabile, simbolico, a volte condiviso."
  wizard: ["Le sue regole oniriche: cosa è reale, come cambia chi sogna", "Chi o cosa vi entra senza volerlo"]
- nome: piano astrale
  descrizione: "La distesa di mezzo che collega i piani: si attraversa più che abitarla."
  wizard: ["Cosa vi naviga e cosa vi si perde", "Come ci si orienta — o ci si arena"]
- nome: semipiano
  descrizione: "Una sacca di realtà piccola e creata: rifugio, prigione o demanio di un potere."
  wizard: ["Chi l'ha creato e perché", "I suoi confini e cosa accade a varcarli"]
- nome: aldilà
  descrizione: "Dove vanno i morti di questo mondo: giudizio, riposo o un viaggio ulteriore."
  wizard: ["Cosa attende le anime che vi giungono", "Chi lo governa e con quali regole"]
# Campo query-abile: "tutti i piani accessibili solo per rituale".
fields:
  accessibilita: { label: Accessibilità, widget: accessibilita }
scheda: [accessibilita]
relazioni:
- field: leggi
  label: Leggi che lo governano
  category: legge_fondamentale
  multi: true
- field: dominio
  label: Dominio cosmico
  category: dominio
- field: abitanti
  label: Abitanti
  category: creatura
  multi: true
- field: soglie
  label: Soglie / accessi
  category: luogo
  multi: true
# Inverso tipizzato di divinita.piano: un piano elenca le divinità che vi dimorano
# (coppia univoca → auto-derivata da Collega; prima l'inverso ricadeva su 'connessioni').
- field: divinita
  label: Divinità che vi dimorano
  category: divinita
  multi: true
creation:
  fields:
  - field: tipo
    prompt: Tipo di piano
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo (opzionale)
    from: notes
    category: mondo
    link: true
    optional: true
  body:
  - field: natura
    prompt: 'Natura: cos''è, che aspetto e sostanza ha'
    heading: Natura
  - field: funzione_cosmica
    prompt: 'Funzione cosmica: che ruolo svolge nel multiverso'
    heading: Funzione cosmica
  - field: caratteristiche
    prompt: 'Caratteristiche: leggi fisiche, ambiente, pericoli'
    heading: Caratteristiche
  - field: accesso
    prompt: 'Accesso: come si entra e si esce (soglie, riti, condizioni)'
    heading: Accesso
  - field: influenza
    prompt: 'Influenza: come tocca il mondo materiale'
    heading: Influenza

guida:
  scopo: Un piano è un livello di realtà a sé — elementale, astrale, onirico, un aldilà — con leggi, abitanti e accessi propri, distinto da un luogo materiale.
  campi_chiave: '**Tipo** di piano + **Accessibilità** (come vi si entra); poi le relazioni a **Leggi** che lo governano e **Dominio**.'
