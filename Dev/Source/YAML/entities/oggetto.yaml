# Schema per-entità: oggetto. Single source di tassonomia, scheda, assi,
# relazioni, wizard e wiring template. render.py lo distribuisce nel
# modello globale 'core' (apply_entities) e raccoglie i template.
# I campi sono nel registro centrale (core.yaml/system.yaml).
id: oggetto
folder: Mondi/Oggetti
order: 11
templates:
- id: oggetto
  title: Oggetto
  default_type: strumento
  target: z.modelli/Oggetto.md
  jinja: reference.md.j2
- id: oggetto_magico
  title: Oggetto Magico
  default_type: oggetto magico
  target: z.modelli/Oggetto Magico.md
  jinja: reference.md.j2
subtypes:
- arma
- armatura
- scudo
- oggetto meraviglioso
- strumento
- oggetto magico
- veleno
- tesoro
- veicolo o cavalcatura
fields:
  cariche: { label: Cariche, widget: text }
  ricarica: { label: Ricarica, widget: text }
scheda:
- rarita
- sintonia
- cariche
- ricarica
relazioni:
- field: proprietario
  label: Proprietario
  category: personaggio
- field: dove
  label: Dove si trova
  category: luogo
creation:
  fields:
  - field: tipo
    prompt: Tipo di oggetto
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo (opzionale)
    from: notes
    category: mondo
    link: true
    optional: true
  - field: rarita
    prompt: Rarità (se magico)
    from: list
    options:
    - comune
    - non comune
    - raro
    - molto raro
    - leggendario
    - artefatto
    optional: true
  - field: sintonia
    prompt: Sintonia richiesta? (es. sì, da un druido)
    optional: true
  # Cariche/ricarica (oggetti magici con usi limitati: bacchette, anelli, …).
  - field: cariche
    prompt: 'Cariche (es. 7 max)'
    optional: true
  - field: ricarica
    prompt: "Ricarica (es. 1d6+1 all'alba)"
    optional: true
  # Meccaniche arma/armatura (parità SRD): per i subtype arma/armatura/scudo. STESSI
  # nomi-campo dell'equip ufficiale → l'arma homebrew è giocabile in renderAttacchi.
  # Opzionali (dietro il gate "campi facoltativi": niente attrito per pozioni/anelli).
  - field: danni
    prompt: 'Danni (armi, es. 1d8 taglienti)'
    optional: true
  - field: proprieta
    prompt: 'Proprietà (armi, es. versatile (1d10), accurata)'
    optional: true
  - field: padronanza
    prompt: Padronanza arma (2024)
    from: list
    options:
    - Doppio fendente
    - Graffio
    - Colpo di striscio
    - Spinta
    - Fiaccare
    - Lentezza
    - Rovesciamento
    - Vessazione
    optional: true
  - field: costo
    prompt: 'Costo (es. 15 mo)'
    optional: true
  - field: peso
    prompt: 'Peso (es. 1 kg)'
    optional: true
  - field: classe_armatura
    prompt: 'Classe armatura (armature, es. 14 + Des (max 2))'
    optional: true
  body:
  - field: descrizione_oggetto
    prompt: Aspetto e fattura
    heading: Aspetto
  - field: effetto
    prompt: 'Cosa fa: regole/effetto al tavolo'
    heading: Effetto
  - field: provenienza
    prompt: Costo, come si ottiene
    heading: Provenienza
