# Schema per-entità: oggetto. Single source di tassonomia, scheda, assi,
# relazioni, wizard e wiring template. render.py lo distribuisce nel
# modello globale 'core' (apply_entities) e raccoglie i template.
# I campi sono nel registro centrale (core.yaml/system.yaml).
id: oggetto
folder: Mondi/Oggetti
order: 11
gruppo: regole
templates:
- id: oggetto
  title: Oggetto
  default_type: strumento
  target: z.modelli/Oggetto.md
  jinja: reference.md.j2
- id: oggetto_magico
  title: Oggetto Magico
  default_type: oggetto magico
  target: z.modelli/Oggetto Magico.md
  jinja: reference.md.j2
# SOTTOTIPI con PROFILO: il `tipo` instrada i campi MECCANICI giusti (già esistenti,
# letti da renderAttacchi/crea_pg) verso l'item giusto — un'arma mostra danni/padronanza,
# un'armatura la CA. Non ridefinisce nulla: i `campi` puntano a campi registrati.
subtypes:
- { nome: arma,                  descrizione: "Da mischia o a distanza: ciò con cui si combatte. Diventa giocabile in crea_pg.", campi: [danni, proprieta, padronanza, costo, peso] }
- { nome: armatura,              descrizione: "Protezione indossata: dà Classe Armatura, a volte con requisiti o svantaggi.", campi: [classe_armatura, proprieta, costo, peso] }
- { nome: scudo,                 descrizione: "Difesa impugnata: bonus alla CA.", campi: [classe_armatura, costo, peso] }
- { nome: oggetto meraviglioso,  descrizione: "Oggetto magico non-arma/armatura: anelli, mantelli, bacchette, amuleti.", campi: [rarita, sintonia, cariche, ricarica] }
- { nome: strumento,             descrizione: "Attrezzo da competenza: arnesi da scasso, kit, strumenti musicali o d'artigiano.", campi: [costo, peso] }
- { nome: oggetto magico,        descrizione: "Manufatto intriso di magia: porta rarità, sintonia ed eventuali cariche.", campi: [rarita, sintonia, cariche, ricarica] }
- { nome: veleno,                descrizione: "Sostanza nociva: per contatto, ingestione, inalazione o sulla lama.", campi: [costo] }
- { nome: tesoro,                descrizione: "Ricchezza in sé: monete, gemme, oggetti d'arte, bottino.", campi: [costo, peso] }
- { nome: veicolo o cavalcatura, descrizione: "Mezzo di trasporto: cavallo, carro, nave, costrutto da viaggio.", campi: [costo, peso] }
fields:
  cariche: { label: Cariche, widget: text }
  ricarica: { label: Ricarica, widget: text }
scheda:
- rarita
- sintonia
- cariche
- ricarica
relazioni:
- field: proprietario
  label: Proprietario
  category: personaggio
- field: dove
  label: Dove si trova
  category: luogo
creation:
  fields:
  - field: tipo
    prompt: Tipo di oggetto
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo (opzionale)
    from: notes
    category: mondo
    link: true
    optional: true
  - field: rarita
    prompt: Rarità (se magico)
    from: list
    options:
    - comune
    - non comune
    - raro
    - molto raro
    - leggendario
    - artefatto
    optional: true
  - field: sintonia
    prompt: Sintonia richiesta? (es. sì, da un druido)
    optional: true
  # Cariche/ricarica (oggetti magici con usi limitati: bacchette, anelli, …).
  - field: cariche
    prompt: 'Cariche (es. 7 max)'
    optional: true
  - field: ricarica
    prompt: "Ricarica (es. 1d6+1 all'alba)"
    optional: true
  # Meccaniche arma/armatura (parità SRD): per i subtype arma/armatura/scudo. STESSI
  # nomi-campo dell'equip ufficiale → l'arma homebrew è giocabile in renderAttacchi.
  # Opzionali (dietro il gate "campi facoltativi": niente attrito per pozioni/anelli).
  - field: danni
    prompt: 'Danni (armi, es. 1d8 taglienti)'
    optional: true
  - field: proprieta
    prompt: 'Proprietà (armi, es. versatile (1d10), accurata)'
    optional: true
  - field: padronanza
    prompt: Padronanza arma (2024)
    from: list
    options:
    - Doppio fendente
    - Graffio
    - Colpo di striscio
    - Spinta
    - Fiaccare
    - Lentezza
    - Rovesciamento
    - Vessazione
    optional: true
  - field: costo
    prompt: 'Costo (es. 15 mo)'
    optional: true
  - field: peso
    prompt: 'Peso (es. 1 kg)'
    optional: true
  - field: classe_armatura
    prompt: 'Classe armatura (armature, es. 14 + Des (max 2))'
    optional: true
  body:
  - field: descrizione_oggetto
    prompt: Aspetto e fattura
    heading: Aspetto
  - field: effetto
    prompt: 'Cosa fa: regole/effetto al tavolo'
    heading: Effetto
  - field: provenienza
    prompt: Costo, come si ottiene
    heading: Provenienza

guida:
  scopo: Un oggetto del mondo — da equipaggiamento mondano ad artefatto senziente; armi/armature homebrew diventano giocabili.
  campi_chiave: '**Tipo** (arma/armatura/oggetto magico…); per gli oggetti magici **Rarità** e **Sintonia**; per armi/armature i campi meccanici (**Danni**, **CA**, **Padronanza**) che li rendono usabili.'
