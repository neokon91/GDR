# Schema per-entità: FAZIONE (lore). Single source di tutto ciò che è specifico
# della fazione: tassonomia, campi, scheda, assi, relazioni, wizard E wiring del
# template. render.py distribuisce questi blocchi nel modello globale 'core'
# (folders/fields/categories/scheda/assi_tematici/relazioni/creation) e raccoglie
# i 'templates'. Gli elementi comuni a tutte le entità restano condivisi:
#   - campi trasversali (tipo/stato/mondo/pressione/tavolo...) in core.yaml;
#   - lo scheletro della nota in Jinja/_entity_base.j2 (macro condivise).
# Arricchito da FantasyWorld t.fazione.json con criterio "mix curato": un
# sottoinsieme interrogabile va in frontmatter (scheda), la profondità nelle
# sezioni body leggibili.
id: fazione
folder: Mondi/Fazioni
order: 5
templates:
  - id: fazione
    title: Fazione
    default_type: gilda
    target: z.modelli/Fazione.md
    jinja: fazione.md.j2
    primary: true
subtypes:
  - gilda
  - ordine
  - casata
  - culto
  - fazione politica
  - banda
# Campi specifici della fazione. (I trasversali stanno in core.yaml; 'portata' è
# condiviso con evento e resta in system.yaml.)
fields:
  motto:         { label: Motto,                widget: text }
  forma_governo: { label: Forma di governo,     widget: text }
  fondazione:    { label: Epoca di fondazione,  widget: text }
scheda: [portata, motto, forma_governo, fondazione]
# Assi tematici nel formato RICCO (seed FantasyWorld assi_tematici_fazione.yaml):
# 5 assi-chiave su scala 1-5 con etichetta + descrizione per valore.
assi:
- id: struttura
  nome: Struttura
  descrizione: Grado di organizzazione interna e rigidità della catena di comando.
  valori:
    1: { etichetta: Orizzontale, descrizione: "Nessuna struttura fissa; decisioni collettive. Cellule, bande, reti informali." }
    2: { etichetta: Consiliare,  descrizione: "Potere distribuito tra circoli; decisioni per consultazione. Alleanze, logge." }
    3: { etichetta: "Semi-gerarchica", descrizione: "Capi e ruoli riconosciuti, ma con margini di autonomia. Gerarchia fluida." }
    4: { etichetta: Gerarchica,  descrizione: "Catena di comando definita; gradi e responsabilità chiari, decisioni dall'alto." }
    5: { etichetta: Piramidale,  descrizione: "Vertice assoluto; ogni ruolo per statuto o lignaggio. Ordini militari, regimi." }
- id: scopo
  nome: Scopo Primario
  descrizione: Natura dell'obiettivo perseguito, da ideale astratto a interesse concreto.
  valori:
    1: { etichetta: "Ideale puro", descrizione: "Fine astratto o trascendente (giustizia, verità); sacrifica i risultati alla visione." }
    2: { etichetta: Visionario,    descrizione: "Idealistico ma con piani concreti. Riformisti, ordini morali, rivoluzionari." }
    3: { etichetta: Equilibrato,   descrizione: "Fine sia simbolico che pratico; l'ideale guida ma non è la sola motivazione." }
    4: { etichetta: Opportunista,  descrizione: "Mira a vantaggi materiali con una facciata ideologica per legittimarsi." }
    5: { etichetta: Pragmatico,    descrizione: "Solo sopravvivenza, espansione, guadagno. Gilde mercenarie, cartelli." }
- id: metodo_operativo
  nome: Metodo Operativo
  descrizione: Grado di visibilità e trasparenza con cui la fazione agisce.
  valori:
    1: { etichetta: Occulto,    descrizione: "Esistenza segreta o negata; spionaggio, cospirazioni, riti nascosti." }
    2: { etichetta: Discreto,   descrizione: "Nota a pochi; agisce via emissari o organizzazioni di copertura." }
    3: { etichetta: Ambivalente, descrizione: "Doppia faccia: identità pubblica rispettabile, fini alternativi celati." }
    4: { etichetta: Controllato, descrizione: "Nota e riconosciuta, ma cauta; l'agenda completa non è pubblica." }
    5: { etichetta: Palese,     descrizione: "Agisce apertamente, dichiara i suoi scopi. Governi, ordini, movimenti." }
- id: legalita
  nome: Legalità
  descrizione: Status rispetto all'ordinamento politico e giuridico dominante.
  valori:
    1: { etichetta: Illegale,   descrizione: "Fuorilegge, perseguitata; i membri rischiano arresto o morte. Ribelli, congiure." }
    2: { etichetta: Tollerata,  descrizione: "Senza riconoscimento, ma tollerata per convenienza o paura. Ai margini." }
    3: { etichetta: "Semi-legale", descrizione: "Riconoscimento limitato o ambiguo; opera con vincoli o stigma." }
    4: { etichetta: Legale,     descrizione: "Pienamente legale; sedi, insegne, potere negoziale. Non dominante." }
    5: { etichetta: Ufficiale,  descrizione: "Organo del potere; coincide col governo o l'autorità religiosa/statale." }
- id: etica_conflitto
  nome: Etica del Conflitto
  descrizione: Approccio della fazione alla guerra, al dominio e all'autodifesa.
  valori:
    1: { etichetta: Difensiva,  descrizione: "Conflitto solo per autodifesa; privilegia diplomazia e resistenza." }
    2: { etichetta: Reattiva,   descrizione: "Accetta la guerra per proteggere alleati o ideali, in modo proporzionato." }
    3: { etichetta: Equilibrata, descrizione: "La guerra è un'opzione sempre disponibile, valutata caso per caso." }
    4: { etichetta: Dominante,  descrizione: "Previene le minacce con la forza; conquista e deterrenza nella dottrina." }
    5: { etichetta: Espansionista, descrizione: "Il conflitto è sacro o glorioso; ogni ostacolo è nemico. Imperi, crociate." }
relazioni:
  - { field: sede,      label: Sede,          category: luogo }
  - { field: fondatori, label: Fondatori,     category: personaggio, multi: true }
  - { field: figure,    label: Figure chiave, category: personaggio, multi: true }
  - { field: alleati,   label: Alleate,       category: fazione, multi: true }
  - { field: rivali,    label: Rivali,        category: fazione, multi: true }
creation:
  fields:
    - { field: tipo, prompt: "Tipo di fazione", from: subtypes, required: true }
    - { field: mondo, prompt: "Mondo", from: notes, category: mondo, link: true, required: true }
  body:
    - { field: obiettivo, prompt: "Cosa vuole ottenere la fazione", heading: "Obiettivo" }
    - { field: metodo, prompt: "Come opera (metodi, stile)", heading: "Metodi" }
    - { field: gerarchia, prompt: "Ruoli, capi, come si entra", heading: "Gerarchia" }
    - { field: influenza, prompt: "Impatto su civiltà, culti e riti associati", heading: "Influenza" }
    - { field: presente, prompt: "Stato attuale, tracce nel mondo, segreti rivelati", heading: "Nel presente" }
    - { field: tensione, prompt: "Conflitto o rivalita'", heading: "Tensione" }
    - { field: segreto, prompt: "Segreto della fazione", callout: segreto, title: "Segreto", fold: true }
