# Schema per-entità: FAZIONE (lore). Single source di tutto ciò che è specifico
# della fazione: tassonomia, campi, scheda, assi, relazioni, wizard E wiring del
# template. render.py distribuisce questi blocchi nel modello globale 'core'
# (folders/fields/categories/scheda/assi_tematici/relazioni/creation) e raccoglie
# i 'templates'. Gli elementi comuni a tutte le entità restano condivisi:
#   - campi trasversali (tipo/stato/mondo/pressione/tavolo...) in core.yaml;
#   - lo scheletro della nota in Jinja/_entity_base.j2 (macro condivise).
# Arricchito da FantasyWorld t.fazione.json con criterio "mix curato": un
# sottoinsieme interrogabile va in frontmatter (scheda), la profondità nelle
# sezioni body leggibili.
id: fazione
folder: Mondi/Fazioni
order: 5
templates:
  - id: fazione
    title: Fazione
    default_type: gilda
    target: z.modelli/Fazione.md
    jinja: fazione.md.j2
    primary: true
subtypes:
  - gilda
  - ordine
  - casata
  - fazione politica
  - banda
  # Forme organizzate formali/statali: ex-entità `istituzione`, assorbita nel merge
  # SYS-2 (era una fazione con un legame al regno — vedi data_model §Principio di
  # inclusione). `culto` NON è più un subtype: è entità a sé (ha legami a divinità).
  - accademia
  - corte
  - tribunale
# Classificazione a 2 livelli: la 'famiglia' (scopo/natura, seed FantasyWorld
# fazione_cat) affianca il 'tipo' (forma). Select + legenda auto-documentante.
# Ogni famiglia pre-compila (campo `assi`) gli assi tematici che la definiscono
# FORTEMENTE — il wizard li propone alla scelta della famiglia (preset, come cultura).
# Solo gli assi impliciti dalla natura della famiglia; gli altri restano al default.
famiglie:
  - { nome: militare,       descrizione: "Strutturata attorno al dominio delle arti belliche: eserciti, ordini armati, caste guerriere.", assi: { struttura: 5, etica_conflitto: 4, coesione: 4 } }
  - { nome: religiosa,      descrizione: "Devota a un'entità, principio o pantheon; si fonda su dogmi, rituali e rivelazioni.", assi: { struttura: 4, scopo: 2, metodo_operativo: 4 } }
  - { nome: arcana,         descrizione: "Dedicata allo studio, controllo o protezione della magia: ordini, gilde, circoli occulti.", assi: { struttura: 3, metodo_operativo: 2, scopo: 2 } }
  - { nome: rivoluzionaria, descrizione: "Mira a sovvertire l'ordine costituito: moti insurrezionali, cellule clandestine.", assi: { legalita: 1, relazione_potere: 2, coesione: 1, scopo: 2 } }
  - { nome: egemonica,      descrizione: "Integrata nel potere vigente: caste, organi ufficiali, bracci di controllo istituzionale.", assi: { legalita: 5, relazione_potere: 5, struttura: 4, metodo_operativo: 5 } }
  - { nome: mercantile,     descrizione: "Orientata a risorse, potere economico o controllo logistico: corporazioni, reti commerciali.", assi: { scopo: 5, etica_conflitto: 2, legalita: 4 } }
  - { nome: profetica,      descrizione: "Fondata su visioni, cicli cosmici o profezie; agisce in funzione di un evento atteso.", assi: { scopo: 1, metodo_operativo: 2, reazione_fallimento: 4 } }
# Campi specifici della fazione. (I trasversali stanno in core.yaml; 'portata' è
# condiviso con evento e resta in system.yaml.)
fields:
  motto:         { label: Motto,                widget: text }
  forma_governo: { label: Forma di governo,     widget: text }
  fondazione:    { label: Epoca di fondazione,  widget: text }
scheda: [portata, motto, forma_governo, fondazione, simbolo]
relazioni:
  - { field: sede,      label: Sede,          category: luogo }
  - { field: fondatori, label: Fondatori,     category: personaggio, multi: true }
  - { field: figure,    label: Figure chiave, category: personaggio, multi: true }
  - { field: alleati,   label: Alleate,       category: fazione, multi: true }
  - { field: rivali,    label: Rivali,        category: fazione, multi: true }
  # Economia/potere: le risorse che la fazione CONTROLLA (coppia 1:1 con
  # risorsa.controllata_da → inverso tipizzato). Il controllo di una risorsa è leva politica.
  - { field: controlla_risorse, label: Controlla le risorse, category: risorsa, multi: true }
  # Regno/stato di cui la fazione è organo ufficiale (ex-istituzione, merge SYS-2).
  # Inverso: regno.fazioni ("Fazioni di corte"), auto-derivato (coppia univoca).
  - { field: regno, label: Regno / Stato, category: regno }
creation:
  fields:
    - { field: tipo, prompt: "Tipo di fazione", from: subtypes, required: true }
    - { field: mondo, prompt: "Mondo", from: notes, category: mondo, link: true, required: true }
  body:
    - { field: obiettivo, prompt: "Cosa vuole ottenere la fazione", heading: "Obiettivo" }
    - { field: metodo, prompt: "Come opera (metodi, stile)", heading: "Metodi" }
    - { field: gerarchia, prompt: "Ruoli, capi, come si entra", heading: "Gerarchia" }
    - { field: influenza, prompt: "Impatto su civiltà, culti e riti associati", heading: "Influenza" }
    - { field: presente, prompt: "Stato attuale, tracce nel mondo, segreti rivelati", heading: "Nel presente" }
    - { field: tensione, prompt: "Conflitto o rivalita'", heading: "Tensione" }
    - { field: segreto, prompt: "Segreto della fazione", callout: segreto, title: "Segreto", fold: true }
