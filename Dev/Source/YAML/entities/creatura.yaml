# Schema per-entità: creatura (lore + statblock 5.5e). Single source di tassonomia,
# campi, scheda, assi, relazioni, wizard e wiring template. render.py lo distribuisce
# nel modello globale 'core' (apply_entities) e raccoglie i template.
# I numeri 5e vivono nel blocco ```statblock``` (creature.md.j2); QUI il lore =
# ecologia, comportamento, mito. Arricchito da FantasyWorld t.bestiario.yaml +
# assi_tematici_specie.yaml con criterio "mix curato" (fm interrogabile + prosa).
id: creatura
folder: Mondi/Creature
order: 9
templates:
- id: creatura
  title: Creatura
  default_type: bestia
  target: z.modelli/Creatura.md
  jinja: creature.md.j2
subtypes:
- aberrazione
- bestia
- celestiale
- costrutto
- drago
- elementale
- fata
- gigante
- immondo
- melma
- mostruosita
- non-morto
- umanoide
- vegetale
# Campi specifici della creatura (i trasversali stanno in core.yaml; 'taglia' è
# condiviso con specie e resta in system.yaml). Pensati per query future
# (dieta/ruolo come filtri nel bestiario Bases/Dataview).
fields:
  ruolo_ecologico: { label: Ruolo ecologico, widget: text }
  dieta:           { label: Dieta,           widget: dieta }
  gs:              { label: Grado di sfida,   widget: gs }
scheda: [taglia, gs, ruolo_ecologico, dieta]
relazioni:
- field: habitat
  label: Habitat
  category: luogo
  multi: true
- field: specie
  label: Specie
  category: specie
creation:
  fields:
  - field: tipo
    prompt: Tipo di creatura (5e)
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo
    from: notes
    category: mondo
    link: true
    required: true
  body:
  - field: ecologia
    prompt: 'Ecologia: habitat, ruolo nell''ecosistema, dieta'
    heading: Ecologia
  - field: aspetto
    prompt: 'Aspetto: taglia, corporatura, tratti distintivi, segni di pericolo'
    heading: Aspetto
  - field: comportamento
    prompt: 'Comportamento: indole, abitudini, come caccia o si difende'
    heading: Comportamento
  - field: tattiche
    prompt: Tattiche in combattimento (apertura, asso nella manica, fuga)
    heading: Tattiche
  - field: mito
    prompt: Mito e reputazione (leggende, come la vedono le civilta')
    heading: Mito e reputazione
  - field: segreto
    prompt: Segreto o debolezza nascosta
    callout: segreto
    title: Segreto
    fold: true
