# Schema per-entità: creatura (lore + statblock 5.5e). Single source di tassonomia,
# campi, scheda, assi, relazioni, wizard e wiring template. render.py lo distribuisce
# nel modello globale 'core' (apply_entities) e raccoglie i template.
# I numeri 5e vivono nel blocco ```statblock``` (creature.md.j2); QUI il lore =
# ecologia, comportamento, mito. Arricchito da FantasyWorld t.bestiario.yaml +
# assi_tematici_specie.yaml con criterio "mix curato" (fm interrogabile + prosa).
id: creatura
folder: Mondi/Creature
order: 9
gruppo: regole
templates:
- id: creatura
  title: Creatura
  default_type: bestia
  target: z.modelli/Creatura.md
  jinja: creature.md.j2
# SOTTOTIPI: i 13 TIPI di creatura 5.5e (orientamento + ganci di gioco). I dati di
# combattimento vivono nel blocco ```statblock``` e in `gs`/`taglia`: il profilo qui è
# descrittivo, non li tocca.
subtypes:
- { nome: aberrazione, descrizione: "Orrore alieno e innaturale: menti contorte, anatomie impossibili, spesso dal profondo o da altri piani." }
- { nome: bestia,      descrizione: "Animale naturale, comune o preistorico: nessuna magia, solo istinto e biologia." }
- { nome: celestiale,  descrizione: "Essere dei piani superiori: angeli, spiriti del bene, servitori delle divinità benevole." }
- { nome: costrutto,   descrizione: "Creato e animato: golem, automi, oggetti animati; non vivo, spesso immune a molto." }
- { nome: drago,       descrizione: "Rettile magico antico e potente: draghi veri, draghetti, parenti draconici." }
- { nome: elementale,  descrizione: "Incarnazione di un elemento: fuoco, acqua, aria, terra, o energie pure dei piani elementali." }
- { nome: fata,        descrizione: "Creatura del Reame Fatato: capricciosa, legata a patti e regole, tra meraviglia e crudeltà." }
- { nome: gigante,     descrizione: "Umanoide enorme: giganti, troll, ogre; forza devastante, culture proprie." }
- { nome: immondo,     descrizione: "Essere dei piani inferiori: demoni del caos, diavoli legalisti, servitori del male." }
- { nome: melma,       descrizione: "Massa amorfa: gelatine, cubi, fanghiglie che divorano e si dividono." }
- { nome: mostruosita, descrizione: "Mostro innaturale ma non aberrante: chimere, manticore, creature da incubo terreno." }
- { nome: non-morto,   descrizione: "Tornato dalla morte: zombi, scheletri, spettri, vampiri, lich; sfida il ciclo naturale." }
- { nome: umanoide,    descrizione: "Popolo civile o tribale: umani, orchi, goblin e affini; cultura, lingua, società." }
- { nome: vegetale,    descrizione: "Pianta animata o fungo senziente: treant, germogli, spore e flora mostruosa." }
# Campi specifici della creatura (i trasversali stanno in core.yaml; 'taglia' è
# condiviso con specie e resta in system.yaml). Pensati per query future
# (dieta/ruolo come filtri nel bestiario Bases/Dataview).
fields:
  ruolo_ecologico: { label: Ruolo ecologico, widget: ruolo_ecologico }
  dieta:           { label: Dieta,           widget: dieta }
  gs:              { label: Grado di sfida,   widget: gs }
scheda: [taglia, gs, ruolo_ecologico, dieta]
relazioni:
- field: habitat
  label: Habitat
  category: luogo
  multi: true
- field: specie
  label: Specie
  category: specie
creation:
  fields:
  - field: tipo
    prompt: Tipo di creatura (5e)
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo
    from: notes
    category: mondo
    link: true
    required: true
  body:
  - field: ecologia
    prompt: 'Ecologia: habitat, ruolo nell''ecosistema, dieta'
    heading: Ecologia
  - field: aspetto
    prompt: 'Aspetto: taglia, corporatura, tratti distintivi, segni di pericolo'
    heading: Aspetto
  - field: comportamento
    prompt: 'Comportamento: indole, abitudini, come caccia o si difende'
    heading: Comportamento
  - field: tattiche
    prompt: Tattiche in combattimento (apertura, asso nella manica, fuga)
    heading: Tattiche
  - field: mito
    prompt: Mito e reputazione (leggende, come la vedono le civilta')
    heading: Mito e reputazione
  - field: segreto
    prompt: Segreto o debolezza nascosta
    callout: segreto
    title: Segreto
    fold: true

guida:
  scopo: 'Una creatura giocabile: il lore (ecologia, mito, tattiche) sopra e lo statblock 5.5e nel blocco dati per iniziativa e attacchi.'
  campi_chiave: '**Tipo** + **GS** (pesa la difficoltà degli incontri) + lo **statblock** che la rende combattibile; **Habitat**/**Specie** la agganciano al mondo.'
