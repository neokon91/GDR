# Schema per-entità: personaggio. Single source di tassonomia, scheda, assi,
# relazioni, wizard e wiring template. render.py lo distribuisce nel
# modello globale 'core' (apply_entities) e raccoglie i template.
# I campi sono nel registro centrale (core.yaml/system.yaml).
id: personaggio
folder: Mondi/Personaggi
order: 8
gruppo: societa
templates:
- id: pg
  title: PG
  default_type: pg
  target: z.modelli/PG.md
  jinja: pg.md.j2
  area: gioco
  primary: true
- id: png
  title: PNG
  default_type: png
  target: z.modelli/PNG.md
  jinja: character.md.j2
  primary: true
subtypes:
- pg
- png
# Classificazione a 2 livelli: il 'ruolo' narrativo (rispetto al gruppo) affianca il
# 'tipo' (pg/png). Pensato soprattutto per i PNG; il select + legenda sono sulla
# scheda PNG (character.md.j2), non sul PG.
famiglia_label: Ruolo narrativo
famiglie:
- { nome: alleato,     descrizione: "Sta dalla parte del gruppo: aiuta, copre, combatte al loro fianco.", assi: { moralita: 2, lealta: 2 } }
- { nome: antagonista, descrizione: "Si oppone attivamente al gruppo o ne ostacola gli obiettivi; non per forza un nemico.", assi: { moralita: 5 } }
- { nome: mentore,     descrizione: "Guida, istruisce o protegge il gruppo; offre saggezza, addestramento o risorse.", assi: { moralita: 2, temperamento: 2, approccio: 2 } }
- { nome: patrono,     descrizione: "Commissiona, finanzia o dà missioni; ha potere e un'agenda propria.", assi: { moralita: 4, lealta: 1 } }
- { nome: rivale,      descrizione: "Compete col gruppo (onore, risorse, gloria) senza volerne la rovina.", assi: { moralita: 4 } }
- { nome: mercante,    descrizione: "Fornisce beni, servizi o informazioni in cambio di qualcosa.", assi: { moralita: 4, socievolezza: 4 } }
- { nome: contatto,    descrizione: "Nodo di informazioni o accesso: introduce, fa da ponte, apre porte.", assi: { socievolezza: 4 } }
- { nome: gregario,    descrizione: "Comparsa ricorrente o seguace: dà colore e continuità alla scena.", assi: { lealta: 1 } }
# Titolo/rango del personaggio (re, arcimago, gran sacerdote...): seed FantasyWorld.
fields:
  titolo: { label: Titolo, widget: text }
  # Rango nobiliare/sociale: vocabolario di ranghi (il `titolo` resta libero per cariche
  # e appellativi specifici — «Arcimago», «Capitano della Guardia»).
  rango:  { label: Rango,  widget: rango }
  occupazione: { label: Occupazione, widget: text }
scheda:
- titolo
- rango
- allineamento
- pronomi
- eta
- occupazione
relazioni:
- field: fazione
  label: Affiliazione
  category: fazione
# Parentela: SIMMETRICA → reciprocal ESPLICITO (se A è parente di B, B lo è di A).
# Serve l'esplicito perché personaggio ha 3 self-relation (parenti/alleati/rivali):
# l'auto-derivazione sarebbe ambigua e cadrebbe su 'connessioni'. alleati/rivali
# restano asimmetrici di proposito (un PNG può considerare alleato chi non ricambia).
- field: parenti
  label: Parenti / stirpe
  category: personaggio
  multi: true
  reciprocal: parenti
- field: luogo
  label: Base
  category: luogo
- field: alleati
  label: Alleati
  category: personaggio
  multi: true
- field: rivali
  label: Rivali
  category: personaggio
  multi: true
# Inverso di profezia.riguarda: le profezie che riguardano questo personaggio,
# come link tipizzati (auto-derivazione dal lato profezia: coppia univoca).
- field: profezie
  label: Profezie che lo riguardano
  category: profezia
  multi: true
  reciprocal: riguarda
# Inverso di missione.png: le missioni che questo PNG affida/coinvolge (chi assegna
# la quest diventa tracciabile dal grafo, non solo dal lato missione).
- field: missioni_assegnate
  label: Missioni affidate
  category: missione
  multi: true
  reciprocal: png
- field: governa
  label: Governa
  category: regno
  multi: true
  reciprocal: dinastia
- field: comanda
  label: Comanda
  category: esercito
  multi: true
  reciprocal: comandante
- field: culti_guidati
  label: Guida il culto
  category: culto
  multi: true
  reciprocal: capi
- field: possiede
  label: Possiede
  category: oggetto
  multi: true
  reciprocal: proprietario
- field: opere
  label: Opere / manufatti
  category: oggetto
  multi: true
  reciprocal: creatore
- field: bastioni
  label: Bastioni
  category: bastione
  multi: true
  reciprocal: proprietario
- field: eventi
  label: Eventi
  category: evento
  multi: true
  reciprocal: coinvolti
- field: alberi
  label: Percorsi / esempio vivente
  category: albero_evolutivo
  multi: true
  reciprocal: figure
creation:
  fields:
  - field: tipo
    prompt: Tipo di personaggio
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo di appartenenza
    from: notes
    category: mondo
    link: true
    required: true
  - field: fazione
    prompt: Fazione (opzionale)
    from: notes
    category: fazione
    link: true
    optional: true
  - field: luogo
    prompt: Dove si trova di solito (opzionale)
    from: notes
    category: luogo
    link: true
    optional: true
  body:
  - field: ruolo
    prompt: Ruolo o occupazione
    heading: Ruolo
  - field: aspetto
    prompt: 'Tratto distintivo: voce, aspetto, manierismo'
    heading: Aspetto
  - field: desiderio
    prompt: Cosa vuole davvero
    heading: Vuole
  - field: paura
    prompt: Cosa teme o evita
    heading: Teme
  - field: storia
    prompt: 'Storia: da dove viene, cosa l''ha formato'
    heading: Storia
  - field: voce
    prompt: 'Come parla: tono, tic, cadenza'
    heading: Voce
  - field: oggetto
    prompt: Un oggetto che porta sempre con sé
    heading: Oggetto
  - field: frase
    prompt: Una battuta tipica (da dire al tavolo)
    callout: quote
    title: Frase tipica
  - field: segreto
    prompt: Segreto (non mostrare ai giocatori)
    callout: segreto
    title: Segreto
    fold: true

guida:
  scopo: Una persona del mondo — PG giocabile o PNG da interpretare (lo stesso tipo serve entrambi).
  campi_chiave: '**Tipo** (pg/png); per i PNG il **Ruolo narrativo** (alleato, mentore, rivale…) e l''**Affiliazione** (fazione); **Allineamento** per la bussola morale.'
