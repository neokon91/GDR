# Schema per-entità: personaggio. Single source di tassonomia, scheda, assi,
# relazioni, wizard e wiring template. render.py lo distribuisce nel
# modello globale 'core' (apply_entities) e raccoglie i template.
# I campi sono nel registro centrale (core.yaml/system.yaml).
id: personaggio
folder: Mondi/Personaggi
order: 8
templates:
- id: pg
  title: PG
  default_type: pg
  target: z.modelli/PG.md
  jinja: pg.md.j2
  area: gioco
  primary: true
- id: png
  title: PNG
  default_type: png
  target: z.modelli/PNG.md
  jinja: character.md.j2
  primary: true
subtypes:
- pg
- png
scheda:
- allineamento
- pronomi
- eta
# Assi tematici nel formato RICCO (autorati sullo standard FantasyWorld, manca un
# seed 'personaggio'): 5 assi di personalità su scala 1-5 con etichetta + descrizione.
assi:
- id: moralita
  nome: Moralità
  descrizione: Quanto antepone gli altri a sé stesso.
  valori:
    1: { etichetta: Altruista,  descrizione: "Si sacrifica per gli altri; il bene comune prima di tutto." }
    2: { etichetta: Generoso,   descrizione: "Aiuta volentieri, ma bada anche a sé." }
    3: { etichetta: Pragmatico, descrizione: "Bilancia interesse proprio e altrui secondo il caso." }
    4: { etichetta: Interessato, descrizione: "Mette sé al primo posto; aiuta se ne ricava qualcosa." }
    5: { etichetta: Spietato,   descrizione: "Usa gli altri senza scrupoli; solo il proprio tornaconto conta." }
- id: lealta
  nome: Lealtà
  descrizione: Rapporto con regole, autorità e patti.
  valori:
    1: { etichetta: Leale,      descrizione: "Rispetta leggi e parola data; l'ordine è un valore." }
    2: { etichetta: Affidabile, descrizione: "Mantiene gli impegni, ma sa essere flessibile." }
    3: { etichetta: Indipendente, descrizione: "Segue il proprio codice; obbedisce se ha senso." }
    4: { etichetta: Insofferente, descrizione: "Mal sopporta regole e autorità; le aggira." }
    5: { etichetta: Ribelle,    descrizione: "Rifiuta ogni vincolo; la libertà sopra tutto." }
- id: temperamento
  nome: Temperamento
  descrizione: Come reagisce sotto pressione.
  valori:
    1: { etichetta: Glaciale,   descrizione: "Imperturbabile; nulla scalfisce la sua calma." }
    2: { etichetta: Calmo,      descrizione: "Misurato; perde il controllo solo all'estremo." }
    3: { etichetta: Equilibrato, descrizione: "Reagisce in proporzione; emotivo ma controllato." }
    4: { etichetta: Impulsivo,  descrizione: "Agisce d'istinto; l'emozione guida le scelte." }
    5: { etichetta: Volatile,   descrizione: "Esplosivo e imprevedibile; un attimo e cambia tutto." }
- id: socievolezza
  nome: Socievolezza
  descrizione: Come si pone con le altre persone.
  valori:
    1: { etichetta: Solitario,  descrizione: "Evita gli altri; sta bene da solo." }
    2: { etichetta: Riservato,  descrizione: "Pochi legami scelti; diffida degli estranei." }
    3: { etichetta: Cordiale,   descrizione: "Si adatta alla compagnia; né schivo né invadente." }
    4: { etichetta: Espansivo,  descrizione: "Cerca gli altri; a suo agio in mezzo alla gente." }
    5: { etichetta: Magnetico,  descrizione: "Calamita l'attenzione; trascina e influenza chi incontra." }
- id: approccio
  nome: Approccio
  descrizione: Come affronta i problemi.
  valori:
    1: { etichetta: Metodico,   descrizione: "Pianifica tutto; niente lasciato al caso." }
    2: { etichetta: Riflessivo, descrizione: "Pondera prima di agire; valuta le opzioni." }
    3: { etichetta: Versatile,  descrizione: "Pensa e agisce a seconda di ciò che serve." }
    4: { etichetta: Pratico,    descrizione: "Impara facendo; preferisce l'azione all'analisi." }
    5: { etichetta: Istintivo,  descrizione: "Si fida del proprio fiuto; decide nell'istante." }
relazioni:
- field: fazione
  label: Affiliazione
  category: fazione
- field: luogo
  label: Base
  category: luogo
- field: alleati
  label: Alleati
  category: personaggio
  multi: true
- field: rivali
  label: Rivali
  category: personaggio
  multi: true
creation:
  fields:
  - field: tipo
    prompt: Tipo di personaggio
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo di appartenenza
    from: notes
    category: mondo
    link: true
    required: true
  - field: fazione
    prompt: Fazione (opzionale)
    from: notes
    category: fazione
    link: true
    optional: true
  - field: luogo
    prompt: Dove si trova di solito (opzionale)
    from: notes
    category: luogo
    link: true
    optional: true
  body:
  - field: ruolo
    prompt: Ruolo o occupazione
    heading: Ruolo
  - field: aspetto
    prompt: 'Tratto distintivo: voce, aspetto, manierismo'
    heading: Aspetto
  - field: desiderio
    prompt: Cosa vuole davvero
    heading: Vuole
  - field: paura
    prompt: Cosa teme o evita
    heading: Teme
  - field: storia
    prompt: 'Storia: da dove viene, cosa l''ha formato'
    heading: Storia
  - field: voce
    prompt: 'Come parla: tono, tic, cadenza'
    heading: Voce
  - field: oggetto
    prompt: Un oggetto che porta sempre con sé
    heading: Oggetto
  - field: frase
    prompt: Una battuta tipica (da dire al tavolo)
    callout: quote
    title: Frase tipica
  - field: segreto
    prompt: Segreto (non mostrare ai giocatori)
    callout: segreto
    title: Segreto
    fold: true
