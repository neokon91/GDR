# Schema per-entità: istituzione (lore, politico). Organizzazione formalizzata
# dentro una civiltà/regno: accademia, gilda di stato, ordine ufficiale, corte,
# tribunale. Assi in assi/istituzione.yaml. Seed FantasyWorld t.istituzione.yaml.
id: istituzione
folder: Mondi/Istituzioni
order: 29
templates:
- id: istituzione
  title: Istituzione
  default_type: accademia
  target: z.modelli/Istituzione.md
subtypes:
- accademia
- gilda
- ordine
- corte
- tribunale
- culto di stato
# + simbolo: sigillo/insegna dell'istituzione (araldica, recupero FantasyWorld).
scheda: [portata, simbolo]
relazioni:
- field: sede
  label: Sede
  category: luogo
- field: regno
  label: Regno
  category: regno
- field: membri
  label: Membri di spicco
  category: personaggio
  multi: true
- field: fazione
  label: Fazione collegata
  category: fazione
creation:
  fields:
  - field: tipo
    prompt: Tipo di istituzione
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo
    from: notes
    category: mondo
    link: true
    required: true
  body:
  - field: missione
    prompt: 'Missione: a cosa serve, cosa custodisce'
    heading: Missione
  - field: struttura
    prompt: 'Struttura: ruoli, gradi, organigramma'
    heading: Struttura
  - field: accesso
    prompt: 'Accesso: come si entra, prove, requisiti'
    heading: Accesso
  - field: attivita
    prompt: 'Attività: cosa fa nel mondo, peso politico'
    heading: Attività
  - field: tensione
    prompt: Tensione o rivalità presente
    heading: Tensione
  - field: segreto
    prompt: Il segreto dell'istituzione
    callout: segreto
    title: Segreto
    fold: true
