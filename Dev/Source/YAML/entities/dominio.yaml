# Schema per-entità: dominio (lore). Il HUB connettivo della cosmologia: una sfera
# ontologica (Identità, Dissoluzione, Flusso Temporale, Trasformazione, Ciclo della
# Vita) che lega leggi, magie, entità primordiali e piani. Seed FantasyWorld
# JSON/cosmologia/domini.json (ogni dominio = nome/descrizione + leggi_fondamentali/
# magie/entità_collegate/piani_collegati → qui relazioni tipizzate).
id: dominio
folder: Mondi/Domini
order: 33
gruppo: cosmo
templates:
- id: dominio
  title: Dominio
  default_type: sfera ontologica
  target: z.modelli/Dominio.md
subtypes:
- sfera ontologica
- principio attivo
- aspetto cosmico
# Classificazione a 2 livelli: la 'famiglia' (ambito di realtà governato) affianca il
# 'tipo' (forma della sfera). Select + legenda auto-documentante.
famiglie:
- { nome: ordine,      descrizione: "La sfera della struttura, della legge e della stabilità.", assi: { orientamento: 1, tensione: 2 } }
- { nome: caos,        descrizione: "La sfera del mutamento, dell'imprevedibile e della distruzione.", assi: { orientamento: 4, tensione: 4 } }
- { nome: vita,        descrizione: "La sfera della crescita, della nascita e della fertilità.", assi: { orientamento: 1 } }
- { nome: morte,       descrizione: "La sfera della fine, del trapasso e dell'oltretomba.", assi: { orientamento: 5, tensione: 2 } }
- { nome: natura,      descrizione: "La sfera del mondo vivente, degli elementi e dei cicli naturali.", assi: { orientamento: 2, pervasivita: 3 } }
- { nome: conoscenza,  descrizione: "La sfera del sapere, della mente e della verità.", assi: { orientamento: 3 } }
- { nome: energia,     descrizione: "La sfera del potere grezzo, della magia e delle forze primarie.", assi: { attivita: 4 } }
- { nome: fato,        descrizione: "La sfera del destino, del tempo e degli eventi predeterminati.", assi: { attivita: 5, pervasivita: 4 } }
relazioni:
- field: leggi
  label: Leggi fondamentali
  category: legge_fondamentale
  multi: true
- field: sistemi_magici
  label: Magie del dominio
  category: sistema_magico
  multi: true
- field: entita
  label: Entità collegate
  category: entita_primordiale
  multi: true
- field: piani
  label: Piani collegati
  category: piano
  multi: true
- field: divinita
  label: Divinità affini
  category: divinita
  multi: true
- field: domini_opposti
  label: Domini in tensione
  category: dominio
  multi: true
  reciprocal: domini_opposti
- field: incantesimi
  label: Incantesimi del dominio
  category: incantesimo
  multi: true
  reciprocal: dominio
creation:
  fields:
  - field: tipo
    prompt: Natura del dominio
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo
    from: notes
    category: mondo
    link: true
    required: true
  body:
  - field: natura
    prompt: 'Natura: cosa governa, di cosa è la sfera'
    heading: Natura
  - field: dinamica
    prompt: 'Dinamica: come opera, cosa mette in moto nel cosmo'
    heading: Dinamica
  - field: tensione
    prompt: 'Tensione: con quali domini confligge o si bilancia'
    heading: Tensione
  - field: manifestazioni
    prompt: 'Manifestazioni: segni del dominio nel mondo mortale'
    heading: Manifestazioni

guida:
  scopo: 'Un dominio è una sfera ontologica della realtà (la Morte, il Tempo, l''Identità): l''hub che lega leggi, magie, piani ed entità affini.'
  campi_chiave: '**Famiglia** (ordine, caos, vita, morte…) dice di quale ambito è sfera; le relazioni a Leggi/Piani/Primordiali ne costruiscono il nodo nel grafo.'
