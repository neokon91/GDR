# Schema per-entità: epoca (lore, temporale). Grande periodo storico/cosmico che
# raccoglie eventi e archi. Sblocca la timeline: gli eventi si collegano a un'epoca.
# Assi in assi/epoca.yaml. Niente 'jinja' -> usa lo scheletro _entity_base.j2.
# Seed FantasyWorld t.epoca.yaml + assi_tematici_epoca.yaml (mix curato).
id: epoca
folder: Mondi/Epoche
order: 24
gruppo: tempo
templates:
- id: epoca
  title: Epoca
  default_type: era storica
  target: z.modelli/Epoca.md
  jinja: epoca.md.j2
subtypes:
- era cosmica
- era storica
- era mitica
- età
- eone
# Classificazione a 2 livelli: la 'famiglia' (funzione cosmica, seed FW epoca_cat)
# affianca il 'tipo'. Select + legenda auto-documentante.
famiglie:
- { nome: fondativa,     descrizione: "Dà origine a strutture cosmiche fondamentali: leggi, piani, razze, civiltà, entità primordiali.", assi: { storicita: 1, presenza_divina: 5 } }
- { nome: transizionale, descrizione: "Periodo di passaggio, mutazione o riformulazione ontologica.", assi: { equilibrio_cosmico: 2, stabilita_geopolitica: 2 } }
- { nome: stabilizzante, descrizione: "L'universo trova una forma durevole, ordinata o codificata.", assi: { equilibrio_cosmico: 4, stabilita_geopolitica: 4 } }
- { nome: degenerativa,  descrizione: "L'equilibrio si corrompe, le leggi si incrinano, le civiltà decadono.", assi: { stabilita_geopolitica: 1, equilibrio_cosmico: 1, luce_cosmica: 2 } }
- { nome: ciclica,       descrizione: "Epoca destinata a ripetersi o riemergere.", assi: { luce_cosmica: 3 } }
- { nome: apocrifa,      descrizione: "Epoca dimenticata, rimossa o occultata.", assi: { storicita: 1, luce_cosmica: 2 } }
- { nome: liminale,      descrizione: "Esiste tra due stati dell'essere: confini, piani e identità incerti.", assi: { equilibrio_cosmico: 3, storicita: 3 } }
fields:
  inizio: { label: Inizio, widget: text }
  fine:   { label: Fine,   widget: text }
scheda: [inizio, fine]
relazioni:
- field: eventi
  label: Eventi principali
  category: evento
  multi: true
  reciprocal: epoca
- field: divinita
  label: Divinità dominanti
  category: divinita
  multi: true
  reciprocal: epoche
- field: precede
  label: Precede
  category: epoca
  reciprocal: segue
- field: segue
  label: Segue
  category: epoca
  reciprocal: precede
- field: evento_apertura
  label: Evento d'apertura
  category: evento
- field: evento_chiusura
  label: Evento di chiusura
  category: evento
- field: miti
  label: Miti dell'era
  category: mito
  multi: true
  reciprocal: epoca_raccontata
- field: calamita
  label: Calamità dell'era
  category: calamita
  multi: true
  reciprocal: epoca
- field: figure
  label: Figure dell'era
  category: personaggio
  multi: true
- field: primordiali
  label: Primordiali dell'era
  category: entita_primordiale
  multi: true
  reciprocal: epoche
creation:
  fields:
  - field: tipo
    prompt: Tipo di epoca
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo
    from: notes
    category: mondo
    link: true
    required: true
  - field: inizio
    prompt: Inizio (data/era del mondo)
    optional: true
  - field: fine
    prompt: Fine (data/era del mondo)
    optional: true
  - field: fc-date
    prompt: 'Inizio sul calendario (opz., formato del calendario attivo, es. 0001-01-01)'
    optional: true
  - field: fc-end
    prompt: 'Fine sul calendario (opz., es. 0500-12-31)'
    optional: true
  body:
  - field: panorama
    prompt: Panorama dell'epoca (com'era il mondo)
    heading: Panorama
  - field: principi
    prompt: Principi dominanti (leggi, divinità, forze)
    heading: Principi dominanti
  - field: sviluppi
    prompt: Sviluppi narrativi (cosa è cambiato)
    heading: Sviluppi
  - field: eredita
    prompt: Tracce nel presente (cosa ne resta oggi)
    heading: Eredità
  - field: segreto
    prompt: Verità nascosta dell'epoca
    callout: segreto
    title: Segreto
    fold: true

guida:
  scopo: Un grande periodo del mondo che raccoglie eventi e archi e fa da spina dorsale alla timeline.
  campi_chiave: '**Tipo** + **Inizio**/**Fine** (date del mondo); **Famiglia** (fondativa, degenerativa…) e gli assi danno il sapore dell''era.'
