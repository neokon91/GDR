# Schema per-entità: cultura. Single source di tassonomia, scheda, assi,
# relazioni, wizard e wiring template. render.py lo distribuisce nel
# modello globale 'core' (apply_entities) e raccoglie i template.
# I campi sono nel registro centrale (core.yaml/system.yaml).
id: cultura
folder: Mondi/Culture
order: 4
templates:
- id: cultura
  title: Cultura
  default_type: civilta
  target: z.modelli/Cultura.md
  primary: true
  # Niente 'jinja' -> usa lo scheletro condiviso _entity_base.j2 (riempito da YAML+macro).
subtypes:
- civilta
- popolo
- tradizione
- religione
# Classificazione a 2 livelli: la 'famiglia' (indole, seed FW glossario_cultura)
# affianca il 'tipo'. Select + legenda auto-documentante.
# La famiglia può pre-compilare gli assi tematici (campo opzionale 'assi':
# asseId -> valore 1-5) — il wizard li propone alla scelta della famiglia, come
# i preset degli archetipi. Esempio curato su alcune famiglie; le altre restano
# senza preset (l'utente compila gli assi a mano).
famiglie:
- nome: ancestrale
  descrizione: "Radicata nelle origini mitiche, nella trasmissione orale e nei cicli naturali."
  assi: { valori_dominanti: 2, relazione_morte: 5, ritualizzazione_vita: 5 }
- { nome: sciamanica, descrizione: "Integra visibile e invisibile: pratiche spirituali, viaggi dell'anima, dialogo con l'Altrove." }
- { nome: iniziatica, descrizione: "Fondata sul passaggio, la prova e la trasformazione." }
- nome: dogmatica
  descrizione: "Del sacro immutabile, del rito stabilito, della gerarchia indiscutibile."
  assi: { valori_dominanti: 3, relazione_morte: 2, ritualizzazione_vita: 4 }
- { nome: fluida,     descrizione: "In perenne mutamento; abbraccia molteplicità e trasformazione." }
- { nome: sincretica, descrizione: "Dell'intreccio: fonde tradizioni e significati." }
- nome: guerriera
  descrizione: "Fondata sul conflitto, sulla prova e sulla conquista."
  assi: { valori_dominanti: 3, relazione_morte: 2, ritualizzazione_vita: 4 }
- { nome: nomadica,   descrizione: "Del movimento, dell'adattamento e della non-fissazione." }
# Diffusione/portata + stile dei nomi (il generatore homebrew genera.js legge
# stile_nomi per comporre nomi a tema della cultura) + simbolo (araldica/emblema
# identitario, recupero FantasyWorld; si sposa con infobox/ritratto).
scheda: [portata, stile_nomi, simbolo]
relazioni:
- field: regioni
  label: Regioni
  category: luogo
  multi: true
- field: lingua
  label: Lingua
  category: lingua
- field: istituzioni
  label: Istituzioni
  # ex-categoria `istituzione` assorbita in `fazione` (merge SYS-2): le istituzioni
  # sono fazioni di subtype accademia/corte/tribunale.
  category: fazione
  multi: true
- field: specie
  label: Specie
  category: specie
  multi: true
creation:
  fields:
  - field: tipo
    prompt: Tipo di cultura
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo
    from: notes
    category: mondo
    link: true
    required: true
  body:
  - field: valori
    prompt: Valori fondanti
    heading: Valori
  - field: vita
    prompt: Vita quotidiana
    heading: Vita
  - field: riti
    prompt: Riti di passaggio, feste
    heading: Riti
  - field: tabu
    prompt: 'Tabù: cosa è proibito'
    heading: Tabù
  - field: estetica
    prompt: 'Estetica: arte, moda, architettura'
    heading: Estetica
  - field: tensione
    prompt: Attrito con altre culture
    heading: Tensione

guida:
  scopo: 'Una cultura è un popolo coi suoi valori, riti e tabù: dà identità a luoghi e personaggi e attriti con le culture vicine.'
  campi_chiave: 'Scegli la **famiglia** (indole): pre-compila gli assi. Poi **Stile dei nomi** (alimenta il generatore) e **Portata**; sul Carattere **Valori dominanti**.'
