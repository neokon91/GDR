# Schema per-entità: cultura. Single source di tassonomia, scheda, assi,
# relazioni, wizard e wiring template. render.py lo distribuisce nel
# modello globale 'core' (apply_entities) e raccoglie i template.
# I campi sono nel registro centrale (core.yaml/system.yaml).
id: cultura
folder: Mondi/Culture
order: 4
templates:
- id: cultura
  title: Cultura
  default_type: civilta
  target: z.modelli/Cultura.md
  jinja: cultura.md.j2
subtypes:
- civilta
- popolo
- tradizione
- religione
# Assi tematici nel formato RICCO (seed FantasyWorld assi_tematici_cultura.yaml):
# 5 assi-chiave su scala 1-5 con etichetta + descrizione per valore.
assi:
- id: valori_dominanti
  nome: Valori Dominanti
  descrizione: I principi che la cultura considera sacri o fondamentali.
  valori:
    1: { etichetta: Sopravvivenza, descrizione: "Tutto è subordinato a sicurezza, difesa, continuità. Virtù: resilienza, sacrificio." }
    2: { etichetta: Armonia,       descrizione: "Comunità, coesione, equilibrio prima dell'eccezione. Virtù: rispetto, adattamento." }
    3: { etichetta: Onore,         descrizione: "Identità per prove, riti, codici; l'onore è cardine. Virtù: fierezza, lealtà." }
    4: { etichetta: Conoscenza,    descrizione: "Ricerca, elevazione, verità; l'ignoranza è il male. Virtù: studio, intuizione." }
    5: { etichetta: Potere,        descrizione: "Mutare, dominare, ascendere; il mondo è forze da riscrivere. Virtù: audacia, potenza." }
- id: relazione_morte
  nome: Relazione con la Morte
  descrizione: Come la cultura concepisce e tratta morte, dolore e lutto.
  valori:
    1: { etichetta: Rimozione,    descrizione: "La morte è evitata e temuta; il dolore è vergogna. Illusione di eternità." }
    2: { etichetta: Sacralizzazione, descrizione: "Passaggio sacro; riti funebri centrali, il dolore onora il legame." }
    3: { etichetta: Iniziazione,  descrizione: "Soglia da attraversare; pratiche per comprendere e trasformare la fine." }
    4: { etichetta: Trascendenza, descrizione: "Superamento del piano fisico; il lutto è gioia, la fine è risveglio." }
    5: { etichetta: Coabitazione, descrizione: "La morte è compagna quotidiana; i morti abitano case e sogni." }
- id: ritualizzazione_vita
  nome: Ciclo Rituale della Vita
  descrizione: Come la cultura scandisce le fasi della vita con riti e passaggi.
  valori:
    1: { etichetta: Spontaneo,    descrizione: "Processo naturale senza riti imposti; la crescita non è codificata." }
    2: { etichetta: Tradizionale, descrizione: "Riti familiari (nascita, unione, morte) trasmessi per imitazione." }
    3: { etichetta: Simbolico,    descrizione: "Ogni fase è un archetipo o ruolo; il passaggio richiede prove e maschere." }
    4: { etichetta: Iniziatico,   descrizione: "Cammino sacro; ogni fase lega a segreti, ordini, vocazioni." }
    5: { etichetta: Ciclico,      descrizione: "Eterno ritorno; si reincarnano antenati o archetipi. Età spiraliche." }
- id: relazione_altrove
  nome: Relazione con l'Altrove
  descrizione: Interazione con i mondi non ordinari (spirituali, onirici, dimensionali).
  valori:
    1: { etichetta: Tabù,         descrizione: "L'Altrove è negato o proibito; le credenze si limitano al visibile." }
    2: { etichetta: Visionario,   descrizione: "Esiste nei sogni e nei canti; lo visitano solo poeti, folli, sciamani." }
    3: { etichetta: Rituale,      descrizione: "Riti per contattarlo (oracoli, sacrifici); dialogo regolato e ambivalente." }
    4: { etichetta: Integrato,    descrizione: "Parte della vita quotidiana; spiriti membri della comunità, i morti parlano." }
    5: { etichetta: "Bi-planare", descrizione: "Ognuno vive su più piani; ogni luogo ha un doppio sacro. Realtà intrecciata." }
- id: costruzione_identitaria
  nome: Costruzione dell'Identità
  descrizione: Come si definiscono i confini tra 'noi' e 'gli altri'.
  valori:
    1: { etichetta: Ereditaria,   descrizione: "Identità fissa per nascita o sangue; chi nasce fuori non appartiene mai." }
    2: { etichetta: "Per ruoli",  descrizione: "Assegnata per funzione (età, lavoro, ruolo); si cambia solo con riti." }
    3: { etichetta: Comunitaria,  descrizione: "Nasce dal rito e dalla memoria condivisa; si appartiene partecipando." }
    4: { etichetta: Iniziatica,   descrizione: "Cammino personale; si appartiene se si è passati una soglia." }
    5: { etichetta: Fluida,       descrizione: "Molteplice e mutevole; si appartiene a più gruppi, l'io è in evoluzione." }
relazioni:
- field: regioni
  label: Regioni
  category: luogo
  multi: true
- field: lingua
  label: Lingua
  category: lingua
creation:
  fields:
  - field: tipo
    prompt: Tipo di cultura
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo
    from: notes
    category: mondo
    link: true
    required: true
  body:
  - field: valori
    prompt: Valori fondanti
    heading: Valori
  - field: vita
    prompt: Vita quotidiana
    heading: Vita
  - field: riti
    prompt: Riti di passaggio, feste
    heading: Riti
  - field: tabu
    prompt: 'Tabù: cosa è proibito'
    heading: Tabù
  - field: estetica
    prompt: 'Estetica: arte, moda, architettura'
    heading: Estetica
  - field: tensione
    prompt: Attrito con altre culture
    heading: Tensione
