# Schema per-entità: ecosistema (lore, natura). Rete dinamica di specie, risorse e
# cicli in equilibrio o tensione. Più focalizzato del bioma (che è il "luogo");
# l'ecosistema è la "rete di relazioni". Assi in assi/ecosistema.yaml.
# Seed FantasyWorld t.ecosistema.yaml.
id: ecosistema
folder: Mondi/Ecosistemi
order: 31
gruppo: geografia
templates:
- id: ecosistema
  title: Ecosistema
  default_type: naturale
  target: z.modelli/Ecosistema.md
# SOTTOTIPI: la NATURA della rete vivente. Profilo leggero (descrizione + evolve nel
# tempo): la profondità sta negli ASSI (equilibrio/diversità/naturalezza).
subtypes:
- { nome: naturale,    descrizione: "Catena alimentare ordinaria: predatori, prede, piante, cicli stagionali.", evoluzione: true }
- { nome: magico,      descrizione: "La magia ambientale plasma la rete: specie arcane, flora senziente, fenomeni innaturali.", evoluzione: true }
- { nome: sacro,       descrizione: "Legato a una divinità o a un luogo santo: creature-totem, equilibri protetti da tabù.", evoluzione: true }
- { nome: mutato,      descrizione: "Alterato da magia, veleno o cataclisma: ibridi, aberrazioni, catene spezzate.", evoluzione: true }
- { nome: instabile,   descrizione: "Sull'orlo del collasso o in piena fioritura esplosiva: equilibrio che non regge.", evoluzione: true }
- { nome: artificiale, descrizione: "Costruito o coltivato da civiltà: campi, allevamenti, giardini, ecosistemi pianificati.", evoluzione: true }
# La "salute" della rete vive come ASSE `equilibrio` (assi/ecosistema.yaml,
# autopoietico→collassante): niente campo-scheda doppione sulla stessa dimensione.
relazioni:
- field: bioma
  label: Bioma
  category: bioma
- field: specie
  label: Specie coinvolte
  category: creatura
  multi: true
- field: luogo
  label: Dove si trova
  category: luogo
creation:
  fields:
  - field: tipo
    prompt: Tipo di ecosistema
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo
    from: notes
    category: mondo
    link: true
    required: true
  body:
  - field: composizione
    prompt: 'Composizione: chi e cosa lo abita'
    heading: Composizione
  - field: equilibri
    prompt: 'Equilibri: catene, simbiosi, predatori/prede'
    heading: Equilibri
  - field: cicli
    prompt: 'Cicli: stagioni, migrazioni, rigenerazione'
    heading: Cicli
  - field: minacce
    prompt: 'Minacce: cosa lo sta spezzando'
    heading: Minacce
  - field: segreto
    prompt: Il segreto dell'ecosistema
    callout: segreto
    title: Segreto
    fold: true

guida:
  scopo: 'L''ecosistema è la rete vivente dentro un bioma: chi mangia chi, quali cicli lo reggono e cosa lo sta spezzando.'
  campi_chiave: '**Tipo** e la relazione **Bioma**; sul Carattere **Equilibrio** (autopoietico→collassante) ne misura la stabilità — l''asse che alimenta i Fronti ecologici.'
