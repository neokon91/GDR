# Schema per-entità: classe. Single source di tassonomia, scheda, assi,
# relazioni, wizard e wiring template. render.py lo distribuisce nel
# modello globale 'core' (apply_entities) e raccoglie i template.
# I campi sono nel registro centrale (core.yaml/system.yaml).
id: classe
folder: Mondi/Classi
order: 14
gruppo: regole
templates:
- id: classe
  title: Classe
  default_type: marziale
  target: z.modelli/Classe.md
  jinja: class.md.j2
subtypes:
- marziale
- incantatore
- mezzo incantatore
- esperto
# Campi-meccanica letti dal ponte homebrew→motore (crea_pg/sali_pg) per rendere la
# classe GIOCABILE: competenze in armi/armature, numero di abilità a scelta.
fields:
  competenze_armi:     { label: Competenze in armi,     widget: text }
  competenze_armature: { label: Competenze in armature, widget: text }
  abilita_numero:      { label: Abilità a scelta (numero), widget: number }
scheda:
- dado_vita
- car_primaria
- ts_competenze
- competenze_armi
- competenze_armature
- strumento
- abilita_numero
creation:
  fields:
  - field: tipo
    prompt: Tipo di classe
    from: subtypes
    required: true
  # Dati che rendono la classe GIOCABILE (crea_pg la fonde nelle opzioni PG; il
  # level-up deriva competenza/ASI standard e — per i caster — gli slot dall'SRD).
  - field: dado_vita
    prompt: Dado vita
    from: list
    options: [d6, d8, d10, d12]
    optional: true
  - field: ts_competenze
    prompt: 'Tiri salvezza competenti (2, es. Forza, Costituzione)'
    optional: true
  - field: tipo_incantatore
    prompt: 'Incantatore?'
    from: list
    options: [nessuno, pieno, mezzo]
    optional: true
  - field: competenze_armature
    prompt: 'Competenze in armature (es. Armature leggere e medie; scudi)'
    optional: true
  - field: competenze_armi
    prompt: 'Competenze in armi (es. Armi semplici e da guerra)'
    optional: true
  - field: strumento
    prompt: Competenza in strumenti
    optional: true
  - field: abilita_numero
    prompt: 'Abilità a scelta (numero, es. 2)'
    from: number
    optional: true
  # Privilegi di 1º livello applicati in crea_pg (lista, separata da ";").
  - field: privilegi_l1
    prompt: 'Privilegi di 1º livello (separati da ";")'
    optional: true
  # Livello in cui si sceglie la sottoclasse (default 3, 2024). sali_pg offre le
  # sottoclassi homebrew del vault legate a questa classe.
  - field: livello_sottoclasse
    prompt: 'Livello della sottoclasse (default 3)'
    from: number
    optional: true
  body:
  - field: descrizione
    prompt: Concept della classe
    heading: Concept
  - field: equipaggiamento
    prompt: 'Equipaggiamento iniziale (es. A: ...; oppure B: ...)'
    heading: Equipaggiamento
  - field: progressione
    prompt: Privilegi salienti per livello
    heading: Progressione

guida:
  scopo: La classe homebrew che i tuoi giocatori potranno scegliere in creazione e far salire di livello come una ufficiale.
  campi_chiave: 'Il **Tipo** (marziale/incantatore/…) è solo narrativo; a guidare la MECCANICA sono **Dado vita** + **Caratteristica primaria** + **Incantatore?** (nessuno/pieno/mezzo): da questi il motore deriva slot, competenza e ASI. ⚠️ imposta **Incantatore?** esplicitamente — il Tipo da solo NON dà gli slot.'
