# Schema per-entità: bioma (lore, natura). Regione ecologica: clima, flora/fauna,
# fenomeni. Arricchisce luoghi e creature con ecologia. Assi in assi/bioma.yaml.
# Seed FantasyWorld t.bioma.yaml.
id: bioma
folder: Mondi/Biomi
order: 30
gruppo: geografia
templates:
- id: bioma
  title: Bioma
  default_type: foresta
  target: z.modelli/Bioma.md
# SOTTOTIPI: il terreno-base del bioma. La profondità vera sta negli ASSI
# (ostilità/fertilità/magia ambientale/accessibilità), non in campi per-tipo: il profilo
# dà solo una descrizione d'orientamento. I biomi sono stabili (niente clock/evoluzione).
subtypes:
- { nome: foresta,     descrizione: "Distese alberate: boschi, giungle, foreste pluviali o stregate. Coperture, predatori, vie nascoste." }
- { nome: deserto,     descrizione: "Aride distese di sabbia, roccia o sale: scarsità d'acqua, escursioni termiche, miraggi." }
- { nome: tundra,      descrizione: "Lande fredde e spoglie: gelo, vento, suolo perennemente ghiacciato." }
- { nome: oceano,      descrizione: "Acque aperte e profondità: mari, abissi, scogliere, e ciò che si cela sotto." }
- { nome: montagna,    descrizione: "Rilievi e altipiani: passi, vette, valichi, l'aria rarefatta dell'altura." }
- { nome: pianura,     descrizione: "Distese aperte: praterie, steppe, campi; poco riparo, lunghi orizzonti." }
- { nome: palude,      descrizione: "Terre acquitrinose: fango, nebbie, malattie, e ciò che striscia nel marcio." }
- { nome: sotterraneo, descrizione: "Il mondo di sotto: caverne, cripte, il Sottosuolo; buio, eco, pressione." }
- { nome: planare,     descrizione: "Ambiente di un altro piano: leggi fisiche aliene, sostanza instabile, ostile ai mortali." }
scheda: [clima]
relazioni:
- field: luoghi
  label: Luoghi
  category: luogo
  multi: true
  reciprocal: bioma
- field: specie
  label: Specie tipiche
  category: creatura
  multi: true
  reciprocal: biomi
- field: ecosistemi
  label: Ecosistemi
  category: ecosistema
  multi: true
  reciprocal: bioma
- field: risorse_naturali
  label: Risorse del bioma
  category: risorsa
  multi: true
creation:
  fields:
  - field: tipo
    prompt: Tipo di bioma
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo
    from: notes
    category: mondo
    link: true
    required: true
  - field: clima
    prompt: Clima
    from: list
    options: [temperato, arido, tropicale, artico, montano, costiero, sotterraneo]
    optional: true
  body:
  - field: geografia
    prompt: 'Geografia: com''è fatto, cosa lo distingue'
    heading: Geografia
  - field: flora_fauna
    prompt: Flora e fauna caratteristiche
    heading: Flora e fauna
  - field: fenomeni
    prompt: 'Fenomeni: meteo, magia ambientale, pericoli naturali'
    heading: Fenomeni
  - field: risorse
    prompt: 'Risorse: cosa offre (e cosa attira)'
    heading: Risorse
  - field: segreto
    prompt: Cosa nasconde il bioma
    callout: segreto
    title: Segreto
    fold: true

guida:
  scopo: 'Il bioma è l''ambiente di un luogo: clima, flora/fauna e fenomeni, e arricchisce di ecologia i luoghi che lo contengono.'
  campi_chiave: '**Tipo** e **Clima** lo inquadrano; sul Carattere **Ostilità** e **Fertilità** dicono quanto è pericoloso e quanta vita sostiene.'
