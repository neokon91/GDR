# Schema per-entità: profezia (lore, narrativo). Predizione/presagio con condizioni
# di avveramento: gancio narrativo forte. Si lega a eventi/personaggi/culti.
# Assi in assi/profezia.yaml. Seed FantasyWorld t.profezia.yaml.
id: profezia
folder: Mondi/Profezie
order: 27
gruppo: tempo
templates:
- id: profezia
  title: Profezia
  default_type: divinatoria
  target: z.modelli/Profezia.md
subtypes:
- nome: cosmica
  descrizione: "Riguarda la sorte del mondo o del cosmo: fini, ere, equilibri che si rovesciano."
  wizard: ["La posta: cosa finisce o muta su scala di mondo", "Il segno annunciato che nessuno può ignorare"]
- nome: divinatoria
  descrizione: "Lettura del probabile da segni, astri o arti: indica una direzione, non una condanna."
  wizard: ["Con quale arte è stata tratta e quanto è affidabile", "Cosa suggerisce di fare o evitare"]
- nome: di rinascita
  descrizione: "Annuncia un ritorno o una riscoperta: un re, un dio, un'età che torna."
  wizard: ["Chi o cosa dovrebbe tornare, e chi lo attende", "Il segno che ne riconoscerà la venuta"]
- nome: distruttiva
  descrizione: "Predice rovina: una fine, un flagello, un crollo — un orologio che corre."
  wizard: ["Cosa annuncia di distruggere, e quando", "Cosa, se fatto, potrebbe ancora scongiurarla"]
- nome: personale
  descrizione: "Lega il destino di una persona sola: un nome, un compito, una morte annunciata."
  wizard: ["Chi riguarda — e se lo sa", "Il dettaglio che la rende inevitabile, o aggirabile"]
# Campo query-abile per il DM: "tutte le profezie ancora in corso".
fields:
  stato_profezia: { label: Stato d'avveramento, widget: stato_profezia }
scheda: [stato_profezia]
relazioni:
- field: riguarda
  label: Chi riguarda
  category: personaggio
  multi: true
- field: evento
  label: Evento legato
  category: evento
- field: culti
  label: Culti che la custodiscono
  category: culto
  multi: true
creation:
  fields:
  - field: tipo
    prompt: Tipo di profezia
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo
    from: notes
    category: mondo
    link: true
    required: true
  body:
  - field: testo
    prompt: 'Il testo della profezia (le parole, anche criptiche)'
    heading: Testo
  - field: interpretazioni
    prompt: Interpretazioni possibili (cosa si crede significhi)
    heading: Interpretazioni
  - field: condizioni
    prompt: Condizioni di avveramento (cosa deve accadere)
    heading: Condizioni
  - field: segni
    prompt: 'Segni e manifestazioni: come capire che si avvera'
    heading: Segni
  - field: segreto
    prompt: La verità sull'avveramento (cosa il DM sa davvero)
    callout: segreto
    title: Segreto
    fold: true

guida:
  scopo: Una predizione con condizioni d'avveramento — un gancio narrativo forte che il DM fa maturare nel tempo.
  campi_chiave: '**Tipo**; **Stato d''avveramento** (campo filtrabile: in corso/compiuta) per ritrovarla; sul Carattere **Malleabilità** dice se le scelte dei PG possono deviarla.'
