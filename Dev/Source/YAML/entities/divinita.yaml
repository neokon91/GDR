# Schema per-entità: divinita. Single source di tassonomia, scheda, assi,
# relazioni, wizard e wiring template. render.py lo distribuisce nel
# modello globale 'core' (apply_entities) e raccoglie i template.
# I campi sono nel registro centrale (core.yaml/system.yaml).
id: divinita
folder: Mondi/Divinita
order: 19
templates:
- id: divinita
  title: Divinità
  default_type: divinità maggiore
  target: z.modelli/Divinita.md
  jinja: reference.md.j2
  primary: true
subtypes:
- divinità maggiore
- divinità minore
- semidio
- pantheon
# Classificazione a 2 livelli: la 'famiglia' (natura, seed FW glossario_divinita)
# affianca il 'tipo' (rango). Select + legenda auto-documentante.
famiglie:
- { nome: primordiale, descrizione: "Preesistente alla creazione dei piani e delle leggi strutturate." }
- { nome: archetipica, descrizione: "Incarna forze universali o concetti eterni." }
- { nome: elementale,  descrizione: "Collegata a uno degli elementi fondamentali o ai loro derivati." }
- { nome: culturale,   descrizione: "Creata, immaginata o evocata dai mortali." }
- { nome: mitica,      descrizione: "Figura simbolica o alchemica, nata dalla convergenza cosmica." }
- { nome: spirituale,  descrizione: "Legata al ciclo dell'anima, alla morte, alla purificazione o al karma." }
- { nome: onirica,     descrizione: "Nata dall'inconscio collettivo, dai sogni cosmici o da archetipi inconsci." }
relazioni:
- field: domini
  label: Domini cosmici
  category: dominio
  multi: true
- field: origine
  label: Origine primordiale
  category: entita_primordiale
- field: culti
  label: Culti
  category: culto
  multi: true
- field: piano
  label: Piano di dimora
  category: piano
scheda:
- dominio
- allineamento
- simbolo
creation:
  fields:
  - field: tipo
    prompt: Rango divino
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo (opzionale)
    from: notes
    category: mondo
    link: true
    optional: true
  body:
  - field: dogmi
    prompt: Dogmi e aspettative
    heading: Dogmi
  - field: culto
    prompt: 'Culto: fedeli, riti, templi'
    heading: Culto
