# Schema per-entità: divinita. Single source di tassonomia, scheda, assi,
# relazioni, wizard e wiring template. render.py lo distribuisce nel
# modello globale 'core' (apply_entities) e raccoglie i template.
# I campi sono nel registro centrale (core.yaml/system.yaml).
id: divinita
folder: Mondi/Divinita
order: 19
gruppo: cosmo
templates:
- id: divinita
  title: Divinità
  default_type: divinità maggiore
  target: z.modelli/Divinita.md
  # Template di default (_entity_base): una divinità è un attore cosmico che PREME sul
  # tavolo (Fronte: clock di risveglio/desiderio — vedi grafo teologico) come le altre
  # entità cosmiche (piano/dominio/legge_fondamentale). La lean reference.md.j2 le negava
  # la tab «Al tavolo»; il default le dà superficie giocabile + Cronologia (tappe_categorie).
# SOTTOTIPI con PROFILO: il RANGO della divinità (la natura sta nella famiglia + assi).
# Tutte premono sul tavolo come Fronti (clock) ed evolvono tra le epoche. Profilo
# leggero: la profondità cosmica è negli assi e nelle relazioni (domini/culti/piano).
subtypes:
- { nome: divinità maggiore, descrizione: "Potenza di prima grandezza: domini ampi, culti diffusi, presenza che pesa sul mondo intero.", campi: [], clock: true, evoluzione: true }
- { nome: divinità minore,   descrizione: "Divinità di portata ristretta: un dominio, una regione, un popolo o un mestiere.",            campi: [], clock: true, evoluzione: true }
- { nome: semidio,           descrizione: "Nato dall'unione di divino e mortale, o asceso da mortale: potere divino ma origine terrena.", campi: [origine_mortale], clock: true, evoluzione: true }
- { nome: pantheon,          descrizione: "Non una singola divinità ma un INSIEME di dèi imparentati che agiscono come un corpo.",       campi: [], clock: true, evoluzione: true }
fields:
  origine_mortale: { label: Origine mortale, widget: text }
# Classificazione a 2 livelli: la 'famiglia' (natura, seed FW glossario_divinita)
# affianca il 'tipo' (rango). Select + legenda auto-documentante.
# Preset assi per famiglia (campo `assi`): il wizard pre-compila gli assi che la
# natura della divinità implica fortemente. Solo quelli; gli altri al default.
famiglie:
- { nome: primordiale, descrizione: "Preesistente alla creazione dei piani e delle leggi strutturate.", assi: { presenza_cosmica: 1, incarnazione: 1, volonta: 1 } }
- { nome: archetipica, descrizione: "Incarna forze universali o concetti eterni.", assi: { presenza_cosmica: 1, polarita_cosmica: 1, incarnazione: 2 } }
- { nome: elementale,  descrizione: "Collegata a uno degli elementi fondamentali o ai loro derivati.", assi: { incarnazione: 2, presenza_cosmica: 4 } }
- { nome: culturale,   descrizione: "Creata, immaginata o evocata dai mortali.", assi: { incarnazione: 4, accessibilita: 4, presenza_cosmica: 4 } }
- { nome: mitica,      descrizione: "Figura simbolica o alchemica, nata dalla convergenza cosmica.", assi: { interazione_divina: 2, incarnazione: 3, polarita_cosmica: 3 } }
- { nome: spirituale,  descrizione: "Legata al ciclo dell'anima, alla morte, alla purificazione o al karma.", assi: { etica_divina: 4, accessibilita: 2 } }
- { nome: onirica,     descrizione: "Nata dall'inconscio collettivo, dai sogni cosmici o da archetipi inconsci.", assi: { interazione_divina: 1, incarnazione: 2, presenza_cosmica: 2 } }
relazioni:
- field: domini
  label: Domini cosmici
  category: dominio
  multi: true
- field: origine
  label: Origine primordiale
  category: entita_primordiale
- field: culti
  label: Culti
  category: culto
  multi: true
- field: piano
  label: Piano di dimora
  category: piano
# Divinità opposte (rivalità divina: Ordine vs Caos, antagonismi di pantheon):
# alimenta il grafo e genera trame. È RECIPROCA: 'rivali' è l'UNICA self-relation
# di divinita → reciprocalField la auto-deriva e Collega scrive l'inverso simmetrico
# (A opposta a B ⇒ B opposta ad A). Diverso da personaggio.rivali (3 self-relation,
# ambiguo → 'connessioni').
- field: rivali
  label: Divinità opposte
  category: divinita
  multi: true
# Inverso di mito.divinita: i miti su questa divinità (dal lato mito si auto-deriva).
- field: miti
  label: Miti
  category: mito
  multi: true
  reciprocal: divinita
# NB: "di cosa è dio/dea" vive nella relazione tipizzata `domini`→dominio (link),
# non in un campo-scheda `dominio` di testo libero che la duplicherebbe.
scheda:
- allineamento
- simbolo
creation:
  fields:
  - field: tipo
    prompt: Rango divino
    from: subtypes
    required: true
  - field: mondo
    prompt: Mondo (opzionale)
    from: notes
    category: mondo
    link: true
    optional: true
  body:
  - field: dogmi
    prompt: Dogmi e aspettative
    heading: Dogmi
  - field: culto
    prompt: 'Culto: fedeli, riti, templi'
    heading: Culto

guida:
  scopo: L'entità venerata — un attore cosmico che, via culti e profezie, può premere sul tavolo come Fronte.
  campi_chiave: '**Rango** (maggiore/minore/semidio); **Famiglia** (→ preimposta gli assi cosmici); **Domini cosmici** e **Allineamento** per la sua identità.'
