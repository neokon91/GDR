id: pg_rules
version: 0.1.0
purpose: >-
  Overlay curato per il rules-engine PG: i dati 5.5e NON presenti (o in prosa)
  nei JSON SRD. build_personaggio.py fonde questo con SRD classes/species/
  backgrounds e genera z.automazioni/data/personaggio.json (le opzioni che
  crea_personaggio.js legge a runtime). Le caratteristiche (6) vengono dal
  modello: caratteristiche e abilità (18) stanno in system.yaml (servono anche
  ai template Jinja della scheda PG); qui solo la generazione dei punteggi.

# Generazione delle caratteristiche (metodi 2024). point_buy: costi per valore.
generazione_caratteristiche:
  metodi:
    array_standard:
      label: Array standard
      valori: [15, 14, 13, 12, 10, 8]
    point_buy:
      label: Acquisto punti
      punti: 27
      minimo: 8
      massimo: 15
      costi: { 8: 0, 9: 1, 10: 2, 11: 3, 12: 4, 13: 5, 14: 7, 15: 9 }
    manuale:
      label: Inserimento manuale

# Schemi di aumento caratteristiche del background (2024): l'utente sceglie.
aumento_background:
  schemi: ["+2/+1", "+1/+1/+1"]
