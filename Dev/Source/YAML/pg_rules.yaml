id: pg_rules
version: 0.1.0
purpose: >-
  Overlay curato per il rules-engine PG: i dati 5.5e NON presenti (o in prosa)
  nei JSON SRD. build_personaggio.py fonde questo con SRD classes/species/
  backgrounds e genera z.automazioni/data/personaggio.json (le opzioni che
  crea_personaggio.js legge a runtime). Le caratteristiche (6) vengono dal
  modello: caratteristiche e abilità (18) stanno in system.yaml (servono anche
  ai template Jinja della scheda PG); qui solo la generazione dei punteggi.

# Generazione delle caratteristiche (metodi 2024). point_buy: costi per valore.
generazione_caratteristiche:
  metodi:
    array_standard:
      label: Array standard
      valori: [15, 14, 13, 12, 10, 8]
    point_buy:
      label: Acquisto punti
      punti: 27
      minimo: 8
      massimo: 15
      costi: { 8: 0, 9: 1, 10: 2, 11: 3, 12: 4, 13: 5, 14: 7, 15: 9 }
    manuale:
      label: Inserimento manuale

# Schemi di aumento caratteristiche del background (2024): l'utente sceglie.
aumento_background:
  schemi: ["+2/+1", "+1/+1/+1"]

# Padronanza delle armi (2024): n. di padronanze note al L1 per le classi che la
# ottengono ma il cui conteggio NON è nella colonna di progressione del SRD
# (Ladro/Paladino/Ranger). Barbaro (2) e Guerriero (3) vengono dal SRD. Valore 2024.
padronanza_armi_fallback: 2

# Risorse di classe a ricarica (loop di sessione 2024). L'SRD TABELLA il valore per
# livello in una colonna della progressione, ma NON dice quando ricarica → mappa
# curata qui. Chiave = nome ESATTO della colonna SRD; build_personaggio.py estrae i
# valori per livello, il resto è authoring. `id` = chiave frontmatter (usi_<id> = spesi);
# `ricarica` breve = riposo breve O lungo · lungo = solo riposo lungo. crea_pg/sali_pg
# scrivono `risorse_pg` sulla scheda; renderRisorsePG ne disegna le barre; i riposi le
# azzerano; il bottone «Usa risorsa» ne spende una (meta_actions.usa_risorsa).
risorse_classe:
  "Ire":                 { id: ira,                label: "Ira",                  ricarica: lungo, icona: "🔥" }
  "Punti stregoneria":   { id: punti_stregoneria,  label: "Punti stregoneria",    ricarica: lungo, icona: "✨" }
  "Concentrazione":      { id: disciplina,         label: "Punti Disciplina (Ki)", ricarica: breve, icona: "🥋" }
  "Incanalare divinità": { id: incanalare,         label: "Incanalare divinità",  ricarica: breve, icona: "🙏" }
  "Forma selvatica":     { id: forma_selvatica,    label: "Forma selvatica",      ricarica: breve, icona: "🐻" }
  "Recuperare energie":  { id: recuperare_energie, label: "Recuperare energie",   ricarica: breve, icona: "💨" }
  "Nemico prescelto":    { id: nemico_prescelto,   label: "Nemico prescelto",     ricarica: lungo, icona: "🎯" }

# Classi le cui SLOT incantesimo ricaricano sul riposo BREVE (Magia del Patto del
# Warlock 2024): crea_pg/sali_pg scrivono `slot_ricarica: breve`, e riposo_breve azzera
# gli slot_uso_N. Gli altri incantatori recuperano gli slot solo sul riposo lungo.
slot_ricarica_breve_classi: [warlock]

# Risorse il cui MAX = modificatore di una CARATTERISTICA (non una colonna SRD): es.
# l'Ispirazione bardica = mod Carisma (min 1). Chiave = id classe; crea_pg/sali_pg
# calcolano max = mod(<caratteristica>) al punteggio corrente del PG (si aggiorna a un ASI).
# `ricarica_breve_da_livello`: dal livello indicato la ricarica passa a riposo breve (Bardo:
# «Fonte di ispirazione» al 5º livello, 2024 → prima riposo lungo, poi breve).
risorse_caratteristica:
  bardo: { id: ispirazione, label: "Ispirazione bardica", caratteristica: carisma, ricarica: lungo, ricarica_breve_da_livello: 5, icona: "🎵" }

# Armature SRD 5.2.1 (per il calcolo CA). ca_base = CA dell'armatura; dex_max =
# massimo bonus di Destrezza applicabile (null = nessun limite; 0 = nessun bonus).
# La scheda calcola: CA = ca_base + min(mod_DES, dex_max) + (2 se scudo). SRD JSON
# tiene le armature in prosa nell'equipaggiamento → tabella curata qui.
armature:
  nessuna:        { label: "Nessuna (senza armatura)", categoria: nessuna, ca_base: 10, dex_max: null }
  imbottita:      { label: "Imbottita",                categoria: leggera, ca_base: 11, dex_max: null }
  cuoio:          { label: "Cuoio",                    categoria: leggera, ca_base: 11, dex_max: null }
  cuoio_borchiato: { label: "Cuoio borchiato",         categoria: leggera, ca_base: 12, dex_max: null }
  pelle:          { label: "Pelle",                    categoria: media,   ca_base: 12, dex_max: 2 }
  camicia_maglia: { label: "Camicia di maglia",        categoria: media,   ca_base: 13, dex_max: 2 }
  corazza_scaglie: { label: "Corazza a scaglie",       categoria: media,   ca_base: 14, dex_max: 2 }
  corazza:        { label: "Corazza di piastre",       categoria: media,   ca_base: 14, dex_max: 2 }
  mezza_armatura: { label: "Mezza armatura",           categoria: media,   ca_base: 15, dex_max: 2 }
  cotta_maglia:   { label: "Cotta di maglia",          categoria: pesante, ca_base: 16, dex_max: 0 }
  corazza_piastre: { label: "Corazza di piastre pesante", categoria: pesante, ca_base: 18, dex_max: 0 }
  piastre:        { label: "Armatura completa",        categoria: pesante, ca_base: 18, dex_max: 0 }

# Lingue (2024): ogni PG conosce il Comune + N lingue standard a scelta dal
# background d'origine. La scelta è guidata dal wizard; elenco curato (SRD).
lingue:
  comune: Comune
  numero_a_scelta: 2
  standard: [Comune, Nanico, Elfico, Gigante, Gnomesco, Goblin, Halfling, Orchesco, Draconico, Silvano, Abissale, Celestiale, Infernale, Profondo, Primordiale, Sottocomune]

# Multiclasse (2024, regola OPZIONALE). Mai in creazione: al 1º livello si parte
# sempre mono-classe; si multiclassa SOLO salendo di livello (sali_pg). Gli slot
# combinati vengono dalla tabella SRD «Incantatore multiclasse» (build li espone in
# slot_multiclasse) sommando i livelli da incantatore PIENO (×1) e MEZZO (÷2, arrot.
# in difetto), MA solo con 2+ classi incantatrici; con UNA sola si usa la sua tabella.
# Il Patto del Warlock (slot_patto) resta SEMPRE separato e ricarica a riposo breve.
multiclasse:
  # Prerequisiti RAW: 13+ nella/e caratteristica/he chiave (della NUOVA classe e di
  # quelle già possedute). Lista di ALTERNATIVE: ne basta una soddisfatta; dentro
  # un'alternativa servono TUTTE le caratteristiche elencate. Guerriero = Forza O
  # Destrezza; Monaco/Paladino/Ranger = entrambe. sali_pg blocca se nessuna regge.
  prerequisiti:
    barbaro:   [{ forza: 13 }]
    bardo:     [{ carisma: 13 }]
    chierico:  [{ saggezza: 13 }]
    druido:    [{ saggezza: 13 }]
    guerriero: [{ forza: 13 }, { destrezza: 13 }]
    ladro:     [{ destrezza: 13 }]
    mago:      [{ intelligenza: 13 }]
    monaco:    [{ destrezza: 13, saggezza: 13 }]
    paladino:  [{ forza: 13, carisma: 13 }]
    ranger:    [{ destrezza: 13, saggezza: 13 }]
    stregone:  [{ carisma: 13 }]
    warlock:   [{ carisma: 13 }]
  # Competenze ottenute ENTRANDO in una classe via multiclasse (sottoinsieme del 1º
  # livello, 2024). `armature_cat` = categorie indossabili (per la CA, come in classes);
  # armi/armature/strumenti = prosa appesa alle competenze; `abilita_scelte` = n. di
  # abilità extra a scelta. Classi assenti o {} (Mago/Stregone) = nessuna competenza extra.
  competenze:
    barbaro:   { armi: "Armi marziali", armature: "Scudi", armature_cat: [scudo] }
    bardo:     { armature: "Armature leggere", armature_cat: [leggera], abilita_scelte: 1, strumenti: "Uno strumento musicale" }
    chierico:  { armature: "Armature leggere e medie, scudi", armature_cat: [leggera, media, scudo] }
    druido:    { armature: "Armature leggere e medie, scudi (non di metallo)", armature_cat: [leggera, media, scudo] }
    guerriero: { armi: "Armi semplici e marziali", armature: "Armature leggere e medie, scudi", armature_cat: [leggera, media, scudo] }
    ladro:     { armature: "Armature leggere", armature_cat: [leggera], abilita_scelte: 1, strumenti: "Attrezzi da scasso" }
    monaco:    { armi: "Armi semplici e armi marziali con la proprietà Leggera" }
    paladino:  { armi: "Armi semplici e marziali", armature: "Armature leggere e medie, scudi", armature_cat: [leggera, media, scudo] }
    ranger:    { armi: "Armi semplici e marziali", armature: "Armature leggere e medie, scudi", armature_cat: [leggera, media, scudo], abilita_scelte: 1 }
    stregone:  {}
    mago:      {}
    warlock:   { armi: "Armi semplici", armature: "Armature leggere", armature_cat: [leggera] }
