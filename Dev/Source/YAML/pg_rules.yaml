id: pg_rules
version: 0.1.0
purpose: >-
  Overlay curato per il rules-engine PG: i dati 5.5e NON presenti (o in prosa)
  nei JSON SRD. build_personaggio.py fonde questo con SRD classes/species/
  backgrounds e genera z.automazioni/data/personaggio.json (le opzioni che
  crea_personaggio.js legge a runtime). Le caratteristiche (6) vengono dal
  modello: caratteristiche e abilità (18) stanno in system.yaml (servono anche
  ai template Jinja della scheda PG); qui solo la generazione dei punteggi.

# Generazione delle caratteristiche (metodi 2024). point_buy: costi per valore.
generazione_caratteristiche:
  metodi:
    array_standard:
      label: Array standard
      valori: [15, 14, 13, 12, 10, 8]
    point_buy:
      label: Acquisto punti
      punti: 27
      minimo: 8
      massimo: 15
      costi: { 8: 0, 9: 1, 10: 2, 11: 3, 12: 4, 13: 5, 14: 7, 15: 9 }
    manuale:
      label: Inserimento manuale

# Schemi di aumento caratteristiche del background (2024): l'utente sceglie.
aumento_background:
  schemi: ["+2/+1", "+1/+1/+1"]

# Padronanza delle armi (2024): n. di padronanze note al L1 per le classi che la
# ottengono ma il cui conteggio NON è nella colonna di progressione del SRD
# (Ladro/Paladino/Ranger). Barbaro (2) e Guerriero (3) vengono dal SRD. Valore 2024.
padronanza_armi_fallback: 2

# Armature SRD 5.2.1 (per il calcolo CA). ca_base = CA dell'armatura; dex_max =
# massimo bonus di Destrezza applicabile (null = nessun limite; 0 = nessun bonus).
# La scheda calcola: CA = ca_base + min(mod_DES, dex_max) + (2 se scudo). SRD JSON
# tiene le armature in prosa nell'equipaggiamento → tabella curata qui.
armature:
  nessuna:        { label: "Nessuna (senza armatura)", categoria: nessuna, ca_base: 10, dex_max: null }
  imbottita:      { label: "Imbottita",                categoria: leggera, ca_base: 11, dex_max: null }
  cuoio:          { label: "Cuoio",                    categoria: leggera, ca_base: 11, dex_max: null }
  cuoio_borchiato: { label: "Cuoio borchiato",         categoria: leggera, ca_base: 12, dex_max: null }
  pelle:          { label: "Pelle",                    categoria: media,   ca_base: 12, dex_max: 2 }
  camicia_maglia: { label: "Camicia di maglia",        categoria: media,   ca_base: 13, dex_max: 2 }
  corazza_scaglie: { label: "Corazza a scaglie",       categoria: media,   ca_base: 14, dex_max: 2 }
  corazza:        { label: "Corazza di piastre",       categoria: media,   ca_base: 14, dex_max: 2 }
  mezza_armatura: { label: "Mezza armatura",           categoria: media,   ca_base: 15, dex_max: 2 }
  cotta_maglia:   { label: "Cotta di maglia",          categoria: pesante, ca_base: 16, dex_max: 0 }
  corazza_piastre: { label: "Corazza di piastre pesante", categoria: pesante, ca_base: 18, dex_max: 0 }
  piastre:        { label: "Armatura completa",        categoria: pesante, ca_base: 18, dex_max: 0 }

# Lingue (2024): ogni PG conosce il Comune + N lingue standard a scelta dal
# background d'origine. La scelta è guidata dal wizard; elenco curato (SRD).
lingue:
  comune: Comune
  numero_a_scelta: 2
  standard: [Comune, Nanico, Elfico, Gigante, Gnomesco, Goblin, Halfling, Orchesco, Draconico, Silvano, Abissale, Celestiale, Infernale, Profondo, Primordiale, Sottocomune]
