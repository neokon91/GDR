id: worldbuilding_control_cockpit
purpose: Contratto operativo per trasformare Controllo Worldbuilding in audit compatto di riparazione.
version: 0.1.0
dashboard:
  page: Hub/Controllo Worldbuilding.md
  workflow: controllo_worldbuilding
  required_runtime_views:
    - renderWorldbuildingControlNow
    - renderWorldbuildingControlReadiness
    - renderWorldbuildingControlQueues
    - renderWorldbuildingControlSurfaceLinks
  required_visible_sections:
    - Filtro
    - Priorita
    - Audit
    - Code Di Riparazione
    - Superfici
panels:
  now:
    runtime_view: renderWorldbuildingControlNow
    promise: Decidere cosa riparare prima leggendo anche tavolo, movimento, conseguenza e collegamento.
    answers:
      - profondita mancante
      - connessioni deboli
      - canone incompleto
      - entita vive incomplete
      - rischio player-safe
  readiness:
    runtime_view: renderWorldbuildingControlReadiness
    promise: Misurare i buchi strutturali e i gate mancanti che impediscono il gioco.
    answers:
      - tavolo mancante
      - movimento mancante
      - conseguenze mancanti
      - collegamenti mancanti
      - profondita
      - collegamenti
      - canone
      - giocabilita
      - sicurezza giocatori
  queues:
    runtime_view: renderWorldbuildingControlQueues
    promise: Ordinare solo le riparazioni azionabili del mondo.
    answers:
      - cosa approfondire
      - cosa collegare
      - cosa canonizzare
      - cosa manca alle entita vive
      - workflow esistente da usare
      - cosa ripulire
  surfaces:
    runtime_view: renderWorldbuildingControlSurfaceLinks
    promise: Aprire le superfici giuste per correggere dati, canone e profondita.
    answers:
      - correggere campi
      - stabilizzare canone
      - approfondire schede
      - usare basi generate
queues:
  - id: depth
    label: Profondita mancante
    table_columns:
      - Nota
      - Area
      - Cosa manca
      - Azione
  - id: connections
    label: Connessioni deboli
    table_columns:
      - Nota
      - Connessioni
      - Azione
  - id: canon
    label: Canone incompleto
    table_columns:
      - Nota
      - Problema
      - Azione
  - id: playability
    label: Materiale non giocabile
    table_columns:
      - Nota
      - Manca
      - Azione
      - Workflow esistente
  - id: player_safe
    label: Player-safe rischioso
    table_columns:
      - Nota
      - Rischio
      - Azione
  - id: ready_unused
    label: Pronte senza uso
    table_columns:
      - Nota
      - Stato
      - Uso mancato
surfaces:
  - id: worldbuilding_base
    label: Codex editabile
    plugin: Bases
    target: z.bases/Worldbuilding.base
    generated_release: true
    badge: Base
    role: correggere campi e connessioni
    action: Apri quando molte schede hanno mondo, uso, player_safe o connessioni da allineare.
    why: La riparazione piu veloce resta tabellare quando il problema e nei campi.
  - id: canon_control
    label: Controllo canone
    plugin: Dataview
    target: Hub/Controllo Canone.md
    badge: Canone
    role: stabilizzare verita e rumor
    action: Apri quando l'audit segnala provenienza, retcon o stato canonico incompleto.
    why: Il canone incompleto va deciso prima che condizioni timeline, segreti o materiale pubblico.
  - id: world_bible
    label: Bibbia del mondo
    plugin: Dataview
    target: Hub/Bibbia del Mondo.md
    badge: Bibbia
    role: consolidare tono e principi
    action: Apri quando mancano principi, contraddizioni centrali o promesse del mondo.
    why: Le decisioni fondative riducono correzioni ripetute sulle schede figlie.
  - id: depth_guide
    label: Worldbuilding profondo
    plugin: Dataview
    target: Risorse/Worldbuilding Profondo.md
    badge: Profondita
    role: aggiungere origine, costo e memoria
    action: Apri quando una scheda esiste ma non produce ancora conseguenze.
    why: La profondita serve solo se crea scelta, rischio, scoperta o memoria al tavolo.
  - id: fileclass_luogo
    label: Campi guidati
    plugin: Metadata Menu
    target: z.fileclass/luogo.md
    generated_release: true
    badge: Campi
    role: compilare proprieta coerenti
    action: Usa quando la riparazione richiede campi ordinati e menu coerenti.
    why: Le FileClass sono generate in release e non rientrano come sorgente tracciato.
contracts:
  dashboard_uses_runtime_views: true
  surfaces_must_resolve_to_source_or_generated_release_target: true
  generated_targets_must_stay_release_only: true
  audit_prioritizes_repair_before_listing: true
