id: obsidian_config
purpose: Configurazione Obsidian utente generata da YAML per mantenere leggibile il setup del vault.
version: 0.1.0
policy:
  source_of_truth: Questo file e la fonte umana per i JSON Obsidian controllati dal progetto.
  native_json_exceptions:
    - .obsidian/workspace.json
  delegated_generated_targets:
    - .obsidian/plugins/obsidian-meta-bind-plugin/data.json
  forbidden_json_targets:
    - .obsidian/**/manifest.json
  rule: 'I JSON dichiarati qui non si editano a mano: modificare YAML e rigenerare.'
configs:
  - target: .obsidian/app.json
    data:
      promptDelete: false
      alwaysUpdateLinks: true
      propertiesInDocument: hidden
      userIgnoreFilters:
        - SRD/
        - z.automazioni/
        - z.bases/
        - z.engine/
        - z.fileclass/
        - z.modelli/
  - target: .obsidian/appearance.json
    data:
      cssTheme: Minimal
      accentColor: ''
      enabledCssSnippets:
        - gdr-vault
  - target: .obsidian/community-plugins.json
    data:
      - obsidian-5e-statblocks
      - dataview
      - templater-obsidian
      - obsidian-meta-bind-plugin
      - js-engine
      - metadata-menu
      - callout-manager
      - obsidian-dice-roller
      - initiative-tracker
      - tabs
      - obsidian-tasks-plugin
  - target: .obsidian/core-plugins.json
    data:
      file-explorer: true
      global-search: true
      switcher: true
      graph: true
      backlink: true
      outgoing-link: true
      tag-pane: true
      footnotes: false
      properties: true
      page-preview: true
      daily-notes: true
      templates: true
      note-composer: true
      command-palette: true
      slash-command: false
      editor-status: true
      bookmarks: true
      markdown-importer: false
      zk-prefixer: false
      random-note: false
      outline: true
      word-count: true
      slides: false
      workspaces: true
      file-recovery: true
      publish: false
      sync: true
      bases: true
      webviewer: true
  - target: .obsidian/graph.json
    data:
      collapse-filter: true
      search: ''
      showTags: false
      showAttachments: false
      hideUnresolved: false
      showOrphans: true
      collapse-color-groups: true
      colorGroups: []
      collapse-display: true
      showArrow: false
      textFadeMultiplier: 0
      nodeSizeMultiplier: 1
      lineSizeMultiplier: 1
      collapse-forces: true
      centerStrength: 0.518713248970312
      repelStrength: 10
      linkStrength: 1
      linkDistance: 250
      scale: 0.25883865621816177
      close: false
