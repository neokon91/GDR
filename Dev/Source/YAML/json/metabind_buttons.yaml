id: metabind_buttons
purpose: Button Template Meta Bind essenziali per creazione note e azioni frontmatter.
version: 0.2.0
buttons:
  nuova_nota_rapida_z_modelli_nota_rapida_md:
    label: Nuova Nota Rapida
    style: primary
    actions:
      - type: templaterCreateNote
        templateFile: z.modelli/Nota Rapida.md
        folderPath: Inbox
        openNote: true
    id: nuova-nota-rapida-z-modelli-nota-rapida-md
  nuova_sessione_z_modelli_dm_sessione_md:
    label: Nuova Sessione
    style: primary
    actions:
      - type: templaterCreateNote
        templateFile: z.modelli/dm/Sessione.md
        folderPath: Mondi/Sessioni
        openNote: true
    id: nuova-sessione-z-modelli-dm-sessione-md
    fallback: '[[z.modelli/dm/Sessione]]'
  nuovo_incontro_z_modelli_dm_incontro_md:
    label: Nuovo Incontro
    style: primary
    actions:
      - type: templaterCreateNote
        templateFile: z.modelli/dm/Incontro.md
        folderPath: Mondi/Incontri
        openNote: true
    id: nuovo-incontro-z-modelli-dm-incontro-md
  nuovo_incontro_z_modelli_dm_incontro_md_default:
    label: Nuovo Incontro
    style: default
    actions:
      - type: templaterCreateNote
        templateFile: z.modelli/dm/Incontro.md
        folderPath: Mondi/Incontri
        openNote: true
    id: nuovo-incontro-z-modelli-dm-incontro-md-default
  nuovo_mondo_homebrew:
    label: Nuovo Mondo Homebrew
    required_for_release: true
    style: primary
    actions:
      - type: templaterCreateNote
        templateFile: z.modelli/wizard/Nuovo Mondo Homebrew.md
        folderPath: Mondi
        openNote: true
    id: nuovo-mondo-homebrew
    fallback: '[[z.modelli/wizard/Nuovo Mondo Homebrew]]'
  nuovo_oggetto_z_modelli_oggetto_md:
    label: Nuovo Oggetto
    style: primary
    actions:
      - type: templaterCreateNote
        templateFile: z.modelli/Oggetto.md
        folderPath: Mondi/Oggetti
        openNote: true
    id: nuovo-oggetto-z-modelli-oggetto-md
  marca_canonico:
    label: Marca Canonico
    required_for_release: true
    style: primary
    actions:
      - type: runTemplaterFile
        templateFile: z.modelli/azioni/Marca Canonico.md
    id: marca-canonico
    fallback: 'Azione manuale: impostare canonico: true'
  marca_rumor:
    label: Marca Rumor
    required_for_release: true
    style: default
    actions:
      - type: runTemplaterFile
        templateFile: z.modelli/azioni/Marca Rumor.md
    id: marca-rumor
    fallback: 'Azione manuale: impostare stato_canonico: rumor'
  archivia_nota:
    label: Archivia
    required_for_release: true
    style: destructive
    actions:
      - type: runTemplaterFile
        templateFile: z.modelli/azioni/Archivia.md
    id: archivia-nota
    fallback: 'Azione manuale: impostare stato: archiviata'
  applica_conseguenza:
    label: Applica Conseguenza
    required_for_release: true
    style: primary
    actions:
      - type: runTemplaterFile
        templateFile: z.modelli/azioni/Applica Conseguenza.md
    id: applica-conseguenza
    fallback: 'Azione manuale: registrare conseguenza, entita_impattate e propagazione_stato'
  registra_scelta_mondo:
    label: Registra Scelta Mondo
    required_for_release: true
    style: primary
    actions:
      - type: runTemplaterFile
        templateFile: z.modelli/azioni/Registra Scelta Mondo.md
    id: registra-scelta-mondo
    fallback: 'Azione manuale: registrare scelta, conseguenza, entita_impattate, applicata_a e propagazione_stato'
  avanza_clock:
    label: Avanza Clock
    required_for_release: true
    style: primary
    actions:
      - type: runTemplaterFile
        templateFile: z.modelli/azioni/Avanza Clock.md
    id: avanza-clock
    fallback: 'Azione manuale: aumentare pressione/progress_value'
  collega_sessione_attiva:
    label: Collega Sessione Attiva
    required_for_release: true
    style: default
    actions:
      - type: runTemplaterFile
        templateFile: z.modelli/azioni/Collega Sessione Attiva.md
    id: collega-sessione-attiva
    fallback: 'Azione manuale: aggiungere la sessione attiva nei collegamenti della nota'
  propaga_a_entita:
    label: Propaga A Entita
    required_for_release: true
    style: primary
    actions:
      - type: runTemplaterFile
        templateFile: z.modelli/azioni/Propaga A Entita.md
    id: propaga-a-entita
    fallback: 'Azione manuale: aggiornare propaga_a, entita_impattate e aggiornamenti_richiesti'
  wizard_conseguenza:
    label: Conseguenza
    required_for_release: true
    style: primary
    actions:
      - type: templaterCreateNote
        templateFile: z.modelli/wizard/Conseguenza.md
        folderPath: Inbox
        openNote: true
    id: wizard-conseguenza
    fallback: '[[z.modelli/wizard/Conseguenza]]'
contracts:
  button_ids_must_match_meta_bind_config: .obsidian/plugins/obsidian-meta-bind-plugin/data.json
  generated_syntax: '`BUTTON[{{ id }}]`'
