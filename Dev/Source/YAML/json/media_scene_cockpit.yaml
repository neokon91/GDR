id: media_scene_cockpit
purpose: Contratto operativo per trasformare Media Scene in cockpit compatto di cue audio, video e immagini per la sessione attiva.
version: 0.1.0
dashboard:
  page: Risorse/Media Scene.md
  workflow: media_scene
  required_runtime_views:
    - renderMediaSceneNow
    - renderMediaSceneReadiness
    - renderMediaSceneSessionCues
    - renderMediaSceneCueQueues
    - renderMediaSceneSurfaceLinks
  required_visible_sections:
    - Media Per La Sessione Attiva
    - Stato Cue
    - Cue Sessione
    - Archivio Cue
    - Superfici
    - Azioni
panels:
  now:
    runtime_view: renderMediaSceneNow
    promise: Decidere quale cue aprire ora o quale campo completare prima del tavolo.
    answers:
      - cue adesso
      - sessione attiva
      - timestamp
      - scena
      - gap
  readiness:
    runtime_view: renderMediaSceneReadiness
    promise: Misurare cue collegati, archivi pronti, timestamp e problemi pratici.
    answers:
      - sessione
      - cue collegati
      - pronti
      - timestamp
      - gap
      - archivio
  session:
    runtime_view: renderMediaSceneSessionCues
    promise: Mostrare solo media della sessione attiva, con scena e timestamp.
    answers:
      - media sessione
      - uso
      - scena
      - timestamp
      - stato
  queues:
    runtime_view: renderMediaSceneCueQueues
    promise: Tenere separati archivio cue e problemi da correggere senza query Dataview inline.
    answers:
      - cue pronti
      - audio
      - video
      - immagini
      - buchi
      - sintassi cue
  surfaces:
    runtime_view: renderMediaSceneSurfaceLinks
    promise: Aprire preparazione, live, materiali e campi media dal cockpit.
    answers:
      - durante il gioco
      - materiali al tavolo
      - preparazione sessione
      - vista giocatori
      - campi media
queues:
  - id: session_cues
    label: Cue Della Sessione
    table_columns:
      - Media
      - Uso
      - Scena
      - Timestamp
      - Stato
  - id: ready_cues
    label: Cue Pronti
    table_columns:
      - Media
      - Tipo
      - Campagna
      - Scena
      - Timestamp
  - id: cue_gaps
    label: Buchi Cue
    table_columns:
      - Media
      - Problema
      - Azione
patterns:
  - id: timestamp_link
    label: Link a un momento
    example: "[[file.mp3#t=70]]"
    use_when: devi aprire il media da un punto preciso
  - id: loop_clip
    label: Clip con loop
    example: "![[file.mp3#t=70,95&loop]]"
    use_when: vuoi tenere una clip breve durante una scena
  - id: sized_embed
    label: Embed dimensionato
    example: "![[reference.mp4|640x360]]"
    use_when: il video deve restare leggibile senza occupare tutto lo schermo
surfaces:
  - id: live_table
    label: Durante il Gioco
    plugin: Media Extended
    target: Hub/Durante il Gioco.md
    badge: Live
    role: aprire cue al tavolo
    action: Apri quando la sessione attiva passa alla scena corrente.
    why: Il cue serve se accompagna una scena, scelta o rivelazione concreta.
  - id: table_materials
    label: Materiali al tavolo
    plugin: Dataview
    target: Risorse/Materiali Al Tavolo.md
    badge: Tavolo
    role: collegare cue ai materiali
    action: Apri quando media, mappe, dispense e incontri devono stare nello stesso pacchetto.
    why: I media non devono diventare un archivio separato dal materiale giocabile.
  - id: preparation
    label: Preparazione sessione
    plugin: Dataview
    target: Risorse/Preparazione Sessione.md
    badge: Prep
    role: decidere se serve davvero
    action: Apri quando un cue non ha ancora scena, obiettivo o momento di ingresso.
    why: Un cue senza scena resta reference e non deve appesantire il tavolo.
  - id: player_view
    label: Vista giocatori
    plugin: Dataview
    target: Hub/Vista Giocatori.md
    badge: Player-safe
    role: controllare contenuto mostrabile
    action: Apri prima di condividere immagini, video o handout visuali.
    why: Un media pubblico non deve rivelare segreti DM o testo interno.
  - id: media_fields
    label: Campi media
    plugin: Metadata Menu
    target: z.fileclass/media.md
    generated_release: true
    badge: Campi
    role: compilare scena e timestamp
    action: Usa quando mancano uso, tono, scena, timestamp o stato.
    why: Le FileClass sono generate in release e non rientrano come sorgente tracciato.
contracts:
  dashboard_uses_runtime_views: true
  page_must_not_use_inline_dataview_queries: true
  media_without_scene_is_reference_not_table_material: true
  surfaces_must_resolve_to_source_or_generated_release_target: true
