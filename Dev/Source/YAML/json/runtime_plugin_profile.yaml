id: runtime_plugin_profile
purpose: Profilo runtime dei plugin essenziali letto dalle viste DataviewJS.
version: 0.1.0
sources:
  plugin_matrix: Dev/Source/YAML/json/plugin_matrix.yaml
  plugin_contracts: Dev/Source/YAML/canonical/plugin_contracts.yaml
output: z.automazioni/data/runtime/plugin_profile.json
defaults:
  support_plugins:
    - Dataview
    - Meta Bind
    - Templater
    - Tabs
    - Fantasy Statblocks
  manual_action: Abilita il plugin richiesto nei community plugin e riapri la nota.
core_plugins: []
manual_actions:
  Dataview: Abilita Dataview e JavaScript queries; se resta vuoto usa le tabelle Markdown sotto il blocco.
  Meta Bind: Abilita Meta Bind; se un pulsante non reagisce apri manualmente la pagina indicata dal titolo dell'azione.
  Templater: Abilita Templater; verifica che la cartella script sia z.automazioni/templater e riprova il wizard.
  Tasks: Abilita Tasks; in alternativa cerca manualmente le checklist marcate
  JS Engine: Se un blocco JS Engine non parte, usa le viste DataviewJS o il corpo nota Markdown della pagina.
  Metadata Menu: Se i campi guidati non compaiono, compila direttamente il frontmatter YAML della nota.
  Callout Manager: Se i callout non hanno stile custom, restano blockquote leggibili.
  Fantasy Statblocks: Abilita Fantasy Statblocks; usa comunque la scheda creatura come Markdown.
  Initiative Tracker: Abilita Initiative Tracker; se non parte, usa l'incontro come lista manuale di turni.
  Dice Roller: Se i tiri restano testo, tira manualmente usando la formula `dice:` mostrata nella tabella.
  Tabs: Se le tabs non renderizzano, leggi le sezioni in ordine dentro il blocco Markdown.
