id: runtime_exports
purpose: Contratto runtime essenziale per DataviewJS, Templater e viste core 5.5e/lore.
version: 0.1.0
bridge: z.engine/session_views.js
runtime_data: z.automazioni/data/runtime/runtime_exports.json
commonjs_runtime:
  purpose: Moduli CommonJS caricati da Templater o dal runtime; le dipendenze locali devono restare dichiarate qui.
  entrypoints:
    - key: helpers
      path: z.automazioni/helpers.js
    - key: meta_actions
      path: z.automazioni/meta_actions.js
    - key: continuity_state
      path: z.automazioni/continuity_state.js
    - key: dm
      path: z.automazioni/dm.js
    - key: pg
      path: z.automazioni/pg.js
    - key: session_lifecycle_actions
      path: z.automazioni/session_lifecycle_actions.js
    - key: template_router
      path: z.automazioni/template_router.js
    - key: wizard_layer
      path: z.automazioni/wizard_layer.js
  local_dependencies:
    - key: helper_paths
      path: z.automazioni/helper_paths.js
    - key: helper_prompts
      path: z.automazioni/helper_prompts.js
    - key: helper_yaml
      path: z.automazioni/helper_yaml.js
    - key: helper_notes
      path: z.automazioni/helper_notes.js
    - key: helper_note_core
      path: z.automazioni/helper_note_core.js
    - key: helper_note_selection
      path: z.automazioni/helper_note_selection.js
    - key: helper_session_links
      path: z.automazioni/helper_session_links.js
    - key: continuity_event_model
      path: z.automazioni/continuity_event_model.js
    - key: pg_mechanics
      path: z.automazioni/pg_mechanics.js
    - key: worldbuilding
      path: z.automazioni/worldbuilding.js
    - key: world_taxonomy
      path: z.automazioni/world_taxonomy.js
  data_dependencies:
    - key: srd_core
      path: z.automazioni/data/srd/core.json
    - key: srd_character_options
      path: z.automazioni/data/srd/opzioni_personaggio.json
    - key: plugin_profile
      path: z.automazioni/data/runtime/plugin_profile.json
    - key: session_context
      path: z.automazioni/data/runtime/session_context.json
runtime_modules:
  shared_context:
    - key: playability
      path: z.engine/session_playability.js
    - key: continuity
      path: z.engine/session_continuity.js
    - key: dnd
      path: z.engine/session_dnd.js
    - key: player
      path: z.engine/session_player.js
  session_context:
    - key: session
      path: z.engine/session_runtime.js
required_exports:
  - renderActiveSessionBanner
  - renderCombatReadiness
  - renderConsequenceCards
  - renderContinuityQueue
  - renderCreationFeedback
  - renderDnd55MaterialPipeline
  - renderContinuityChain
  - renderOnboardingReadiness
  - renderPlayabilityFamilyCards
  - renderPlayableOutline
  - renderPlayerView
  - renderPluginTroubleshooting
  - renderSessionAnchorCards
  - renderSessionLiveCards
  - renderSessionMaterialCards
  - renderSessionPostCards
  - renderTableCockpit
  - renderVaultReadiness
  - renderWorldImpact
