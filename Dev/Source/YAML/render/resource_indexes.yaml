id: resource_indexes
purpose: Indici semplici di risorse finali materializzati da YAML/Jinja, non mantenuti come note sorgente.
version: 0.1.0
indexes:
  - path: Risorse/Audio/Audio.md
    title: Audio
    categoria: risorsa
    tipo: audio
    guidance: 'Usa campi semplici nelle note audio quando servono: `uso`, `tono`, `campagna`, `scena`, `timestamp`, `stato`.'
    table:
      columns:
        - uso
        - tono
        - campagna
        - scena
        - timestamp
        - stato
      from: Risorse/Audio
      where: file.name != "Audio"
      sort: uso ASC, tono ASC, file.name ASC
  - path: Risorse/Video/Video.md
    title: Video
    categoria: risorsa
    tipo: video
    guidance: 'Usa campi semplici nelle note video quando servono: `uso`, `tono`, `campagna`, `scena`, `stato`, `timestamp`.'
    table:
      columns:
        - uso
        - tono
        - campagna
        - scena
        - timestamp
        - stato
      from: Risorse/Video
      where: file.name != "Video"
      sort: uso ASC, tono ASC, file.name ASC
  - path: Risorse/Immagini/Immagini.md
    title: Immagini
    categoria: risorsa
    tipo: immagini
    guidance: 'Usa campi semplici nelle note immagine quando servono: `uso`, `tono`, `campagna`, `luogo`, `stato`.'
    table:
      columns:
        - uso
        - tono
        - campagna
        - luogo
        - stato
      from: Risorse/Immagini
      where: file.name != "Immagini"
      sort: uso ASC, tono ASC, file.name ASC
  - path: Risorse/Dispense/Dispense.md
    title: Dispense
    body: ''
    list:
      from: Risorse/Dispense
      where: file.name != "Dispense"
      sort: file.name ASC
