id: template_blueprints
purpose: Blueprint per generare tutti i template operativi Markdown/Templater da TemplateFactory.
version: 0.3.0
blueprint_profiles:
  generic:
    jinja_template: ../jinja/generic_template.md.j2
    required_modules:
      - fields_core
      - plugin_bindings
      - sections
      - callouts
      - tabs
      - dataview_blocks
      - metabind_inputs
      - metabind_buttons
    sections:
      - identita
      - uso_al_tavolo
      - connessioni
      - propagazione
      - player_safe
      - controllo
    plugin_features:
      - tabs
      - callouts
      - templater
      - meta_bind
      - dataview
      - js_engine
      - tasks
  encounter:
    jinja_template: ../jinja/encounter_template.md.j2
    required_modules:
      - fields_core
      - plugin_bindings
      - sections
      - callouts
      - tabs
      - dataview_blocks
      - metabind_inputs
      - metabind_buttons
    sections:
      - statblock
      - encounter
      - terreno
      - obiettivo
      - complicazioni
      - ricompense
    plugin_features:
      - fantasy_statblocks
      - initiative_tracker
      - dice_roller
      - callout_manager
  session:
    jinja_template: ../jinja/session_template.md.j2
    required_modules:
      - fields_core
      - plugin_bindings
      - sections
      - callouts
      - tabs
      - dataview_blocks
      - metabind_inputs
      - metabind_buttons
    sections:
      - obiettivo
      - prima_scena
      - scelta
      - pressione
      - materiali
      - incontri
      - post_sessione
    plugin_features:
      - tabs
      - callouts
      - templater
      - meta_bind
      - dataview
      - js_engine
      - tasks
      - dice_roller
  action:
    jinja_template: ../jinja/action_template.md.j2
    required_modules: []
    sections: []
    plugin_features:
      - templater
blueprints:
  mondo:
    target_family:
      - mondo
    templater_entry: <% await tp.user.mondo(tp) %>
    template_title: Mondo
    world_impact: true
    lore_foundation: true
    depth_profiles:
      - mondo
      - cosmologia
      - magia
    output:
      folder: z.modelli
      files:
        - Mondo.md
    comparison_targets:
      - z.modelli/Mondo.md
    profile: generic
  world_entity:
    target_family:
      - entita worldbuilding
    templater_entry: <% await tp.user.world_entity(tp) %>
