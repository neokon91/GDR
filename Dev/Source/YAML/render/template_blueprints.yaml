outputs:
  markdown_templates: z.modelli
  fileclasses: z.fileclass
  bases: z.bases
jinja_contract:
  role: generatore_statico
  allowed:
    - scegliere sezioni da YAML
    - comporre callout, tabs, input Meta Bind e blocchi Dataview
    - emettere una sola entry Templater iniziale
    - emettere corpo nota leggibile
  forbidden:
    - richiedere Jinja nel vault utente
    - inserire logica Jinja da eseguire in Obsidian
    - duplicare responsabilita degli script runtime in z.automazioni
