  - path: Risorse/Worldbuilding Profondo.md
    title: Worldbuilding Profondo
    frontmatter:
      cssclasses:
        - indice
      categoria: risorsa
      tipo: guida
      stato: pronto
    body: |
      Questa guida serve quando vuoi che una scheda non sia solo utile al tavolo, ma diventi parte coerente dell'ambientazione.

      ## Tre Livelli

      | Livello | Serve a | Domanda |
      | --- | --- | --- |
      | Tavolo | Giocare la prossima scena | Cosa vedono, scelgono o rischiano i personaggi? |
      | Mondo | Rendere coerente l'ambientazione | Perché questa cosa esiste proprio qui? |
      | Storia | Far cambiare il mondo nel tempo | Da dove viene e cosa diventerà? |

      ## Domande Forti Per Ogni Entità

      | Entità | Domande di profondità |
      | --- | --- |
      | Mondo | Quali leggi, contraddizioni e credenze lo rendono diverso? |
      | Cultura | Cosa considera sacro, vergognoso, normale o mostruoso? |
      | Lingua | Quali parole rivelano il modo di pensare di chi la parla? |
      | Luogo | Come geografia, memoria e potere plasmano chi ci vive? |
      | Regno | Chi comanda davvero e quale mito giustifica il potere? |
      | Fazione | Quale bisogno storico l'ha creata e quale ferita la muove? |
      | Rotta | Chi la controlla, cosa trasporta e chi soffre se viene bloccata? |
      | Risorsa | Perché esiste proprio qui e quale potere dipende dalla sua scarsità? |
      | Mercato | Quali rotte concentra e quale prezzo sociale impone? |
      | Ricorrenza | Chi deve agire quando arriva questa data e cosa succede se non lo fa? |
      | Relazione | Come raccontano diversamente la stessa storia le due parti? |
      | Evento storico | Cosa e cambiato nella vita quotidiana dopo l'evento? |
      | Segreto | Chi conosce la verita, chi mente e chi si sbaglia sinceramente? |

      ## Quando Fermarsi

      Fermati appena la scheda produce almeno uno di questi effetti:

      - cambia il comportamento di un PNG;
      - spiega un conflitto;
      - crea una differenza visibile tra luoghi o culture;
      - genera una prossima mossa;
      - rivela una contraddizione;
      - mostra una dipendenza economica, rituale o stagionale;
      - lascia una domanda interessante per il tavolo.

      Il worldbuilding buono non riempie campi: crea conseguenze.

  - path: Risorse/Tabelle/Tabelle.md
    title: Tabelle
    frontmatter:
      cssclasses:
        - indice
      categoria: risorsa
      tipo: tabelle
      stato: pronto
    body: |
      ## Tiri Rapidi

      > [!scena] Al tavolo
      > - Complicazione: `dice: [[Risorse/Tabelle/Tabelle#^complicazioni]]`
      > - Umore PNG: `dice: [[Risorse/Tabelle/Tabelle#^umore-png]]`
      > - Bottino minore: `dice: [[Risorse/Tabelle/Tabelle#^bottino-minore]]`
      > - Dettaglio sensoriale: `dice: [[Risorse/Tabelle/Tabelle#^dettagli-sensoriali]]`
      > - Incontro viaggio: `dice: [[Risorse/Tabelle/Tabelle#^incontri-viaggio]]`
      > - Scoperta esagono: `dice: [[Risorse/Tabelle/Tabelle#^scoperte-esagono]]`
      > - Reazione fazione: `dice: [[Risorse/Tabelle/Tabelle#^reazioni-fazione]]`
      > - Conseguenza post-sessione: `dice: [[Risorse/Tabelle/Tabelle#^conseguenze-post-sessione]]`
      > - Festa locale: `dice: [[Risorse/Tabelle/Worldbuilding Generatori#^festa-locale]]`
      > - Rumor politico: `dice: [[Risorse/Tabelle/Worldbuilding Generatori#^rumor-politico]]`
      > - Problema commerciale: `dice: [[Risorse/Tabelle/Worldbuilding Generatori#^problema-commerciale]]`

      ## Complicazioni

      | d6 | Risultato |
      | ---: | --- |
      | 1 | Una minaccia avanza fuori scena. |
      | 2 | Qualcuno arriva nel momento peggiore. |
      | 3 | Una risorsa costa piu del previsto. |
      | 4 | Una informazione e vera ma incompleta. |
      | 5 | Un alleato chiede qualcosa subito. |
      | 6 | Il luogo cambia: rumore, folla, meteo, guardie o pericolo. |
      ^complicazioni

      ## Umore PNG

      | d6 | Risultato |
      | ---: | --- |
      | 1 | Diffidente, risponde poco. |
      | 2 | Nervoso, vuole chiudere in fretta. |
      | 3 | Curioso, fa domande prima di aiutare. |
      | 4 | Pragmatico, chiede uno scambio chiaro. |
      | 5 | Disponibile, ma ha un problema urgente. |
      | 6 | Espansivo, rivela un dettaglio non richiesto. |
      ^umore-png

      ## Bottino Minore

      | d8 | Risultato |
      | ---: | --- |
      | 1 | Monete, poche ma subito spendibili. |
      | 2 | Oggetto comune utile: corda, torcia, gesso, olio o utensile. |
      | 3 | Indizio scritto, simbolo, ricevuta o mappa incompleta. |
      | 4 | Chiave, sigillo, parola d'ordine o lasciapassare. |
      | 5 | Componente raro ma non prezioso. |
      | 6 | Favore promesso da una persona minore. |
      | 7 | Oggetto curioso che punta a una fazione o luogo. |
      | 8 | Consumabile magico minore o monouso. |
      ^bottino-minore

      ## Dettagli Sensoriali

      | d10 | Risultato |
      | ---: | --- |
      | 1 | Odore acre o dolciastro. |
      | 2 | Umidita, polvere o cenere sulle mani. |
      | 3 | Rumore ripetuto in lontananza. |
      | 4 | Luce tremolante, riflesso o ombra fuori posto. |
      | 5 | Traccia recente: impronte, graffi, briciole, sangue o fango. |
      | 6 | Temperatura diversa dal previsto. |
      | 7 | Silenzio improvviso. |
      | 8 | Segno di manutenzione, cura o abbandono. |
      | 9 | Piccolo animale, insetto o presenza naturale che reagisce. |
      | 10 | Dettaglio bello ma inquietante. |
      ^dettagli-sensoriali

      ## Incontri Viaggio

      | dice: 1d12 | Risultato |
      | --- | --- |
      | 1 | Traccia fresca di una creatura piu grande del previsto. |
      | 2 | Pattuglia o viaggiatori che hanno fretta e nascondono qualcosa. |
      | 3 | Ostacolo naturale: frana, piena, nebbia fitta o sentiero crollato. |
      | 4 | Segno di una fazione: sigillo, stendardo, cadavere, avviso o offerta. |
      | 5 | Riparo utile ma gia occupato. |
      | 6 | Mercante, pellegrino o messaggero con una notizia urgente. |
      | 7 | Scena inquietante senza nemico visibile. |
      | 8 | Opportunita di scorciatoia con costo chiaro. |
      | 9 | Conflitto tra due PNG minori. |
      | 10 | Risorsa rara: acqua pulita, erbe, carburante, cavalcatura o guida. |
      | 11 | Pericolo legato al meteo o al terreno. |
      | 12 | Indizio diretto verso missione, luogo o antagonista. |
      ^incontri-viaggio

      ## Scoperte Esagono

      | dice: 1d10 | Risultato |
      | --- | --- |
      | 1 | Rovina piccola con un simbolo leggibile. |
      | 2 | Punto panoramico che rivela un percorso o una minaccia. |
      | 3 | Fonte, guado, grotta o riparo sicuro. |
      | 4 | Confine conteso tra fazioni. |
      | 5 | Traccia di magia recente. |
      | 6 | Insediamento minore o accampamento provvisorio. |
      | 7 | Luogo sacro trascurato. |
      | 8 | Resti di uno scontro. |
      | 9 | Risorsa strategica contesa. |
      | 10 | Segreto del mondo collegato a una missione attiva. |
      ^scoperte-esagono

      ## Reazioni Fazione

      | dice: 2d6 | Risultato |
      | --- | --- |
      | 2-3 | Ostile: blocca, minaccia o pretende una concessione. |
      | 4-5 | Diffidente: concede poco e chiede garanzie. |
      | 6-8 | Pragmatica: tratta se il vantaggio e chiaro. |
      | 9-10 | Collaborativa: offre aiuto limitato. |
      | 11-12 | Interessata: propone alleanza, favore o informazione forte. |
      ^reazioni-fazione

      ## Conseguenze Post-Sessione

      | dice: 1d8 | Risultato |
      | --- | --- |
      | 1 | Una fazione interpreta male le azioni dei PG. |
      | 2 | Un PNG chiede protezione, pagamento o vendetta. |
      | 3 | Un luogo cambia stato: chiuso, occupato, danneggiato o rivelato. |
      | 4 | Una risorsa diventa scarsa. |
      | 5 | Un segreto trapela a chi non doveva saperlo. |
      | 6 | Una missione avanza anche senza intervento dei PG. |
      | 7 | Qualcuno offre una scorciatoia rischiosa. |
      | 8 | Una vittoria crea un nuovo obbligo. |
      ^conseguenze-post-sessione

      ## Archivio

      ```dataview
      LIST
      FROM "Risorse/Tabelle"
      WHERE file.name != "Tabelle"
      SORT file.name ASC
      ```

  - path: Risorse/Tabelle/Worldbuilding Generatori.md
    title: Worldbuilding Generatori
    frontmatter:
      cssclasses:
        - indice
      categoria: risorsa
      tipo: generatori worldbuilding
      stato: pronto
    body: |
      ## Tiri Rapidi

      > [!scena] Generatori
      > - Festa locale: `dice: [[Risorse/Tabelle/Worldbuilding Generatori#^festa-locale]]`
      > - Rumor politico: `dice: [[Risorse/Tabelle/Worldbuilding Generatori#^rumor-politico]]`
      > - Risorsa contesa: `dice: [[Risorse/Tabelle/Worldbuilding Generatori#^risorsa-contesa]]`
      > - Rovina con segreto: `dice: [[Risorse/Tabelle/Worldbuilding Generatori#^rovina-segreto]]`
      > - Conflitto culturale: `dice: [[Risorse/Tabelle/Worldbuilding Generatori#^conflitto-culturale]]`
      > - Evento storico ambiguo: `dice: [[Risorse/Tabelle/Worldbuilding Generatori#^evento-ambiguo]]`
      > - PNG radicato in una cultura: `dice: [[Risorse/Tabelle/Worldbuilding Generatori#^png-culturale]]`
      > - Problema economico o commerciale: `dice: [[Risorse/Tabelle/Worldbuilding Generatori#^problema-commerciale]]`
      > - Complicazione di viaggio: `dice: [[Risorse/Tabelle/Worldbuilding Generatori#^complicazione-viaggio]]`

      ## Festa Locale

      | dice: 1d8 | Risultato |
      | --- | --- |
      | 1 | Festa del primo raccolto, ma quest'anno manca la risorsa che la rende sacra. |
      | 2 | Processione di confine che non puo attraversare una rotta contesa. |
      | 3 | Giorno dei debiti perdonati, usato da una fazione per comprare consenso. |
      | 4 | Veglia dei morti senza nomi, con un tabù contro le domande dirette. |
      | 5 | Mercato stagionale dove ogni prezzo deve includere una promessa. |
      | 6 | Festa delle maschere in cui un PNG puo parlare senza ruolo sociale. |
      | 7 | Rito di chiusura dei ponti prima della stagione pericolosa. |
      | 8 | Celebrazione antica di cui due culture ricordano cause incompatibili. |
      ^festa-locale

      ## Rumor Politico

      | dice: 1d8 | Risultato |
      | --- | --- |
      | 1 | Un trattato e stato firmato con una clausola non letta in pubblico. |
      | 2 | Una fazione ha perso il controllo di una rotta ma finge il contrario. |
      | 3 | Il governante deve il trono a una risorsa che sta finendo. |
      | 4 | Un culto prepara una festa come prova generale di una rivolta. |
      | 5 | Due mercati usano monete diverse per sabotarsi. |
      | 6 | Una lingua minoritaria contiene il nome vero di un confine. |
      | 7 | Un matrimonio politico copre una cessione territoriale. |
      | 8 | I dazi aumentano per finanziare una guerra non dichiarata. |
      ^rumor-politico

      ## Risorsa Contesa

      | dice: 1d8 | Risultato |
      | --- | --- |
      | 1 | Sale rituale che conserva giuramenti e cadaveri. |
      | 2 | Legno che non brucia durante una stagione sacra. |
      | 3 | Pianta medicinale che cresce solo vicino a rovine proibite. |
      | 4 | Pietra da moneta riconosciuta da una sola cultura. |
      | 5 | Acqua ferrata necessaria a una tecnologia locale. |
      | 6 | Lana di una creatura regionale in migrazione. |
      | 7 | Inchiostro che rende visibili trattati cancellati. |
      | 8 | Vetro usato per chiavi, mappe e sigilli. |
      ^risorsa-contesa

      ## Rovina Con Segreto

      | dice: 1d8 | Risultato |
      | --- | --- |
      | 1 | Rovina ufficialmente vuota, ma ancora pagata da un mercato. |
      | 2 | Tempio precedente alla religione che lo rivendica. |
      | 3 | Fortezza costruita per difendersi da alleati attuali. |
      | 4 | Archivio dove le mappe mostrano rotte future. |
      | 5 | Necropoli con professioni incise al posto dei nomi. |
      | 6 | Ponte crollato che appare solo durante una festa. |
      | 7 | Officina di una tecnologia proibita ma indispensabile. |
      | 8 | Villaggio cancellato che parla ancora attraverso una superstizione. |
      ^rovina-segreto

      ## Conflitto Culturale

      | dice: 1d8 | Risultato |
      | --- | --- |
      | 1 | Una cultura vende cio che un'altra considera antenato. |
      | 2 | Una lingua sacra viene usata come gergo commerciale. |
      | 3 | Un tabù stagionale blocca una missione urgente. |
      | 4 | Due popoli hanno la stessa festa con colpevoli diversi. |
      | 5 | Una professione stimata in una regione e impura in un'altra. |
      | 6 | Una malattia viene vista come punizione o investitura. |
      | 7 | Una moneta porta un volto che una fazione vuole cancellare. |
      | 8 | Un cibo comune viola il rito funebre di un ospite. |
      ^conflitto-culturale

      ## Evento Storico Ambiguo

      | dice: 1d8 | Risultato |
      | --- | --- |
      | 1 | Fondazione ricordata come liberazione e come esilio. |
      | 2 | Pace ottenuta cedendo una rotta a un potere senza nome. |
      | 3 | Carestia risolta da una risorsa che oggi e proibita. |
      | 4 | Incoronazione avvenuta in una data impossibile. |
      | 5 | Battaglia vinta da entrambi i racconti ufficiali. |
      | 6 | Scoperta tecnologica attribuita alla cultura sbagliata. |
      | 7 | Epidemia cancellata dai registri ma rimasta nelle feste. |
      | 8 | Rovina nata prima dell'evento che avrebbe dovuto crearla. |
      ^evento-ambiguo

      ## PNG Radicato In Una Cultura

      | dice: 1d8 | Risultato |
      | --- | --- |
      | 1 | Esattore di pedaggi che conosce ogni tabù di viaggio. |
      | 2 | Guaritrice che cura solo chi rispetta una festa minore. |
      | 3 | Scriba bilingue che altera titoli e confini con le traduzioni. |
      | 4 | Cuoco di mercato che ascolta accordi da tutte le fazioni. |
      | 5 | Artigiana di una risorsa rituale ormai quasi introvabile. |
      | 6 | Pastore di creature regionali migratorie. |
      | 7 | Professionista disprezzato fuori dalla propria cultura ma essenziale. |
      | 8 | Pellegrino che porta una moneta non piu valida. |
      ^png-culturale

      ## Problema Economico O Commerciale

      | dice: 1d8 | Risultato |
      | --- | --- |
      | 1 | Rotta aperta sulla carta ma chiusa da pedaggi informali. |
      | 2 | Mercato pieno di merci senza compratori legittimi. |
      | 3 | Risorsa abbondante ma inutilizzabile fino a una data rituale. |
      | 4 | Controllore ufficiale senza forza per imporre i dazi. |
      | 5 | Moneta locale rifiutata fuori da una regione. |
      | 6 | Nodo commerciale dipendente da una creatura in migrazione. |
      | 7 | Contrabbando necessario alla sopravvivenza di un luogo. |
      | 8 | Fazione religiosa che tassa una risorsa profana. |
      ^problema-commerciale

      ## Complicazione Di Viaggio

      | dice: 1d8 | Risultato |
      | --- | --- |
      | 1 | Il percorso sicuro attraversa una festa in cui gli stranieri non parlano. |
      | 2 | Una rotta cambia stato mentre i PG sono in viaggio. |
      | 3 | Il pedaggio richiesto e una memoria, non moneta. |
      | 4 | Una mappa zoomabile mostra un pin che non esiste sul terreno. |
      | 5 | Il confine politico e diverso dal confine religioso. |
      | 6 | Una risorsa trasportata attira una fazione rivale. |
      | 7 | La stagione rende illegale il passaggio piu breve. |
      | 8 | Un mercato mobile e arrivato prima dei PG e ha comprato tutto. |
      ^complicazione-viaggio

  - path: Risorse/Controllo Vault.md
    title: Controllo Vault
    frontmatter:
      cssclasses:
        - dashboard
        - gdr-vault-control
      categoria: risorsa
      tipo: controllo
      stato: pronto
    body: |
      > [!regia] Controllo operativo
      > Questa vista indica cosa blocca un vault pulito e pronto al tavolo: code, stati incoerenti, date, materiale pronto ma incompleto.

      ## Priorita

      ```dataviewjs
      const gdr = await eval(await app.vault.adapter.read("z.engine/session_views.js"));
      await gdr.renderVaultControlNow(dv);
      ```

