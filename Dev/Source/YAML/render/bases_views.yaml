          pubblico:
            displayName: Pubblico
          canonico:
            displayName: Canonico
          fonti:
            displayName: Fonti
          versioni_contrapposte:
            displayName: Versioni contrapposte
          memoria_pubblica:
            displayName: Memoria pubblica
          pressione:
            displayName: Pressione
          prossima_mossa:
            displayName: Prossima mossa
          connessioni:
            displayName: Connessioni
          soggetti:
            displayName: Soggetti
          intensita:
