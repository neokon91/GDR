id: bases_views
purpose: Contratti per viste Bases generate o mantenute da TemplateFactory.
version: 0.1.0
views:
  worldbuilding_codex:
    file: z.bases/Worldbuilding.base
    source_folders:
      - Mondi
      - Mondi/Culture
      - Mondi/Religioni
      - Mondi/Societa
      - Mondi/Cosmologia
      - Mondi/Conflitti
      - Mondi/Creature
      - Mondi/Lingue
      - Mondi/Mercati
      - Mondi/Relazioni
      - Mondi/Risorse
      - Mondi/Rotte
      - Mondi/Timeline
    required_fields:
      - nome
      - categoria
      - tipo
      - stato
      - mondo
      - stato_canonico
      - grado_certezza
      - fonti
      - versioni_contrapposte
      - uso_al_tavolo
      - player_safe
      - connessioni
    formulas:
      - prontezza
  luoghi:
    file: z.bases/Luoghi.base
    source_folders:
      - Mondi/Luoghi
    required_fields:
      - nome
      - stato
      - tipo
      - mondo
      - scala_geografica
      - luogo_padre
      - memoria_del_territorio
      - tracce_passato
      - cultura_dominante
      - autorita
      - pericolo
      - pressione
      - fazioni
      - missioni
      - connessioni
  missioni:
    file: z.bases/Missioni.base
    source_folders:
      - Mondi/Missioni
    required_fields:
      - nome
      - stato
      - tipo
      - mondo
      - pressione
      - prossima_mossa
      - campagne
      - luoghi
      - fazioni
      - ricompense
  png:
    file: z.bases/PNG.base
    source_folders:
      - Mondi/Personaggi
    required_fields:
      - nome
      - stato
      - luogo
      - fazioni
      - pressione
      - prossima_mossa
      - missioni
  sessions:
    file: z.bases/Incontri.base
    source_folders:
      - Mondi/Incontri
    required_fields:
      - nome
      - stato
      - tipo
      - luogo
      - pericolo
      - creature
      - personaggi
      - sessioni
      - ricompense
contracts:
  base_fields_must_exist_in_fields_core_or_domain_module: true
  formulas_should_remain_lightweight: true
generated_bases:
  readme: '# z.bases


    Viste Bases leggere per correggere frontmatter e relazioni senza duplicare vista.


    | Base | Uso |

    | --- | --- |

    | `Worldbuilding.base` | Mondo, cultura, cosmologia e note lore fondamentali. |

    | `Luoghi.base` | Regioni, insediamenti e siti di interesse. |

    | `Fazioni.base` | Poteri, culti e organizzazioni. |

    | `Missioni.base` | Obiettivi e pressioni giocabili. |

    | `PNG.base` | Personaggi non giocanti in uso. |

    | `Incontri.base` | Incontri e pericoli 5.5e. |


    Regola: Bases corregge dati; Dataview/JS mostra feedback; Jinja/Templater crea note.'
  files:
    sessions:
      file: z.bases/Incontri.base
      content:
        filters:
          and:
            - file.folder == "Mondi/Incontri"
            - file.name != "Incontri"
        properties:
          nome:
            displayName: Nome
          stato:
            displayName: Stato
          tipo:
            displayName: Tipo
          luogo:
            displayName: Luogo
          pericolo:
            displayName: Pericolo
          pressione:
            displayName: Pressione
          creature:
            displayName: Creature
          personaggi:
            displayName: Personaggi
          sessioni:
            displayName: Sessioni
          ricompense:
            displayName: Ricompense
          gancio:
            displayName: Gancio
          uso_al_tavolo:
            displayName: Uso al tavolo
          prossima_mossa:
            displayName: Prossima mossa
          entita_impattate:
            displayName: Entita impattate
          propaga_a:
            displayName: Propaga a
          conseguenze:
            displayName: Conseguenze
        views:
          - type: table
            name: Pronti
            filters:
              and:
                - stato != "archiviata"
            order:
              - nome
              - stato
              - tipo
              - luogo
              - pericolo
              - pressione
              - creature
              - personaggi
              - gancio
              - uso_al_tavolo
            sort:
              - property: stato
                direction: ASC
              - property: pericolo
                direction: DESC
          - type: table
            name: Pericolo alto
            filters:
              and:
                - stato != "archiviata"
                - pericolo
            order:
              - nome
              - stato
              - pericolo
              - pressione
              - luogo
              - creature
              - prossima_mossa
              - entita_impattate
              - propaga_a
              - conseguenze
            sort:
              - property: pericolo
                direction: DESC
              - property: pressione
                direction: DESC
          - type: table
            name: Per sessione
            filters:
              and:
                - stato != "archiviata"
            order:
              - nome
              - stato
              - sessioni
              - luogo
              - personaggi
              - ricompense
              - uso_al_tavolo
            sort:
              - property: sessioni
                direction: ASC
              - property: stato
                direction: ASC
          - type: table
            name: Da completare
            filters:
              or:
                - '!creature'
                - '!luogo'
                - stato == "bozza"
            order:
              - nome
              - stato
              - tipo
              - luogo
              - creature
              - prossima_mossa
              - entita_impattate
              - propaga_a
              - conseguenze
            sort:
              - property: stato
                direction: ASC
              - property: nome
                direction: ASC
    luoghi:
      file: z.bases/Luoghi.base
      content:
        filters:
          and:
            - file.folder == "Mondi/Luoghi"
            - file.name != "Luoghi"
        properties:
          nome:
            displayName: Nome
          stato:
            displayName: Stato
          tipo:
            displayName: Tipo
          tipologia:
            displayName: Tipologia
          mondo:
            displayName: Mondo
          scala_geografica:
            displayName: Scala geografica
          luogo_padre:
            displayName: Luogo padre
          memoria_del_territorio:
            displayName: Memoria territorio
          tracce_passato:
            displayName: Tracce passato
          funzione_storica:
            displayName: Funzione storica
          funzione_attuale:
            displayName: Funzione attuale
          abitanti:
            displayName: Abitanti
          cultura_dominante:
            displayName: Cultura dominante
          autorita:
            displayName: Autorita
          pericolo:
            displayName: Pericolo
          pressione:
            displayName: Pressione
          origine:
            displayName: Origine
          tensione:
            displayName: Tensione
          bisogno_quotidiano:
            displayName: Bisogno quotidiano
          costo_sociale:
            displayName: Costo sociale
          evoluzione_se_ignorata:
            displayName: Evoluzione se ignorata
          governante:
            displayName: Governante
          fazioni:
            displayName: Fazioni
          personaggi:
            displayName: Personaggi
          missioni:
            displayName: Missioni
          promessa_al_tavolo:
            displayName: Promessa al tavolo
          prossima_mossa:
            displayName: Prossima mossa
          connessioni:
            displayName: Connessioni
        views:
          - type: table
            name: Attivi
            filters:
              and:
                - stato != "archiviata"
            order:
              - nome
              - stato
              - tipo
              - tipologia
              - scala_geografica
              - pericolo
              - pressione
              - luogo_padre
              - cultura_dominante
              - governante
            sort:
              - property: pericolo
                direction: DESC
              - property: nome
                direction: ASC
          - type: table
            name: Pericolosi
            filters:
              and:
                - stato != "archiviata"
                - pericolo
            order:
              - nome
              - stato
              - tipo
              - pericolo
              - pressione
              - origine
              - tensione
              - bisogno_quotidiano
              - prossima_mossa
              - missioni
              - personaggi
            sort:
              - property: pericolo
                direction: DESC
              - property: pressione
                direction: DESC
          - type: table
            name: Per mondo
            filters:
              and:
                - stato != "archiviata"
            order:
              - nome
              - mondo
              - tipo
              - scala_geografica
              - luogo_padre
              - memoria_del_territorio
              - tracce_passato
              - fazioni
              - governante
              - promessa_al_tavolo
            sort:
              - property: mondo
                direction: ASC
              - property: luogo_padre
                direction: ASC
              - property: nome
                direction: ASC
          - type: table
            name: Gerarchia
            order:
              - nome
              - tipo
              - stato
              - scala_geografica
              - luogo_padre
              - mondo
            sort:
              - property: luogo_padre
                direction: ASC
              - property: nome
                direction: ASC
    missioni:
      file: z.bases/Missioni.base
      content:
        filters:
          and:
            - file.folder == "Mondi/Missioni"
            - file.name != "Missioni"
        formulas:
          stato_operativo: if(stato == "archiviata" || stato == "completata" || stato == "fallita", "chiusa", if(mondo, if(prossima_mossa, if(pressione, "pressione", "ok"), "manca mossa"), "manca mondo"))
        properties:
          formula.stato_operativo:
            displayName: Stato operativo
          nome:
            displayName: Nome
          stato:
            displayName: Stato
          tipo:
            displayName: Tipo
          mondo:
            displayName: Mondo
          committente:
            displayName: Committente
          pressione:
            displayName: Pressione
          origine:
            displayName: Origine
          causa:
            displayName: Causa
          tensione:
            displayName: Tensione
          costo_sociale:
            displayName: Costo sociale
          evoluzione_se_ignorata:
            displayName: Evoluzione se ignorata
          scadenza_mondo:
            displayName: Scadenza
          prossima_mossa:
            displayName: Prossima mossa
          connessioni:
            displayName: Connessioni
          campagna:
            displayName: Campagna
          campagne:
            displayName: Campagne
          luoghi:
            displayName: Luoghi
          fazioni:
            displayName: Fazioni
          ricompense:
            displayName: Ricompense
          entita_impattate:
            displayName: Entita impattate
          propaga_a:
            displayName: Propaga a
        views:
          - type: table
            name: Aperte
            limit: 30
            groupBy:
              property: formula.stato_operativo
              direction: ASC
            filters:
              and:
                - stato != "archiviata"
                - stato != "completata"
                - stato != "fallita"
            order:
              - nome
              - stato
              - formula.stato_operativo
              - tipo
              - pressione
              - origine
              - causa
              - tensione
              - scadenza_mondo
              - prossima_mossa
              - mondo
              - committente
            sort:
              - property: pressione
                direction: DESC
              - property: scadenza_mondo
                direction: ASC
          - type: table
            name: Sotto pressione
            limit: 20
            groupBy:
              property: formula.stato_operativo
              direction: ASC
            filters:
              and:
                - stato != "archiviata"
                - stato != "completata"
                - stato != "fallita"
                - pressione
            order:
              - nome
              - stato
              - formula.stato_operativo
              - pressione
              - scadenza_mondo
              - prossima_mossa
              - entita_impattate
              - propaga_a
              - fazioni
              - luoghi
            sort:
              - property: pressione
                direction: DESC
              - property: prossima_mossa
                direction: ASC
          - type: table
            name: Per campagna
            filters:
              and:
                - stato != "archiviata"
            order:
              - nome
              - stato
              - formula.stato_operativo
              - campagna
              - campagne
              - mondo
              - committente
              - luoghi
              - fazioni
            sort:
              - property: campagna
                direction: ASC
              - property: stato
                direction: ASC
              - property: nome
                direction: ASC
          - type: table
            name: Chiusura
            filters:
              or:
                - stato == "completata"
                - stato == "fallita"
                - stato == "archiviata"
            order:
              - nome
              - stato
              - formula.stato_operativo
              - tipo
              - mondo
              - ricompense
              - prossima_mossa
            sort:
              - property: stato
                direction: ASC
              - property: nome
                direction: ASC
          - type: table
            name: Tutte
            order:
              - nome
              - stato
              - formula.stato_operativo
              - tipo
              - mondo
              - pressione
              - scadenza_mondo
              - prossima_mossa
            sort:
              - property: stato
                direction: ASC
              - property: nome
                direction: ASC
    png:
      file: z.bases/PNG.base
      content:
        filters:
          and:
            - file.folder == "Mondi/Personaggi"
            - tipo == "png"
        properties:
          nome:
            displayName: Nome
          stato:
            displayName: Stato
          ruolo:
