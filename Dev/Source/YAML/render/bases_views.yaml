          luoghi_sacri:
            displayName: Luoghi sacri
          divinita:
            displayName: Divinita
          religioni_collegate:
            displayName: Religioni collegate
          culture_collegate:
            displayName: Culture collegate
        views:
          - type: table
            name: Codex vivo
            limit: 40
