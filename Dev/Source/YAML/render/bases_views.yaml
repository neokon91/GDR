            name: Schede rapide
            filters:
              and:
                - stato != "archiviata"
            order:
              - nome
              - ruolo
              - luogo
              - fazioni
              - prossima_mossa
            cardSize: 240
    worldbuilding_codex:
      file: z.bases/Worldbuilding.base
      content:
        filters:
          or:
            - file.folder == "Mondi"
            - file.folder == "Mondi/Culture"
            - file.folder == "Mondi/Religioni"
            - file.folder == "Mondi/Societa"
            - file.folder == "Mondi/Cosmologia"
            - file.folder == "Mondi/Conflitti"
