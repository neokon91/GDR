            - file.folder == "Mondi/Risorse"
            - file.folder == "Mondi/Rotte"
            - file.folder == "Mondi/Timeline"
        formulas:
          prontezza: if(stato == "archiviata", "archivio", if(mondo, if(stato_canonico, if(connessioni, "codex collegato", "manca connessioni"), "manca canone"), "manca mondo"))
        properties:
          formula.prontezza:
            displayName: Prontezza
          nome:
            displayName: Nome
          categoria:
            displayName: Categoria
          tipo:
            displayName: Tipo
          famiglia_creativa:
            displayName: Famiglia creativa
          stato:
            displayName: Stato
          stato_canonico:
            displayName: Stato canonico
          grado_certezza:
            displayName: Grado certezza
          mondo:
