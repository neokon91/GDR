              - formula.prontezza
              - connessioni
              - fonti
              - versioni_contrapposte
              - propaga_a
              - luoghi
              - fazioni
              - relazioni
            sort:
              - property: mondo
                direction: ASC
              - property: categoria
                direction: ASC
          - type: table
            name: Pubblicabili
            filters:
              and:
                - file.name != "Culture"
                - file.name != "Religioni"
                - file.name != "Societa"
