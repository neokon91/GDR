id: source_pipeline
purpose: Pipeline unica YAML/Jinja/codice utile -> output richiesti dal vault Obsidian.
version: 0.1.0
policy:
  source_roots:
    - Dev/Source/YAML
    - Dev/Source/Jinja
    - Dev/Tools
  runtime_output_roots:
    - z.automazioni
    - z.engine
  rule: Per sviluppo umano partire da YAML/Jinja e generatori TemplateFactory; JSON, template materializzati e runtime Obsidian sono output del vault.
  no_repo_output_roots:
    - dist
    - z.modelli
    - z.bases
    - z.fileclass
    - Dev/Build/template-previews
steps:
  srd_character_data:
    purpose: Converte YAML SRD personaggio in JSON runtime per PG.
    sources:
      - Dev/Source/YAML/canonical/srd_character_build.yaml
    outputs:
      - z.automazioni/data/srd/core.json
      - z.automazioni/data/srd/opzioni_personaggio.json
    render:
      - node
      - Dev/Tools/node-legacy/import_srd_character_data.js
    check:
      - node
      - Dev/Tools/node-legacy/check_srd_character_data.js
  obsidian_config:
    purpose: Genera i JSON Obsidian controllati dal progetto.
    sources:
      - Dev/Source/YAML/json/obsidian_config.yaml
    outputs:
      - .obsidian/**/*.json
    render:
      - python3
      - Dev/Tools/python/render_obsidian_config.py
    check:
      - python3
      - Dev/Tools/python/render_obsidian_config.py
      - --check
  plugin_matrix:
    purpose: Genera la matrice operativa dei plugin.
    sources:
      - Dev/Source/YAML/json/plugin_matrix.yaml
    outputs:
      - Dev/plugin_matrix.json
    render:
      - python3
      - Dev/Tools/python/render_plugin_matrix.py
    check:
      - python3
      - Dev/Tools/python/render_plugin_matrix.py
      - --check
  obsidian_plugin_bundles:
    purpose: Verifica che plugin Obsidian siano dichiarati da YAML senza bundle terzi tracciati nella repo.
    sources:
      - Dev/Source/YAML/quality/obsidian_plugin_bundle_contract.yaml
      - Dev/Source/YAML/json/obsidian_config.yaml
      - Dev/Source/YAML/json/plugin_matrix.yaml
      - Dev/Source/YAML/canonical/plugin_contracts.yaml
      - .obsidian/snippets
      - Dev/Tools/node-legacy/check_obsidian_plugin_bundles.js
    outputs:
      - memoria
    render:
      - node
      - Dev/Tools/node-legacy/check_obsidian_plugin_bundles.js
    check:
      - node
      - Dev/Tools/node-legacy/check_obsidian_plugin_bundles.js
  entity_model_contract:
    purpose: Verifica il catalogo YAML delle categorie entita e impedisce il ritorno della nota lunga in Risorse.
    sources:
      - Dev/Source/YAML/canonical/entity_model.yaml
      - Dev/Source/YAML/canonical/fields_core.yaml
      - Dev/Source/YAML/canonical/frontmatter_profiles.yaml
      - Dev/Source/YAML/canonical/validation_contract.yaml
      - Dev/Tools/node-legacy/check_entity_model.js
    outputs:
      - memoria
    render:
      - node
      - Dev/Tools/node-legacy/check_entity_model.js
    check:
      - node
      - Dev/Tools/node-legacy/check_entity_model.js
  templater_wrappers:
    purpose: Genera i wrapper richiesti da Templater nella user_scripts_folder.
    sources:
      - Dev/Source/YAML/render/templater_wrappers.yaml
    outputs:
      - z.automazioni/templater/*.js
    render:
      - python3
      - Dev/Tools/python/render_templater_wrappers.py
    check:
      - python3
      - Dev/Tools/python/render_templater_wrappers.py
      - --check
  metabind_config:
    purpose: Assembla la configurazione Meta Bind da impostazioni, input e pulsanti YAML.
    sources:
      - Dev/Source/YAML/json/metabind_config.yaml
      - Dev/Source/YAML/json/metabind_inputs.yaml
      - Dev/Source/YAML/json/metabind_buttons.yaml
    outputs:
      - .obsidian/plugins/obsidian-meta-bind-plugin/data.json
    render:
      - python3
      - Dev/Tools/python/render_metabind_config.py
    check:
      - python3
      - Dev/Tools/python/render_metabind_config.py
      - --check
  workflow_data:
    purpose: Genera quick_actions.json da workflows.yaml.
    sources:
      - Dev/Source/YAML/json/workflows.yaml
    outputs:
      - z.automazioni/data/workflows/quick_actions.json
    render:
      - node
      - Dev/Tools/node-legacy/generate_workflow_data.js
    check:
      - node
      - Dev/Tools/node-legacy/generate_workflow_data.js
      - --check
  runtime_plugin_profile:
    purpose: Genera il profilo runtime dei plugin usato da troubleshooting, workflow fallback e readiness.
    sources:
      - Dev/Source/YAML/json/runtime_plugin_profile.yaml
      - Dev/Source/YAML/json/plugin_matrix.yaml
      - Dev/Source/YAML/canonical/plugin_contracts.yaml
      - Dev/Source/YAML/json/workflows.yaml
      - Dev/Tools/python/render_runtime_plugin_profile.py
    outputs:
      - z.automazioni/data/runtime/plugin_profile.json
    render:
      - python3
      - Dev/Tools/python/render_runtime_plugin_profile.py
    check:
      - python3
      - Dev/Tools/python/render_runtime_plugin_profile.py
      - --check
  bacheche:
    purpose: Genera le bacheche Kanban operative del vault finale da YAML/Jinja.
    sources:
      - Dev/Source/YAML/render/bacheche.yaml
      - Dev/Source/Jinja/bacheca_kanban.md.j2
