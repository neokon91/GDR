id: source_pipeline
purpose: Pipeline essenziale YAML/Jinja/JS -> output Obsidian necessari al vault.
version: 0.2.0
policy:
  source_roots:
    - Dev/Source/YAML
    - Dev/Source/Jinja
    - Dev/Source/JS
    - Dev/Tools
  runtime_output_roots:
    - z.automazioni
    - z.engine
  rule: Il sorgente resta in YAML/Jinja/JS essenziale; output Obsidian e runtime sono generati.
  no_repo_output_roots:
    - dist
    - z.modelli
    - z.bases
    - z.fileclass
    - Dev/Build/template-previews
  mode: render_only
steps:
  srd_character_data:
    purpose: Converte YAML SRD personaggio in JSON runtime per PG.
    sources:
      - Dev/Source/YAML/canonical/srd_character_build.yaml
      - Dev/Tools/python/render_srd_character_data.py
    outputs:
      - z.automazioni/data/srd/core.json
      - z.automazioni/data/srd/opzioni_personaggio.json
    render:
      - python3
      - Dev/Tools/python/render_srd_character_data.py
  metadata_surfaces:
    purpose: Genera fileClass e Bases leggere da profili frontmatter.
    release_only: true
    sources:
      - Dev/Source/YAML/canonical/frontmatter_profiles.yaml
      - Dev/Source/YAML/render/bases_views.yaml
      - Dev/Tools/python/render_metadata_surfaces.py
    outputs:
      - z.fileclass/**/*.md
      - z.bases/**/*.base
      - z.bases/README.md
    render:
      - python3
      - Dev/Tools/python/render_metadata_surfaces.py
  obsidian_config:
    purpose: Genera i JSON Obsidian controllati dal progetto.
    sources:
      - Dev/Source/YAML/json/obsidian_config.yaml
      - Dev/Tools/python/render_obsidian_config.py
    outputs:
      - .obsidian/**/*.json
    render:
      - python3
      - Dev/Tools/python/render_obsidian_config.py
  templater_wrappers:
    purpose: Genera i wrapper richiesti da Templater nella user_scripts_folder.
    sources:
      - Dev/Source/YAML/render/templater_wrappers.yaml
      - Dev/Tools/python/render_templater_wrappers.py
    outputs:
      - z.automazioni/templater/*.js
    render:
      - python3
      - Dev/Tools/python/render_templater_wrappers.py
  metabind_config:
    purpose: Assembla la configurazione Meta Bind da impostazioni, input e pulsanti YAML.
    sources:
      - Dev/Source/YAML/json/metabind_config.yaml
      - Dev/Source/YAML/json/metabind_inputs.yaml
      - Dev/Source/YAML/json/metabind_buttons.yaml
      - Dev/Tools/python/render_metabind_config.py
    outputs:
      - .obsidian/plugins/obsidian-meta-bind-plugin/data.json
    render:
      - python3
      - Dev/Tools/python/render_metabind_config.py
  runtime_plugin_profile:
    purpose: Genera il profilo runtime dei plugin essenziali.
    sources:
      - Dev/Source/YAML/json/runtime_plugin_profile.yaml
      - Dev/Source/YAML/json/plugin_matrix.yaml
      - Dev/Source/YAML/canonical/plugin_contracts.yaml
      - Dev/Tools/python/render_runtime_plugin_profile.py
    outputs:
      - z.automazioni/data/runtime/plugin_profile.json
    render:
      - python3
      - Dev/Tools/python/render_runtime_plugin_profile.py
  session_context_contract:
    purpose: Genera il contratto JSON letto da Templater e runtime worldbuilding.
    sources:
      - Dev/Source/YAML/canonical/runtime_profiles.yaml
      - Dev/Source/YAML/canonical/template_router.yaml
      - Dev/Source/YAML/canonical/ontology/classes.yaml
      - Dev/Source/YAML/canonical/ontology/relations.yaml
      - Dev/Source/YAML/canonical/ontology/projections.yaml
      - Dev/Source/YAML/canonical/fields_core.yaml
      - Dev/Source/YAML/canonical/entity_model.yaml
      - Dev/Source/YAML/canonical/validation_contract.yaml
      - Dev/Source/YAML/render/template_blueprints.yaml
      - Dev/Tools/python/render_session_context_contract.py
    outputs:
      - z.automazioni/data/runtime/session_context.json
    render:
      - python3
      - Dev/Tools/python/render_session_context_contract.py
  runtime_exports_contract:
    purpose: Genera il manifest runtime per bridge z.engine e dipendenze CommonJS Templater.
    sources:
      - Dev/Source/YAML/json/runtime_exports.yaml
      - Dev/Source/JS/z.automazioni/dm.js
      - Dev/Source/JS/z.automazioni/helper_paths.js
      - Dev/Source/JS/z.automazioni/template_router.js
      - Dev/Source/JS/z.automazioni/wizard_layer.js
      - Dev/Source/JS/z.automazioni/worldbuilding.js
      - Dev/Source/JS/z.automazioni/world_taxonomy.js
      - z.automazioni/data/runtime/plugin_profile.json
      - z.automazioni/data/runtime/session_context.json
      - Dev/Source/JS/z.engine/session_playability.js
      - Dev/Source/JS/z.engine/session_continuity.js
      - Dev/Source/JS/z.engine/session_dnd.js
      - Dev/Source/JS/z.engine/session_player.js
      - Dev/Source/JS/z.engine/session_runtime.js
      - Dev/Tools/python/render_runtime_exports.py
    outputs:
      - z.automazioni/data/runtime/runtime_exports.json
    render:
      - python3
      - Dev/Tools/python/render_runtime_exports.py
