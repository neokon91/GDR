arcani:
- numero: '0'
  nome: Il Matto
  parola_chiave: Inizio
  ruolo: Chiamata all’avventura. La nascita della coscienza libera.
  ombra: Impulsività cieca
- numero: '1'
  nome: Il Bagatto
  parola_chiave: Potenziale creativo
  ruolo: Manifestazione dell’intento attraverso il linguaggio e la mente.
  ombra: Manipolazione mentale
- numero: '2'
  nome: La Papessa
  parola_chiave: Intuizione profonda
  ruolo: Contatto con l’inconscio e le memorie originarie.
  ombra: Chiusura emotiva
- numero: '3'
  nome: L’Imperatrice
  parola_chiave: Fertilità e sicurezza
  ruolo: Manifestazione della vita, del corpo, della materia fertile.
  ombra: Attaccamento materiale
- numero: '4'
  nome: L’Imperatore
  parola_chiave: Struttura
  ruolo: Definizione delle leggi e dei confini. Sovranità dell’Io.
  ombra: Rigidità, dominio
- numero: '5'
  nome: Il Papa
  parola_chiave: Guida interiore
  ruolo: Trasmissione spirituale attraverso l’ordine e il rito.
  ombra: Dogmatismo
- numero: '6'
  nome: Gli Amanti
  parola_chiave: Scelta relazionale
  ruolo: Confronto tra polarità, fusione, attrazione e libertà.
  ombra: Indecisione, dipendenza
- numero: '7'
  nome: Il Carro
  parola_chiave: Vittoria personale
  ruolo: Avanzare con volontà e direzione. Ma verso dove?
  ombra: Dominio egotico
- numero: '8'
  nome: La Giustizia
  parola_chiave: Equilibrio
  ruolo: Giudizio interiore e cosmico. Karma e armonia.
  ombra: Soffocamento etico
- numero: '9'
  nome: L’Eremita
  parola_chiave: Introspezione
  ruolo: Il ritiro che precede la rivelazione.
  ombra: Isolamento sterile
- numero: '10'
  nome: La Ruota della Fortuna
  parola_chiave: Cambiamento
  ruolo: Ciclo del destino e accettazione del mutamento.
  ombra: Fatalismo
- numero: '11'
  nome: La Forza
  parola_chiave: Dominio interiore
  ruolo: La tenerezza come vera forza.
  ombra: Soppressione
- numero: '12'
  nome: L’Appeso
  parola_chiave: Sospensione
  ruolo: Abbandono dell’ego, apertura al flusso.
  ombra: Rinuncia sterile
- numero: '13'
  nome: La Morte
  parola_chiave: Fine e Rinascita
  ruolo: Trasformazione radicale. Abbandono del vecchio sé.
  ombra: Paura del cambiamento
- numero: '14'
  nome: La Temperanza
  parola_chiave: Sintesi
  ruolo: Alchimia dei contrari. Riconciliazione interiore.
  ombra: Conciliazione forzata
- numero: '15'
  nome: Il Diavolo
  parola_chiave: Ossessione
  ruolo: Confronto con i desideri più profondi e l’ombra.
  ombra: Illusione di potere
- numero: '16'
  nome: La Torre
  parola_chiave: Crollo
  ruolo: Rottura delle illusioni. Verità rivelata.
  ombra: Distruzione caotica
- numero: '17'
  nome: La Stella
  parola_chiave: Ispirazione
  ruolo: Visione superiore. Guarigione cosmica.
  ombra: Utopia irrealizzabile
- numero: '18'
  nome: La Luna
  parola_chiave: Mistero
  ruolo: Navigare nel mondo onirico e intuitivo.
  ombra: Inganno, illusione
- numero: '19'
  nome: Il Sole
  parola_chiave: Verità e Gioia
  ruolo: Realizzazione luminosa del Sé autentico.
  ombra: Ego abbagliante
- numero: '20'
  nome: Il Giudizio
  parola_chiave: Rinascita
  ruolo: Risveglio dell’anima collettiva.
  ombra: Senso di colpa cosmico
- numero: '21'
  nome: Il Mondo
  parola_chiave: Compimento
  ruolo: Integrazione finale. Unione tra tutti gli archetipi.
  ombra: Falsa conclusione
