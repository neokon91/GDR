# Sistema astrologico / psico-archetipico (recupero #9, FantasyWorld JSON/astrologia).
# Catalogo del TEMA NATALE per i personaggi (soprattutto PNG): scelto un SEGNO si
# deriva elemento/modalità/archetipo/MBTI; l'ARCANO è la carta del destino opzionale.
# Distillato fedele da astro_segni/archetipi/elementi/arcani_maggiori. Sola lettura,
# rigenerabile. Reso da views.renderTemaNatale; emesso in core.json (write_engine_data).
elementi:
- nome: Fuoco
  qualita: Volontà, ispirazione, coraggio
  funzioni: intuizione, azione, idealismo
  polarita: espansiva
- nome: Acqua
  qualita: empatia, sensibilità, introspezione
  funzioni: sentimento introverso, percezione intuitiva
  polarita: ricettiva
- nome: Aria
  qualita: razionalità, apertura, analisi
  funzioni: pensiero introverso, intuizione estroversa
  polarita: dinamica
- nome: Terra
  qualita: concretezza, disciplina, realismo
  funzioni: sensazione introversa, pensiero estroverso
  polarita: strutturante
