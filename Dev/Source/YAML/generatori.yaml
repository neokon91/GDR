# Generatore homebrew di nomi/spunti — italiano e legato all'ontologia.
# render.py lo carica in core.json (sezione 'generatori'); genera.js (Templater)
# compone i nomi a runtime. Espandibile a mano: aggiungere stili/sillabe qui.
#
# MODELLO. 'stili' = come comporre i nomi di PERSONA (sillabe). I TOPONIMI
# riusano le sillabe dello stile scelto + gli affissi globali (toponimi:), così
# un luogo riflette la cultura della sua gente. Le FAZIONI usano forme
# templatizzate ({nome}=persona, {luogo}=toponimo, gli altri pescano dalle liste).
# Il campo 'stile_nomi' sulle entità cultura/specie sceglie lo stile; il
# generatore lo risolve dai link della nota (o lo chiede).
id: generatori
version: 0.1.0
purpose: Generatore nomi/spunti homebrew (italiano, a tema).

stili:
  romanzo:
    label: Romanzo (latino)
    persona:
      inizi: [Aur, Cor, Val, Mar, Luc, Sev, Tib, Cas, Fab, Rem, Ott, Vinc, Lel, Dec]
      centri: ["", "el", "in", "an", "or", "il", "ent"]
      fini_m: [io, eo, us, ano, ico, ino, aro, ente]
      fini_f: [ia, ea, a, ina, ella, ora, enzia]
    cognomi: [Aurelii, Corvini, Valenti, di Marca, Severi, Tiberii, Cassi, Fabri, Ottavii]
  nordico:
    label: Nordico
    persona:
      inizi: [Bj, Sig, Thor, Ulf, Rag, Hild, Ein, Gun, Sven, Ast, Vald, Hak, Frey, Yng]
      centri: ["", "ar", "or", "un", "val", "rid", "gn"]
      fini_m: [orn, ar, ulf, nar, vid, mund, grim, dan]
      fini_f: [run, hild, dis, gerd, unn, a, veig]
    cognomi: [Bjornsson, Ulfdottir, Ravnsen, Stormkald, Iverthing, Skaldson]
  silvano:
    label: Silvano (élfico)
    persona:
      inizi: [Ae, Lai, Syl, Eli, Tha, Cae, Niam, Ily, Fae, Aer, Loth, Vael, Ela, Rin]
      centri: ["", "la", "ri", "no", "el", "wy", "the"]
      fini_m: [riel, andil, los, wyn, thir, aen, mil]
      fini_f: [riel, wen, eth, lia, ynn, ae, sil]
    cognomi: [Lathuil, Sylvaranth, Aeloria, Nimathen, Caelorn, Faelith]
  montano:
    label: Montano (nanico)
    persona:
      inizi: [Bal, Dur, Thr, Grom, Kaz, Bro, Dwal, Bru, Tor, Khar, Grun, Bof, Nor, Dain]
      centri: ["", "in", "or", "dum", "ar", "gni", "kk"]
      fini_m: [in, ar, drin, gar, mund, oth, nir, rakk]
      fini_f: [is, ra, din, hild, na, gunn, rid]
    cognomi: [Martelpietra, Barbaferro, Fendiroccia, Forgiacupa, Spaccamonti, Vena d'Oro]
  tribale:
    label: Tribale (orchesco)
    persona:
      inizi: [Gro, Kar, Urz, Mog, Sha, Grik, Vra, Hru, Naz, Dro, Ghaz, Brak, Zug, Mor]
      centri: ["", "ag", "ur", "ok", "az", "gor", "ush"]
      fini_m: [sh, g, ak, og, ur, nak, rok, gash]
      fini_f: [a, ka, sha, gra, ila, ush, na]
    cognomi: [Spaccateschi, Mangiaferro, dei Tre Zanne, Brucianebbia, Rompiscudo]
  esotico:
    label: Esotico (arcano/deserto)
    persona:
      inizi: [Az, Sah, Zir, Nef, Kal, Ras, Jah, Mir, Sel, Tah, Zan, Yas, Adh, Suy]
      centri: ["", "ar", "ee", "ir", "an", "ud", "ay"]
      fini_m: [ar, im, ud, an, esh, ir, aan, yd]
      fini_f: [a, ira, een, ara, isha, ah, yel]
    cognomi: [al-Sahir, Zirran, della Sabbia, Mirelin, ibn-Tahar, del Velo]

# Affissi toponomastici globali (italiani, a tema): la RADICE è composta dalle
# sillabe dello stile scelto, così il luogo "suona" come la cultura.
toponimi:
  prefissi: [Alto, Forte, Porto, Valle, Pietra, Colle, Monte, Capo, Borgo, Lago, Vado, Roccia]
  suffissi: [borgo, valle, monte, porto, fosso, caro, lade, gard, holm, mar, reth, dun]

# Fazioni: forme templatizzate. Placeholder: {nome}=nome di persona generato,
# {luogo}=toponimo generato, {sintagma}/{nucleo_pl}/{aggettivo} dalle liste qui.
fazioni:
  # {aggettivo} è femminile (Rossa/Nera…): solo dopo nomi femminili (Mano/Setta/
  # Lama). I nomi maschili (Ordine/Patto/Circolo) usano {sintagma} (del/della/di…).
  forme:
    - "L'Ordine {sintagma}"
    - "La Confraternita {sintagma}"
    - "I {nucleo_pl} di {luogo}"
    - "La Mano {aggettivo}"
    - "La Setta {aggettivo}"
    - "La Lama {aggettivo}"
    - "Il Patto {sintagma}"
    - "I Figli {sintagma}"
    - "La Compagnia {sintagma}"
    - "Il Circolo {sintagma}"
    - "Gli Araldi {sintagma}"
    - "La Casata di {nome}"
  sintagma:
    - "del Corvo"
    - "della Fiamma"
    - "di {nome}"
    - "di {luogo}"
    - "del Silenzio"
    - "della Cenere"
    - "dell'Alba"
    - "della Spada Spezzata"
    - "del Velo"
    - "delle Tre Lune"
  nucleo_pl: [Corvi, Lupi, Sussurri, Aspidi, Veggenti, Cinque, Senzavolto, Raminghi, Custodi, Erranti]
  aggettivo: [Rossa, Nera, Spezzata, Eterna, Cinerea, Velata, Argentea, Silente, Cremisi, Infranta]

# === Spunti per il tavolo (Stage 1) ========================================
# Stessa meccanica delle fazioni: forme templatizzate, {chiave} pesca da una lista
# omonima di questa sezione; {nome} = nome di persona dello stile, {luogo} =
# toponimo dello stile (così PNG/taverne/ganci "suonano" come il mondo collegato).

# PNG: schizzo di personaggio non-giocante in una riga (nome + ruolo + aspetto +
# tratto + manierismo + cosa vuole / segreto). Forme con campi distinti.
png:
  forme:
    - "{nome}, {ruolo} — {aspetto}; {tratto}. Vuole {vuole}."
    - "{nome} — {tratto}, {manierismo}. {aspetto}."
    - "{nome}, {ruolo}: sembra {tratto}, ma {segreto}."
    - "{nome} — {aspetto}; {manierismo}. In segreto {segreto}."
  ruolo: [mercante, guardia cittadina, locandiere, ladro di strada, chierico errante, mendicante, scriba, cacciatore di taglie, contrabbandiere, nobile decaduto, fabbro, erborista, menestrello, becchino, capitano di ventura]
  aspetto: ["una cicatrice che taglia il sopracciglio", "mani enormi e callose", "voce roca da troppo fumo", "un occhio lattiginoso", "vestiti buoni ma logori", "magro fino a sembrare spettrale", "una risata troppo forte", "tatuaggi sbiaditi sulle nocche", "sempre infreddolito", "un sorriso a cui manca un dente", "addosso un odore d'incenso", "movimenti lenti e misurati"]
  tratto: [diffidente, gioviale ma calcolatore, collerico, ossequioso, cinico, fervente, codardo sotto la spavalderia, leale fino all'osso, avido, malinconico, curioso di tutto, paranoico]
  manierismo: ["gioca di continuo con un anello", "non guarda mai negli occhi", "ripete l'ultima parola di chi gli parla", "tamburella le dita sul tavolo", "benedice ogni frase", "conta le monete senza accorgersene", "ride alle proprie battute", "annusa l'aria prima di parlare", "stringe sempre un amuleto"]
  vuole: ["ripagare un vecchio debito", "vendetta su un nobile", "fuggire dalla città prima dell'alba", "proteggere un parente fragile", "un passaggio sicuro verso nord", "che il passato resti sepolto", "denaro, e in fretta", "il rispetto che gli viene negato", "ritrovare qualcuno che ha perso"]
  segreto: ["è una spia al soldo di un'altra fazione", "ha ucciso un uomo per errore", "deve denaro a un culto", "non è chi dice di essere", "nasconde un oggetto rubato", "è malato e non ha più molto tempo", "tradirà al primo segno di pericolo", "ha visto qualcosa che non doveva"]

# Taverna/locanda: insegna (nome curato, concordanza italiana corretta) + un
# dettaglio che la rende viva.
taverna:
  forme:
    - "{insegna} — {dettaglio}"
  insegna:
    - "Il Cinghiale Rosso"
    - "La Sirena Ubriaca"
    - "Il Drago Dormiente"
    - "Le Tre Lanterne"
    - "Al Boccale Spaccato"
    - "La Rosa Nera"
    - "Il Corvo Storto"
    - "L'Ancora Arrugginita"
    - "La Lepre Zoppa"
    - "Il Gatto e la Candela"
    - "La Forca Allegra"
    - "La Quercia Cava"
    - "Il Pellegrino Stanco"
    - "Le Due Lune"
    - "La Spada nel Fango"
    - "Il Grifone Spennato"
    - "La Botte Senza Fondo"
  dettaglio:
    - "famosa per lo stufato di {ingrediente}"
    - "dove nel retro si gioca d'azzardo fino all'alba"
    - "frequentata soprattutto da {avventore}"
    - "il vino è acido, ma le stanze sono pulite"
    - "il locandiere sa tutto di tutti, a un prezzo"
    - "puzza di {ingrediente} e di segreti"
    - "qui le risse finiscono in canzoni"
    - "stanze a buon mercato, pareti sottili"
    - "nessuno ti chiede il nome, e va bene così"
    - "un tempo era una cappella: si vede ancora l'altare"
  ingrediente: [cinghiale, anguilla, funghi, montone, cavolo, aringa, lepre, castagne]
  avventore: [carovanieri, marinai, disertori, pellegrini, contrabbandieri, minatori, mercenari sfaccendati, vedove allegre]

# Gancio: spunto di trama in una-due frasi. È l'anima del vault — ogni gancio è un
# invito a giocare. {luogo}/{nome} contestualizzano col mondo.
gancio:
  forme:
    - "{chi} offre una ricompensa: {cosa}. Ma {twist}."
    - "{cosa_capita} a {luogo}; chi indaga scopre che {twist}."
    - "Gira voce che {voce}. Chi arriva primo {posta}."
    - "{chi} sta per {azione} — e nessuno sa che {twist}."
  chi: ["Un mercante nervoso", "Una vedova in lutto", "Il capitano della guardia", "Un chierico pallido", "Un nobile in disgrazia", "Una vecchia del mercato", "Un bambino lasciato solo", "Un rivale di vecchia data"]
  cosa: ["la figlia è sparita tre notti fa", "un carico è stato rubato lungo la strada", "qualcuno profana le tombe di famiglia", "un debito va riscosso a {luogo}", "serve una scorta che non faccia domande", "un nome va cancellato dai registri"]
  cosa_capita: ["Il bestiame muore senza una ferita", "Le campane suonano da sole di notte", "I pozzi danno acqua salmastra", "Un incendio non lascia cenere", "La gente sogna lo stesso volto", "Spariscono solo i primogeniti"]
  voce: ["sotto {luogo} ci sia una porta che non andrebbe aperta", "un tesoro aspetti chi risolve l'enigma giusto", "{nome} sia tornato dai morti", "il vecchio ponte regga ancora un segreto", "qualcuno paghi in oro antico, troppo antico"]
  azione: ["firmare un patto che non capisce", "vendere ciò che non gli appartiene", "accusare un innocente per salvarsi", "lasciare la città con tutto il tesoro del tempio"]
  twist: ["il colpevole è qualcuno di cui ti fidi", "è una trappola tesa proprio a voi", "c'entra un culto che si credeva estinto", "la vittima mente su tutto", "la ricompensa promessa non esiste", "chi vi assume è peggio di chi cacciate"]
  posta: ["ne esce ricco — o non ne esce", "si fa un nemico potente", "scopre una verità che pesa", "guadagna un debito di sangue"]

# === Spunti per il tavolo (Stage 2) ========================================

# Diceria: una voce che gira (può essere vera o falsa) — atmosfera e mezzi-ganci.
diceria:
  forme:
    - "Dicono che {soggetto} {fatto}."
    - "Al mercato sussurrano che {fatto2}."
    - "{soggetto} giura di aver visto {visione} verso {luogo}."
    - "C'è chi scommette che {predizione}."
  soggetto: ["il vecchio mugnaio", "la figlia del borgomastro", "un mercante di passaggio", "il prete", "la banda dei moli", "il barone", "una strega del bosco"]
  fatto: ["nasconda oro sotto il pavimento", "abbia stretto un patto a mezzanotte", "non sia morto come dicono", "venda merce rubata", "parli con i morti", "stia per fuggire con la cassa"]
  fatto2: ["le tasse raddoppieranno alla luna nuova", "qualcuno avvelena i pozzi", "i lupi quest'anno non sono lupi", "il ponte crollerà al primo carro pesante", "sparisce gente e nessuno indaga"]
  visione: ["luci nel cimitero", "una figura incappucciata sui tetti", "occhi nel bosco che non erano d'animale", "una nave senza equipaggio", "fuoco che bruciava verde"]
  predizione: ["l'inverno arriverà in anticipo", "il signore non vedrà la primavera", "tornerà chi se n'era andato", "il raccolto marcirà nei granai"]

# Bottino: un colpo d'occhio su cosa si trova (monete + oggetto + curiosità). A
# tema, non legato alle tabelle SRD (quello è uno Stage successivo).
bottino:
  forme:
    - "{monete}; {oggetto_b}"
    - "{oggetto_b}, e {curiosita}"
    - "{monete}, e {curiosita}"
  monete: ["una manciata di rame", "{n} monete d'argento", "una borsa pesante d'oro", "monete straniere fuori corso", "argento annerito dal tempo", "poche monete e molti pagherò"]
  n: [12, 20, 35, 50, 80, 120]
  oggetto_b: ["un pugnale dal pomo d'osso", "un anello con un sigillo sconosciuto", "una fiala di liquido ambrato", "una mappa strappata a metà", "un libro mastro cifrato", "una lama intaccata ma ben bilanciata", "uno scrigno chiuso senza chiave", "una collana di denti"]
  curiosita: ["una lettera mai spedita", "il ritratto di qualcuno che riconosci", "un dente troppo grande per essere umano", "una chiave che non apre nulla di noto", "un dado truccato", "una ciocca di capelli con un nastro nero", "un occhio di vetro"]

# Insediamento: schizzo di un luogo abitato (taglia + economia + tratto + chi
# comanda + problema). {luogo} = toponimo a tema.
insediamento:
  forme:
    - "{luogo} — {taglia_i}, vive di {economia}; {tratto_i}."
    - "{luogo}, {taglia_i}: comanda {chi_comanda}, ma {problema_i}."
  taglia_i: ["un pugno di case", "un villaggio di palafitte", "un borgo murato", "una città di mercanti", "un avamposto di frontiera", "un porto affollato"]
  economia: ["pesca e sale", "miniere di ferro", "pastorizia", "commercio di passaggio", "legname e pece", "vino e ulivi", "contrabbando, ufficiosamente"]
  tratto_i: ["le porte si chiudono al tramonto", "ogni casa ha un'edicola votiva", "i forestieri pagano il doppio", "una nebbia non se ne va mai del tutto", "campane a ogni ora", "tutti si conoscono, e si sorvegliano"]
  chi_comanda: ["un borgomastro avido", "un consiglio di anziani", "una vedova di ferro", "un capitano della corona, assente", "la gilda dei mercanti", "nessuno, ufficialmente"]
  problema_i: ["le tasse strozzano i contadini", "qualcosa ruba il bestiame di notte", "due famiglie sono in faida", "il pozzo si è guastato", "una setta cresce nell'ombra", "i banditi controllano la strada"]

# Oggetto/curiosità: un oggetto evocativo (materiale + forma + dettaglio/storia).
# Non è un oggetto magico con statistiche — è un gancio in forma di cosa.
oggetto:
  forme:
    - "{forma_o} {materiale} — {dettaglio_o}."
    - "{forma_o} {materiale}; {storia_o}."
  materiale: ["d'ottone annerito", "di legno scuro intagliato", "d'osso levigato", "di ferro freddo", "di vetro affumicato", "d'argento ossidato", "di giada incrinata", "di cuoio consunto"]
  forma_o: ["un medaglione", "una chiave", "un carillon", "un pugnale cerimoniale", "un anello", "una maschera", "un libricino", "una bambola", "un compasso", "una fiala"]
  dettaglio_o: ["caldo al tatto senza motivo", "inciso con un nome cancellato", "che ronza vicino alla magia", "con dentro qualcosa che si muove", "che indica sempre la stessa direzione", "freddo come ghiaccio"]
  storia_o: ["dicono porti sfortuna a chi mente", "apparteneva a un morto famoso", "nessuno ricorda chi l'ha fatto", "vale più di quanto sembri", "lo cercano in molti", "fu rubato a un tempio"]

# === Spunti per il tavolo (Stage 3) ========================================

# Meteo/presagio: il tempo che fa + un presagio atmosferico (superstizione di
# popolo, mezzo-gancio). {luogo} = toponimo a tema dove ambientarlo.
meteo:
  forme:
    - "{cielo}, {vento}: {presagio}."
    - "{cielo}; {dettaglio_m} — {presagio}."
    - "{fenomeno} verso {luogo}: {presagio}."
    - "{cielo}, {vento}; {dettaglio_m}."
    - "{fenomeno}; {dettaglio_m}, e {presagio}."
  cielo: ["Cielo terso e tagliente di freddo", "Nuvole basse color piombo", "Una caligine che non si alza", "Sole pallido dietro un velo", "Cielo livido di temporale imminente", "Nubi rosse al tramonto", "Cielo coperto, luce piatta senza ombre", "Prime stelle e un'aria immobile", "Foschia che mangia gli orizzonti", "Squarci di sereno fra nubi in corsa"]
  vento: ["vento del nord che gela le ossa", "non un alito d'aria", "raffiche che strappano le insegne", "una brezza umida di pioggia in arrivo", "vento che porta odore di mare", "tramontana secca e insistente", "folate improvvise e dispettose", "aria ferma che pesa sul petto"]
  dettaglio_m: ["la prima neve imbianca i tetti", "una pioggia sottile non smette da ore", "la nebbia ingoia il sentiero a dieci passi", "il ghiaccio rende infide le strade", "l'afa schiaccia ogni rumore", "grandine improvvisa picchia sulle tegole", "i tuoni rotolano lontani fra i monti", "la rugiada gela sulle foglie", "il fango risucchia gli stivali a ogni passo", "un arcobaleno doppio scavalca la valle"]
  fenomeno: ["Una tempesta nera monta dall'orizzonte", "Cala una nebbia fitta come latte", "Un vento caldo fuori stagione scende dai valichi", "Il cielo si oscura a mezzogiorno", "Una pioggia di cenere imbianca tutto", "Fulmini senza tuono guizzano fra le nubi", "Un gelo improvviso spacca le pozze", "La prima vera bufera dell'inverno"]
  presagio: ["i vecchi si segnano e chiudono le imposte", "dicono che porti sventura a chi viaggia", "qualcuno giura che è opera di una strega", "gli animali sono nervosi senza motivo", "i pescatori non escono, e hanno ragione", "le campane suonano da sole, dicono", "è lo stesso tempo della notte del disastro", "i bambini sognano tutti la stessa cosa", "il prete parla di castigo, l'oste di buon affare", "chi sa leggere il cielo prepara le scorte"]

# Stanza di dungeon: cosa c'è in un ambiente sotterraneo (contenuto + dettaglio
# + pericolo/tesoro/uscita). Per popolare al volo una mappa o improvvisare.
dungeon_stanza:
  forme:
    - "{stanza}: {contenuto}; {dettaglio_d}."
    - "{stanza} — {contenuto}, ma {complicazione}."
    - "{stanza}: {contenuto}; {esito}."
    - "{stanza}: {dettaglio_d}, e {esito}."
    - "{stanza} — {contenuto}; {complicazione}, e {esito}."
  stanza: ["Una cripta a volta", "Un corridoio mezzo allagato", "Una sala con colonne spezzate", "Una cella angusta", "Un'antica biblioteca in rovina", "Una fucina spenta", "Una caverna naturale", "Un refettorio crollato", "Un pozzo profondo", "Una cappella profanata", "Una galleria mineraria", "Una sala del trono vuota", "Un magazzino polveroso", "Una scalinata a chiocciola"]
  contenuto: ["sarcofagi aperti e ossa sparse", "una statua che guarda l'ingresso", "casse marce e barili sfondati", "un altare macchiato di scuro", "ragnatele spesse come tende", "una pozza d'acqua nera e immobile", "armi arrugginite appese alle pareti", "affreschi sbiaditi che raccontano una storia", "un braciere ancora tiepido", "scaffali crollati e pergamene ammuffite", "un mucchio di macerie da scavalcare", "gabbie vuote, le sbarre divelte dall'interno"]
  dettaglio_d: ["c'è puzza di marcio e di vecchio", "un gocciolio scandisce il silenzio", "le impronte nella polvere sono fresche", "qualcosa si muove appena la luce entra", "il pavimento è inclinato e infido", "un'iscrizione in una lingua morta corre sul muro", "fa molto più freddo che nel corridoio", "le torce faticano a restare accese", "si sente un canto sommesso da chissà dove", "il soffitto scricchiola sotto un peso invisibile"]
  complicazione: ["il pavimento cede a metà stanza", "una trappola a dardi scatta dall'arco", "il rumore richiama qualcosa dal buio", "la porta sul fondo si chiude di colpo", "il gas dalle fessure annebbia la mente", "le ossa sul pavimento iniziano a muoversi", "una lastra a pressione arma una lama oscillante", "l'acqua sale veloce dalle grate", "il ponte di pietra è marcio e traballa"]
  esito: ["dietro le macerie luccica qualcosa", "una scala scende ancora più giù", "un passaggio segreto si apre nella parete", "l'unica uscita è sbarrata dall'altra parte", "uno scrigno aspetta, troppo in vista per essere onesto", "una corrente d'aria tradisce un cunicolo nascosto", "c'è una via di fuga, ma stretta", "il bottino c'è, ma qualcuno è morto per averlo cercato", "una mappa graffiata sul muro indica la via"]

# Bevanda: cosa versano al bancone (nome già concordato + dettaglio o provenienza).
# Le bevande sono ITALIANE e concordate dentro `bevanda_n` (niente agg. separato,
# così "una birra scura" e "un vino dorato" restano corretti). {luogo} a tema.
bevanda:
  forme:
    - "{bevanda_n} — {dettaglio_b}"
    - "{bevanda_n}, {origine}"
    - "{bevanda_n}: {dettaglio_b}"
    - "{bevanda_n} — {origine}; {dettaglio_b}"
  bevanda_n: ["un vino speziato color rubino", "una birra scura densa come pane", "un idromele dorato dei monaci", "un sidro aspro di mele selvatiche", "una grappa che sa di resina", "un liquore d'erbe amarissimo", "un distillato chiaro e infuocato", "un vino bianco quasi acido", "una birra rossa schiumosa", "un infuso caldo di bacche scure", "un nettare ambrato troppo dolce", "un'acquavite che toglie il fiato", "un brodo corretto con qualcosa di forte", "un vino torbido di contrabbando"]
  dettaglio_b: ["lo bevono solo i veterani, e ridendo", "due boccali e scordi la strada di casa", "la casa lo offre, ma nessuno sa di cosa sia fatto", "costa quanto una settimana di lavoro", "dicono curi il mal di mare e altri mali", "ha un retrogusto che non sai se ti piace", "va giù come acqua, e questo è il problema", "serve a dimenticare, e funziona", "lo tengono sotto il bancone, per pochi", "scalda fino alle ossa in pieno inverno", "il primo sorso fa tossire, gli altri no"]
  origine: ["ricetta di {luogo}, gelosamente custodita", "arriva con le carovane, raro e caro", "lo fanno i monaci sopra {luogo}", "distillato di nascosto oltre il confine", "tradizione di queste valli da generazioni", "bottino di una nave naufragata, dicono", "lo si beve solo alle feste di {luogo}"]

# === Tesoro legato all'SRD (Stage 3) =======================================
# Bottino MECCANICO: monete a fascia + un oggetto/equip REALE dell'SRD 5.2.1
# (CC-BY-4.0). I NOMI degli oggetti NON stanno qui: render.py li inietta da
# Dev/Source/SRD/*.json in `tesoro._srd` (per fascia/rarità), così il bottino
# cita item veri e licenziabili. Qui restano editabili solo le parti italiane di
# atmosfera (monete, importi, connettori). NESSUNA chiave `forme`: il generatore
# `tesoro` è una funzione dedicata (genera.js: generaTesoro), non generaDaForme —
# perciò il validatore degli spunti lo salta apposta. Vedi il `bottino` (sopra)
# per il colpo d'occhio puramente atmosferico, slegato dalle regole.
tesoro:
  # Fasce in ordine crescente di valore; `pesi` = probabilità relativa (i tesori
  # comuni capitano più spesso). `mondano` = equipaggiamento non magico; le altre
  # = oggetti magici per rarità.
  fasce: [mondano, "non comune", rara, "molto rara", leggendaria]
  pesi:  [40, 30, 18, 9, 3]
  fascia_mondana: mondano
  # Frase delle monete per fascia; {n} = importo pescato da `importi`.
  monete:
    mondano:      ["una manciata di monete di rame", "{n} monete d'argento", "{n} pezzi d'argento e qualche spicciolo", "una borsa logora con {n} monete miste"]
    "non comune": ["{n} monete d'oro", "una borsa pesante: {n} mo", "{n} pezzi d'oro e un paio di gemme dozzinali"]
    rara:         ["{n} monete d'oro", "{n} mo e una gemma che vale quasi altrettanto", "uno scrigno con {n} pezzi d'oro"]
    "molto rara": ["uno scrigno serrato con {n} monete d'oro", "{n} mo in lingotti marchiati", "{n} pezzi d'oro e gioielli d'antiquariato"]
    leggendaria:  ["un tesoro regale: {n} pezzi d'oro", "{n} monete d'oro e gemme da capogiro", "un forziere reale: {n} mo e un diadema"]
  # Importi possibili per fascia (povero → ricco). Coerenti coi tesori 2024.
  importi:
    mondano:      [8, 15, 25, 40, 60]
    "non comune": [80, 150, 250, 400]
    rara:         [500, 900, 1500, 2500]
    "molto rara": [3000, 5000, 8000, 12000]
    leggendaria:  [15000, 25000, 40000, 60000]
  # Come legare monete + oggetto in una riga sola.
  connettori:
    - "{monete}; e {oggetto}"
    - "{oggetto}, insieme a {monete}"
    - "{monete}, più {oggetto}"
    - "{oggetto} e {monete}"

# Trappola / insidia: innesco + effetto + prova (CD) + dettaglio. Per dungeon e luoghi
# pericolosi; l'entità `insidia` ne è la versione persistente (questa è lo spunto rapido).
trappola:
  forme:
    - "{innesco} → {effetto}; TS {prova} (dimezza)."
    - "{innesco}: {effetto}. TS {prova}; {dettaglio_t}."
    - "{innesco} — {effetto} [TS {prova}]; {dettaglio_t}."
  innesco:
    - "Una piastra a pressione sotto la polvere"
    - "Un filo teso all'altezza delle caviglie"
    - "Una serratura sigillata da una runa"
    - "Uno scrigno con un falso fondo"
    - "Una maniglia unta di veleno da contatto"
    - "Una lastra di pietra che cede sotto il peso"
    - "Un glifo inciso sull'arco della porta"
    - "Una statua che ruota su un perno nascosto"
  effetto:
    - "una rosa di dardi avvelenati ({danno} veleno)"
    - "una fossa di {profondita} con punte sul fondo ({danno} perforanti)"
    - "una lama oscilla dal soffitto ({danno} taglienti)"
    - "un getto di fiamme investe il corridoio ({danno} da fuoco)"
    - "un gas soporifero riempie la stanza"
    - "il soffitto cala lentamente, un metro a round"
    - "una scarica necrotica corre sul pavimento ({danno} necrotici)"
    - "blocchi di pietra sigillano ogni uscita"
  prova:
    - "CD 12 Destrezza"
    - "CD 13 Destrezza"
    - "CD 14 Destrezza"
    - "CD 15 Costituzione"
  dettaglio_t:
    - "Percezione CD 13 per scovarla in tempo"
    - "disinnescarla (Arnesi CD 15) rivela un piccolo tesoro"
    - "si riarma dopo un minuto"
    - "il rumore attira ciò che vive più in fondo"
    - "è già scattata: una vittima giace lì da tempo"
    - "una seconda trappola protegge la prima"
  danno: ["2d6", "3d6", "1d10", "4d6", "2d10"]
  profondita: ["3 metri", "6 metri", "9 metri"]

# Evento di viaggio (overland / hexcrawl): una situazione lungo la strada + dettaglio o
# complicazione. Da tirare a ogni esagono/tappa per dare vita al viaggio.
evento_viaggio:
  forme:
    - "{situazione}: {dettaglio_v}."
    - "{situazione} — {complicazione_v}."
    - "{situazione}: {dettaglio_v}, e {complicazione_v}."
  situazione:
    - "Tracce fresche tagliano il sentiero"
    - "Una colonna di fumo si alza all'orizzonte"
    - "Un viandante solitario viene incontro al gruppo"
    - "Il tempo cambia di colpo"
    - "Un ponte è crollato di recente"
    - "Rovine soffocate dalla vegetazione"
    - "Un accampamento abbandonato da poco"
    - "Il verso di una bestia grossa, troppo vicina"
    - "Una carovana ferma sul ciglio della strada"
    - "Un cippo di confine sfregiato"
  dettaglio_v:
    - "sembrano dirigersi proprio dove andate voi"
    - "qualcuno vi osserva da lontano"
    - "c'è odore di sangue nell'aria"
    - "il silenzio è innaturale, nessun uccello"
    - "qualcosa di utile è rimasto indietro da chi è passato di qui"
    - "i locali, se interrogati, eviterebbero questo posto"
  complicazione_v:
    - "il gruppo non è d'accordo sul da farsi"
    - "aggirarlo costa mezza giornata di marcia"
    - "è un'esca, o lo sembra"
    - "qualcuno chiede aiuto — ma a quale prezzo?"
    - "le provviste rischiano di non bastare fino a sera"

# Incontro casuale: creatura SRD (per banda di GS) + numero + cosa fa. Le creature NON stanno
# qui: render.py inietta i nomi REALI in `incontro._srd` (per banda, CC-BY). NESSUNA chiave
# `forme` via generaDaForme → funzione dedicata (genera.js: generaIncontro), come `tesoro`.
incontro:
  fasce: [debole, medio, tosto, letale]   # banda di GS: debole≤1, medio≤5, tosto≤10, letale>10
  pesi:  [40, 35, 18, 7]
  numero: ["una", "una", "una coppia di", "1d4", "1d4+1", "un branco di", "2d4"]
  forme:
    - "{numero} {creatura} — {attivita}."
    - "{numero} {creatura}: {attivita}, ma {twist_i}."
    - "{numero} {creatura} ({atteggiamento}); {attivita}."
  attivita:
    - "in cerca di prede lungo il sentiero"
    - "che si contendono una carcassa"
    - "accampate attorno a un fuoco"
    - "a guardia di un passaggio obbligato"
    - "intente a depredare un carro rovesciato"
    - "ferite, in ritirata da un altro scontro"
    - "in agguato: hanno teso un'imboscata e aspettano"
    - "smarrite, lontane dal loro territorio"
  atteggiamento:
    - "ostili a vista"
    - "diffidenti ma trattabili"
    - "spaventate, pronte a fuggire"
    - "affamate e imprevedibili"
    - "indifferenti, finché non le provochi"
  twist_i:
    - "qualcosa dà la caccia a loro, a sua volta"
    - "una di loro porta un oggetto fuori posto"
    - "non sono ciò che sembrano a prima vista"
    - "il vero pericolo è ciò che le ha attirate qui"
    - "una tregua è possibile, al prezzo giusto"
