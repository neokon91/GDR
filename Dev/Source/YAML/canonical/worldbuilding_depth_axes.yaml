id: worldbuilding_depth_axes
purpose: Profili opzionali di profondita ridotti a pochi assi giocabili per entita chiave.
version: 0.1.0
rules:
  optional: true
  max_axes_per_profile: 5
  min_axes_per_profile: 3
  scale:
    min: 1
    max: 5
  usage: >
    Gli assi non sono frontmatter obbligatorio. Servono a guidare domande, generatori e revisioni
    quando una nota deve diventare piu profonda, non a trasformare ogni entita in una scheda lunga.
rights:
  status: idea_originale_riservata
  license: non_inclusa_nella_licenza_generale_del_vault
  owner: Andrea
  note: >
    Assi originali di profondita mantenuti come materiale interno riservato e non inclusi nella
    licenza generale della release utente.
profiles:
  mondo:
    source: depth_axes_mondo
    intent: Rendere il mondo una fonte primaria di realta, memoria, canone e limiti, non un semplice contenitore.
    recommended_for:
      - mondo
      - nuovo_mondo_homebrew
    axes:
      principi_realta:
        label: Principi di realta
        question: Quanto le leggi del mondo cambiano cosa e possibile, credibile o proibito?
        low: Convenzionali
        mid: Distintive
        high: Fondative
        table_use: Stabilire quali fatti sono veri prima di creare luoghi, magie, religioni o eccezioni.
      scala_canonica:
        label: Scala canonica
        question: Il mondo e definito da una regione, da continenti o da una cosmologia intera?
        low: Locale
        mid: Continentale
        high: Cosmica
        table_use: Decidere quali dettagli restano locali e quali diventano regole globali.
      memoria_storica:
        label: Memoria storica
        question: Quanto il passato spiega istituzioni, paure, confini e miti presenti?
        low: Sfondo
        mid: Stratificata
        high: Determinante
        table_use: Scegliere quali eventi entrano in timeline, rumor, rovine e tradizioni vive.
      contraddizione_centrale:
        label: Contraddizione centrale
        question: Quale tensione rende il mondo incoerente, fragile o conteso?
        low: Latente
        mid: Visibile
        high: Strutturale
        table_use: Tenere allineati conflitti, fazioni e segreti alla stessa frattura fondativa.
      permeabilita_cosmica:
        label: Permeabilita cosmica
        question: Quanto piani, dei, morti o potenze esterne entrano nel mondo materiale?
        low: Separata
        mid: Soglie rare
        high: Porosa
        table_use: Definire quanto cosmologia, religione e magia devono apparire nella geografia concreta.
  cosmologia:
    source: depth_axes_cosmologia
    intent: Dare alla cosmologia leggi, soglie, morte, interpretazioni e contraddizioni che sostengono il lore profondo.
    recommended_for:
      - cosmologia
      - religione_culto
      - mondo
    axes:
      ontologia:
        label: Ontologia
        question: La cosmologia descrive luoghi reali, stati dell'essere, forze morali o modelli incompleti?
        low: Luoghi
        mid: Stati e forze
        high: Mistero instabile
        table_use: Separare verita cosmica, dottrina e interpretazione parziale delle culture.
      confini_piani:
        label: Confini dei piani
        question: Quanto e chiaro il confine tra mondo, aldila, sogni, dei e anomalie?
        low: Netto
        mid: Ritualizzato
        high: Incerto
        table_use: Stabilire soglie, luoghi sacri, fenomeni visibili e rischi di attraversamento.
      morte_aldila:
        label: Morte e aldila
        question: Quanto la morte e un passaggio, una trasformazione, una prigione o una perdita assoluta?
        low: Passaggio stabile
        mid: Patto fragile
        high: Frattura cosmica
        table_use: Rendere coerenti necromanzia, funerali, antenati, resurrezione e paura sociale.
      intervento_divino:
        label: Intervento divino
        question: Quanto divinita e potenze cosmiche agiscono direttamente nel mondo?
        low: Silenziose
        mid: Mediate
        high: Intrusive
        table_use: Decidere se miracoli, culti, oracoli e luoghi sacri sono prova o interpretazione.
      contraddizione_dottrinale:
        label: Contraddizione dottrinale
        question: Quanto le religioni raccontano versioni incompatibili della stessa struttura cosmica?
        low: Concordi
        mid: Divergenti
        high: Incompatibili
        table_use: Creare conflitti tra fede, magia, politica e fonti canoniche senza rompere la coerenza.
  geografia:
    source: depth_axes_geografia
    intent: Trattare geografia e luoghi come territorio abitato, memoria fisica e struttura culturale del mondo.
    recommended_for:
      - luogo
      - geografia_regione
      - geografia_continente
      - geografia_isola
    axes:
      scala_geografica:
        label: Scala geografica
        question: Il luogo funziona come punto, area, rete, frontiera o intero sistema territoriale?
        low: Punto
        mid: Area
        high: Sistema
        table_use: Decidere quanto servono confini, percorsi, risorse e sotto-luoghi.
      continuita_ecologica:
        label: Continuita ecologica
        question: Quanto clima, bioma, risorse e insediamenti si spiegano a vicenda?
        low: Decorativa
        mid: Coerente
        high: Determinante
        table_use: Rendere credibili risorse, pericoli, migrazioni e tensioni economiche.
      memoria_territoriale:
        label: Memoria territoriale
        question: Quanto il passato resta visibile in rovine, nomi, confini, rituali o traumi locali?
        low: Tracce deboli
        mid: Stratificata
        high: Ineludibile
        table_use: Legare storia, cultura e descrizione fisica senza duplicare timeline e schede evento.
      permeabilita_frontiere:
        label: Permeabilita delle frontiere
        question: Quanto e facile attraversare confini naturali, politici, sociali o magici?
        low: Chiuso
        mid: Sorvegliato
        high: Poroso
        table_use: Definire rotte, dogane, tabù, contrabbando, isolamento e contaminazioni culturali.
      centralita_culturale:
        label: Centralita culturale
        question: Quanto il territorio modella identita, autorita, religioni e vita quotidiana?
        low: Sfondo
        mid: Identitario
        high: Fondativo
        table_use: Capire se il luogo va descritto come scenario, patria, nodo sacro o posta politica.
  fazione:
    source: depth_axes_fazione
    intent: Rendere una fazione leggibile come potere sociale, metodo operativo e pressione al tavolo.
    recommended_for:
      - fazione
      - fazione_gilda
      - fazione_confraternita
      - culto
    axes:
      struttura:
        label: Struttura
        question: Quanto e rigida la catena decisionale interna?
        low: Orizzontale
        mid: Semi-gerarchica
        high: Piramidale
        table_use: Capire chi puo negoziare, tradire o bloccare una decisione.
      scopo:
        label: Scopo primario
        question: La fazione agisce per ideale, potere concreto o sopravvivenza?
        low: Ideale puro
        mid: Equilibrato
        high: Pragmatico puro
        table_use: Rendere chiara la posta quando i PG offrono compromessi.
      metodo_operativo:
        label: Metodo operativo
        question: Quanto sono visibili le sue azioni?
        low: Occulto
        mid: Ambivalente
        high: Palese
        table_use: Decidere se gli indizi arrivano come segreti, pressione pubblica o ultimatum.
      legalita:
        label: Legalita
        question: Che rapporto ha con l'autorita riconosciuta?
        low: Illegale
        mid: Semi-legale
        high: Ufficiale
        table_use: Determinare conseguenze sociali quando i PG collaborano o si oppongono.
  cultura:
    source: depth_axes_cultura
    intent: Usare la cultura come motore di identita, tabù, linguaggio e conflitto, non come lore statico.
    recommended_for:
      - cultura
      - router_societa
      - specie_dnd
      - luogo_insediamento
    axes:
      valori_dominanti:
        label: Valori dominanti
        question: Quale valore giustifica sacrifici e giudizi morali?
        low: Sopravvivenza e protezione
        mid: Onore e manifestazione
        high: Potere e trasformazione
        table_use: Preparare dilemmi che il gruppo locale non considera neutri.
      dinamica_linguaggi:
        label: Dinamica dei linguaggi
        question: Come la cultura trasmette significato e memoria?
        low: Orale intuitivo
        mid: Codificato stratificato
        high: Sinestetico-trascendente
        table_use: Dare forma a prove sociali, traduzioni, tabù e incomprensioni.
      relazione_morte:
        label: Relazione con morte e dolore
        question: La perdita e rimossa, ritualizzata o integrata nella vita quotidiana?
        low: Rimozione e paura
        mid: Iniziazione trasformativa
        high: Coabitazione con la morte
        table_use: Rendere tombe, lutti, antenati e necromanzia scelte sociali concrete.
  magia:
    source: depth_axes_magia
    intent: Definire come funziona la magia in un mondo o regione senza sovrascrivere il regolamento D&D/SRD.
    recommended_for:
      - mondo
      - cosmologia
      - religione_culto
      - luogo
      - incantesimo
    axes:
      fonte_magia:
        label: Fonte della magia
        question: La magia nasce dall'individuo, dal mondo o da potenze esterne?
        low: Innata
        mid: Equilibrata
        high: Donata
        table_use: Chiarire patroni, lignaggi, luoghi di potere e conflitti sui canali magici.
      metodo_magia:
        label: Metodo magico
        question: La magia e impulso, arte interpretativa o procedura esatta?
        low: Selvaggio
        mid: Interpretativo
        high: Meccanico
        table_use: Stabilire il tono di scuole, rituali, fallimenti e ricerca arcana.
      costo_magia:
        label: Costo esistenziale
        question: Cosa consuma davvero un incanto importante?
        low: Nullo
        mid: Bilanciato
        high: Sacrificio
        table_use: Creare conseguenze narrative senza modificare i numeri base del sistema.
      rischio:
        label: Rischio esistenziale
        question: Quanto l'uso della magia minaccia identita, corpo o realta?
        low: Sicura
        mid: Instabile
        high: Corrompente
        table_use: Decidere quando un effetto magico produce clock, segni o contaminazioni.
  luogo:
    source: depth_axes_luogo
    intent: Rendere i luoghi scenari attivi con leggi, pericoli e pressioni riconoscibili.
    recommended_for:
      - luogo
      - luogo_dungeon
      - geografia_regione
      - luogo_rovina
      - luogo_tempio
    axes:
      stabilita_spaziale:
        label: Stabilita spaziale
        question: Lo spazio resta affidabile o cambia sotto pressione?
        low: Solido
        mid: Anomalo
        high: Mutante
        table_use: Scegliere se orientamento, accessi e ritorni sono risorse sicure o rischiose.
      coerenza_temporale:
        label: Coerenza temporale
        question: Il tempo scorre in modo normale?
        low: Lineare
        mid: Distorto
        high: Atemporale
        table_use: Preparare scadenze, salti, ripetizioni e conseguenze fuori scena.
      presenza_magica:
        label: Presenza magica
        question: Quanta magia ambientale influenza azioni e percezioni?
        low: Nulla
        mid: Attiva
        high: Sovraccarica
        table_use: Definire segnali sensoriali, indizi arcani e complicazioni.
      sacralita:
        label: Sacralita
        question: Il luogo e profano, rituale o centro simbolico del mondo?
        low: Profano
        mid: Rituale
        high: Axis Mundi
        table_use: Collegare culto, tabù, profanazioni e reazioni delle fazioni.
  regione_giocabile:
    source: depth_axes_regione_giocabile
    intent: Rendere una regione abbastanza densa da sostenere canone, pressioni e sessioni senza diventare enciclopedia.
    recommended_for:
      - luogo
      - geografia_regione
      - luogo_regione_naturale
    axes:
      densita_operativa:
        label: Densita operativa
        question: Quanti luoghi, poteri e problemi possono generare scene diverse nella stessa regione?
        low: Punto singolo
        mid: Rete locale
        high: Sistema regionale
        table_use: Capire se serve una singola missione, una mini-campagna o un arco lungo.
      pressione_sistemica:
        label: Pressione sistemica
        question: Quanto la crisi della regione si propaga su luoghi, risorse e fazioni?
        low: Isolata
        mid: Collegata
        high: Cascata
        table_use: Decidere quali conseguenze aggiornare dopo una scelta dei PG.
      differenza_culturale:
        label: Differenza culturale
        question: Quanto la vita quotidiana locale cambia scelte, linguaggio e rischi sociali?
        low: Familiare
        mid: Distintiva
        high: Estraniante
        table_use: Preparare scene sociali che non siano solo informazioni da leggere.
      accessibilita_player_safe:
        label: Accessibilita player-safe
        question: Quanto della regione puo essere mostrato senza rivelare i segreti DM?
        low: Opaca
        mid: A strati
        high: Leggibile
        table_use: Separare versione pubblica, rumor e verita nascoste prima della sessione.
      memoria_canonica:
        label: Memoria canonica
        question: Quanto il passato della regione spiega il conflitto presente e le reazioni future?
        low: Decorativa
        mid: Motivante
        high: Fondativa
        table_use: Scegliere quali eventi entrano in timeline e quali restano colore.
