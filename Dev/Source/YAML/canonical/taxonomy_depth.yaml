id: taxonomy_depth
purpose: Contratti di copertura tassonomica per D&D 5.5 e worldbuilding profondo.
version: 0.1.0
families:
  dnd55_player_options:
    reason: Le opzioni giocatore non devono restare solo pagine SRD, ma diventare agganci di mondo, cultura e campagna.
    source_folders:
      - SRD/Classi
      - SRD/Specie
      - SRD/Background
      - SRD/Talenti
    required_sections:
      - profondita_lore
      - giocabilita
      - pubblicazione
    required_tabs:
      - profondita_fantasy
    plugin_surfaces:
      - meta_bind
      - dataview
      - bases
    profile_contracts:
      classe_dnd:
        option_groups:
          - classi
        required_frontmatter_fields:
          - nome
          - categoria
          - classe
          - fonte
          - privilegi
          - competenze
          - equipaggiamento
          - incantesimi
          - culture
          - player_safe
          - uso_al_tavolo
      specie_dnd:
        option_groups:
          - specie
        required_frontmatter_fields:
          - nome
          - categoria
          - specie
          - fonte
          - tratti
          - lingue
          - culture
          - luoghi
          - player_safe
          - uso_al_tavolo
      background_dnd:
        option_groups:
          - background
        required_frontmatter_fields:
          - nome
          - categoria
          - background
          - fonte
          - competenze
          - strumenti
          - equipaggiamento
          - fazioni
          - culture
          - player_safe
          - uso_al_tavolo
      talento_dnd:
        required_frontmatter_fields:
          - nome
          - categoria
          - talento
          - fonte
          - prerequisito
          - beneficio
          - culture
          - fazioni
          - player_safe
          - uso_al_tavolo
      pg:
        required_frontmatter_fields:
          - nome
          - categoria
          - classe
          - specie
          - background
          - level
          - mondo
          - luogo
          - fazioni
  dnd55_magic_and_rules:
    reason: Magia, regole e oggetti devono collegare meccanica, conseguenza fictionale e canone del mondo.
    source_folders:
      - SRD/Incantesimi
      - SRD/Oggetti Magici
      - SRD/Regole
    required_sections:
      - profondita_lore
      - giocabilita
      - continuita
      - pubblicazione
    required_tabs:
      - profondita_fantasy
    plugin_surfaces:
      - meta_bind
      - dataview
      - bases
    profile_contracts:
      incantesimo:
        option_groups:
          - livelli_incantesimo
          - scuole_magia
          - tempi_lancio
          - componenti_incantesimo
          - gittate_incantesimo
          - durate_incantesimo
          - classi
        required_frontmatter_fields:
          - nome
          - categoria
          - fonte
          - livello_incantesimo
          - scuola
          - tempo_lancio
          - gittata
          - componenti
          - durata
          - classi
          - effetti
          - limiti
          - uso_al_tavolo
          - player_safe
      oggetto_magico:
        option_groups:
          - rarita
        required_frontmatter_fields:
          - nome
          - categoria
          - rarita
          - sintonia
          - cariche
          - maledizione
          - mondo
          - gancio
          - uso_al_tavolo
          - player_safe
      regola_dnd:
        required_frontmatter_fields:
          - nome
          - categoria
          - fonte
          - regola
          - limiti
          - effetti
          - uso_al_tavolo
          - player_safe
  dnd55_encounter_tools:
    reason: Encounter design richiede mostri, trappole, pericoli, tesori e conseguenze collegati alle sessioni.
    source_folders:
      - SRD/Mostri
      - SRD/Equipaggiamento
    required_sections:
      - giocabilita
      - continuita
      - pubblicazione
    required_tabs:
      - profondita_fantasy
    plugin_surfaces:
      - meta_bind
      - dataview
      - statblocks
      - dice_roller
      - initiative_tracker
    profile_contracts:
      creatura:
        option_groups:
          - tipi_creatura
          - taglie
          - allineamenti
          - grado_sfida
          - caratteristiche
          - tiri_salvezza
          - tipi_danno
          - condizioni
        required_frontmatter_fields:
          - nome
          - categoria
          - type
          - size
          - ac
          - hp
          - speed
          - cr
          - stats
          - habitat
          - luoghi
      incontro:
        required_frontmatter_fields:
          - nome
          - categoria
          - luogo
          - creature
          - pericolo
          - ricompense
          - pressione
      trappola:
        option_groups:
          - difficolta_cd
          - dadi_danno
          - tipi_danno
        required_frontmatter_fields:
          - nome
          - categoria
          - fonte
          - pericolo
          - innesco
          - cd
          - danno
          - contromisure
          - conseguenze
          - uso_al_tavolo
      pericolo_ambientale:
        option_groups:
          - difficolta_cd
          - dadi_danno
          - tipi_danno
          - condizioni
        required_frontmatter_fields:
          - nome
          - categoria
          - bioma
          - pericolo
          - cd
          - danno
          - segnali
          - contromisure
          - conseguenze
          - uso_al_tavolo
      tesoro:
        option_groups:
          - rarita
          - categorie_equipaggiamento
        required_frontmatter_fields:
          - nome
          - categoria
          - fonte
          - rarita
          - valore
          - ricompense
          - proprietario
          - luogo
          - gancio
          - player_safe
  world_society_economy:
    reason: Societa ed economia devono spiegare chi decide, chi paga, quali risorse muovono conflitto e missioni.
    required_sections:
      - profondita_lore
      - giocabilita
      - continuita
      - pubblicazione
    required_tabs:
      - profondita_fantasy
    plugin_surfaces:
      - meta_bind
      - dataview
      - bases
      - tasks
    profile_contracts:
      cultura:
        required_frontmatter_fields:
          - nome
          - categoria
          - mondo
          - mito_origine
          - valori
          - tabu
          - economia_mestieri
          - gancio
          - player_safe
      lingua:
        required_frontmatter_fields:
          - nome
          - categoria
          - mondo
          - culture
          - origine
          - usi
          - alfabeto
          - parole_note
      relazione:
        required_frontmatter_fields:
          - nome
          - categoria
          - soggetti
          - origine
          - posta
          - prossima_mossa
          - propaga_a
      mercato:
        required_frontmatter_fields:
          - nome
          - categoria
          - luogo
          - risorse
          - pressione
          - rischi
          - rotte
      rotta:
        required_frontmatter_fields:
          - nome
          - categoria
          - partenza
          - arrivo
          - risorse_trasportate
          - rischi
          - pedaggi
      risorsa_mondo:
        required_frontmatter_fields:
          - nome
          - categoria
          - mondo
          - luoghi
          - usi
          - scarsita
          - dipendenze
          - pressione
  world_religion_cosmology:
    reason: Religione e cosmologia devono produrre riti, tabu, eresie, calendari, luoghi sacri e conseguenze.
    required_sections:
      - profondita_lore
      - giocabilita
      - continuita
      - pubblicazione
    required_tabs:
      - profondita_fantasy
    plugin_surfaces:
      - meta_bind
      - dataview
      - calendarium
      - bases
    profile_contracts:
      culto:
        required_frontmatter_fields:
          - nome
          - categoria
          - mondo
          - divinita
          - dogmi
          - rituali
          - eresie
          - pressione
          - propaga_a
      cosmologia:
        required_frontmatter_fields:
          - nome
          - categoria
          - mondo
          - regola
          - leggi_metafisiche
          - morte_aldila
          - effetti_su_magia
          - misteri
      ricorrenza_calendario:
        required_frontmatter_fields:
          - nome
          - categoria
          - mondo
          - data_mondo
          - festa
          - scadenze_rituali
          - conseguenze
          - fc-calendar
  world_history_geography_ecology:
    reason: Storia, geografia ed ecologia devono mostrare causa, luogo, specie, memoria pubblica e impatto al tavolo.
    required_sections:
      - profondita_lore
      - giocabilita
      - continuita
      - pubblicazione
    required_tabs:
      - profondita_fantasy
    plugin_surfaces:
      - meta_bind
      - dataview
      - maps
      - excalidraw
      - canvas
    profile_contracts:
      era_storica:
        required_frontmatter_fields:
          - nome
          - categoria
          - mondo
          - data_mondo
          - causa
          - conseguenze
          - culture
          - religioni
      evento_storico:
        required_frontmatter_fields:
          - nome
          - categoria
          - mondo
          - data_mondo
          - causa
          - effetti
          - memoria_pubblica
          - conseguenze
          - propaga_a
      luogo:
        required_frontmatter_fields:
          - nome
          - categoria
          - mondo
          - origine
          - tensione
          - bisogno_quotidiano
          - evoluzione_se_ignorata
      mappa:
        required_frontmatter_fields:
          - nome
          - categoria
          - mondo
          - luogo
          - coordinates
          - layer_mappa
          - player_safe
      lore_capture:
        required_frontmatter_fields:
          - nome
          - categoria
          - mondo
          - fonte
          - grado_certezza
          - giocabile
          - propaga_a
contracts:
  profiles_must_exist_before_templates: true
  source_folders_must_exist_for_srd_groups: true
  required_fields_must_be_cataloged: true
  no_unchecked_taxonomy_backlog: true
