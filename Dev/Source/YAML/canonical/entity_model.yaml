id: entity_model
purpose: Catalogo canonico delle categorie di entita, usato per decidere cosa merita template, cartella e controlli.
version: 0.1.0
policy:
  structured_note_when:
    - deve essere ritrovata durante la sessione
    - deve collegarsi a mondo, luogo, personaggio, fazione o missione
    - deve avere stato operativo
    - deve essere riusata in piu sessioni o campagne
    - deve diventare contenuto canonico
  folder_when:
    - la categoria e stabile
    - una automazione o dashboard la consuma
    - serve trovarla rapidamente al tavolo
  do_not_create_for:
    - idee vaghe
    - varianti speculative
    - contenuti finti di collaudo
  inbox_for_uncertain_content: Inbox/Inbox
  replaces_tracked_note: z.modelli/worldbuilding/Entita Worldbuilding.md
common_fields:
  required:
    - nome
    - categoria
    - tipo
    - stato
  contextual:
    - mondo
    - canonico
    - luogo
    - luoghi
    - personaggi
    - fazioni
    - creature
    - oggetti
    - ricompense
    - sessioni
priorities:
  essential: Template e controlli da mantenere ora.
  useful: Utile solo quando il flusso lo richiede spesso.
  defer: Non implementare finche non c'e domanda reale.
categories:
  mondo:
    label: Mondo
    folder: Mondi
    priority: essential
    purpose: Fissa le fondazioni della realta, della memoria storica e delle regole profonde dell'ambientazione.
    create_when:
      - piu luoghi, culture, cosmologie o campagne condividono le stesse leggi del mondo
      - serve una fonte primaria per decidere cosa e vero, rumor, leggenda o retcon
    types:
      - mondo
    required_fields:
      - categoria
      - stato
      - tono
      - tema
    useful_fields:
      - principi_realta
      - leggi_del_mondo
      - cosmologie
      - tecnologia
      - magia
      - continenti
      - regioni
      - culture_fondative
      - fazioni
      - religioni
      - campagne
      - memoria_pubblica
      - canonico
    template_blueprints:
      - mondo
    future_templates:
      - piano o dimensione
      - linea temporale del mondo
  personaggio:
    label: Personaggio
    folder: Mondi/Personaggi
    priority: essential
    purpose: Gestisce PG, PNG, divinita e figure importanti.
    create_when:
      - il personaggio puo tornare o influenzare una missione
      - il personaggio ha relazioni, luogo, fazione o segreti rilevanti
    types:
      - pg
      - png
    required_fields:
      - categoria
      - stato
    useful_fields:
      - tipo
      - ruolo
      - classe
      - mondo
      - luogo
      - fazioni
      - relazioni
    template_blueprints:
      - png
      - pg
    future_templates:
      - antagonista come variante guidata del png
      - divinita se diventa flusso frequente
  luogo:
    label: Luogo
    folder: Mondi/Luoghi
    priority: essential
    purpose: Descrive territorio, geografia, memoria stratificata, abitanti e pressioni locali prima dell'uso scenico.
    create_when:
      - il territorio spiega culture, rotte, conflitti, risorse o memoria del mondo
      - i personaggi possono andarci, tornarci o parlarne come punto importante
    types:
      - regione
      - insediamento
      - sito di interesse
      - habitat
    required_fields:
      - categoria
      - stato
      - mondo
      - tipo
    useful_fields:
      - scala_geografica
      - tipologia
      - bioma
      - luogo_padre
      - confini
      - memoria_del_territorio
      - tracce_passato
      - funzione_storica
      - funzione_attuale
      - abitanti
      - cultura_dominante
      - autorita
      - pericolo
      - fazioni
      - religioni
      - risorse
      - problemi
    template_blueprints:
      - luogo
    future_templates:
      - regione politica
      - continente o isola
      - quartiere solo per citta dense
  fazione:
    label: Fazione
    folder: Mondi/Fazioni
    priority: essential
    purpose: Segue gruppi con obiettivi, potere, leader, agenti e oppositori.
    create_when:
      - il gruppo prende decisioni, muove risorse o reagisce alle azioni dei PG
    types:
      - fazione generica
      - confraternita
      - culto
      - gilda
      - ordine rituale
    required_fields:
      - categoria
      - stato
      - mondo
      - pressione
    useful_fields:
      - tipo
      - canonico
      - leader
      - luoghi
      - personaggi
      - obiettivo
      - prossima_mossa
    template_blueprints:
      - fazione
    future_templates:
      - gilda
      - confraternita o ordine
      - casata nobile
  missione:
    label: Missione
    folder: Mondi/Missioni
    priority: essential
    purpose: Trasforma lore in obiettivo giocabile, scelta, rischio, ricompensa e conseguenza.
    create_when:
      - i giocatori possono accettare, rifiutare, cambiare o fallire qualcosa
    types:
      - incarico
      - ricerca
      - mistero
      - salvataggio
      - caccia
      - viaggio
      - fronte
      - trama personale
      - missione di fazione
      - arco narrativo
      - missione
    required_fields:
      - categoria
      - stato
      - mondo
      - prossima_mossa
    useful_fields:
      - scelta
      - posta
      - rischi
      - ricompense
      - conseguenze
      - entita_impattate
      - propaga_a
      - luoghi
      - fazioni
    template_blueprints:
      - missione
  tracciato:
    label: Tracciato
    folder: Mondi/Tracciati
    priority: essential
    purpose: Rende visibile una pressione, come avanza e cosa cambia nel mondo.
    create_when:
      - serve un clock, rituale, minaccia, viaggio o progetto con avanzamento persistente
    types:
      - clock
      - progress track
      - fronte
      - rituale
      - minaccia
      - viaggio
      - progetto
    required_fields:
