id: ontology_classes
purpose: Classi semantiche canoniche del vault; definiscono cosa esiste prima di template, profili frontmatter e viste.
version: 0.1.0
policy:
  rule: Le classi descrivono il modello concettuale; i sottotipi restano pochi e giocabili.
  frontmatter_rule: Il frontmatter conserva solo stato, relazioni e campi operativi; la lore vive nel corpo nota.
  projection_rule: Router, validation e runtime consumano questa ontologia direttamente o tramite projection YAML esplicite.
domains:
  worldbuilding:
    purpose: Fondazioni lore usate per costruire ambientazione, geografia, cosmologia e identita culturali.
    classes:
      mondo:
        label: Mondo
        entity_category: mondo
        validation_authority: true
        router_kind: mondo
        folder_key: mondi
        default_type: mondo
        types:
          - mondo
        frontmatter_profile: mondo
        body_model: lore_foundation
      cosmologia:
        label: Cosmologia
        entity_category: cosmologia
        validation_authority: true
        router_kind: cosmologia
        folder_key: cosmologia
        default_type: legge cosmica
        types:
          - legge cosmica
          - piano o aldila
          - divinita
          - pantheon
        frontmatter_profile: cosmologia
        body_model: metaphysics_lore
      luogo:
        label: Luogo
        entity_category: luogo
        validation_authority: true
        router_kind: luogo
        folder_key: luoghi
        default_type: sito di interesse
        types:
          - regione
          - insediamento
          - sito di interesse
        frontmatter_profile: luogo
        body_model: geography_lore
      cultura:
        label: Cultura
        entity_category: cultura
        validation_authority: true
        router_kind: cultura
        folder_key: culture
        default_type: civilta
        types:
          - civilta
        frontmatter_profile: cultura
        body_model: culture_lore
      ecologia:
        label: Ecologia
        entity_category: luogo
        validation_authority: true
        router_kind: ecologia
        folder_key: luoghi
        default_type: habitat
        types:
          - habitat
        frontmatter_profile: luogo
        body_model: habitat_lore
  gioco_5_5e:
