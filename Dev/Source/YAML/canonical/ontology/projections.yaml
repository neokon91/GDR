id: ontology_projections
purpose: Proiezioni tecniche dall'ontologia a router, template e superfici runtime.
version: 0.1.0
world_taxonomy:
  purpose: Router creativo worldbuilding derivato dalle classi con router_kind.
  template_routes:
    default_template: z.modelli/worldbuilding/Entita Worldbuilding
    by_kind:
      mondo:
        default_template: z.modelli/Mondo
      cosmologia:
        default_template: z.modelli/worldbuilding/Cosmologia
      luogo:
        default_template: z.modelli/luogo/Interesse
        rules:
          - id: luogo_regione
            match:
              subtype: regione
            template: z.modelli/geografia/Regione
          - id: luogo_insediamento
            match:
              subtype: insediamento
            template: z.modelli/luogo/Insediamento
          - id: luogo_sito_interesse
            match:
              subtype: sito di interesse
            template: z.modelli/luogo/Interesse
      cultura:
        default_template: z.modelli/worldbuilding/Cultura
      ecologia:
        default_template: z.modelli/luogo/Regione Naturale
