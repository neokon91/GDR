id: ontology_relations
purpose: Relazioni semantiche tra classi, campi frontmatter e link Obsidian.
version: 0.1.0
policy:
  rule: Le relazioni descrivono domain, range e cardinalita; non aggiungono lore descrittiva nel frontmatter.
  storage_rule: I campi relazione devono puntare a campi atomici dichiarati in fields_core.
