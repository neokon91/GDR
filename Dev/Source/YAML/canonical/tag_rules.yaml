id: tag_rules
purpose: Tag italiani semplici, coerenti e limitati; la tassonomia principale resta in categoria, tipo e stato.
version: 0.1.0
language: it
allowed_tags:
  navigation:
    - indice
    - dashboard
    - tavolo
  gdr:
    - gdr/pronto
    - gdr/bozza
    - gdr/da-collegare
    - gdr/player-safe
    - gdr/canonico
    - gdr/rumor
    - gdr/da-propagare
  dnd55:
    - dnd55/homebrew
    - dnd55/srd
    - dnd55/incantesimo
    - dnd55/creatura
    - dnd55/oggetto-magico
    - dnd55/regola
  world:
    - mondo/canone
    - mondo/lore
    - mondo/mappa
    - mondo/relazioni
  plugin_assets:
    - excalidraw
    - mappa
    - relazioni
contracts:
  tags_are_optional: true
  category_type_state_are_primary_taxonomy: true
  tags_must_be_lowercase_ascii_or_known_italian: true
  no_ad_hoc_tags_in_release_content: true
