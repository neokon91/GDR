id: playability_contract
purpose: Contratto sistemico per verificare che il worldbuilding generi gioco e non solo lore.
version: 0.1.0
policy:
  scope: categorie operative di mondo, campagna e sessione
  rule: La playability non e un punteggio; una categoria e giocabile quando espone leve verificabili per scena, conflitto, scelta, conseguenza e prossima mossa.
  do_not_add:
    - nuovi vista
    - nuovi flussi paralleli
    - logica JS quando basta YAML
playability:
  genera_scene:
    required: true
  genera_conflitti:
    required: true
  genera_scelte:
    required: true
  genera_conseguenze:
    required: true
  genera_prossima_mossa:
    required: true
signals:
  genera_scene:
    fields:
      - gancio
      - uso_al_tavolo
      - scene
      - scene_pronte
      - apertura
      - luogo
      - luoghi
  genera_conflitti:
    fields:
      - tensione
      - tensioni
      - pressione
      - posta
      - conflitti
      - conflitto_generato
      - rivali
      - rischi
  genera_scelte:
    fields:
      - scelta
      - scelte
      - decisioni
      - posta
      - rischi
      - costo_sociale
      - reazione_a_violazione
  genera_conseguenze:
    fields:
      - conseguenze
      - entita_impattate
      - propaga_a
      - evoluzione_se_ignorata
      - conseguenze_se_bloccata
      - output_sessione
  genera_prossima_mossa:
    fields:
      - prossima_mossa
      - prossima_apertura
      - innesco
      - progress_value
      - progress_max
      - missioni
contracts:
  categories_must_declare_play_output: true
  lore_only_requires_explicit_defer: true
  region_is_minimum_value_unit: true
  playability_is_contract_not_score: true
