id: plugin_bindings
purpose: Binding tecnici dei plugin usati dai template generati.
version: 0.2.0
bindings:
  templater:
    plugin_id: templater-obsidian
    runtime: true
    responsibility: crea, sposta, rinomina e inizializza la nota prima del corpo statico
    entry_syntax:
      - <% await tp.user.nome_script(tp) %>
    forbidden_in_generated_body:
      - <%* codice JS Templater sparso %>
      - <%= espressioni runtime dentro sezioni Jinja %>
    local_scripts: z.automazioni
    output_targets:
      - z.modelli
  meta_bind:
    plugin_id: obsidian-meta-bind-plugin
    runtime: true
    responsibility: modifica campi YAML e lancia azioni esplicite dopo creazione nota
    inline_inputs:
      - INPUT[text:campo]
      - INPUT[toggle:campo]
      - INPUT[slider(minValue(0), maxValue(10), stepSize(1), addLabels):pressione]
      - INPUT[inlineListSuggester(optionQuery("Mondi"), useLinks(partial), allowOther):connessioni]
    button_syntax:
      - BUTTON[id-template]
    config_path: .obsidian/plugins/obsidian-meta-bind-plugin/data.json
    generated_from:
      - metabind_inputs
      - metabind_buttons
  dataview:
    plugin_id: dataview
    runtime: true
    responsibility: viste, indici e controlli leggibili senza modificare file
    codeblocks:
      - '```dataview'
      - '```dataviewjs'
    use_for:
      - indici
      - dashboard
      - controlli leggibili
  js_engine:
    plugin_id: js-engine
    runtime: true
    responsibility: viste riusabili quando DataviewJS inline diventerebbe troppo lungo
    use_for:
      - viste riusabili
      - componenti dashboard complessi
    local_modules:
      - z.engine/gdr_views.js
      - z.engine/session_core.js
      - z.engine/session_continuity.js
      - z.engine/session_dnd.js
      - z.engine/session_player.js
      - z.engine/session_runtime.js
      - z.engine/session_views.js
  metadata_menu:
    plugin_id: metadata-menu
    runtime: true
    responsibility: tipi campo, fileClass e qualita frontmatter
    config_path: .obsidian/plugins/metadata-menu/data.json
    output_targets:
      - z.fileclass
  tasks:
    plugin_id: obsidian-tasks-plugin
    runtime: true
    responsibility: task operative e manutenzione
    global_filter: '#task'
    use_for:
      - lavoro operativo DM
      - manutenzione
  statblocks:
    plugin_id: obsidian-5e-statblocks
    runtime: true
    responsibility: rendering creature e schede SRD
    fields:
      - statblock
      - name
      - source
    codeblock: statblock
  initiative_tracker:
    plugin_id: initiative-tracker
    runtime: true
    responsibility: gestione incontri e turni live
    codeblock: encounter
  dice_roller:
    plugin_id: obsidian-dice-roller
    runtime: true
    responsibility: tiri inline e tabelle casuali
    inline_syntax:
      - 'dice: 1d20'
      - 'dice: 1d6'
  tabs:
    plugin_id: tabs
    runtime: true
    responsibility: organizzazione sezioni lunghe
    codeblock: tabs
  callout_manager:
    plugin_id: callout-manager
    runtime: true
    responsibility: vocabolario visuale dei callout GDR
    syntax: '> [!tipo]'
runtime_boundaries:
  jinja: sviluppo only; produce Markdown statico e non deve essere richiesto in Obsidian
  templater: una sola entry iniziale per template generato
  meta_bind: modifica frontmatter solo da controlli espliciti
  dataview_js_engine: rendering e feedback senza side effect su file
