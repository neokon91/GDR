      required: false
      source: meta_bind
      use: fonti a note, sezioni o block id
    - name: riferimenti_srd
      type: wikilink_target_list
      required: false
      source: meta_bind
      use: riferimenti puntuali al compendio SRD
    - name: riferimenti_regola
      type: wikilink_target_list
      required: false
      source: meta_bind
      use: regole precise collegate alla scheda
    - name: sezioni_collegate
      type: wikilink_section_list
      required: false
      source: meta_bind
      use: link a sezioni Markdown specifiche
    - name: blocchi_collegati
      type: wikilink_block_list
      required: false
      source: meta_bind
      use: link a block id Obsidian
    - name: tabelle_collegate
      type: wikilink_block_list
      required: false
      source: meta_bind
      use: tabelle o generatori collegati via block id
    - name: tags
      type: tag_list
      required: false
      source: obsidian
      use: tag italiani opzionali e controllati
  presentation:
    - name: identita
      type: text
      required: false
      source: meta_bind
      use: identita narrativa breve
    - name: gancio
      type: text
      required: false
      source: meta_bind
      use: perche entra in gioco
    - name: uso_al_tavolo
      type: text
      required: false
      source: meta_bind
      use: come usarlo in sessione
    - name: player_safe
      type: text
      required: false
      source: meta_bind
      use: testo condivisibile
    - name: segreto
      type: text
      required: false
      source: meta_bind
      use: informazione DM
    - name: abitante_sa
      type: list
      required: false
      source: meta_bind
      use: versione diegetica leggibile nel mondo
    - name: dm_sa
      type: list
      required: false
      source: meta_bind
