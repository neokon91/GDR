id: fields_core
purpose: Campi canonici condivisi da template, fileClass, Bases, Dataview e controlli.
version: 0.2.0
organization:
  rule: fields_core registra campi atomici condivisi; classi, tipi e relazioni stanno in canonical/ontology.
  level_0_scope: solo definizioni di campo riusabili da frontmatter, plugin, Bases, Dataview e controlli.
fields:
  identity:
    - name: id
      type: text
      required: true
      source: templater
      use: slug stabile della nota
    - name: nome
      type: text
      required: true
      source: templater
      use: titolo leggibile
    - name: descrizione
      type: text
      required: false
      source: templater
      use: descrizione sintetica o testo importato leggibile
    - name: categoria
      type: select
      required: true
      source: taxonomy
      use: famiglia principale della nota
      values:
        - azione
        - avventura
        - background
        - campagna
        - classe
        - conflitto
        - cosmologia
        - creatura
        - cultura
        - dispensa
        - evento storico
        - fazione
        - incontro
        - incantesimo
        - lingua
        - lore capture
        - luogo
        - missione
        - mondo
        - nota rapida
        - oggetto
        - pericolo ambientale
        - personaggio
        - regola
        - religione
        - relazione
        - risorsa
        - sessione
        - societa
        - specie
        - srd
        - talento
        - tesoro
        - tracciato
        - trappola
    - name: tipo
      type: select
      required: true
      source: taxonomy
      use: sottotipo giocabile
      values:
        - mondo
        - legge cosmica
        - piano o aldila
        - divinita
        - pantheon
        - regione
        - insediamento
        - sito di interesse
        - civilta
        - habitat
        - pg
        - png
        - classe
        - specie
        - background
        - talento
        - creatura
        - incontro
        - trappola
        - pericolo ambientale
        - arma
        - armatura
        - scudo
        - strumento
        - veleno
        - oggetto meraviglioso
        - oggetto magico
        - incantesimo
        - regola
        - condizione
        - azione
        - bastione
        - tesoro
        - veicolo o cavalcatura
    - name: stato
      type: select
      required: true
      source: metadata_menu
      use: avanzamento operativo
      values:
        - accettata
        - archiviata
        - attivo
        - bozza
        - canonica
        - canonico
        - collegata
        - completato
        - conclusa
        - da smistare
        - fallito
        - giocata
        - ignorata
        - in corso
        - in gioco
        - in guerra
        - in pausa
        - minacciato
        - morto
        - ostile
        - preparazione
        - pronto
        - proposta
        - scomparso
        - smistata
    - name: fileClass
      type: text
      required: false
      source: metadata_menu
      use: fileClass Metadata Menu da applicare alla famiglia nota
    - name: tono
      type: text
      required: false
      source: meta_bind
      use: tono dominante di mondo, campagna o nota fondativa
  world_links:
    - name: mondo
      type: wikilink
      required: true
      source: meta_bind
      use: mondo di riferimento
    - name: luoghi
      type: wikilink_list
      required: false
      source: meta_bind
      use: ancore geografiche
    - name: luoghi_collegati
      type: wikilink_list
      required: false
      source: meta_bind
      use: luoghi semanticamente collegati senza gerarchia diretta
    - name: cosmologie
      type: wikilink_list
      required: false
      source: meta_bind
      use: cosmologie o verita metafisiche collegate
    - name: culture_fondative
      type: wikilink_list
      required: false
      source: meta_bind
      use: culture che fondano o definiscono un mondo
    - name: culture_collegate
      type: wikilink_list
      required: false
      source: meta_bind
      use: culture collegate da una relazione semantica specifica
    - name: religioni_collegate
      type: wikilink_list
      required: false
      source: meta_bind
      use: religioni collegate da una relazione semantica specifica
    - name: fazioni
      type: wikilink_list
      required: false
      source: meta_bind
      use: poteri coinvolti
    - name: missioni
      type: wikilink_list
      required: false
      source: meta_bind
      use: trasformazione in gioco
    - name: connessioni
      type: wikilink_list
      required: false
      source: meta_bind
      use: rete generale del Codex
    - name: campagne
      type: wikilink_list
      required: false
      source: meta_bind
      use: campagne collegate
    - name: personaggi
      type: wikilink_list
      required: false
      source: meta_bind
      use: PNG o personaggi coinvolti
    - name: tracciati
      type: wikilink_list
      required: false
      source: meta_bind
      use: clock, fronti o progress track collegati
    - name: sessioni
      type: wikilink_list
      required: false
      source: meta_bind
      use: sessioni in cui la nota entra in gioco
    - name: luogo
      type: wikilink
      required: false
      source: meta_bind
      use: luogo principale collegato
  precise_links:
    - name: fonti
