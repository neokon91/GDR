id: plugin_contracts
purpose: 'Contratto unico plugin/release: fonti ufficiali, uso locale ed errori visibili.'
version: 0.1.0
policy: Ogni plugin incluso deve servire creazione note, frontmatter, lettura lore o supporto 5.5e concreto.
plugins:
  - id: obsidian-5e-statblocks
    name: Fantasy Statblocks
    version: 4.10.3
    official_sources:
      - https://github.com/obsidianmd/obsidian-releases/blob/master/community-plugins.json
      - https://github.com/Obsidian-TTRPG-Community/fantasy-statblocks
      - https://plugins.javalent.com/statblocks
    official_capability: Blocchi statblock e parsing creature fantasy
    local_scope: Creature con frontmatter coerente; non inventare sintassi statblock fuori plugin
    visible_failure: Schede creatura grezze o errori su blocchi statblock
    release_contract: Mostri/creature mantengono statblock e campi verificabili
  - id: dataview
    name: Dataview
    version: 0.5.68
    official_sources:
      - https://github.com/obsidianmd/obsidian-releases/blob/master/community-plugins.json
      - https://github.com/blacksmithgu/obsidian-dataview
      - https://blacksmithgu.github.io/obsidian-dataview/
      - https://blacksmithgu.github.io/obsidian-dataview/api/intro/
    official_capability: Query TABLE/LIST/TASK e blocchi DataviewJS
    local_scope: JS abilitato; blocchi devono compilare e avere corpo nota leggibile
    visible_failure: Codice dataviewjs visibile, errori rossi, tabelle vuote incomprensibili
    release_contract: enableDataviewJs true, blocchi DataviewJS compilati staticamente
  - id: templater-obsidian
    name: Templater
    version: 2.20.4
    official_sources:
      - https://github.com/obsidianmd/obsidian-releases/blob/master/community-plugins.json
      - https://github.com/silentvoid13/Templater
      - https://silentvoid13.github.io/Templater/
      - https://silentvoid13.github.io/Templater/user-functions/script-user-functions.html
    official_capability: Esecuzione tp.user.* e template creation
    local_scope: Templater vede solo wrapper funzione in z.automazioni/templater; niente object exports
    visible_failure: Errore Templater export object/function o template non eseguito
    release_contract: user_scripts_folder isolato, 54 wrapper importati e verificati come funzioni
  - id: obsidian-meta-bind-plugin
    name: Meta Bind
    version: 1.4.10
    official_sources:
      - https://github.com/obsidianmd/obsidian-releases/blob/master/community-plugins.json
      - https://github.com/mprojectscode/obsidian-meta-bind-plugin
      - https://www.moritzjung.dev/obsidian-meta-bind-plugin-docs/
      - https://www.moritzjung.dev/obsidian-meta-bind-plugin-docs/guides/inputfields/
      - https://www.moritzjung.dev/obsidian-meta-bind-plugin-docs/guides/buttons/
    official_capability: INPUT, BUTTON e azioni operative
    local_scope: Button solo da template globali; input complessi in blocchi meta-bind; target sempre esistenti
    visible_failure: BUTTON grezzi, input non renderizzati, azioni verso file mancanti
    release_contract: Tutti BUTTON/INPUT e templateFile verificati contro data.json
  - id: js-engine
    name: JS Engine
    version: 0.3.5
    official_sources:
      - https://github.com/obsidianmd/obsidian-releases/blob/master/community-plugins.json
      - https://github.com/mprojectscode/obsidian-js-engine-plugin
      - https://www.moritzjung.dev/obsidian-js-engine-plugin-docs/
    official_capability: Esecuzione JS avanzata in note
    local_scope: Opzionale; runtime condiviso resta in z.engine e DataviewJS
    visible_failure: Blocchi JS non renderizzati o doppione di DataviewJS
    release_contract: Nessuna dipendenza critica dal plugin per primo percorso utente
  - id: metadata-menu
    name: Metadata Menu
    version: 0.8.12
    official_sources:
      - https://github.com/obsidianmd/obsidian-releases/blob/master/community-plugins.json
      - https://github.com/mdelobelle/metadatamenu
      - https://mdelobelle.github.io/metadatamenu/
    official_capability: FileClass, presetFields e gestione metadata
    local_scope: Preset coerenti con Meta Bind/Bases; non deve riscrivere campi a caso
    visible_failure: Campi incoerenti, suggerimenti mancanti, classi non trovate
    release_contract: classFilesPath e preset principali verificati
  - id: callout-manager
    name: Callout Manager
    version: 1.1.1
    official_sources:
      - https://github.com/obsidianmd/obsidian-releases/blob/master/community-plugins.json
      - https://github.com/eth-p/obsidian-callout-manager
      - https://github.com/eth-p/obsidian-callout-manager#readme
    official_capability: Callout custom e resa semantica
    local_scope: Callout devono restare blockquote leggibili senza plugin
    visible_failure: Callout non colorati ma testo leggibile
    release_contract: Tipi callout custom configurati e corpo nota Markdown presente
  - id: obsidian-dice-roller
    name: Dice Roller
    version: 11.4.2
    official_sources:
      - https://github.com/obsidianmd/obsidian-releases/blob/master/community-plugins.json
      - https://github.com/Obsidian-TTRPG-Community/dice-roller
      - https://plugins.javalent.com/dice-roller
    official_capability: Sintassi dice e tabelle casuali
    local_scope: Usare solo dove il testo resta comprensibile senza roll automatico
    visible_failure: 'dice: visibile come testo invece di roll'
    release_contract: Tabelle e guide restano Markdown leggibile
  - id: initiative-tracker
    name: Initiative Tracker
    version: 13.0.21
    official_sources:
      - https://github.com/obsidianmd/obsidian-releases/blob/master/community-plugins.json
      - https://github.com/Obsidian-TTRPG-Community/initiative-tracker
      - https://plugins.javalent.com/it
    official_capability: Encounter e iniziativa
    local_scope: Solo incontri preparati; nomi creature coerenti con statblock
    visible_failure: Encounter non caricato o creature non trovate
    release_contract: Template incontro/creatura e riferimenti verificati
  - id: tabs
    name: Tabs
    version: 1.1.8
    official_sources:
      - https://github.com/obsidianmd/obsidian-releases/blob/master/community-plugins.json
      - https://github.com/xhuajin/obsidian-tabs
      - https://github.com/xhuajin/obsidian-tabs#readme
    official_capability: Blocchi tabs
    local_scope: Ridurre scrolling; contenuto deve restare ordinato anche se tabs non renderizza
    visible_failure: Blocchi tabs grezzi o sezioni lunghe
    release_contract: Dashboard/template chiave verificati come plugin-native
  - id: obsidian-tasks-plugin
    name: Tasks
    version: 8.0.0
    official_sources:
      - https://github.com/obsidianmd/obsidian-releases/blob/master/community-plugins.json
      - https://github.com/obsidian-tasks-group/obsidian-tasks
      - https://publish.obsidian.md/tasks/
    official_capability: 'Query tasks con globalFilter #task'
    local_scope: Solo task DM operative, non lore/canone
    visible_failure: Task non visibili o warning cache
    release_contract: globalFilter e loggingOptions verificati
