id: callouts
purpose: Callout GDR riusabili nei template generati.
version: 0.1.0
callouts:
  infobox:
    type: infoboxwiki
    title: Codex
    collapsible: true
    use_for:
      - metadata rapidi
      - riepilogo laterale
    fallback_heading: Scheda rapida
  scena:
    type: scena
    title: Scena
    use_for:
      - apertura sessione
      - blocchi giocabili
    fallback_heading: Scena
  luogo:
    type: luogo
    title: Luogo
    use_for:
      - ancore geografiche
      - territori
      - esplorazione
    fallback_heading: Luogo
  indizio:
    type: indizio
    title: Indizio
    use_for:
      - informazioni scopribili
      - clue
      - prove
    fallback_heading: Indizio
  incontro:
    type: incontro
    title: Incontro
    use_for:
      - incontri
      - combattimenti
      - materiale al tavolo
    fallback_heading: Incontro
  pericolo:
    type: pericolo
    title: Pericolo
    use_for:
      - minacce ambientali
      - rischi immediati
      - complicazioni
    fallback_heading: Pericolo
  png:
    type: png
    title: PNG
    use_for:
      - personaggi non giocanti
      - motivazioni
      - voci al tavolo
    fallback_heading: PNG
  fazione:
    type: fazione
    title: Fazione
    use_for:
      - poteri organizzati
      - agenda
      - pressione
    fallback_heading: Fazione
  cultura:
    type: cultura
    title: Cultura
    use_for:
      - societa
      - costumi
      - tabu
    fallback_heading: Cultura
  societa:
    type: societa
    title: Societa
    use_for:
      - ruoli sociali
      - istituzioni
      - vita quotidiana
    fallback_heading: Societa
  religione:
    type: religione
    title: Religione
    use_for:
      - culti
      - dogmi
      - rituali
    fallback_heading: Religione
  economia:
    type: economia
    title: Economia
    use_for:
      - rotte
      - mercati
      - risorse
    fallback_heading: Economia
  magia:
    type: magia
    title: Magia
    use_for:
      - regole arcane
      - costo della magia
      - fenomeni
    fallback_heading: Magia
  ecologia:
    type: ecologia
    title: Ecologia
    use_for:
      - habitat
      - creature
      - biomi
    fallback_heading: Ecologia
  handout:
    type: handout
    title: Handout
    use_for:
      - dispense
      - testo consegnabile
      - materiale pubblico
    fallback_heading: Handout
  regola:
    type: regola
    title: Regola
    use_for:
      - riferimenti meccanici
      - eccezioni
      - ruling
    fallback_heading: Regola
  tesoro:
    type: tesoro
    title: Tesoro
    use_for:
      - ricompense
      - bottino
      - oggetti importanti
    fallback_heading: Tesoro
  ricompensa:
    type: ricompensa
    title: Ricompensa
    use_for:
      - premi
      - favori
      - conseguenze positive
    fallback_heading: Ricompensa
  todo:
    type: todo
    title: Task
    collapsible: true
    use_for:
      - task operative
      - checklist
    fallback_heading: Task
  lettura:
    type: lettura
    title: Versione pubblica
    collapsible: true
    use_for:
      - player_safe
      - recap_pubblico
    fallback_heading: Versione pubblica
  segreto:
    type: segreto
    title: Livello DM
    collapsible: true
    use_for:
      - segreti
      - recap_dm
    fallback_heading: Note DM
  timer:
    type: timer
    title: Pressione
    collapsible: true
    use_for:
      - prossima_mossa
      - conseguenze
      - clock
    fallback_heading: Pressione
  regia:
    type: regia
    title: Regia
    use_for:
      - vista
      - controlli live
    fallback_heading: Regia
  missione:
    type: missione
    title: Uso al tavolo
    use_for:
      - gancio
      - uso_al_tavolo
    fallback_heading: Uso al tavolo
  conflitto:
    type: conflitto
    title: Conflitto
    collapsible: true
    use_for:
      - prossima_mossa
      - posta
    fallback_heading: Conflitto
syntax:
  standard: '> [!{{ type }}] {{ title }}'
  collapsible: '> [!{{ type }}]- {{ title }}'
  nested_prefix: '> >'
contracts:
  nested_callouts_allowed: true
  fallback_required: true
  avoid_plugin_only_content: true
