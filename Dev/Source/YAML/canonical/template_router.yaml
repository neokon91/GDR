id: template_router
purpose: Contratto dichiarativo delle route Templater che scelgono template o delegano a runtime creativi.
version: 0.1.0
prompt_routes:
  - id: personaggio
    prompt: Che tipo di personaggio vuoi creare?
    options:
      - label: PNG
        id: png
        template: z.modelli/personaggio/PNG
      - label: PG
        id: pg
        template: z.modelli/personaggio/PG
delegated_routes:
  - id: dm
    handler: dm
dm_content:
  prompt: Cosa vuoi creare per il tavolo?
  fallback_template: z.modelli/dm/Incontro
  options:
    - label: Sessione
      id: sessione
      template: z.modelli/dm/Sessione
    - label: Missione
      id: missione
      template: z.modelli/dm/Missione
    - label: Clock o tracciato
      id: tracciato
      template: z.modelli/dm/Tracciato
    - label: Incontro
      id: incontro
      template: z.modelli/dm/Incontro
    - label: Trappola
      id: trappola
      template: z.modelli/dm/Trappola
    - label: Pericolo ambientale
      id: pericolo ambientale
      template: z.modelli/dm/Pericolo Ambientale
wizard_routes:
  conseguenza:
    handler: lore_capture
    route:
      tipo: conseguenza
      defaultName: Conseguenza emersa
      useActiveSession: true
creative_routes:
  - mondo
  - luogo
  - cosmologia
  - cultura
  - ecologia
