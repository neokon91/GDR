id: root_pages
purpose: Pagine root finali del vault materializzate da YAML/Jinja, non mantenute come note sorgente.
version: 0.1.0
pages:
  - path: Inizia Qui.md
    title: Inizia Qui
    frontmatter:
      cssclasses:
        - dashboard
        - gdr-start-here
      categoria: risorsa
      tipo: onboarding
      stato: pronto
    body: |
      Questa e la pagina da usare quando non sai cosa aprire. Il vault distribuito e gia configurato: parti da Prima Sessione o Regione Giocabile, prepara una sessione, gioca, poi chiudi le conseguenze.

      ## Primo Passo

      > [!scena] Percorso guidato
      > Scegli una strada sola: Prima Sessione se vuoi giocare oggi, Regione Giocabile se vuoi costruire un territorio minimo, Prepara quando hai gia un'idea giocabile. Se Obsidian chiede di abilitare gli strumenti inclusi nel vault, conferma solo se hai scaricato questa copia dalla release ufficiale.

      <!-- workflow:quick_actions:start onboarding_utente -->
      > [!regia] Azioni rapide
      > Scegliere subito se giocare oggi, creare un mondo minimo o tornare al tavolo.
      >
      > **Prima sessione** - vuoi giocare oggi senza completare tutto il Codex
      <!-- workflow:button prima-sessione-in-15-minuti-risorse-prima-sessione-in-15-minuti -->
      >
      > **Regione giocabile** - vuoi creare il minimo territorio che produce gioco
      <!-- workflow:button regione-giocabile-risorse-regione-giocabile -->
      >
      > **Prepara sessione** - hai un mondo o almeno un'idea pronta da giocare
      <!-- workflow:button preparazione-sessione-risorse-preparazione-sessione -->
      >
      > **Gioca** - sei al tavolo o vuoi vedere il cockpit live
      <!-- workflow:button gioca-hub-durante-il-gioco-durante-il-gioco -->
      >
      > **Post sessione** - il tavolo e finito e devi salvare conseguenze
      <!-- workflow:button post-sessione-guidato-risorse-post-sessione-guidato -->
      >
      > [!regia]- Se ti perdi
      > Aprire solo le viste di supporto, non nuove strade parallele.
      >
      > **Crea mondo** - vuoi fondare un mondo minimo prima della regione
      <!-- workflow:button nuovo-mondo-homebrew -->
      >
      > **Recupero strumenti** - pulsanti, tabelle o pagina iniziale non rispondono
      <!-- workflow:button setup-guidato-risorse-setup-guidato -->
      >
      > **Worldbuilder** - vuoi espandere il mondo dopo il primo giro
      <!-- workflow:button worldbuilder-worldbuilder-dashboard-2 -->
      >
      > **Bibbia del mondo** - vuoi consolidare tono e canone
      <!-- workflow:button bibbia-del-mondo-bibbia-del-mondo-2 -->
      >
      > **Fuori scena** - devi decidere reazioni tra una sessione e l'altra
      <!-- workflow:button fuori-scena-hub-cosa-succede-fuori-scena-cosa-succede-fuori-scena -->
      >
      > **Vista giocatori** - devi mostrare materiale senza segreti DM
      <!-- workflow:button vista-giocatori-hub-vista-giocatori-vista-giocatori -->
      >
      > **Report qualita** - vuoi capire cosa manca nel vault
      <!-- workflow:button quality-report-risorse-quality-report -->
      >
      > **Aiuto** - non capisci cosa fare o una vista non risponde
      <!-- workflow:button aiuto-risorse-faq -->
      <!-- workflow:quick_actions:end onboarding_utente -->

      ```dataviewjs
      const gdr = await eval(await app.vault.adapter.read("z.engine/session_views.js"));
      await gdr.renderWorkflowCommandDeck(dv, "onboarding_utente", { mode: "simple" });
      ```

      ## Cosa Fare Adesso

      ```dataviewjs
      const gdr = await eval(await app.vault.adapter.read("z.engine/session_views.js"));
      gdr.renderOnboardingReadiness(dv);
      gdr.renderActiveSessionBanner(dv);
      gdr.renderActions(dv);
      ```

      ## Vault Pronto

      ```dataviewjs
      const gdr = await eval(await app.vault.adapter.read("z.engine/session_views.js"));
      await gdr.renderVaultReadiness(dv, "start");
      ```

      ## Se I Pulsanti Non Funzionano

      | Cosa vuoi fare | Apri |
      | --- | --- |
      | Controllare gli strumenti | [[Risorse/Setup Guidato]] |
      | Giocare con il minimo | [[Risorse/Prima Sessione In 15 Minuti]] |
      | Dare profondita a una zona | [[Risorse/Regione Giocabile]] |
      | Preparare la sessione | [[Risorse/Preparazione Sessione]] |
      | Giocare al tavolo | [[Hub/Durante il Gioco]] |
      | Chiudere la sessione | [[Risorse/Post Sessione Guidato]] |
      | Vedere cosa reagisce | [[Hub/Cosa Succede Fuori Scena]] |

      Resta sulle pagine indicate: le aree interne non servono durante il gioco.

  - path: VERSION.md
    title: Versione Vault
    body: |
      Versione: `1.0.0`

      Data: 2026-05-21


      ## Compatibilità

      - Obsidian con plugin community abilitati.
      - Plugin inclusi nella cartella `.obsidian/plugins`.
      - Tema consigliato: Minimal.
      - Snippet consigliato: `gdr-vault`.
