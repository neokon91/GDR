id: plugin_contracts
purpose: 'Contratto unico plugin/release: fonti ufficiali, uso locale, errori visibili
  e gate.'
version: 0.1.0
checked_at: '2026-05-26'
policy: 'Contratto operativo profondo: ogni plugin incluso deve avere comportamento
  ufficiale studiato, uso locale limitato, rischi di errore visibile e gate di verifica.'
plugins:
- id: obsidian-icon-folder
  name: Iconize
  version: 2.14.7
  official_sources:
  - https://github.com/obsidianmd/obsidian-releases/blob/master/community-plugins.json
  - https://github.com/florianwoelki/obsidian-iconize
  - https://github.com/florianwoelki/obsidian-iconize#readme
  official_capability: Icone cartelle e orientamento visuale
  local_scope: Nessuna logica di gioco; non deve essere prerequisito per capire il
    vault
  visible_failure: Icone assenti o rumorose, ma nessun blocco rotto
  release_contract: Manifest incluso, data.json valido, non usato come navigazione
    primaria
  gates:
  - check:release-quality
  - check:repo
  manual_smoke: Aprire una pagina che usa Iconize, verificare resa plugin e fallback
    Markdown senza errori visibili.
- id: media-extended
  name: Media Extended
  version: 4.2.4
  official_sources:
  - https://github.com/obsidianmd/obsidian-releases/blob/master/community-plugins.json
  - https://github.com/aidenlx/media-extended
  - https://github.com/aidenlx/media-extended#readme
  official_capability: Playback e gestione media in note di scena
  local_scope: Usarlo solo per materiali audio/video realmente pronti; indici Dataview
    restano fallback
  visible_failure: Embed media non renderizzati o controlli assenti
  release_contract: Le pagine media devono restare leggibili senza playback
  gates:
  - check:release-quality
  - check:vault
  manual_smoke: Aprire una pagina che usa Media Extended, verificare resa plugin e
    fallback Markdown senza errori visibili.
