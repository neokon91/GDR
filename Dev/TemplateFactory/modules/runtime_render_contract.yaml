id: runtime_render_contract
purpose: Contratto dichiarativo degli scenari minimi di render DataviewJS verificati dal runtime Obsidian.
version: 0.1.0
bridge: z.engine/session_views.js
fixture: Dev/TemplateFactory/tools/fixtures/runtime_demo_pages.json
dataview_contract: Dev/TemplateFactory/modules/runtime_dataview_contract.yaml
