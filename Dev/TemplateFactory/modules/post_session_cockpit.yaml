id: post_session_cockpit
purpose: Contratto operativo per trasformare Post Sessione Guidato in cockpit di chiusura sessione, continuita e prossima apertura.
version: 0.1.0
dashboard:
  page: Risorse/Post Sessione Guidato.md
  workflow: post_sessione
  required_runtime_views:
    - renderPostSessionNow
    - renderPostSessionReadiness
    - renderPostSessionClosureQueues
    - renderPostSessionPropagationQueues
    - renderPostSessionSurfaceLinks
  required_visible_sections:
    - Sessione Da Chiudere
    - Stato Chiusura
    - Canone E Recap
    - Conseguenze E Prossime Mosse
    - Superfici
    - Azioni
panels:
  now:
    runtime_view: renderPostSessionNow
    promise: Decidere cosa chiudere prima per trasformare la sessione in mondo aggiornato.
    answers:
      - appunti senza decisione
      - conseguenze da applicare
      - continuita incompleta
      - recap mancante
      - prossima sessione
  readiness:
    runtime_view: renderPostSessionReadiness
    promise: Misurare appunti, conseguenze, bersagli, recap e prossima sessione.
    answers:
      - appunti live
      - decisioni aperte
      - conseguenze
      - bersagli
      - gap continuita
      - recap
  closure:
    runtime_view: renderPostSessionClosureQueues
    promise: Portare in tabella appunti live, decisioni canoniche e blocchi recap.
    answers:
      - appunti live
      - canone o rumor
      - recap pubblico
      - recap DM
      - prossima apertura
  propagation:
    runtime_view: renderPostSessionPropagationQueues
    promise: Verificare conseguenze, bersagli impattati e prossima sessione.
    answers:
      - conseguenze
      - bersagli
      - prossime mosse
      - prossima sessione
  surfaces:
    runtime_view: renderPostSessionSurfaceLinks
    promise: Aprire gli strumenti giusti per propagare, condividere o preparare dopo la chiusura.
    answers:
      - mondo vivo
      - fuori scena
      - preparazione sessione
      - vista giocatori
queues:
  - id: live_notes
    label: Appunti Live Da Decidere
    table_columns:
      - Appunto
      - Tipo
      - Stato
      - Decisione
      - Impatto
  - id: canon_decisions
    label: Canone Rumor O Archivio
    table_columns:
      - Nota
      - Stato
      - Decisione richiesta
      - Bersagli
  - id: recaps
    label: Recap E Apertura
    table_columns:
      - Blocco
      - Stato
      - Azione
  - id: consequences
    label: Conseguenze E Continuita
    table_columns:
      - Conseguenza
      - Stato
      - Bersagli
      - Azione
      - Prossima mossa
  - id: impacted
    label: Bersagli Impattati
    table_columns:
      - Bersaglio
      - Tipo
      - Pressione
      - Prossima mossa
      - Gap
  - id: next_session
    label: Prossima Sessione
    table_columns:
      - Sessione
      - Stato
      - Data
      - Obiettivo
      - Apertura
surfaces:
  - id: living_world
    label: Motore Mondo Vivo
    plugin: Dataview
    target: Hub/Motore Mondo Vivo.md
    badge: Propaga
    role: applicare conseguenze
    action: Apri quando una conseguenza deve cambiare fazioni, luoghi, missioni o timeline.
    why: Il post-sessione non chiude finche le conseguenze non hanno bersagli e stato.
  - id: offscreen
    label: Fuori scena
    plugin: Dataview
    target: Hub/Cosa Succede Fuori Scena.md
    badge: Reazioni
    role: scegliere chi reagisce
    action: Apri quando PNG, fazioni, missioni o clock devono muoversi prima della prossima sessione.
    why: La chiusura deve produrre reazioni concrete, non solo recap.
  - id: preparation
    label: Preparazione sessione
    plugin: Dataview
    target: Risorse/Preparazione Sessione.md
    badge: Prep
    role: aprire il prossimo tavolo
    action: Apri quando recap e output sono pronti e devi preparare la prossima sessione.
    why: Ogni post-sessione deve finire con una prossima apertura o una scelta di pausa esplicita.
  - id: player_view
    label: Vista Giocatori
    plugin: Dataview
    target: Hub/Vista Giocatori.md
    badge: Sicurezza
    role: controllare recap pubblico
    action: Apri prima di condividere recap, mappe, dispense o note pubbliche.
    why: Il recap pubblico non deve esporre segreti, retcon o prossime mosse DM.
  - id: canon_control
    label: Controllo canone
    plugin: Dataview
    target: Hub/Controllo Canone.md
    badge: Canone
    role: stabilizzare verita
    action: Apri quando un appunto live deve diventare verita, rumor, falso, segreto o retcon.
    why: Le decisioni canoniche vanno esplicitate prima della prossima preparazione.
  - id: missions_base
    label: Missioni aperte
    plugin: Bases
    target: z.bases/Missioni.base
    generated_release: true
    badge: Base
    role: correggere missioni
    action: Apri quando missioni impattate devono aggiornare stato, pressione o prossima mossa.
    why: Le Bases restano output di release, ma accelerano la manutenzione post-sessione.
contracts:
  dashboard_uses_runtime_views: true
  surfaces_must_resolve_to_source_or_generated_release_target: true
  generated_targets_must_stay_release_only: true
  post_session_prioritizes_closure_before_new_preparation: true
