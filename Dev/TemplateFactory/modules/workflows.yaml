id: workflows
purpose: Flussi principali da coprire con template generati e integrazioni plugin.
version: 0.1.0
workflows:
  onboarding_utente:
    audience: user
    user_goal: Partire da zero con il vault gia configurato, senza scegliere tra troppe dashboard.
    entry_points:
      - Inizia Qui.md
    quick_actions:
      - button: nuovo-mondo-homebrew
        label: Crea mondo
        use_when: non hai ancora un mondo giocabile
      - button: preparazione-sessione-risorse-preparazione-sessione
        label: Prepara sessione
        use_when: hai un mondo o almeno un'idea pronta da giocare
      - button: gioca-hub-durante-il-gioco-durante-il-gioco
        label: Gioca
        use_when: sei al tavolo o vuoi vedere il cockpit live
      - button: fuori-scena-hub-cosa-succede-fuori-scena-cosa-succede-fuori-scena
        label: Chiudi e aggiorna
        use_when: la sessione e finita e devi decidere conseguenze
    action_groups:
      orientamento:
        label: Se ti perdi
        purpose: Aprire solo le viste di supporto, non nuove strade parallele.
        actions:
          - button: setup-guidato-risorse-setup-guidato
            label: Recupero strumenti
            use_when: pulsanti, tabelle o pagina iniziale non rispondono
          - button: prima-sessione-in-15-minuti-risorse-prima-sessione-in-15-minuti
            label: Prima sessione in 15 minuti
            use_when: vuoi giocare subito senza completare tutto
          - button: worldbuilder-worldbuilder-dashboard-2
            label: Worldbuilder
            use_when: vuoi espandere il mondo dopo il primo giro
          - button: bibbia-del-mondo-bibbia-del-mondo-2
            label: Bibbia del mondo
            use_when: vuoi consolidare tono e canone
          - button: vista-giocatori-hub-vista-giocatori-vista-giocatori
            label: Vista giocatori
            use_when: devi mostrare materiale senza segreti DM
          - button: quality-report-risorse-quality-report
            label: Report qualita
            use_when: vuoi capire cosa manca nel vault
          - button: aiuto-risorse-faq
            label: Aiuto
            use_when: non capisci cosa fare o una vista non risponde
    required_plugins:
      - Meta Bind
      - Dataview
      - Templater
  setup_guidato:
    user_goal: Capire se il vault e pronto senza leggere impostazioni tecniche.
    entry_points:
      - Risorse/Setup Guidato.md
    quick_actions:
      - button: inizia-qui-inizia-qui
        label: Torna all'inizio
        use_when: i controlli sono pronti o vuoi ripartire dal percorso semplice
      - button: nuovo-mondo-homebrew
        label: Crea mondo
        use_when: gli strumenti base funzionano
      - button: preparazione-sessione-risorse-preparazione-sessione
        label: Prepara sessione
        use_when: hai gia un mondo o vuoi preparare il primo tavolo
      - button: durante-il-gioco-durante-il-gioco
        label: Apri tavolo
        use_when: vuoi verificare il cockpit live
      - button: fuori-scena-hub-cosa-succede-fuori-scena-cosa-succede-fuori-scena
        label: Fuori scena
        use_when: vuoi verificare il ciclo dopo sessione
    action_groups:
      ripristino:
        label: Se qualcosa non va
        purpose: Usare guide di ripristino leggibili prima di toccare impostazioni avanzate.
        actions:
          - button: aiuto-risorse-se-qualcosa-non-funziona
            label: Se qualcosa non funziona
            use_when: plugin, pulsanti o tabelle non sembrano pronti
          - button: prima-sessione-in-15-minuti-risorse-prima-sessione-in-15-minuti
            label: Prima sessione in 15 minuti
            use_when: vuoi saltare il setup profondo e giocare con il minimo
    required_plugins:
      - Meta Bind
      - Dataview
      - Templater
      - Metadata Menu
      - Homepage
  prima_sessione_rapida:
    user_goal: Preparare, giocare e chiudere una prima sessione con il minimo indispensabile.
    entry_points:
      - Risorse/Prima Sessione In 15 Minuti.md
    quick_actions:
      - button: setup-guidato-risorse-setup-guidato-2
        label: Controlla setup
        use_when: non sai se i pulsanti funzionano
      - button: preparazione-sessione-risorse-preparazione-sessione
        label: Prepara
        use_when: devi scrivere obiettivo, apertura e poche ancore
      - button: rendi-sessione-attiva
        label: Rendi attiva
        use_when: hai scelto quale sessione giocare
      - button: durante-il-gioco-durante-il-gioco
        label: Gioca
        use_when: vuoi aprire il cockpit del tavolo
      - button: post-sessione-guidato-risorse-post-sessione-guidato
        label: Chiudi sessione
        use_when: il tavolo e finito
      - button: cosa-succede-fuori-scena-cosa-succede-fuori-scena
        label: Fuori scena
        use_when: devi scegliere una conseguenza o prossima mossa
    action_groups:
      minimo:
        label: Minimo giocabile
        purpose: Creare solo quello che serve alla prima sessione.
        actions:
          - button: nuova-sessione-z-modelli-dm-sessione-md
            label: Nuova sessione
            use_when: non esiste ancora una nota sessione
          - button: creazione-guidata-entita-risorse-creazione-guidata-entita
            label: Creazione entita
            use_when: non sai cosa compilare su PNG, luogo o fazione
          - button: dm-dashboard-1-dm-dashboard
            label: DM Dashboard
            use_when: vuoi vedere lo stato complessivo del tavolo
    required_plugins:
      - Meta Bind
      - Dataview
      - Templater
  dashboard_dm:
    user_goal: Scegliere in pochi secondi se preparare, giocare, consolidare o creare materiale.
    entry_points:
      - Hub/1. DM Dashboard.md
    quick_actions:
      - button: durante-il-gioco-durante-il-gioco
        label: Durante il gioco
        use_when: la sessione e pronta o in corso
      - button: prossima-sessione-risorse-preparazione-sessione
        label: Preparazione sessione
        use_when: devi preparare o scegliere la prossima sessione
      - button: post-sessione-z-bacheche-post-sessione
        label: Post sessione
        use_when: devi chiudere appunti, recap e conseguenze
      - button: aiuto-risorse-se-qualcosa-non-funziona
        label: Aiuto
        use_when: pulsanti, viste o tabelle non rispondono
    action_groups:
      navigazione:
        label: Navigazione DM
        purpose: Aprire le superfici operative senza cercarle nella sidebar.
        actions:
          - button: stato-campagna-mondi-stato-del-mondo
            label: Stato campagna
            use_when: vuoi controllare pressioni e conseguenze aperte
          - button: mondo-vivo-motore-mondo-vivo
            label: Mondo vivo
            use_when: vuoi decidere cosa si muove fuori scena
          - button: fuori-scena-cosa-succede-fuori-scena
            label: Fuori scena
            use_when: devi scegliere le reazioni prima della prossima sessione
          - button: inbox-inbox-inbox
            label: Inbox
            use_when: devi smistare appunti e materiale grezzo
          - button: worldbuilder-worldbuilder-dashboard
            label: Worldbuilder
            use_when: devi costruire o collegare mondo, luoghi e fazioni
          - button: campagna-da-ambientazione-campagna-da-ambientazione
            label: Campagna da ambientazione
            use_when: vuoi trasformare worldbuilding in gioco
      creazione:
        label: Crea per il tavolo
        purpose: Creare materiale strutturato solo quando serve alla prossima sessione.
        actions:
          - button: nuovo-contenuto-dm-z-modelli-dm-dm-router-md
            label: Router DM
            use_when: non sai ancora quale scheda creare
          - button: nuova-campagna-z-modelli-dm-campagna-md
            label: Nuova campagna
            use_when: serve un contenitore di gioco
          - button: campagna-da-regione-z-modelli-dm-campagna-da-regione-md
            label: Campagna da regione
            use_when: vuoi partire da un territorio gia definito
          - button: arco-da-conflitto-z-modelli-dm-arco-da-conflitto-md
            label: Arco da conflitto
            use_when: un conflitto deve diventare struttura di sessioni
          - button: nuova-sessione-z-modelli-dm-sessione-md
            label: Nuova sessione
            use_when: devi preparare il prossimo tavolo
          - button: nuova-missione-z-modelli-dm-missione-md
            label: Nuova missione
            use_when: emerge un obiettivo concreto
          - button: nuovo-clock-z-modelli-dm-tracciato-md
            label: Nuovo clock
            use_when: una pressione va resa visibile
          - button: nuovo-incontro-z-modelli-dm-incontro-md
            label: Nuovo incontro
            use_when: serve una scena pronta o un combattimento
      manutenzione:
        label: Manutenzione
        purpose: Tenere pulito il materiale generato e risolvere problemi prima del tavolo.
        actions:
          - button: preparazione-sessioni-z-bacheche-preparazione-sessioni
            label: Bacheca preparazione
            use_when: devi riordinare le sessioni in corso
          - button: task-dm-risorse-task-dm
            label: Task DM
            use_when: devi vedere lavoro aperto e manutenzione
          - button: smista-generati-risorse-smistamento-bozze-generate
            label: Smista generati
            use_when: materiale generato deve diventare nota utile o archivio
          - button: generatore-fantasy-fantasy-content-generator-open-generator
            label: Generatore fantasy
            use_when: vuoi produrre bozza da smistare, non canone diretto
          - button: guida-dm-risorse-guida-dm
            label: Guida DM
            use_when: devi ricordare il flusso di uso del vault
    required_plugins:
      - Meta Bind
      - Dataview
      - Templater
      - Tasks
  crea_mondo:
    user_goal: Creare un mondo homebrew senza sapere quali file servono.
    entry_points:
      - Inizia Qui.md
      - z.modelli/wizard/Nuovo Mondo Homebrew.md
    required_plugins:
      - Templater
      - Meta Bind
      - Dataview
      - Metadata Menu
      - Folder Notes
    outputs:
      - Mondi
      - luoghi
      - fazioni
      - culture
      - mistero
      - pressione
  espandi_mondo:
    user_goal: Aggiungere entita vive collegate e giocabili.
    entry_points:
      - Hub/Worldbuilder Dashboard.md
    quick_actions:
      - button: nuovo-mondo-homebrew
        label: Nuovo mondo guidato
        use_when: il vault non ha ancora un mondo operativo
      - button: wizard-nuova-entita-viva
        label: Nuova entita viva
        use_when: non sai ancora se serve luogo, fazione, PNG o pressione
      - button: campagna-da-ambientazione-campagna-da-ambientazione
        label: Campagna da ambientazione
        use_when: il mondo deve diventare struttura giocabile
      - button: stato-mondo-mondi-stato-del-mondo
        label: Stato mondo
        use_when: vuoi vedere cosa e gia vivo o incompleto
      - button: motore-mondo-vivo-motore-mondo-vivo
        label: Motore mondo vivo
        use_when: devi decidere chi si muove fuori scena
      - button: controllo-vault-risorse-controllo-vault
        label: Controllo vault
        use_when: il materiale sembra scollegato o non pronto
    action_groups:
      superfici:
        label: Superfici mondo
        purpose: Aprire viste di controllo senza cercarle nella sidebar.
        actions:
          - button: dm-dashboard-1-dm-dashboard
            label: DM Dashboard
            use_when: devi tornare al cockpit principale
          - button: indice-mondo-mondi-mondo
            label: Indice mondo
            use_when: vuoi navigare le categorie del mondo
          - button: atlante-del-mondo-atlante-del-mondo
            label: Atlante del mondo
            use_when: devi controllare luoghi e mappe
          - button: bibbia-del-mondo-bibbia-del-mondo-2
            label: Bibbia del mondo
            use_when: vuoi consolidare canone e tono
          - button: geopolitica-geopolitical-dashboard-2
            label: Geopolitica
            use_when: vuoi leggere poteri, confini e conflitti
          - button: economia-e-rotte-economia-e-rotte-2
            label: Economia e rotte
            use_when: vuoi controllare scambi, risorse e dipendenze
          - button: lore-hub-lore-hub-2
            label: Lore hub
            use_when: devi lavorare su canone e appunti lore
          - button: timeline-mondi-timeline-timeline
            label: Timeline
            use_when: devi storicizzare un evento
          - button: revisione-lore-revisione-lore
            label: Revisione lore
            use_when: devi ripulire o canonizzare materiale
          - button: controllo-canone-controllo-canone
            label: Controllo canone
            use_when: temi duplicati, contraddizioni o segreti esposti
      fondamenta:
        label: Fondamenta giocabili
        purpose: Creare solo pezzi di mondo con un uso potenziale al tavolo.
        actions:
          - button: nuovo-luogo-z-modelli-luogo-router-md
            label: Nuovo luogo
            use_when: serve un posto dove possano agire i personaggi
          - button: nuova-cultura-z-modelli-worldbuilding-cultura-md
            label: Nuova cultura
            use_when: un popolo o costume cambia scelte e scene
          - button: nuova-lingua-z-modelli-worldbuilding-lingua-md
            label: Nuova lingua
            use_when: lingua o scrittura diventano indizio, accesso o ostacolo
          - button: evento-storico-z-modelli-evento-storico-md
            label: Evento storico
            use_when: un fatto deve entrare nella timeline canonica
          - button: nuova-era-z-modelli-worldbuilding-era-storica-md
            label: Nuova era
            use_when: la cronologia ha bisogno di una fase riconoscibile
      pressioni:
        label: Poteri e pressioni
        purpose: Dare al mondo attori capaci di reagire.
        actions:
          - button: nuova-fazione-z-modelli-fazione-router-md
            label: Nuova fazione
            use_when: serve un potere organizzato
          - button: nuovo-culto-z-modelli-fazione-culto-md
            label: Nuovo culto
            use_when: religione o culto devono agire come fazione
          - button: nuovo-personaggio-z-modelli-personaggio-router-md
            label: Nuovo personaggio
            use_when: serve un volto ricorrente o una leva sociale
          - button: nuova-relazione-z-modelli-worldbuilding-relazione-md
            label: Nuova relazione
            use_when: due entita devono influenzarsi a vicenda
          - button: nuovo-conflitto-z-modelli-worldbuilding-conflitto-md
            label: Nuovo conflitto
            use_when: la tensione deve produrre missioni o clock
          - button: nuovo-clock-z-modelli-dm-tracciato-md
            label: Nuovo clock
            use_when: una pressione deve avanzare in modo visibile
      mistero_e_materia:
        label: Mistero, mito e risorse
        purpose: Collegare meraviglia, segreti ed economia a conseguenze pratiche.
        actions:
          - button: cosmologia-z-modelli-worldbuilding-cosmologia-md
            label: Cosmologia
            use_when: piani, dei o regole cosmiche incidono sul gioco
          - button: segreto-o-mistero-z-modelli-worldbuilding-segreto-o-mistero-md
            label: Segreto o mistero
            use_when: serve materiale da rivelare gradualmente
          - button: nuova-creatura-z-modelli-creatura-md
            label: Nuova creatura
            use_when: una presenza deve avere habitat, uso e conseguenze
          - button: nuovo-oggetto-z-modelli-oggetto-md
            label: Nuovo oggetto
            use_when: serve una leva concreta o ricompensa
          - button: nuovo-oggetto-magico-z-modelli-oggetto-magico-md
            label: Oggetto magico
            use_when: una ricompensa deve essere giocabile al tavolo
          - button: nuova-rotta-z-modelli-worldbuilding-rotta-md
            label: Nuova rotta
            use_when: commercio o viaggio devono creare opportunita
          - button: nuova-risorsa-z-modelli-worldbuilding-risorsa-md
            label: Nuova risorsa
            use_when: una merce o dipendenza muove fazioni
          - button: nuovo-mercato-z-modelli-worldbuilding-mercato-o-nodo-commerciale-md
            label: Nuovo mercato
            use_when: serve un nodo economico o sociale
      tavolo_e_mappe:
        label: Tavolo e mappe
        purpose: Trasformare worldbuilding in materiale immediatamente usabile.
        actions:
          - button: nuova-missione-z-modelli-dm-missione-md
            label: Nuova missione
            use_when: una tensione diventa obiettivo giocabile
          - button: nuovo-incontro-z-modelli-dm-incontro-md-default
            label: Nuovo incontro
            use_when: serve una scena pronta
          - button: dispense-mondi-dispense-dispense
            label: Dispense
            use_when: vuoi controllare materiale consegnabile
          - button: mappe-risorse-mappe-mappe
            label: Mappe
            use_when: devi vedere o creare supporti spaziali
          - button: nuova-mappa-zoom-z-modelli-mappe-mappa-zoom-md
            label: Nuova mappa zoom
            use_when: un luogo deve essere navigabile
          - button: nuova-mappa-fronti-z-modelli-mappe-mappa-excalidraw-fronti-excalidraw-md
            label: Nuova mappa fronti
            use_when: vuoi visualizzare poteri, relazioni o pressioni
    required_plugins:
      - Templater
      - Meta Bind
      - Bases
      - Maps
      - Excalidraw
      - Advanced Canvas
      - Iconize
      - Dataview
  fuori_scena:
    user_goal: Scegliere cosa reagisce tra una sessione e l'altra senza perdere conseguenze aperte.
    entry_points:
      - Hub/Cosa Succede Fuori Scena.md
    quick_actions:
      - button: post-sessione-guidato-risorse-post-sessione-guidato
        label: Post sessione guidato
        use_when: devi chiudere appunti, recap e output della sessione
      - button: motore-mondo-vivo-motore-mondo-vivo
        label: Motore mondo vivo
        use_when: vuoi leggere pressioni e prossime mosse aggregate
      - button: stato-campagna-mondi-stato-del-mondo
        label: Stato campagna
        use_when: devi vedere conseguenze, missioni e tracciati aperti
      - button: nuovo-clock-z-modelli-dm-tracciato-md
        label: Nuovo clock
        use_when: una pressione fuori scena deve diventare tracciabile
      - button: applica-conseguenza
        label: Applica conseguenza
        use_when: una conseguenza ha bersagli gia identificati
      - button: propaga-a-entita
        label: Propaga a entita
        use_when: piu note devono ricevere aggiornamenti coerenti
    action_groups:
      continuita:
        label: Continuita
        purpose: Trasformare eventi e scelte in stato leggibile prima della prossima preparazione.
        actions:
          - button: registra-scelta-mondo
            label: Registra scelta mondo
            use_when: una decisione del party deve diventare pressione o stato
          - button: wizard-conseguenza
            label: Conseguenza guidata
            use_when: sai che qualcosa cambia ma non hai ancora i campi corretti
          - button: evento-storico-z-modelli-evento-storico-md
            label: Evento storico
            use_when: la conseguenza deve entrare nella timeline
          - button: prepara-recap-pubblico
            label: Prepara recap pubblico
            use_when: devi separare materiale mostrabile dai segreti DM
      preparazione:
        label: Ponte verso la prossima sessione
        purpose: Convertire reazioni fuori scena in materiale da giocare.
        actions:
          - button: prossima-sessione-risorse-preparazione-sessione
            label: Preparazione sessione
            use_when: hai scelto una pressione da portare al tavolo
          - button: nuova-missione-z-modelli-dm-missione-md
            label: Nuova missione
            use_when: una reazione diventa obiettivo concreto
          - button: nuova-fazione-z-modelli-fazione-router-md
            label: Nuova fazione
            use_when: manca l'attore che produce la pressione
          - button: nuovo-png-z-modelli-personaggio-png-md
            label: Nuovo PNG
            use_when: serve un volto per mostrare la reazione
    required_plugins:
      - Meta Bind
      - Dataview
      - Templater
      - Tasks
  prepara_sessione:
    user_goal: Preparare una sessione radicata nel mondo.
    entry_points:
      - Risorse/Preparazione Sessione.md
    quick_actions:
      - button: nuova-sessione-z-modelli-dm-sessione-md
        label: Nuova sessione
        use_when: non esiste ancora una nota sessione per il prossimo tavolo
      - button: rendi-sessione-attiva
        label: Rendi sessione attiva
        use_when: hai scelto quale sessione userai al tavolo
      - button: wizard-nuova-entita-viva
        label: Nuova entita viva
        use_when: manca un'ancora mondo giocabile
      - button: collega-sessione-attiva
        label: Collega sessione attiva
        use_when: una nota utile non e ancora collegata alla sessione
      - button: nuova-mappa-zoom-z-modelli-mappe-mappa-zoom-md
        label: Nuova mappa
        use_when: serve materiale spaziale pronto al tavolo
      - button: durante-il-gioco-durante-il-gioco
        label: Apri tavolo
        use_when: la sessione e pronta o in corso
    action_groups:
      ancore:
        label: Ancore mondo
        purpose: Collegare materiale vivo prima di compilare i cinque blocchi della sessione.
        actions:
          - button: worldbuilder-worldbuilder-dashboard-2
            label: Worldbuilder
            use_when: mancano mondo, luogo, fazione o pressione
          - button: nuova-missione-z-modelli-dm-missione-md
            label: Nuova missione
            use_when: serve un obiettivo giocabile
          - button: nuovo-clock-z-modelli-dm-tracciato-md
            label: Nuovo clock
            use_when: manca una pressione visibile
          - button: nuova-fazione-z-modelli-fazione-router-md
            label: Nuova fazione
            use_when: serve un potere che reagisce
      materiale:
        label: Materiale pronto
        purpose: Preparare solo cio che puo arrivare davvero al tavolo.
        actions:
          - button: nuovo-incontro-z-modelli-dm-incontro-md
            label: Nuovo incontro
            use_when: serve una scena meccanica o un combattimento
          - button: nuova-dispensa-z-modelli-dispensa-md
            label: Nuova dispensa
            use_when: serve materiale da consegnare o leggere
          - button: nuova-mappa-fronti-z-modelli-mappe-mappa-excalidraw-fronti-excalidraw-md-2
            label: Nuova mappa fronti
            use_when: vuoi visualizzare relazioni, pressioni o fronti
          - button: nuovo-png-z-modelli-personaggio-png-md
            label: Nuovo PNG
            use_when: serve una persona pronta in scena
    required_plugins:
      - Templater
      - Dataview
      - Tasks
      - Kanban
      - Dice Roller
      - Initiative Tracker
      - Fantasy Statblocks
      - Media Extended
  gioca_live:
    user_goal: Gestire sessione, tiri, incontri, media e appunti live da una schermata.
    entry_points:
      - Hub/Durante il Gioco.md
    quick_actions:
      - button: aggiorna-scena-z-modelli-dm-aggiorna-scena-corrente-md
        label: Aggiorna scena
        use_when: cambia la scena corrente e vuoi tenerla visibile alla sessione
      - button: wizard-appunto-live
        label: Appunto live
        use_when: emerge qualcosa ma non sai ancora che tipo di nota sia
      - button: collega-appunto-z-modelli-dm-collega-appunto-live-md
        label: Collega appunto
        use_when: hai gia scritto un appunto Inbox e va agganciato alla sessione attiva
      - button: aggiungi-decisione-z-modelli-dm-aggiungi-decisione-live-md
        label: Aggiungi decisione live
        use_when: vuoi registrare una decisione senza ancora propagare tutto il mondo
      - button: wizard-conseguenza
        label: Conseguenza
        use_when: una scelta cambia missioni, PNG, luoghi, fazioni o clock
      - button: registra-scelta-mondo
        label: Registra scelta mondo
