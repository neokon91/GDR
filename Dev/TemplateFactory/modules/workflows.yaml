id: workflows
purpose: Flussi principali da coprire con template generati e integrazioni plugin.
version: 0.1.0
workflows:
  crea_mondo:
    user_goal: Creare un mondo homebrew senza sapere quali file servono.
    entry_points:
      - Inizia Qui.md
      - z.modelli/wizard/Nuovo Mondo Homebrew.md
    required_plugins:
      - Templater
      - Meta Bind
      - Dataview
      - Metadata Menu
      - Folder Notes
    outputs:
      - Mondi
      - luoghi
      - fazioni
      - culture
      - mistero
      - pressione
  espandi_mondo:
    user_goal: Aggiungere entita vive collegate e giocabili.
    required_plugins:
      - Templater
      - Meta Bind
      - Bases
      - Maps
      - Excalidraw
      - Advanced Canvas
      - Iconize
  prepara_sessione:
    user_goal: Preparare una sessione radicata nel mondo.
    entry_points:
      - Risorse/Preparazione Sessione.md
    quick_actions:
      - button: nuova-sessione-z-modelli-dm-sessione-md
        label: Nuova sessione
        use_when: non esiste ancora una nota sessione per il prossimo tavolo
      - button: rendi-sessione-attiva
        label: Rendi sessione attiva
        use_when: hai scelto quale sessione userai al tavolo
      - button: wizard-nuova-entita-viva
        label: Nuova entita viva
        use_when: manca un'ancora mondo giocabile
      - button: collega-sessione-attiva
        label: Collega sessione attiva
        use_when: una nota utile non e ancora collegata alla sessione
      - button: nuova-mappa-zoom-z-modelli-mappe-mappa-zoom-md
        label: Nuova mappa
        use_when: serve materiale spaziale pronto al tavolo
      - button: durante-il-gioco-durante-il-gioco
        label: Apri tavolo
        use_when: la sessione e pronta o in corso
    required_plugins:
      - Templater
      - Dataview
      - Tasks
      - Kanban
      - Dice Roller
      - Initiative Tracker
      - Fantasy Statblocks
      - Media Extended
  gioca_live:
    user_goal: Gestire sessione, tiri, incontri, media e appunti live da una schermata.
    entry_points:
      - Hub/Durante il Gioco.md
    quick_actions:
      - button: aggiorna-scena-z-modelli-dm-aggiorna-scena-corrente-md
        label: Aggiorna scena
        use_when: cambia la scena corrente e vuoi tenerla visibile alla sessione
      - button: wizard-appunto-live
        label: Appunto live
        use_when: emerge qualcosa ma non sai ancora che tipo di nota sia
      - button: collega-appunto-z-modelli-dm-collega-appunto-live-md
        label: Collega appunto
        use_when: hai gia scritto un appunto Inbox e va agganciato alla sessione attiva
      - button: aggiungi-decisione-z-modelli-dm-aggiungi-decisione-live-md
        label: Aggiungi decisione live
        use_when: vuoi registrare una decisione senza ancora propagare tutto il mondo
      - button: wizard-conseguenza
        label: Conseguenza
        use_when: una scelta cambia missioni, PNG, luoghi, fazioni o clock
      - button: registra-scelta-mondo
        label: Registra scelta mondo
        use_when: vuoi trasformare una decisione in continuita tracciabile
      - button: avanza-clock
        label: Avanza clock
        use_when: il tempo passa o una pressione peggiora
      - button: post-sessione-guidato-risorse-post-sessione-guidato
        label: Chiudi sessione
        use_when: il tavolo finisce
    action_groups:
      cattura_live:
        label: Cattura live
        purpose: Creare note grezze durante il tavolo senza decidere subito la struttura definitiva.
        actions:
          - button: evento-live-z-modelli-live-evento-md
            label: Evento live
            use_when: succede qualcosa che potrebbe diventare canone
          - button: png-improvvisato-z-modelli-live-png-md
            label: PNG improvvisato
            use_when: compare una persona non preparata
          - button: luogo-improvvisato-z-modelli-live-luogo-md
            label: Luogo improvvisato
            use_when: il party entra in un posto non preparato
          - button: nota-grezza-z-modelli-live-nota-grezza-md
            label: Nota grezza
            use_when: devi catturare velocemente senza tassonomia
          - button: conseguenza-z-modelli-live-conseguenza-md
            label: Conseguenza live
            use_when: una scelta produce un effetto da risolvere dopo
      supporto_tavolo:
        label: Supporto al tavolo
        purpose: Aprire strumenti che servono durante la sessione senza cercarli nel vault.
        actions:
          - button: preparazione-sessione-risorse-preparazione-sessione
            label: Preparazione
            use_when: devi tornare alle ancore della sessione
          - button: nuovo-incontro-z-modelli-dm-incontro-md
            label: Nuovo incontro
            use_when: serve una scena meccanica o un combattimento
          - button: party-control-hub-party-control
            label: Party control
            use_when: devi controllare PG, risorse e stato del party
          - button: vista-giocatori-hub-vista-giocatori-vista-giocatori
            label: Vista giocatori
            use_when: devi verificare cosa e mostrabile
      strumenti_avanzati:
        label: Strumenti avanzati
        purpose: Creare o aprire materiale strutturato solo quando il tavolo lo richiede.
        actions:
          - button: nuovo-png-z-modelli-personaggio-png-md
            label: Nuovo PNG
            use_when: un PNG improvvisato diventa ricorrente
          - button: nuovo-luogo-z-modelli-luogo-router-md
            label: Nuovo luogo
            use_when: un luogo diventa rilevante per il mondo
          - button: nuova-missione-z-modelli-dm-missione-md
            label: Nuova missione
            use_when: emerge un obiettivo giocabile
          - button: nuova-fazione-z-modelli-fazione-router-md
            label: Nuova fazione
            use_when: emerge un potere organizzato
          - button: iniziativa-risorse-iniziativa-e-combattimenti
            label: Iniziativa
            use_when: inizia un combattimento o una scena a turni
          - button: nuovo-oggetto-z-modelli-oggetto-md
            label: Nuovo oggetto
            use_when: serve una ricompensa o leva concreta
          - button: evento-storico-z-modelli-evento-storico-md
            label: Evento storico
            use_when: la sessione cambia la timeline
          - button: stato-mondo-mondi-stato-del-mondo
            label: Stato mondo
            use_when: vuoi vedere pressioni e conseguenze aperte
          - button: controllo-vault-risorse-controllo-vault
            label: Controllo vault
            use_when: qualcosa non torna nei controlli o nelle viste
          - button: tabelle-rapide-risorse-tabelle-tabelle
            label: Tabelle rapide
            use_when: ti serve improvvisazione controllata
    required_plugins:
      - Meta Bind
      - Dataview
      - Dice Roller
      - Initiative Tracker
      - Fantasy Statblocks
      - Media Extended
      - Callout Manager
  post_sessione:
    user_goal: Trasformare appunti e conseguenze in mondo aggiornato.
    entry_points:
      - Risorse/Post Sessione Guidato.md
    quick_actions:
      - button: wizard-fine-sessione
        label: Fine sessione guidata
        use_when: devi convertire appunti in output, recap e prossima apertura
      - button: wizard-sessione-da-output
        label: Prossima sessione da output
        use_when: hai chiuso la sessione e vuoi preparare la prossima partendo dall'output
      - button: applica-conseguenza
        label: Applica conseguenza
        use_when: una nota ha conseguenze o impatti ancora aperti
      - button: propaga-a-entita
        label: Propaga a entita
        use_when: bersagli collegati devono ricevere aggiornamenti
      - button: prepara-recap-pubblico
        label: Prepara recap pubblico
        use_when: devi produrre materiale mostrabile ai giocatori
      - button: fuori-scena-hub-cosa-succede-fuori-scena-cosa-succede-fuori-scena
        label: Fuori scena
        use_when: devi scegliere chi reagisce prima della prossima sessione
    action_groups:
      continuita:
        label: Continuita e propagazione
        purpose: Applicare le conseguenze alle note bersaglio prima che restino appunti isolati.
        actions:
          - button: registra-scelta-mondo
            label: Registra scelta mondo
            use_when: una decisione deve diventare stato tracciabile
          - button: applica-conseguenza
            label: Applica conseguenza
            use_when: una conseguenza ha bersagli concreti
          - button: propaga-a-entita
            label: Propaga a entita
            use_when: piu note devono ricevere aggiornamenti
          - button: prepara-recap-pubblico
            label: Prepara recap pubblico
            use_when: devi chiudere con materiale player-safe
    required_plugins:
      - Templater
      - Meta Bind
      - Tasks
      - Kanban
      - Dataview
      - Calendarium
  vista_giocatori:
    user_goal: Mostrare solo materiale sicuro e leggibile ai giocatori.
    required_plugins:
      - Dataview
      - JS Engine
      - Callout Manager
      - Maps
      - Excalidraw
  manutenzione:
    user_goal: Tenere il vault pulito e rilasciabile.
    required_plugins:
      - Linter
      - BRAT
      - Style Settings
      - Tasks
      - Bases
continuity_rules:
  player_choice_to_world_state:
    trigger: BUTTON[registra-scelta-mondo]
    action: registra_scelta_mondo
    executor: z.automazioni/meta_actions.js
    entry_points:
      - Risorse/Post Sessione Guidato.md
      - Hub/Durante il Gioco.md
      - z.automazioni/meta_actions.js
    conditions:
      - field: conseguenze
        required_when: la scelta cambia il mondo
      - field: entita_impattate
        required_when: la scelta tocca note concrete
      - field: propaga_a
        required_when: la scelta deve produrre reazioni future
    effects:
      - field: propagazione_stato
        value: aperta
      - field: aggiornamenti_richiesti
        value: descrizione breve del cambiamento da verificare
      - field: output_sessione
        value: continuita utile alla prossima preparazione
      - target_field: propagato_da
      - target_field: aggiornamenti_richiesti
      - target_field: progress_value
        when: target.categoria == tracciato
    propagation:
      action: registra_scelta_mondo
      target_fields:
        - luoghi
        - personaggi
        - fazioni
        - missioni
        - relazioni
        - tracciati
  apply_consequence:
    trigger: BUTTON[applica-conseguenza]
    action: applica_conseguenza
    executor: z.automazioni/meta_actions.js
    conditions:
      - source_has: entita_impattate or propaga_a
      - source_has: conseguenze or impatto or conseguenza_potenziale
    effects:
      - source_field: applicata_il
      - source_field: applicata_a
      - source_field: propagazione_stato
        value: applicata
      - target_field: propagato_da
      - target_field: aggiornamenti_richiesti
      - target_field: conseguenze
    propagation:
      target_status: da verificare
      dashboard:
        - Mondi/Stato del Mondo.md
        - Hub/Cosa Succede Fuori Scena.md
        - Risorse/Post Sessione Guidato.md
  propagate_entity:
    trigger: BUTTON[propaga-a-entita]
    action: propaga_entita
    executor: z.automazioni/meta_actions.js
    conditions:
      - source_has: propaga_a or entita_impattate
    effects:
      - source_field: propagato_il
      - source_field: propaga_a
      - source_field: propagazione_stato
        value: propagata
      - target_field: connessioni
      - target_field: propagato_da
      - target_field: aggiornamenti_richiesti
    propagation:
      target_status: da verificare
      relation_subjects: update_relazioni_when_target_is_relation
dnd55_world_material_rules:
  encounter_to_world:
    trigger: creazione o aggiornamento incontro
    entities:
      - incontro
    conditions:
      - field: luogo
        required: true
      - any_field:
          - missioni
          - fazioni
          - sessioni
        required: true
      - field: encounter_creatures
        required_when: tipo == combattimento
      - field: creature
        required_when: tipo == combattimento
    effects:
      - field: prossima_mossa
        use: esito se l'incontro viene evitato, perso o vinto
      - field: entita_impattate
        use: note che cambiano per esito dell'incontro
      - field: propaga_a
        use: note da aggiornare dopo la scena
    surfaced_by:
      - renderDnd55MaterialPipeline
      - renderCombatReadiness
  creature_to_world:
    trigger: creazione o aggiornamento creatura homebrew
    entities:
      - creatura
    conditions:
      - any_field:
          - habitat
          - luoghi
        required: true
      - any_field:
          - missioni
          - fazioni
          - sessioni
          - connessioni
        required: true
      - any_field:
          - gancio
          - uso_al_tavolo
        required: true
    effects:
      - field: player_safe
        use: versione mostrabile o rumor sulla creatura
      - field: prossima_mossa
        use: cosa cambia se la creatura resta libera o ignorata
      - field: entita_impattate
        use: prede, luoghi, fazioni o missioni toccate
  reward_to_world:
    trigger: creazione o aggiornamento oggetto o ricompensa
    entities:
      - oggetto
    conditions:
      - any_field:
          - luogo
          - proprietario
        required: true
      - any_field:
          - missioni
          - sessioni
          - connessioni
        required: true
      - any_field:
          - gancio
          - uso_al_tavolo
          - prossima_mossa
        required: true
    effects:
      - field: entita_impattate
        use: chi cambia status, debito, accesso o pericolo
      - field: propaga_a
        use: luoghi, fazioni, missioni o tracciati da aggiornare
      - field: player_safe
        use: descrizione consegnabile al tavolo
