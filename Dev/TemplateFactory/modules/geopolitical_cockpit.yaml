id: geopolitical_cockpit
purpose: Contratto operativo per trasformare Geopolitical Dashboard in cockpit di territori, relazioni, confini e crisi.
version: 0.1.0
dashboard:
  page: Hub/Geopolitical Dashboard.md
  workflow: geopolitica
  required_runtime_views:
    - renderGeopoliticalNow
    - renderGeopoliticalReadiness
    - renderGeopoliticalQueues
    - renderGeopoliticalPressureQueues
    - renderGeopoliticalSurfaceLinks
  required_visible_sections:
    - Filtro
    - Priorita Politica
    - Stato Poteri
    - Territori E Relazioni
    - Confini Risorse Crisi
    - Superfici
    - Azioni
panels:
  now:
    runtime_view: renderGeopoliticalNow
    promise: Decidere quale crisi politica deve muovere il mondo adesso.
    answers:
      - territorio sotto pressione
      - relazione diplomatica
      - buco geopolitico
      - nodo economico politico
  readiness:
    runtime_view: renderGeopoliticalReadiness
    promise: Misurare territori, relazioni, crisi, risorse, rotte, mercati e buchi.
    answers:
      - territori
      - relazioni
      - crisi
      - confini
      - buchi
  powers:
    runtime_view: renderGeopoliticalQueues
    promise: Portare in tabella territori e relazioni diplomatiche giocabili.
    answers:
      - potenze
      - territori
      - trattati
      - rivalita
  pressure:
    runtime_view: renderGeopoliticalPressureQueues
    promise: Vedere confini, risorse, nodi economici e buchi geopolitici.
    answers:
      - confini
      - vassalli
      - risorse strategiche
      - rotte e mercati
      - buchi
  surfaces:
    runtime_view: renderGeopoliticalSurfaceLinks
    promise: Aprire gli strumenti giusti per trasformare politica in mondo vivo e tavolo.
    answers:
      - economia
      - atlante
      - mondo vivo
      - basi politiche
queues:
  - id: territories
    label: Potenze E Territori
    table_columns:
      - Territorio
      - Tipo
      - Stabilita
      - Pressione
      - Legittimita
      - Capitale
      - Governante
      - Prossima mossa
  - id: relations
    label: Relazioni Diplomatiche
    table_columns:
      - Relazione
      - Tipo
      - Soggetti
      - Intensita
      - Pressione
      - Posta
      - Conseguenze
      - Prossima mossa
  - id: borders
    label: Confini Vassalli E Dipendenze
    table_columns:
      - Territorio
      - Confini
      - Vassalli
      - Luogo padre
      - Relazioni
      - Rivali
  - id: resources
    label: Risorse Strategiche Territoriali
    table_columns:
      - Territorio
      - Risorse
      - Fazioni
      - Culture
      - Religioni
      - Crisi
  - id: economic_nodes
    label: Rotte E Nodi Commerciali
    table_columns:
      - Elemento
      - Tipo
      - Stato
      - Luoghi
      - Controllori
      - Risorse
      - Pressione
  - id: gaps
    label: Buchi Geopolitici
    table_columns:
      - Nota
      - Problema
      - Tipo
      - Stato
surfaces:
  - id: economy
    label: Economia e rotte
    plugin: Dataview
    target: Hub/Economia E Rotte.md
    badge: Economia
    role: leggere risorse e pedaggi
    action: Apri quando confini, tasse, rotte o mercati stanno muovendo il conflitto.
    why: La politica diventa concreta quando controlla passaggi, risorse e costi.
  - id: living_world
    label: Motore Mondo Vivo
    plugin: Dataview
    target: Hub/Motore Mondo Vivo.md
    badge: Propaga
    role: applicare crisi
    action: Apri quando una crisi politica deve cambiare fazioni, luoghi o timeline.
    why: Le conseguenze geopolitiche devono propagarsi oltre la dashboard.
  - id: atlas
    label: Atlante
    plugin: Dataview
    target: Hub/Atlante del Mondo.md
    badge: Mappa
    role: vedere confini e territori
    action: Apri quando un conflitto dipende da geografia, rotte o marker.
    why: Confini e potere restano leggibili solo se hanno spazio e posizione.
  - id: lore
    label: Lore hub
    plugin: Dataview
    target: Hub/Lore Hub.md
    badge: Segnali
    role: collegare storia e legittimita
    action: Apri quando una pretesa politica nasce da storia, cultura, religione o rumor.
    why: La legittimita politica vive di memoria, simboli e versioni canoniche.
  - id: preparation
    label: Preparazione sessione
    plugin: Dataview
    target: Risorse/Preparazione Sessione.md
    badge: Tavolo
    role: portare crisi in scena
    action: Apri quando una crisi diplomatica deve diventare scelta della prossima sessione.
    why: Una crisi politica vale se produce scena, costo o decisione per i PG.
  - id: factions_base
    label: Poteri in movimento
    plugin: Bases
    target: z.bases/Fazioni.base
    generated_release: true
    badge: Base
    role: confrontare fazioni
    action: Apri quando piu poteri hanno pressione, alleanze o prossime mosse da ordinare.
    why: Le fazioni sono il lato operativo delle tensioni geopolitiche.
  - id: locations_base
    label: Luoghi operativi
    plugin: Bases
    target: z.bases/Luoghi.base
    generated_release: true
    badge: Base
    role: correggere territori
    action: Apri quando territori, gerarchie, confini o capitali vanno sistemati in tabella.
    why: I territori politici restano luoghi editabili in release, non sorgente manuale.
  - id: worldbuilding_base
    label: Relazioni e societa
    plugin: Bases
    target: z.bases/Worldbuilding.base
    generated_release: true
    badge: Base
    role: correggere relazioni
    action: Apri quando relazioni diplomatiche, culture o societa devono essere allineate.
    why: La Base Worldbuilding copre relazioni e societa senza tracciare z.bases.
contracts:
  dashboard_uses_runtime_views: true
  surfaces_must_resolve_to_source_or_generated_release_target: true
  generated_targets_must_stay_release_only: true
  geopolitics_prioritizes_playable_pressure_before_archive_tables: true
