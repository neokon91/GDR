id: source_pipeline
purpose: Pipeline unica YAML/Jinja/codice utile -> output richiesti dal vault Obsidian.
version: 0.1.0
policy:
  source_roots:
    - Dev/TemplateFactory/modules
    - Dev/TemplateFactory/jinja
    - z.automazioni
    - z.engine
  rule: Per sviluppo umano partire da questa pipeline; i singoli script restano dettagli implementativi.
  no_repo_output_roots:
    - dist
    - z.modelli
    - z.bases
    - z.fileclass
    - Dev/TemplateFactory/examples/generated
steps:
  srd_character_data:
    purpose: Converte YAML SRD personaggio in JSON runtime per PG.
    sources:
      - Dev/TemplateFactory/modules/srd_character_build.yaml
    outputs:
      - z.automazioni/data/srd/core.json
      - z.automazioni/data/srd/opzioni_personaggio.json
    render:
      - node
      - z.automazioni/import_srd_character_data.js
    check:
      - node
      - z.automazioni/check_srd_character_data.js
  obsidian_config:
    purpose: Genera i JSON Obsidian controllati dal progetto.
    sources:
      - Dev/TemplateFactory/modules/obsidian_config.yaml
    outputs:
      - .obsidian/**/*.json
    render:
      - python3
      - z.automazioni/render_obsidian_config.py
    check:
      - python3
      - z.automazioni/render_obsidian_config.py
      - --check
  plugin_matrix:
    purpose: Genera la matrice operativa dei plugin.
    sources:
      - Dev/TemplateFactory/modules/plugin_matrix.yaml
    outputs:
      - Dev/plugin_matrix.json
    render:
      - python3
      - z.automazioni/render_plugin_matrix.py
    check:
      - python3
      - z.automazioni/render_plugin_matrix.py
      - --check
  plugin_usage_audit:
    purpose: Verifica che ogni plugin installato abbia classe, contratto, binding tecnico e superficie reale.
    sources:
      - Dev/TemplateFactory/modules/plugin_matrix.yaml
      - Dev/TemplateFactory/modules/plugin_contracts.yaml
      - Dev/TemplateFactory/modules/plugin_bindings.yaml
      - Dev/TemplateFactory/modules/release_boundary.yaml
      - Dev/TemplateFactory/modules/live_acceptance.yaml
    outputs:
      - memoria
    render:
      - node
      - z.automazioni/check_plugin_usage_audit.js
    check:
      - node
      - z.automazioni/check_plugin_usage_audit.js
  templater_wrappers:
    purpose: Genera i wrapper richiesti da Templater nella user_scripts_folder.
    sources:
      - Dev/TemplateFactory/modules/templater_wrappers.yaml
    outputs:
      - z.automazioni/templater/*.js
    render:
      - python3
      - z.automazioni/render_templater_wrappers.py
    check:
      - python3
      - z.automazioni/render_templater_wrappers.py
      - --check
  metabind_config:
    purpose: Assembla la configurazione Meta Bind da impostazioni, input e pulsanti YAML.
    sources:
      - Dev/TemplateFactory/modules/metabind_config.yaml
      - Dev/TemplateFactory/modules/metabind_inputs.yaml
      - Dev/TemplateFactory/modules/metabind_buttons.yaml
    outputs:
      - .obsidian/plugins/obsidian-meta-bind-plugin/data.json
    render:
      - python3
      - z.automazioni/render_metabind_config.py
    check:
      - python3
      - z.automazioni/render_metabind_config.py
      - --check
  workflow_data:
    purpose: Genera quick_actions.json da workflows.yaml.
    sources:
      - Dev/TemplateFactory/modules/workflows.yaml
    outputs:
      - z.automazioni/data/workflows/quick_actions.json
    render:
      - node
      - z.automazioni/generate_workflow_data.js
    check:
      - node
      - z.automazioni/generate_workflow_data.js
      - --check
  bacheche:
    purpose: Genera le bacheche Kanban operative del vault finale da YAML/Jinja.
    sources:
      - Dev/TemplateFactory/modules/bacheche.yaml
      - Dev/TemplateFactory/jinja/bacheca_kanban.md.j2
      - Dev/TemplateFactory/jinja/bacheche_readme.md.j2
    outputs:
      - z.bacheche/*.md
    render:
      - python3
      - z.automazioni/render_bacheche.py
    check:
      - python3
      - z.automazioni/render_bacheche.py
      - --check
  resource_indexes:
    purpose: Genera indici semplici di risorse finali da YAML/Jinja.
    sources:
      - Dev/TemplateFactory/modules/resource_indexes.yaml
      - Dev/TemplateFactory/jinja/resource_index.md.j2
    outputs:
      - Risorse/Audio/Audio.md
      - Risorse/Video/Video.md
      - Risorse/Immagini/Immagini.md
      - Risorse/Dispense/Dispense.md
    render:
      - python3
      - z.automazioni/render_resource_indexes.py
    check:
      - python3
      - z.automazioni/render_resource_indexes.py
      - --check
  resource_hub:
    purpose: Genera il catalogo centrale Risorse/Risorse.md da YAML/Jinja.
    sources:
      - Dev/TemplateFactory/modules/resource_hub.yaml
      - Dev/TemplateFactory/jinja/resource_hub.md.j2
    outputs:
      - Risorse/Risorse.md
    render:
      - python3
      - z.automazioni/render_resource_hub.py
    check:
      - python3
      - z.automazioni/render_resource_hub.py
      - --check
  workflow_blocks:
    purpose: Renderizza blocchi azioni rapide dentro le pagine operative.
    sources:
      - Dev/TemplateFactory/modules/workflows.yaml
      - z.automazioni/data/workflows/quick_actions.json
    outputs:
      - Hub/**/*.md
      - Risorse/**/*.md
      - z.bacheche/**/*.md
    render:
      - node
      - z.automazioni/render_workflow_quick_actions.js
    check:
      - node
      - z.automazioni/render_workflow_quick_actions.js
      - --check
  dm_dashboard_cockpit:
    purpose: Genera il contratto runtime della DM Dashboard senza scrivere root generate.
    sources:
      - Dev/TemplateFactory/modules/dm_dashboard_cockpit.yaml
      - Dev/TemplateFactory/modules/bases_views.yaml
      - Dev/TemplateFactory/modules/frontmatter_profiles.yaml
      - Hub/1. DM Dashboard.md
      - z.engine/session_dm_dashboard.js
      - z.engine/session_views.js
    outputs:
      - z.automazioni/data/runtime/dm_dashboard_cockpit.json
    render:
      - node
      - z.automazioni/render_dm_dashboard_cockpit.js
    check:
      - node
      - z.automazioni/render_dm_dashboard_cockpit.js
      - --check
  vault_control_cockpit:
    purpose: Genera il contratto runtime del cockpit Controllo Vault senza scrivere root generate.
    sources:
      - Dev/TemplateFactory/modules/vault_control_cockpit.yaml
      - Dev/TemplateFactory/modules/bases_views.yaml
      - Dev/TemplateFactory/modules/frontmatter_profiles.yaml
      - Risorse/Controllo Vault.md
      - z.engine/session_vault_control.js
      - z.engine/session_views.js
    outputs:
      - z.automazioni/data/runtime/vault_control_cockpit.json
    render:
      - node
      - z.automazioni/render_vault_control_cockpit.js
    check:
      - node
      - z.automazioni/render_vault_control_cockpit.js
      - --check
  worldbuilding_cockpit:
    purpose: Genera il contratto runtime del cockpit worldbuilding senza scrivere root generate.
    sources:
      - Dev/TemplateFactory/modules/worldbuilding_cockpit.yaml
      - Dev/TemplateFactory/modules/bases_views.yaml
      - Dev/TemplateFactory/modules/frontmatter_profiles.yaml
      - Hub/Worldbuilder Dashboard.md
      - z.engine/session_views.js
    outputs:
      - z.automazioni/data/runtime/worldbuilding_cockpit.json
    render:
      - node
      - z.automazioni/render_worldbuilding_cockpit.js
    check:
      - node
      - z.automazioni/render_worldbuilding_cockpit.js
      - --check
  atlas_cockpit:
    purpose: Genera il contratto runtime del cockpit atlante senza scrivere root generate.
    sources:
      - Dev/TemplateFactory/modules/atlas_cockpit.yaml
      - Dev/TemplateFactory/modules/bases_views.yaml
      - Dev/TemplateFactory/modules/frontmatter_profiles.yaml
      - Hub/Atlante del Mondo.md
      - z.engine/session_atlas.js
      - z.engine/session_views.js
    outputs:
      - z.automazioni/data/runtime/atlas_cockpit.json
    render:
      - node
      - z.automazioni/render_atlas_cockpit.js
    check:
      - node
      - z.automazioni/render_atlas_cockpit.js
      - --check
  worldbuilding_control_cockpit:
    purpose: Genera il contratto runtime dell'audit Controllo Worldbuilding senza scrivere root generate.
    sources:
      - Dev/TemplateFactory/modules/worldbuilding_control_cockpit.yaml
      - Dev/TemplateFactory/modules/bases_views.yaml
      - Dev/TemplateFactory/modules/frontmatter_profiles.yaml
      - Hub/Controllo Worldbuilding.md
      - z.engine/session_worldbuilding_control.js
      - z.engine/session_views.js
    outputs:
      - z.automazioni/data/runtime/worldbuilding_control_cockpit.json
    render:
      - node
      - z.automazioni/render_worldbuilding_control_cockpit.js
    check:
      - node
      - z.automazioni/render_worldbuilding_control_cockpit.js
      - --check
  canon_control_cockpit:
    purpose: Genera il contratto runtime del cockpit Controllo Canone senza scrivere root generate.
    sources:
      - Dev/TemplateFactory/modules/canon_control_cockpit.yaml
      - Dev/TemplateFactory/modules/bases_views.yaml
      - Dev/TemplateFactory/modules/frontmatter_profiles.yaml
      - Hub/Controllo Canone.md
      - z.engine/session_canon_control.js
      - z.engine/session_views.js
    outputs:
      - z.automazioni/data/runtime/canon_control_cockpit.json
    render:
      - node
      - z.automazioni/render_canon_control_cockpit.js
    check:
      - node
      - z.automazioni/render_canon_control_cockpit.js
      - --check
  living_world_cockpit:
    purpose: Genera il contratto runtime del cockpit Motore Mondo Vivo senza scrivere root generate.
    sources:
      - Dev/TemplateFactory/modules/living_world_cockpit.yaml
      - Dev/TemplateFactory/modules/bases_views.yaml
      - Dev/TemplateFactory/modules/frontmatter_profiles.yaml
      - Hub/Motore Mondo Vivo.md
      - z.engine/session_living_world.js
      - z.engine/session_views.js
    outputs:
      - z.automazioni/data/runtime/living_world_cockpit.json
    render:
      - node
      - z.automazioni/render_living_world_cockpit.js
    check:
      - node
      - z.automazioni/render_living_world_cockpit.js
      - --check
  economy_cockpit:
    purpose: Genera il contratto runtime del cockpit Economia E Rotte senza scrivere root generate.
    sources:
      - Dev/TemplateFactory/modules/economy_cockpit.yaml
      - Dev/TemplateFactory/modules/bases_views.yaml
      - Dev/TemplateFactory/modules/frontmatter_profiles.yaml
      - Hub/Economia E Rotte.md
      - z.engine/session_economy.js
      - z.engine/session_views.js
    outputs:
      - z.automazioni/data/runtime/economy_cockpit.json
    render:
      - node
      - z.automazioni/render_economy_cockpit.js
    check:
      - node
      - z.automazioni/render_economy_cockpit.js
      - --check
  lore_cockpit:
    purpose: Genera il contratto runtime del cockpit Lore Hub senza scrivere root generate.
    sources:
      - Dev/TemplateFactory/modules/lore_cockpit.yaml
      - Dev/TemplateFactory/modules/bases_views.yaml
      - Dev/TemplateFactory/modules/frontmatter_profiles.yaml
      - Hub/Lore Hub.md
      - z.engine/session_lore.js
      - z.engine/session_views.js
    outputs:
      - z.automazioni/data/runtime/lore_cockpit.json
    render:
      - node
      - z.automazioni/render_lore_cockpit.js
    check:
      - node
      - z.automazioni/render_lore_cockpit.js
      - --check
  offscreen_cockpit:
    purpose: Genera il contratto runtime del cockpit Cosa Succede Fuori Scena senza scrivere root generate.
    sources:
      - Dev/TemplateFactory/modules/offscreen_cockpit.yaml
      - Dev/TemplateFactory/modules/bases_views.yaml
      - Dev/TemplateFactory/modules/frontmatter_profiles.yaml
      - Hub/Cosa Succede Fuori Scena.md
      - z.engine/session_offscreen.js
      - z.engine/session_views.js
    outputs:
      - z.automazioni/data/runtime/offscreen_cockpit.json
    render:
      - node
      - z.automazioni/render_offscreen_cockpit.js
    check:
      - node
      - z.automazioni/render_offscreen_cockpit.js
      - --check
  live_table_cockpit:
    purpose: Genera il contratto runtime del cockpit Durante il Gioco senza scrivere root generate.
    sources:
      - Dev/TemplateFactory/modules/live_table_cockpit.yaml
      - Dev/TemplateFactory/modules/bases_views.yaml
      - Dev/TemplateFactory/modules/frontmatter_profiles.yaml
      - Hub/Durante il Gioco.md
      - z.engine/session_live_table.js
      - z.engine/session_views.js
    outputs:
      - z.automazioni/data/runtime/live_table_cockpit.json
    render:
      - node
      - z.automazioni/render_live_table_cockpit.js
    check:
      - node
      - z.automazioni/render_live_table_cockpit.js
      - --check
  user_path:
    purpose: Verifica il percorso utente primario dichiarato in YAML.
    sources:
      - Dev/TemplateFactory/modules/user_path.yaml
      - Dev/TemplateFactory/modules/workflows.yaml
      - z.automazioni/check_user_path.js
      - z.automazioni/data/workflows/quick_actions.json
      - .obsidian/plugins/obsidian-meta-bind-plugin/data.json
    outputs:
      - memoria
    render:
      - node
      - z.automazioni/check_user_path.js
    check:
      - node
      - z.automazioni/check_user_path.js
  validation_contract:
    purpose: Verifica i contratti YAML usati dai check di dominio e qualita delle note.
    sources:
      - Dev/TemplateFactory/modules/validation_contract.yaml
      - Dev/TemplateFactory/modules/fields_core.yaml
      - Dev/TemplateFactory/modules/frontmatter_profiles.yaml
      - Dev/TemplateFactory/modules/runtime_profiles.yaml
    outputs:
      - memoria
    render:
      - node
      - z.automazioni/check_validation_contract.js
    check:
      - node
      - z.automazioni/check_validation_contract.js
  session_context_contract:
    purpose: Genera il contratto JSON letto dal runtime legacy session_context.js.
    sources:
      - Dev/TemplateFactory/modules/runtime_profiles.yaml
      - Dev/TemplateFactory/modules/fields_core.yaml
      - z.automazioni/render_session_context_contract.py
    outputs:
      - z.automazioni/data/runtime/session_context.json
    render:
      - python3
      - z.automazioni/render_session_context_contract.py
    check:
      - python3
      - z.automazioni/render_session_context_contract.py
      - --check
  repo_quality_contract:
    purpose: Verifica il contratto YAML dei gate repository usati da check_vault.
    sources:
      - Dev/TemplateFactory/modules/repo_quality_contract.yaml
      - Dev/TemplateFactory/modules/obsidian_config.yaml
      - Dev/TemplateFactory/modules/release_boundary.yaml
      - Dev/TemplateFactory/modules/workflows.yaml
      - Dev/README.md
      - z.automazioni/check_repo_quality_contract.js
    outputs:
      - memoria
    render:
      - node
      - z.automazioni/check_repo_quality_contract.js
    check:
      - node
      - z.automazioni/check_repo_quality_contract.js
  release_quality_contract:
    purpose: Verifica il contratto YAML dei gate statici di release quality.
    sources:
      - Dev/TemplateFactory/modules/release_quality_contract.yaml
      - Dev/TemplateFactory/modules/metabind_inputs.yaml
      - Dev/TemplateFactory/modules/metabind_buttons.yaml
      - z.automazioni/check_release_quality.js
    outputs:
      - memoria
    render:
      - node
      - z.automazioni/check_release_quality.js
      - --contract-check
    check:
      - node
      - z.automazioni/check_release_quality.js
      - --contract-check
  release_folder_notes:
    purpose: Verifica le folder notes utente di release da release_boundary.yaml e Jinja.
    sources:
      - Dev/TemplateFactory/modules/release_boundary.yaml
      - Dev/TemplateFactory/jinja/release_folder_note.md.j2
      - z.automazioni/data/workflows/quick_actions.json
    outputs:
      - memoria
    render:
      - python3
      - z.automazioni/render_release_folder_notes.py
      - --check
    check:
      - python3
      - z.automazioni/render_release_folder_notes.py
      - --check
  obsidian_user_acceptance:
    purpose: Verifica il contratto dello smoke live Obsidian senza aprire l'app.
    sources:
      - Dev/TemplateFactory/modules/live_acceptance.yaml
      - z.automazioni/check_obsidian_user_acceptance.js
    outputs:
      - memoria
    render:
      - node
      - z.automazioni/check_obsidian_user_acceptance.js
      - --contract-check
    check:
      - node
      - z.automazioni/check_obsidian_user_acceptance.js
      - --contract-check
  template_previews:
    purpose: Verifica blueprint YAML e Jinja senza materializzare z.modelli nel repo sorgente.
    sources:
      - Dev/TemplateFactory/modules/template_blueprints.yaml
      - Dev/TemplateFactory/jinja
    outputs:
      - memoria
    render:
      - python3
      - z.automazioni/check_template_factory.py
    check:
      - python3
      - z.automazioni/check_template_factory.py
  metadata_surfaces:
    purpose: Verifica fileClass/Bases generate dai moduli metadata senza scrivere output nel repo sorgente.
    release_only: true
    sources:
      - Dev/TemplateFactory/modules/frontmatter_profiles.yaml
      - Dev/TemplateFactory/modules/bases_views.yaml
    outputs:
      - z.fileclass/**/*.md
      - z.bases/**/*.base
      - z.bases/README.md
    render:
      - python3
      - z.automazioni/render_metadata_surfaces.py
      - --check
    check:
      - python3
      - z.automazioni/render_metadata_surfaces.py
      - --check
