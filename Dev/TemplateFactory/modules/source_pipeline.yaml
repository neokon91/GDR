id: source_pipeline
purpose: Pipeline unica YAML/Jinja/codice utile -> output richiesti dal vault Obsidian.
version: 0.1.0
policy:
  source_roots:
    - Dev/TemplateFactory/modules
    - Dev/TemplateFactory/jinja
    - z.automazioni
    - z.engine
  rule: Per sviluppo umano partire da questa pipeline; i singoli script restano dettagli implementativi.
  no_repo_output_roots:
    - dist
    - z.modelli
    - z.bases
    - z.fileclass
    - Dev/TemplateFactory/examples/generated
steps:
  srd_character_data:
    purpose: Converte YAML SRD personaggio in JSON runtime per PG.
    sources:
      - Dev/TemplateFactory/modules/srd_character_build.yaml
    outputs:
      - z.automazioni/data/srd/core.json
      - z.automazioni/data/srd/opzioni_personaggio.json
    render:
      - node
      - z.automazioni/import_srd_character_data.js
    check:
      - node
      - z.automazioni/check_srd_character_data.js
  obsidian_config:
    purpose: Genera i JSON Obsidian controllati dal progetto.
    sources:
      - Dev/TemplateFactory/modules/obsidian_config.yaml
    outputs:
      - .obsidian/**/*.json
    render:
      - python3
      - z.automazioni/render_obsidian_config.py
    check:
      - python3
      - z.automazioni/render_obsidian_config.py
      - --check
  plugin_matrix:
    purpose: Genera la matrice operativa dei plugin.
    sources:
      - Dev/TemplateFactory/modules/plugin_matrix.yaml
    outputs:
      - Dev/plugin_matrix.json
    render:
      - python3
      - z.automazioni/render_plugin_matrix.py
    check:
      - python3
      - z.automazioni/render_plugin_matrix.py
      - --check
  entity_model_contract:
    purpose: Verifica il catalogo YAML delle categorie entita e impedisce il ritorno della nota lunga in Risorse.
    sources:
      - Dev/TemplateFactory/modules/entity_model.yaml
      - Dev/TemplateFactory/modules/fields_core.yaml
      - Dev/TemplateFactory/modules/frontmatter_profiles.yaml
      - Dev/TemplateFactory/modules/validation_contract.yaml
      - z.automazioni/check_entity_model.js
    outputs:
      - memoria
    render:
      - node
      - z.automazioni/check_entity_model.js
    check:
      - node
      - z.automazioni/check_entity_model.js
  templater_wrappers:
    purpose: Genera i wrapper richiesti da Templater nella user_scripts_folder.
    sources:
      - Dev/TemplateFactory/modules/templater_wrappers.yaml
    outputs:
      - z.automazioni/templater/*.js
    render:
      - python3
      - z.automazioni/render_templater_wrappers.py
    check:
      - python3
      - z.automazioni/render_templater_wrappers.py
      - --check
  metabind_config:
    purpose: Assembla la configurazione Meta Bind da impostazioni, input e pulsanti YAML.
    sources:
      - Dev/TemplateFactory/modules/metabind_config.yaml
      - Dev/TemplateFactory/modules/metabind_inputs.yaml
      - Dev/TemplateFactory/modules/metabind_buttons.yaml
    outputs:
      - .obsidian/plugins/obsidian-meta-bind-plugin/data.json
    render:
      - python3
      - z.automazioni/render_metabind_config.py
    check:
      - python3
      - z.automazioni/render_metabind_config.py
      - --check
  workflow_data:
    purpose: Genera quick_actions.json da workflows.yaml.
    sources:
      - Dev/TemplateFactory/modules/workflows.yaml
    outputs:
      - z.automazioni/data/workflows/quick_actions.json
    render:
      - node
      - z.automazioni/generate_workflow_data.js
    check:
      - node
      - z.automazioni/generate_workflow_data.js
      - --check
  bacheche:
    purpose: Genera le bacheche Kanban operative del vault finale da YAML/Jinja.
    sources:
      - Dev/TemplateFactory/modules/bacheche.yaml
      - Dev/TemplateFactory/jinja/bacheca_kanban.md.j2
      - Dev/TemplateFactory/jinja/bacheche_readme.md.j2
    outputs:
      - z.bacheche/*.md
    render:
      - python3
      - z.automazioni/render_bacheche.py
    check:
      - python3
      - z.automazioni/render_bacheche.py
      - --check
  resource_support_pages:
    purpose: Genera guide Risorse di supporto da YAML/Jinja, lasciandole fuori dal sorgente tracciato.
    sources:
      - Dev/TemplateFactory/modules/resource_support_pages.yaml
      - Dev/TemplateFactory/jinja/resource_support_page.md.j2
      - z.automazioni/render_resource_support_pages.py
    outputs:
      - Risorse/Aspetto Vault.md
      - Risorse/Callout GDR.md
      - Risorse/Canvas Per GDR.md
      - Risorse/Come Usare I Clock.md
      - Risorse/Excalidraw Per GDR.md
      - Risorse/FAQ.md
      - Risorse/Iniziativa e Combattimenti.md
      - Risorse/Mappe Bases.md
      - Risorse/Preset Calendario.md
      - Risorse/Prima Sessione In 15 Minuti.md
      - Risorse/Primo Avvio Strumenti.md
      - Risorse/Se Qualcosa Non Funziona.md
      - Risorse/Setup Guidato.md
      - Risorse/Task DM.md
    render:
      - python3
      - z.automazioni/render_resource_support_pages.py
    check:
      - python3
      - z.automazioni/render_resource_support_pages.py
      - --check
  plugin_usage_audit:
    purpose: Verifica che ogni plugin installato abbia classe, contratto, binding tecnico e superficie reale.
    sources:
      - Dev/TemplateFactory/modules/plugin_matrix.yaml
      - Dev/TemplateFactory/modules/plugin_contracts.yaml
      - Dev/TemplateFactory/modules/plugin_bindings.yaml
      - Dev/TemplateFactory/modules/release_boundary.yaml
      - Dev/TemplateFactory/modules/live_acceptance.yaml
      - Dev/plugin_matrix.json
      - .obsidian/plugins/obsidian-meta-bind-plugin/data.json
      - z.bacheche/Manutenzione Vault.md
    outputs:
      - memoria
    render:
      - node
      - z.automazioni/check_plugin_usage_audit.js
    check:
      - node
      - z.automazioni/check_plugin_usage_audit.js
  resource_indexes:
    purpose: Genera indici semplici di risorse finali da YAML/Jinja.
    sources:
      - Dev/TemplateFactory/modules/resource_indexes.yaml
      - Dev/TemplateFactory/jinja/resource_index.md.j2
    outputs:
      - Risorse/Audio/Audio.md
      - Risorse/Video/Video.md
      - Risorse/Immagini/Immagini.md
      - Risorse/Dispense/Dispense.md
    render:
      - python3
      - z.automazioni/render_resource_indexes.py
    check:
      - python3
      - z.automazioni/render_resource_indexes.py
      - --check
  resource_hub:
    purpose: Genera il catalogo centrale Risorse/Risorse.md da YAML/Jinja.
    sources:
      - Dev/TemplateFactory/modules/resource_hub.yaml
      - Dev/TemplateFactory/jinja/resource_hub.md.j2
    outputs:
      - Risorse/Risorse.md
    render:
      - python3
      - z.automazioni/render_resource_hub.py
    check:
      - python3
      - z.automazioni/render_resource_hub.py
      - --check
  workflow_blocks:
    purpose: Renderizza blocchi azioni rapide dentro le pagine operative.
    sources:
      - Dev/TemplateFactory/modules/workflows.yaml
      - z.automazioni/data/workflows/quick_actions.json
    outputs:
      - Hub/**/*.md
      - Risorse/**/*.md
      - z.bacheche/**/*.md
    render:
      - node
      - z.automazioni/render_workflow_quick_actions.js
    check:
      - node
      - z.automazioni/render_workflow_quick_actions.js
      - --check
