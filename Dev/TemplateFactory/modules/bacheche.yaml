id: bacheche
purpose: Sorgente dichiarativa delle bacheche Kanban operative materializzate nel vault finale.
version: 0.1.0
boards:
  - path: z.bacheche/Bacheca Creature.md
    columns:
      - title: Idee
        tasks:
          - 'Nuova creatura #task'
      - title: Da Preparare
        tasks:
          - 'Statblock #task'
      - title: Pronte
        tasks:
          - 'Incontro pronto #task'
      - title: Usate
        tasks:
          - 'Da archiviare o riutilizzare #task'
  - path: z.bacheche/Manutenzione Vault.md
    columns:
      - title: Mensile
        tasks:
          - 'Aprire [[Risorse/Controllo Vault]] e [[Risorse/Quality Report]] #task 🔁 every month 📅 2026-06-01'
          - 'Verificare che [[Vista Giocatori]] non mostri segreti #task 🔁 every month 📅 2026-06-01'
          - 'Controllare [[Risorse/Se Qualcosa Non Funziona]] se dashboard, pulsanti o tabelle mostrano errori #task 🔁 every month 📅 2026-06-01'
      - title: Release
        tasks:
          - 'Aprire [[Inizia Qui]] e verificare che crea mondo, prepara, gioca e aggiorna siano raggiungibili #task 🔺'
          - 'Aprire [[Vista Giocatori]] e controllare recap, mappe e dispense pubbliche #task 🔺'
          - 'Aprire [[Risorse/Controllo Vault]] e risolvere blocchi critici prima di condividere il vault #task 🔼'
          - 'Aprire [[Risorse/Quality Report]] e controllare note incomplete, materiale pubblico e buchi operativi #task 🔼'
  - path: z.bacheche/Post Sessione.md
    columns:
      - title: Guida Rapida
        tasks:
          - 'Aprire [[Risorse/Post Sessione Guidato]] se vuoi il percorso passo passo #task'
          - 'Aprire [[Hub/Cosa Succede Fuori Scena]] per decidere quali attori reagiscono #task'
          - 'Aprire [[Risorse/Materiali Al Tavolo]] se devi verificare cosa e stato usato o consegnato #task'
      - title: Appunti Da Smistare
        tasks:
          - 'Aprire [[Durante il Gioco]] e copiare gli appunti grezzi nella sessione giocata #task 🔺'
          - 'Aprire [[Inbox/Inbox]] e classificare Evento Live, PNG improvvisati, luoghi improvvisati e conseguenze #task 🔺'
          - 'Separare fatti canonici, rumor, segreti e ipotesi del GM #task 🔼'
          - 'Collegare ogni appunto utile a sessione, mondo e almeno una nota impattata #task 🔼'
      - title: Canonizzare Lore
        tasks:
          - 'Aprire [[Mondi/Stato del Mondo]] e controllare Conseguenze Aperte #task'
          - 'Canonizzare gli eventi veri o archiviarli #task'
          - 'Creare o aggiornare evento storico in [[Mondi/Timeline/Timeline]] #task'
          - 'Aggiornare PNG cambiati #task'
          - 'Aggiornare luoghi cambiati #task'
          - 'Aggiornare fazioni in movimento #task'
          - 'Scrivere cosa fanno fuori scena i PNG importanti #task'
      - title: Missioni e Ricompense
        tasks:
          - 'Aggiornare stati, pressione e prossima_mossa delle missioni #task 🔺'
          - 'Aggiornare clock e progress track in [[Mondi/Tracciati/Tracciati]] #task 🔺'
          - 'Segnare oggetti consegnati o promessi #task'
          - 'Segnare dispense consegnate #task'
          - 'Annotare conseguenze aperte sulle missioni coinvolte #task'
      - title: Chiudere Sessione
        tasks:
          - 'Togliere `attiva: true` alla sessione giocata #task 🔺'
          - 'Portare `stato` a `giocata` #task 🔺'
          - 'Scegliere o creare la prossima sessione attiva #task 🔺'
          - 'Controllare che non ci siano sessioni multiple attive #task 🔺'
      - title: Prossima Apertura
        tasks:
          - 'Scrivere riassunto da leggere #task 🔼'
          - 'Preparare scena iniziale #task 🔺'
          - 'Preparare clock o pressione #task 🔼'
          - 'Eseguire [[Risorse/Controllo Vault]] #task'
          - 'Controllare [[Hub/Cosa Succede Fuori Scena]] e scegliere una prossima mossa da mostrare subito #task'
  - path: z.bacheche/Preparazione Sessioni.md
    columns:
      - title: Idee
        tasks:
          - 'Aprire [[Risorse/Preparazione Sessione]] e scegliere la sessione da rendere giocabile #task 🔺'
          - 'Scrivere uno spunto di scena collegato a luogo, missione o pressione #task'
      - title: Da Preparare
        tasks:
          - 'Collegare almeno un luogo alla sessione #task 🔼'
          - 'Collegare PNG o fazioni che possono reagire #task 🔼'
          - 'Collegare o creare incontri pronti in [[Risorse/Iniziativa e Combattimenti]] #task 🔼'
          - 'Collegare ricompense, oggetti o indizi alla missione #task'
          - 'Aprire [[Risorse/Mappe/Mappe]] e verificare se serve una mappa al tavolo #task'
      - title: Pronto Per Il Tavolo
        tasks:
          - 'Impostare una sola prossima sessione con `attiva: true` #task 🔺'
          - 'Aprire [[Risorse/Materiali Al Tavolo]] e controllare mappe, dispense, incontri e media #task 🔺'
      - title: Dopo Sessione
        tasks:
          - 'Aprire [[Risorse/Post Sessione Guidato]] e aggiornare conseguenze #task 🔺'
          - 'Spostare appunti nelle note del mondo o in [[Inbox/Inbox]] #task 🔼'
readme:
  path: z.bacheche/README.md
  title: z.bacheche
  intro: Bacheche Kanban operative del vault.
  boards:
    - file: Preparazione Sessioni.md
      use: Coda di lavoro prima della sessione.
    - file: Post Sessione.md
      use: Consolidamento, canonizzazione e prossima apertura.
    - file: Bacheca Creature.md
      use: Idee e stato delle creature.
    - file: Manutenzione Vault.md
      use: Controlli tecnici e ricorrenze di manutenzione.
  guidelines:
    - 'Le bacheche sono Markdown con frontmatter `kanban-plugin: board`. Non usarle come archivio definitivo: le decisioni importanti devono finire in note canoniche dentro `Mondi/`, `Campagne/` o `Risorse/`.'
    - 'Le checklist operative usano `#task` per essere compatibili con il plugin Tasks. Le checklist narrative e le checklist di documentazione restano senza tag, cosi non entrano per errore nel backlog del DM.'
    - 'Usa priorita e scadenze solo per lavoro reale del DM o manutenzione. Non trasformare missioni, clock, conseguenze o eventi del mondo in task ricorrenti.'
