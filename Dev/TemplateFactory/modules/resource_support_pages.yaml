    body: |
      ## Tiri Rapidi

      > [!scena] Generatori
      > - Festa locale: `dice: [[Risorse/Tabelle/Worldbuilding Generatori#^festa-locale]]`
      > - Rumor politico: `dice: [[Risorse/Tabelle/Worldbuilding Generatori#^rumor-politico]]`
      > - Risorsa contesa: `dice: [[Risorse/Tabelle/Worldbuilding Generatori#^risorsa-contesa]]`
      > - Rovina con segreto: `dice: [[Risorse/Tabelle/Worldbuilding Generatori#^rovina-segreto]]`
      > - Conflitto culturale: `dice: [[Risorse/Tabelle/Worldbuilding Generatori#^conflitto-culturale]]`
      > - Evento storico ambiguo: `dice: [[Risorse/Tabelle/Worldbuilding Generatori#^evento-ambiguo]]`
      > - PNG radicato in una cultura: `dice: [[Risorse/Tabelle/Worldbuilding Generatori#^png-culturale]]`
      > - Problema economico o commerciale: `dice: [[Risorse/Tabelle/Worldbuilding Generatori#^problema-commerciale]]`
      > - Complicazione di viaggio: `dice: [[Risorse/Tabelle/Worldbuilding Generatori#^complicazione-viaggio]]`

      ## Festa Locale

      | dice: 1d8 | Risultato |
      | --- | --- |
      | 1 | Festa del primo raccolto, ma quest'anno manca la risorsa che la rende sacra. |
      | 2 | Processione di confine che non puo attraversare una rotta contesa. |
      | 3 | Giorno dei debiti perdonati, usato da una fazione per comprare consenso. |
      | 4 | Veglia dei morti senza nomi, con un tabù contro le domande dirette. |
      | 5 | Mercato stagionale dove ogni prezzo deve includere una promessa. |
      | 6 | Festa delle maschere in cui un PNG puo parlare senza ruolo sociale. |
      | 7 | Rito di chiusura dei ponti prima della stagione pericolosa. |
      | 8 | Celebrazione antica di cui due culture ricordano cause incompatibili. |
      ^festa-locale

      ## Rumor Politico

      | dice: 1d8 | Risultato |
      | --- | --- |
      | 1 | Un trattato e stato firmato con una clausola non letta in pubblico. |
      | 2 | Una fazione ha perso il controllo di una rotta ma finge il contrario. |
      | 3 | Il governante deve il trono a una risorsa che sta finendo. |
      | 4 | Un culto prepara una festa come prova generale di una rivolta. |
      | 5 | Due mercati usano monete diverse per sabotarsi. |
      | 6 | Una lingua minoritaria contiene il nome vero di un confine. |
      | 7 | Un matrimonio politico copre una cessione territoriale. |
      | 8 | I dazi aumentano per finanziare una guerra non dichiarata. |
      ^rumor-politico

      ## Risorsa Contesa

      | dice: 1d8 | Risultato |
      | --- | --- |
      | 1 | Sale rituale che conserva giuramenti e cadaveri. |
      | 2 | Legno che non brucia durante una stagione sacra. |
      | 3 | Pianta medicinale che cresce solo vicino a rovine proibite. |
      | 4 | Pietra da moneta riconosciuta da una sola cultura. |
      | 5 | Acqua ferrata necessaria a una tecnologia locale. |
      | 6 | Lana di una creatura regionale in migrazione. |
      | 7 | Inchiostro che rende visibili trattati cancellati. |
      | 8 | Vetro usato per chiavi, mappe e sigilli. |
      ^risorsa-contesa

      ## Rovina Con Segreto

      | dice: 1d8 | Risultato |
      | --- | --- |
      | 1 | Rovina ufficialmente vuota, ma ancora pagata da un mercato. |
      | 2 | Tempio precedente alla religione che lo rivendica. |
      | 3 | Fortezza costruita per difendersi da alleati attuali. |
      | 4 | Archivio dove le mappe mostrano rotte future. |
      | 5 | Necropoli con professioni incise al posto dei nomi. |
      | 6 | Ponte crollato che appare solo durante una festa. |
      | 7 | Officina di una tecnologia proibita ma indispensabile. |
      | 8 | Villaggio cancellato che parla ancora attraverso una superstizione. |
      ^rovina-segreto

      ## Conflitto Culturale

      | dice: 1d8 | Risultato |
      | --- | --- |
      | 1 | Una cultura vende cio che un'altra considera antenato. |
      | 2 | Una lingua sacra viene usata come gergo commerciale. |
      | 3 | Un tabù stagionale blocca una missione urgente. |
      | 4 | Due popoli hanno la stessa festa con colpevoli diversi. |
      | 5 | Una professione stimata in una regione e impura in un'altra. |
      | 6 | Una malattia viene vista come punizione o investitura. |
      | 7 | Una moneta porta un volto che una fazione vuole cancellare. |
      | 8 | Un cibo comune viola il rito funebre di un ospite. |
      ^conflitto-culturale

      ## Evento Storico Ambiguo

      | dice: 1d8 | Risultato |
      | --- | --- |
      | 1 | Fondazione ricordata come liberazione e come esilio. |
      | 2 | Pace ottenuta cedendo una rotta a un potere senza nome. |
      | 3 | Carestia risolta da una risorsa che oggi e proibita. |
      | 4 | Incoronazione avvenuta in una data impossibile. |
      | 5 | Battaglia vinta da entrambi i racconti ufficiali. |
      | 6 | Scoperta tecnologica attribuita alla cultura sbagliata. |
      | 7 | Epidemia cancellata dai registri ma rimasta nelle feste. |
      | 8 | Rovina nata prima dell'evento che avrebbe dovuto crearla. |
      ^evento-ambiguo

      ## PNG Radicato In Una Cultura

      | dice: 1d8 | Risultato |
      | --- | --- |
      | 1 | Esattore di pedaggi che conosce ogni tabù di viaggio. |
      | 2 | Guaritrice che cura solo chi rispetta una festa minore. |
      | 3 | Scriba bilingue che altera titoli e confini con le traduzioni. |
      | 4 | Cuoco di mercato che ascolta accordi da tutte le fazioni. |
      | 5 | Artigiana di una risorsa rituale ormai quasi introvabile. |
      | 6 | Pastore di creature regionali migratorie. |
      | 7 | Professionista disprezzato fuori dalla propria cultura ma essenziale. |
      | 8 | Pellegrino che porta una moneta non piu valida. |
      ^png-culturale

      ## Problema Economico O Commerciale

      | dice: 1d8 | Risultato |
      | --- | --- |
      | 1 | Rotta aperta sulla carta ma chiusa da pedaggi informali. |
      | 2 | Mercato pieno di merci senza compratori legittimi. |
      | 3 | Risorsa abbondante ma inutilizzabile fino a una data rituale. |
      | 4 | Controllore ufficiale senza forza per imporre i dazi. |
      | 5 | Moneta locale rifiutata fuori da una regione. |
      | 6 | Nodo commerciale dipendente da una creatura in migrazione. |
      | 7 | Contrabbando necessario alla sopravvivenza di un luogo. |
      | 8 | Fazione religiosa che tassa una risorsa profana. |
      ^problema-commerciale

      ## Complicazione Di Viaggio

      | dice: 1d8 | Risultato |
      | --- | --- |
      | 1 | Il percorso sicuro attraversa una festa in cui gli stranieri non parlano. |
      | 2 | Una rotta cambia stato mentre i PG sono in viaggio. |
      | 3 | Il pedaggio richiesto e una memoria, non moneta. |
      | 4 | Una mappa zoomabile mostra un pin che non esiste sul terreno. |
      | 5 | Il confine politico e diverso dal confine religioso. |
      | 6 | Una risorsa trasportata attira una fazione rivale. |
      | 7 | La stagione rende illegale il passaggio piu breve. |
      | 8 | Un mercato mobile e arrivato prima dei PG e ha comprato tutto. |
      ^complicazione-viaggio
