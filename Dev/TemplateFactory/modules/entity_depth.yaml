contracts:
  fields_must_exist_in_yaml_catalog: true
  runtime_prompts_must_exist: true
  frontmatter_profiles_must_expose_required_fields: true
  sections_and_tabs_must_exist_before_jinja_use: true
  no_dashboard_required: true
  depth_levels:
    purpose: Ridurre attrito permettendo profondita selettiva invece di chiedere sempre la scheda massima.
    field: depth_level
    default: giocabile
    values:
      rapido:
        required_fields:
          - gancio
          - uso_al_tavolo
      giocabile:
        extends: rapido
        required_fields:
          - pressione
          - prossima_mossa
          - connessioni
      profondo:
        extends: giocabile
        required_fields:
          - dipendenze
          - costo_sociale
          - evoluzione_se_ignorata
          - propaga_a
    creation_policy:
      new_entity_default: rapido
      table_relevant_default: giocabile
      recurring_or_canon_entity_default: profondo
  playability_gate:
    purpose: Ogni famiglia deve esporre abbastanza leve per diventare scena, scelta o conseguenza senza imporre un asse tematico proprietario.
    min_groups_present: 3
    field_groups:
      tavolo:
        reason: L'utente deve capire come portare la scheda in scena.
        fields:
          - gancio
          - uso_al_tavolo
          - impressione
          - obiettivo
          - scelta
          - innesco
          - posta
          - luogo
          - missioni
          - proprietario
      movimento:
        reason: La scheda deve poter cambiare il mondo anche se il party non la tocca.
        fields:
          - pressione
          - prossima_mossa
          - evoluzione_se_ignorata
          - progress_value
          - progress_max
          - causa
      conseguenza:
        reason: Le conseguenze devono poter propagare stato e non restare testo isolato.
        fields:
          - conseguenze
          - entita_impattate
          - propaga_a
          - ricompense
          - rischi
      collegamento:
        reason: Una nota giocabile deve avere almeno un ponte verso mondo, sessione o altre entita.
        fields:
          - mondo
          - luoghi
          - fazioni
          - sessioni
          - connessioni
          - creature
