id: metabind_inputs
purpose: Input Field Template Meta Bind canonici usati per generare data.json e per validare i template Jinja.
version: 0.2.0
inputs:
  mondo:
    name: mondo
    required_for_release: true
    declaration: INPUT[suggester(optionQuery("Mondi"), useLinks(partial), allowOther)]
    field: mondo
    syntax: '`INPUT[mondo][:mondo]`'
    fallback: 'Mondo: [[Mondi/Mondo]]'
  campagne:
    name: campagne
    declaration: INPUT[inlineListSuggester(optionQuery("Campagne"), useLinks(partial))]
  canonico:
    name: canonico
    declaration: INPUT[toggle]
    field: canonico
    syntax: '`INPUT[canonico][:canonico]`'
    fallback: 'Canonico: false'
  stato_base:
    name: stato base
    declaration: INPUT[inlineSelect(option(bozza, Bozza), option(pronto, Pronto), option(in gioco, In Gioco), option(archiviata,
      Archiviata))]
    field: stato
    syntax: '`INPUT[stato base][:stato]`'
    fallback: 'Stato: bozza'
  stato_canonico:
    name: stato canonico
    declaration: INPUT[inlineSelect(option(canonico, Canonico), option(rumor, Rumor), option(leggenda, Leggenda), option(falso,
      Falso), option(retcon, Retcon))]
  stato:
    name: stato
    required_for_release: true
    declaration: INPUT[inlineSelect(option(bozza, Bozza), option(preparazione, Preparazione), option(pronto, Pronto), option(in
      corso, In Corso), option(in gioco, In Gioco), option(giocata, Giocata), option(da smistare, Da smistare), option(collegata,
      Collegata), option(canonica, Canonica), option(archiviata, Archiviata), option(ignorata, Ignorata))]
    field: stato
    syntax: '`INPUT[stato][:stato]`'
    fallback: 'Stato: bozza'
  pressione:
    name: pressione
    required_for_release: true
    declaration: INPUT[slider(minValue(0), maxValue(10), stepSize(1), addLabels)]
    field: pressione
    syntax: '`INPUT[pressione][:pressione]`'
    fallback: 'Pressione: 0'
  prossima_mossa:
    name: prossima_mossa
    required_for_release: true
    declaration: INPUT[text]
    field: prossima_mossa
    syntax: '`INPUT[prossima_mossa][:prossima_mossa]`'
    fallback: 'Prossima mossa:'
  connessioni:
    name: connessioni
    required_for_release: true
    declaration: INPUT[inlineListSuggester(optionQuery("Mondi"), useLinks(partial), allowOther)]
    field: connessioni
    syntax: '`INPUT[connessioni][:connessioni]`'
    fallback: 'Connessioni:'
  fonti:
    name: fonti
    required_for_release: true
    declaration: INPUT[inlineListSuggester(optionQuery("Mondi"), useLinks(partial), allowOther)]
    field: fonti
    syntax: '`INPUT[fonti][:fonti]`'
    fallback: 'Fonti:'
  riferimenti_srd:
    name: riferimenti_srd
    required_for_release: true
    declaration: INPUT[inlineListSuggester(optionQuery("SRD"), useLinks(partial), allowOther)]
    field: riferimenti_srd
    syntax: '`INPUT[riferimenti_srd][:riferimenti_srd]`'
    fallback: 'Riferimenti SRD:'
  riferimenti_regola:
    name: riferimenti_regola
    required_for_release: true
    declaration: INPUT[inlineListSuggester(optionQuery("SRD"), useLinks(partial), allowOther)]
    field: riferimenti_regola
    syntax: '`INPUT[riferimenti_regola][:riferimenti_regola]`'
    fallback: 'Riferimenti regola:'
  sezioni_collegate:
    name: sezioni_collegate
    required_for_release: true
    declaration: INPUT[inlineList]
    field: sezioni_collegate
    syntax: '`INPUT[sezioni_collegate][:sezioni_collegate]`'
    fallback: 'Sezioni collegate:'
  blocchi_collegati:
    name: blocchi_collegati
    required_for_release: true
    declaration: INPUT[inlineList]
    field: blocchi_collegati
    syntax: '`INPUT[blocchi_collegati][:blocchi_collegati]`'
    fallback: 'Blocchi collegati:'
  tabelle_collegate:
    name: tabelle_collegate
    required_for_release: true
    declaration: INPUT[inlineList]
    field: tabelle_collegate
    syntax: '`INPUT[tabelle_collegate][:tabelle_collegate]`'
    fallback: 'Tabelle collegate:'
  tags:
    name: tags
    required_for_release: true
    declaration: INPUT[inlineList]
    field: tags
    syntax: '`INPUT[tags][:tags]`'
    fallback: 'Tag:'
  player_safe:
    name: player_safe
    required_for_release: true
    declaration: INPUT[text]
    field: player_safe
    syntax: '`INPUT[player_safe][:player_safe]`'
    fallback: 'Player-safe:'
  entita_impattate:
    name: entita_impattate
    required_for_release: true
    declaration: INPUT[inlineListSuggester(optionQuery("Mondi"), useLinks(partial), allowOther)]
    field: entita_impattate
    syntax: '`INPUT[entita_impattate][:entita_impattate]`'
    fallback: 'Entita impattate:'
  propaga_a:
    name: propaga_a
    required_for_release: true
    declaration: INPUT[inlineListSuggester(optionQuery("Mondi"), useLinks(partial), allowOther)]
    field: propaga_a
    syntax: '`INPUT[propaga_a][:propaga_a]`'
    fallback: 'Propaga a:'
  sessioni:
    name: sessioni
    required_for_release: true
    declaration: INPUT[inlineListSuggester(optionQuery("Mondi/Sessioni"), useLinks(partial), allowOther)]
  luoghi:
    name: luoghi
    required_for_release: true
    declaration: INPUT[inlineListSuggester(optionQuery("Mondi/Luoghi"), useLinks(partial), allowOther)]
    field: luoghi
    syntax: '`INPUT[luoghi][:luoghi]`'
    fallback: 'Luoghi:'
  fazioni:
    name: fazioni
    required_for_release: true
    declaration: INPUT[inlineListSuggester(optionQuery("Mondi/Fazioni"), useLinks(partial), allowOther)]
    field: fazioni
    syntax: '`INPUT[fazioni][:fazioni]`'
    fallback: 'Fazioni:'
  missioni:
    name: missioni
    required_for_release: true
    declaration: INPUT[inlineListSuggester(optionQuery("Mondi/Missioni"), useLinks(partial), allowOther)]
    field: missioni
    syntax: '`INPUT[missioni][:missioni]`'
    fallback: 'Missioni:'
  tracciati:
    name: tracciati
    required_for_release: true
    declaration: INPUT[inlineListSuggester(optionQuery("Mondi/Tracciati"), useLinks(partial), allowOther)]
    field: tracciati
    syntax: '`INPUT[tracciati][:tracciati]`'
    fallback: 'Clock e tracciati:'
  list_block:
    syntax: '```meta-bind

      INPUT[list:{{ field }}]

      ```'
    fallback: '- Voce da compilare'
contracts:
  field_must_exist_in: fields_core
  generated_inputs_must_be_listed_in: plugin_bindings.meta_bind
  fallback_required: true
