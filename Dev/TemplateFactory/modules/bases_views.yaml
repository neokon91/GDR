id: bases_views
purpose: Contratti per viste Bases generate o mantenute da TemplateFactory.
version: 0.1.0
views:
  worldbuilding_codex:
    file: z.bases/Worldbuilding.base
    source_folders:
      - Mondi/Culture
      - Mondi/Religioni
      - Mondi/Societa
      - Mondi/Cosmologia
      - Mondi/Conflitti
      - Mondi/Creature
      - Mondi/Lingue
      - Mondi/Mercati
      - Mondi/Relazioni
      - Mondi/Risorse
      - Mondi/Rotte
      - Mondi/Timeline
    required_fields:
      - nome
      - categoria
      - tipo
      - stato
      - mondo
      - uso_al_tavolo
      - player_safe
      - connessioni
    formulas:
      - prontezza
    fallback_dataview_block: linked_connections_table
  atlas_maps:
    file: z.bases/Atlante Mappe.base
    source_folders:
      - Risorse/Mappe
      - Mondi/Luoghi
    required_fields:
      - nome
      - tipo
      - stato
      - coordinates
      - layer_mappa
      - icon
      - color
    map_view: true
    fallback_dataview_block: map_assets
  luoghi:
    file: z.bases/Luoghi.base
    source_folders:
      - Mondi/Luoghi
    required_fields:
      - nome
      - stato
      - tipo
      - mondo
      - luogo_padre
      - pericolo
      - pressione
      - fazioni
      - missioni
      - connessioni
    fallback_dataview_block: linked_connections_table
  fazioni:
    file: z.bases/Fazioni.base
    source_folders:
      - Mondi/Fazioni
    required_fields:
      - nome
      - stato
      - tipo
      - mondo
      - pressione
      - prossima_mossa
      - luoghi
      - missioni
      - connessioni
      - propaga_a
    fallback_dataview_block: linked_connections_table
  economia:
    file: z.bases/Economia.base
    source_folders:
      - Mondi/Risorse
      - Mondi/Rotte
      - Mondi/Mercati
    required_fields:
      - nome
      - stato
      - tipo
      - mondo
      - pressione
      - prossima_mossa
      - luoghi
      - fazioni_controllanti
      - risorse
      - rotte
      - mercati
    fallback_dataview_block: linked_connections_table
  missioni:
    file: z.bases/Missioni.base
    source_folders:
      - Mondi/Missioni
    required_fields:
      - nome
      - stato
      - tipo
      - mondo
      - pressione
      - prossima_mossa
      - campagne
      - luoghi
      - fazioni
      - ricompense
    fallback_dataview_block: linked_connections_table
  png:
    file: z.bases/PNG.base
    source_folders:
      - Mondi/Personaggi
    required_fields:
      - nome
      - stato
      - luogo
      - fazioni
      - pressione
      - prossima_mossa
      - missioni
    fallback_dataview_block: linked_connections_table
  sessions:
    file: z.bases/Incontri.base
    source_folders:
      - Mondi/Incontri
    required_fields:
      - nome
      - stato
      - tipo
      - luogo
      - pericolo
      - creature
      - personaggi
      - sessioni
      - mappe
      - ricompense
    fallback_markdown: encounter
contracts:
  base_fields_must_exist_in_fields_core_or_domain_module: true
  every_map_view_needs_markdown_table_fallback: true
  formulas_should_remain_lightweight: true

generated_bases:
  readme: |-
    # z.bases

    Viste Bases pilota per il vault.

    Queste viste non sostituiscono Dataview: servono come layer modificabile sopra i metadati principali, utile a chi vuole correggere stato, pressione, collegamenti e prossime mosse senza toccare query.

    | Base | Uso |
    | --- | --- |
    | `Missioni.base` | Missioni aperte, sotto pressione, per campagna, chiusura e vista completa. |
    | `Worldbuilding.base` | Culture, religioni, societa e cosmologia: Codex vivo, collegamenti, pubblicazione e propagazione. |
    | `Fazioni.base` | Fazioni in movimento, pressione, relazioni, mondo e archivio. |
    | `Economia.base` | Risorse, rotte, mercati, pressioni economiche e archivio. |
    | `PNG.base` | PNG in gioco, pressione, segreti/leve, archivio e schede rapide. |
    | `Luoghi.base` | Luoghi attivi, pericolosi, per mondo e gerarchia. |
    | `Incontri.base` | Incontri pronti, pericolo alto, per sessione e da completare. |
    | `Atlante Mappe.base` | Mappa, tabella, layer e dati marker. |

    Regola: aggiungere qui solo viste su frontmatter gia stabile. Le viste aggregate, i controlli complessi e le card operative restano in Dataview/DataviewJS.
  files:
    atlas_maps:
      file: z.bases/Atlante Mappe.base
      content:
        filters:
          and:
          - file.folder == "Mondi/Luoghi"
          - note.coordinates
        properties:
          file.name:
            displayName: Luogo
          note.stato:
            displayName: Stato
          note.tipo:
            displayName: Tipo
          note.mondo:
            displayName: Mondo
          note.coordinates:
            displayName: Coordinate
          note.layer_mappa:
            displayName: Layer
          note.icon:
            displayName: Icona
          note.color:
            displayName: Colore
        views:
        - type: map
          name: Mappa
          order:
          - file.name
          - note.tipo
          - note.stato
          - note.mondo
          - note.layer_mappa
          coordinates: note.coordinates
          markerIcon: note.icon
          markerColor: note.color
          defaultZoom: 13
        - type: table
          name: Tabella
          order:
          - file.name
          - note.tipo
          - note.stato
          - note.mondo
          - note.coordinates
          - note.layer_mappa
          - note.icon
          - note.color
          sort:
          - property: note.layer_mappa
            direction: ASC
          - property: file.name
            direction: ASC
        - type: table
          name: Per layer
          order:
          - note.layer_mappa
          - file.name
          - note.tipo
          - note.stato
          - note.mondo
          - note.coordinates
          sort:
          - property: note.layer_mappa
            direction: ASC
          - property: note.tipo
            direction: ASC
          - property: file.name
            direction: ASC
        - type: table
          name: Dati marker
          order:
          - file.name
          - note.coordinates
          - note.icon
          - note.color
          - note.layer_mappa
          sort:
          - property: note.icon
            direction: ASC
          - property: file.name
            direction: ASC
    economia:
      file: z.bases/Economia.base
      content:
        filters:
          or:
          - file.folder == "Mondi/Risorse"
          - file.folder == "Mondi/Rotte"
          - file.folder == "Mondi/Mercati"
        formulas:
          stato_operativo: if(stato == "archiviata" || stato == "ignorata" || stato == "conclusa", "chiusa", if(pressione, if(prossima_mossa, "pressione", "manca mossa"), "stabile"))
        properties:
          formula.stato_operativo:
            displayName: Stato operativo
          nome:
            displayName: Nome
          stato:
            displayName: Stato
          tipo:
            displayName: Tipo
          mondo:
            displayName: Mondo
          pressione:
            displayName: Pressione
          prossima_mossa:
            displayName: Prossima mossa
          luoghi:
            displayName: Luoghi
          luogo:
            displayName: Luogo
          regioni:
            displayName: Regioni
          fazioni_controllanti:
            displayName: Fazioni controllanti
          risorse:
            displayName: Risorse
          rotte:
            displayName: Rotte
          mercati:
            displayName: Mercati
          scarsita:
            displayName: Scarsita
          uso_narrativo:
            displayName: Uso narrativo
          stato_rotta:
            displayName: Stato rotta
          partenza:
            displayName: Partenza
          arrivo:
            displayName: Arrivo
          risorse_trasportate:
            displayName: Risorse trasportate
          pedaggi:
            displayName: Pedaggi
          rischi:
            displayName: Rischi
          connessioni:
            displayName: Connessioni
        views:
