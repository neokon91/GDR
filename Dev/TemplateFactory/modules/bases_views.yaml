            property: formula.stato_operativo
            direction: ASC
          filters:
            and:
            - file.name != "Risorse"
            - file.name != "Rotte"
            - file.name != "Mercati"
            - stato != "archiviata"
          order:
          - nome
          - tipo
          - stato
          - formula.stato_operativo
          - pressione
          - prossima_mossa
          - luoghi
          - fazioni_controllanti
          sort:
          - property: pressione
            direction: DESC
          - property: nome
            direction: ASC
        - type: table
          name: Risorse
          filters:
            and:
