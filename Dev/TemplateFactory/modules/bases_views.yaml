id: bases_views
purpose: Contratti per viste Bases generate o mantenute da TemplateFactory.
version: 0.1.0
views:
  worldbuilding_codex:
    file: z.bases/Worldbuilding.base
    source_folders:
      - Mondi/Culture
      - Mondi/Religioni
      - Mondi/Societa
      - Mondi/Cosmologia
      - Mondi/Conflitti
      - Mondi/Creature
      - Mondi/Lingue
      - Mondi/Mercati
      - Mondi/Relazioni
      - Mondi/Risorse
      - Mondi/Rotte
      - Mondi/Timeline
    required_fields:
      - nome
      - categoria
      - tipo
      - stato
      - mondo
      - uso_al_tavolo
      - player_safe
      - connessioni
    formulas:
      - prontezza
    fallback_dataview_block: linked_connections_table
  atlas_maps:
    file: z.bases/Atlante Mappe.base
    source_folders:
      - Risorse/Mappe
      - Mondi/Luoghi
    required_fields:
      - nome
      - tipo
      - stato
      - coordinates
      - luoghi
      - icon
      - color
    map_view: true
    fallback_dataview_block: map_assets
  luoghi:
    file: z.bases/Luoghi.base
    source_folders:
      - Mondi/Luoghi
    required_fields:
      - nome
      - stato
      - tipo
      - mondo
      - luogo_padre
      - pericolo
      - pressione
      - fazioni
      - missioni
      - connessioni
    fallback_dataview_block: linked_connections_table
  fazioni:
    file: z.bases/Fazioni.base
    source_folders:
      - Mondi/Fazioni
    required_fields:
      - nome
      - stato
      - tipo
      - mondo
      - pressione
      - prossima_mossa
      - luoghi
      - missioni
      - connessioni
      - propaga_a
    fallback_dataview_block: linked_connections_table
  missioni:
    file: z.bases/Missioni.base
    source_folders:
      - Mondi/Missioni
    required_fields:
      - nome
      - stato
      - tipo
      - mondo
      - pressione
      - prossima_mossa
      - campagne
      - luoghi
      - fazioni
      - ricompense
    fallback_dataview_block: linked_connections_table
  png:
    file: z.bases/PNG.base
    source_folders:
      - Mondi/Personaggi
    required_fields:
      - nome
      - stato
      - luogo
      - fazioni
      - pressione
      - prossima_mossa
      - missioni
    fallback_dataview_block: linked_connections_table
  sessions:
    file: z.bases/Incontri.base
    source_folders:
      - Mondi/Incontri
    required_fields:
      - nome
      - stato
      - mondo
      - creature
      - luoghi
      - missioni
    fallback_markdown: encounter
contracts:
  base_fields_must_exist_in_fields_core_or_domain_module: true
  every_map_view_needs_markdown_table_fallback: true
  formulas_should_remain_lightweight: true
