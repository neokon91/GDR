id: metabind_config
purpose: Impostazioni base Meta Bind; input e button vengono assemblati da metabind_inputs.yaml e metabind_buttons.yaml.
version: 0.2.0
config:
  devMode: false
  ignoreCodeBlockRestrictions: false
  preferredDateFormat: YYYY-MM-DD
  firstWeekday:
    index: 1
    name: Monday
    shortName: Mo
  syncInterval: 200
  enableJs: true
  viewFieldDisplayNullAsEmpty: false
  enableSyntaxHighlighting: true
  enableEditorRightClickMenu: true
  excludedFolders:
  - SRD
  - z.automazioni
  - z.modelli
contracts:
  inputFieldTemplates_source: Dev/TemplateFactory/modules/metabind_inputs.yaml
  buttonTemplates_source: Dev/TemplateFactory/modules/metabind_buttons.yaml
  target: .obsidian/plugins/obsidian-meta-bind-plugin/data.json
  rule: Modificare input e button nei cataloghi YAML, non nel JSON Obsidian.
