id: dm_guide_cockpit
purpose: Contratto operativo per trasformare Guida DM in bussola compatta del ciclo prepara, gioca, chiudi e pulisci.
version: 0.1.0
dashboard:
  page: Risorse/Guida DM.md
  workflow: guida_dm
  required_runtime_views:
    - renderDmGuideNow
    - renderDmGuideLoop
    - renderDmGuideRules
    - renderDmGuideSurfaceLinks
  required_visible_sections:
    - Cosa Fare Ora
    - Ciclo DM
    - Regole Di Taglio
    - Superfici
    - Azioni
panels:
  now:
    runtime_view: renderDmGuideNow
    promise: Dire al DM quale superficie aprire adesso senza leggere un manuale.
    answers:
      - crea mondo
      - prepara
      - gioca
      - chiudi
      - pulisci
  loop:
    runtime_view: renderDmGuideLoop
    promise: Riassumere il ciclo operativo in pochi passaggi verificabili.
    answers:
      - parti
      - prepara
      - gioca
      - chiudi
      - muovi mondo
      - pulisci
  rules:
    runtime_view: renderDmGuideRules
    promise: Tenere solo regole di taglio che impediscono accumulo e duplicazione.
    answers:
      - una sessione attiva
      - tre ancore
      - bozze non canone
      - player-safe
      - conseguenze
  surfaces:
    runtime_view: renderDmGuideSurfaceLinks
    promise: Aprire solo cockpit consolidati, non liste o guide lunghe.
    answers:
      - DM Dashboard
      - Preparazione
      - Durante il gioco
      - Post sessione
      - Controllo vault
phases:
  - id: start
    label: Parti
    surface: Inizia Qui.md
    action: Crea o scegli un mondo minimale.
    done_when: Esiste almeno un mondo con tono, promessa e conflitto.
  - id: prepare
    label: Prepara
    surface: Risorse/Preparazione Sessione.md
    action: Scegli una sessione e collega ancore concrete.
    done_when: La sessione ha obiettivo, scena e almeno tre ancore mondo.
  - id: play
    label: Gioca
    surface: Hub/Durante il Gioco.md
    action: Usa solo scena corrente, pressioni, materiali e cattura live.
    done_when: Le decisioni importanti sono catturate senza riordinare durante il tavolo.
  - id: close
    label: Chiudi
    surface: Risorse/Post Sessione Guidato.md
    action: Trasforma appunti in output, recap e prossima apertura.
    done_when: La sessione non e piu attiva e ha conseguenze smistate.
  - id: move_world
    label: Muovi mondo
    surface: Hub/Motore Mondo Vivo.md
    action: Propaga solo conseguenze che cambiano note vere.
    done_when: Missioni, fazioni, luoghi o clock mostrano cosa cambia.
  - id: clean
    label: Pulisci
    surface: Risorse/Controllo Vault.md
    action: Ripara buchi prima di creare altro materiale.
    done_when: Le note pronte hanno agganci, stato e uso al tavolo.
rules:
  - id: one_active_session
    label: Una sessione attiva
    action: "Tieni `attiva: true` su una sola sessione."
    why: Dashboard e materiali diventano ambigui se due tavoli risultano live.
  - id: anchors_before_detail
    label: Tre ancore prima del dettaglio
    action: Collega mondo, luogo, fazione, missione, PNG, clock, mappa o scena prima di approfondire.
    why: Il dettaglio isolato non arriva al tavolo.
  - id: drafts_not_canon
    label: Bozze non canone
    action: Inbox e generati restano bozze finche non sono confermati o smistati.
    why: Evita che rumore, import e generazione entrino nel mondo automaticamente.
  - id: player_safe_first
    label: Player-safe prima di mostrare
    action: Controlla Vista Giocatori prima di condividere mappe, dispense o recap.
    why: Segreti e materiale DM non devono uscire per errore.
  - id: consequences_move_world
    label: Conseguenze muovono il mondo
    action: Ogni conseguenza importante deve cambiare almeno una nota o un clock.
    why: Se non cambia nulla, resta recap e non stato del mondo.
surfaces:
  - id: start
    label: Inizia Qui
    plugin: Meta Bind
    target: Inizia Qui.md
    badge: Start
    role: ripartire dal percorso minimo
    action: Apri quando non e chiaro se creare, preparare o giocare.
    why: Il percorso iniziale evita di scegliere tra troppe dashboard.
  - id: dm_dashboard
    label: DM Dashboard
    plugin: Dataview
    target: Hub/1. DM Dashboard.md
    badge: Regia
    role: scegliere il prossimo gesto
    action: Apri quando vuoi una lettura complessiva del tavolo.
    why: La dashboard aggrega stato, code e superfici senza duplicare istruzioni.
  - id: preparation
    label: Preparazione sessione
    plugin: Dataview
    target: Risorse/Preparazione Sessione.md
    badge: Prep
    role: preparare una sessione giocabile
    action: Apri prima del tavolo o quando manca una sessione target.
    why: Preparazione decide cosa serve davvero e cosa va tagliato.
  - id: live
    label: Durante il Gioco
    plugin: Dataview
    target: Hub/Durante il Gioco.md
    badge: Live
    role: gestire il tavolo
    action: Apri quando una sessione e attiva.
    why: Il live deve catturare eventi senza riordinare tutto in partita.
  - id: post
    label: Post Sessione Guidato
    plugin: Dataview
    target: Risorse/Post Sessione Guidato.md
    badge: Chiusura
    role: chiudere appunti e output
    action: Apri appena finisce il tavolo.
    why: La chiusura separa recap, conseguenze e prossima apertura.
  - id: worldbuilder
    label: Worldbuilder Dashboard
    plugin: Dataview
    target: Hub/Worldbuilder Dashboard.md
    badge: Mondo
    role: espandere solo se serve
    action: Apri quando la sessione chiede nuovi luoghi, poteri o pressioni.
    why: Il worldbuilding deve restare collegato a gioco, canone e mappe.
  - id: living_world
    label: Motore Mondo Vivo
    plugin: Dataview
    target: Hub/Motore Mondo Vivo.md
    badge: Reazioni
    role: propagare conseguenze
    action: Apri quando una scelta deve cambiare fazioni, luoghi, missioni o clock.
    why: Le conseguenze importanti devono diventare stato, non solo testo.
  - id: vault_control
    label: Controllo Vault
    plugin: Dataview
    target: Risorse/Controllo Vault.md
    badge: Pulizia
    role: riparare buchi
    action: Apri prima di creare altro se ci sono note isolate o incomplete.
    why: Meno rumore rende il vault piu giocabile.
contracts:
  dashboard_uses_runtime_views: true
  page_must_not_use_inline_dataview_queries: true
  guide_must_not_duplicate_cockpit_manuals: true
  surfaces_must_resolve_to_source_or_generated_release_target: true
