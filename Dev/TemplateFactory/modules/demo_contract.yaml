id: demo_contract
purpose: Contratto dichiarativo per mantenere la demo finale come codice generato e verificabile.
version: 0.1.0
status: pre_finale
policy:
  source_demo_allowed: false
  output_root: dist/vault-gdr-clean
  final_demo_only_after_release_contract: true
  note: >
    La demo finale non deve vivere come note sorgente. I generatori producono artefatti in dist/
    e i check verificano flussi, categorie, sicurezza giocatori e continuita.
generators:
  fixture:
    script: Dev/TemplateFactory/tools/generate_demo_fixture.js
    npm: generate:demo-fixture
    role: prova tecnica della catena scelta -> conseguenza -> propagazione
  demo_world:
    script: Dev/TemplateFactory/tools/generate_demo_world.js
    npm: generate:demo-world
    role: demo minima di primo avvio, non contenuto sorgente
checks:
  required_npm:
    - check:smoke
    - check:continuity
    - check:release-artifact
  forbidden_source_files:
    - Mondi/[Demo] Regno di Prova.md
    - Campagne/[Demo] Sale Sotto La Nebbia.md
    - Mondi/Luoghi/[Demo] Costa Delle Lanterne.md
    - Mondi/Luoghi/[Demo] Porto Di Prova.md
    - Mondi/Luoghi/[Demo] Faro Vecchio.md
    - Mondi/Luoghi/[Demo] Saline Bianche.md
    - Mondi/Culture/[Demo] Gente Della Soglia Salata.md
    - Mondi/Fazioni/[Demo] Consorzio Del Sale Nero.md
    - Mondi/Fazioni/[Demo] Dogana Delle Lanterne.md
    - Mondi/Fazioni/[Demo] Custodi Delle Saline.md
    - Mondi/Conflitti/[Demo] Blocco Delle Rotte Del Sale.md
    - Mondi/Segreti/[Demo] Patto Della Campana Sommersa.md
    - Mondi/Missioni/[Demo] Recuperare La Campana Sommersa.md
    - Mondi/Sessioni/[Demo] 2026-05-28 - La Campana Nella Nebbia.md
    - Mondi/Tracciati/[Demo] Marea Della Lanterna Bassa.md
    - Mondi/Incontri/[Demo] Scontro Alla Banchina.md
    - Mondi/Creature/[Demo] Vedetta Salmastra.md
    - Mondi/Oggetti/[Demo] Chiave Di Sale.md
    - Mondi/Timeline/[Demo] Il Faro Vecchio Si Riaccende.md
    - Mondi/Dispense/[Demo] Avviso Della Dogana.md
    - Demo Regno Di Prova.md
    - Mondi/Porto di Prova Demo.md
    - Campagne/Sale Sotto La Nebbia/Sale Sotto La Nebbia.md
    - Mondi/Culture/Custodi Delle Saline.md
    - Mondi/Fazioni/Consorzio Del Sale Nero.md
    - Mondi/Religioni/Culto Della Lanterna Bassa.md
    - Mondi/Luoghi/Porto Di Prova.md
    - Mondi/Mercati/Mercato Del Sale Nero.md
    - Risorse/Mappe/Mappa Pubblica Di Porto di Prova.md
    - Mondi/Dispense/Avviso Della Dogana Di Porto di Prova.md
    - Mondi/Missioni/Recuperare La Campana Sommersa.md
    - Mondi/Sessioni/2026-05-28 - La Campana Nella Nebbia.md
    - Mondi/Timeline/La Marea Ha Preso Il Faro Vecchio.md
final_demo_minimum:
  categories:
    - mondo
    - campagna
    - luogo
    - cultura
    - fazione
    - conflitto
    - segreto
    - missione
    - sessione
    - tracciato
    - incontro
    - creatura
    - oggetto
    - evento storico
  flows:
    - scelta
    - conseguenza
    - entita_impattate
    - propaga_a
    - propagazione_stato
    - player_safe
  player_safe_surfaces:
    - Hub/Vista Giocatori.md
    - Risorse/Post Sessione Guidato.md
    - Hub/Durante il Gioco.md
  playable_region:
    name: Costa Delle Lanterne
    min_locations: 3
    min_factions: 3
    required_categories:
      - cultura
      - conflitto
      - segreto
      - missione
      - sessione
      - tracciato
    required_fields:
      - regione_starter
      - luoghi
      - fazioni
      - culture
      - conflitti
      - segreti
      - missioni
      - tracciati
      - player_safe
