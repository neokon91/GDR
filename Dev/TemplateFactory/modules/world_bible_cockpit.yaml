id: world_bible_cockpit
purpose: Contratto operativo per trasformare Bibbia del Mondo in cockpit Codex leggibile, mostrabile e giocabile.
version: 0.1.0
dashboard:
  page: Hub/Bibbia del Mondo.md
  workflow: bibbia_mondo
  required_runtime_views:
    - renderWorldBibleNow
    - renderWorldBibleReadiness
    - renderWorldBibleIdentity
    - renderWorldBibleArticles
    - renderWorldBibleGaps
    - renderWorldBibleSurfaceLinks
  required_visible_sections:
    - Filtro
    - Priorita Codex
    - Stato Codex
    - Identita
    - Articoli Pronti
    - Buchi Del Codex
    - Superfici
    - Azioni
panels:
  now:
    runtime_view: renderWorldBibleNow
    promise: Decidere subito se il mondo scelto e leggibile, mostrabile o ancora da completare.
    answers:
      - mondo prima
      - leggibilita
      - da mostrare
      - da giocare
      - buchi del Codex
  readiness:
    runtime_view: renderWorldBibleReadiness
    promise: Misurare mondo base, articoli, player-safe, materiale giocabile e buchi residui.
    answers:
      - mondi
      - identita complete
      - articoli
      - player-safe
      - da giocare
  identity:
    runtime_view: renderWorldBibleIdentity
    promise: Rendere visibile la promessa del mondo senza aprire tabelle o query.
    answers:
      - gancio
      - tono
      - conflitto centrale
      - luoghi iconici
      - fazioni principali
      - misteri pubblici
  articles:
    runtime_view: renderWorldBibleArticles
    promise: Mostrare articoli del mondo gia leggibili, mostrabili o pronti da giocare.
    answers:
      - luoghi iconici
      - poteri in movimento
      - volti da ricordare
      - misteri e timeline
      - pronti da mostrare
      - pronti da giocare
  gaps:
    runtime_view: renderWorldBibleGaps
    promise: Portare in tabella i buchi che impediscono al Codex di diventare gioco.
    answers:
      - identita mondo
      - articoli incompleti
      - sicurezza pubblica
      - uso al tavolo
  surfaces:
    runtime_view: renderWorldBibleSurfaceLinks
    promise: Aprire lo strumento giusto per completare, mostrare o trasformare il Codex in campagna.
    answers:
      - atlante
      - worldbuilder
      - controllo worldbuilding
      - controllo canone
      - vista giocatori
      - campagna
queues:
  - id: world_identity
    label: Identita Mondo
    table_columns:
      - Mondo
      - Campo
      - Azione
  - id: article_gaps
    label: Articoli Incompleti
    table_columns:
      - Nota
      - Categoria
      - Manca
      - Azione
  - id: public_safety
    label: Da Mostrare In Sicurezza
    table_columns:
      - Nota
      - Problema
      - Azione
  - id: playable_gaps
    label: Da Rendere Giocabili
    table_columns:
      - Nota
      - Categoria
      - Manca
      - Azione
surfaces:
  - id: atlas
    label: Atlante
    plugin: Dataview
    target: Hub/Atlante del Mondo.md
    badge: Spazio
    role: leggere luoghi e mappe
    action: Apri quando il Codex deve mostrare geografia, culture, storia o marker.
    why: Il mondo diventa consultabile quando luoghi e mappe sostengono la promessa.
  - id: worldbuilder
    label: Worldbuilder
    plugin: Dataview
    target: Hub/Worldbuilder Dashboard.md
    badge: Crea
    role: completare identita e appigli
    action: Apri quando mancano promessa, poteri, misteri o collegamenti operativi.
    why: La Bibbia resta leggibile solo se il materiale creato produce scelte e segnali.
  - id: worldbuilding_control
    label: Controllo worldbuilding
    plugin: Dataview
    target: Hub/Controllo Worldbuilding.md
    badge: Audit
    role: trovare buchi strutturali
    action: Apri quando molti articoli sono pronti ma isolati, incompleti o non player-safe.
    why: L'audit impedisce che il Codex diventi enciclopedia senza uso al tavolo.
  - id: canon_control
    label: Controllo canone
    plugin: Dataview
    target: Hub/Controllo Canone.md
    badge: Canone
    role: stabilizzare verita e rumor
    action: Apri quando misteri, timeline o retcon devono diventare vincoli chiari.
    why: La Bibbia del Mondo deve distinguere pubblico, segreto, rumor e canone.
  - id: player_view
    label: Vista giocatori
    plugin: Dataview
    target: Hub/Vista Giocatori.md
    badge: Pubblico
    role: controllare cosa si puo mostrare
    action: Apri quando vuoi consegnare mappe, recap o articoli senza rivelare campi DM.
    why: Un Codex mostrabile richiede player_safe, non solo pubblico true.
  - id: campaign_builder
    label: Campagna da ambientazione
    plugin: Dataview
    target: Hub/Campagna da Ambientazione.md
    badge: Gioco
    role: trasformare Codex in campagna
    action: Apri quando il mondo e leggibile e deve produrre promessa, regione, fazioni e prima sessione.
    why: La Bibbia e finita solo quando puo generare una situazione da giocare.
  - id: worldbuilding_base
    label: Worldbuilding tabellare
    plugin: Bases
    target: z.bases/Worldbuilding.base
    generated_release: true
    badge: Base
    role: correggere campi in tabella
    action: Apri quando devi completare molte note di cultura, religione, societa o cosmologia.
    why: "La Base e output di release: utile al vault finale, ma non sorgente tracciato."
contracts:
  dashboard_uses_runtime_views: true
  world_bible_answers_readable_showable_playable: true
  surfaces_must_resolve_to_source_or_generated_release_target: true
  generated_targets_must_stay_release_only: true
