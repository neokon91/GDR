id: campaign_builder_cockpit
purpose: Contratto operativo per trasformare Campagna da Ambientazione in cockpit di conversione mondo-campagna-tavolo.
version: 0.1.0
dashboard:
  page: Hub/Campagna da Ambientazione.md
  workflow: campagna_ambientazione
  required_runtime_views:
    - renderCampaignBuilderNow
    - renderCampaignBuilderReadiness
    - renderCampaignBuilderOpportunityQueues
    - renderCampaignBuilderCampaignQueues
    - renderCampaignBuilderSurfaceLinks
  required_visible_sections:
    - Filtro
    - Prossima Campagna
    - Stato Ponte
    - Opportunita Da Giocare
    - Fronti E Campagne
    - Superfici
    - Azioni
panels:
  now:
    runtime_view: renderCampaignBuilderNow
    promise: Decidere quale pezzo di ambientazione deve diventare campagna o prima sessione.
    answers:
      - opportunita forte
      - campagna mancante
      - fronte senza mossa
      - buco campagna
      - tavolo da materializzare
  readiness:
    runtime_view: renderCampaignBuilderReadiness
    promise: Misurare se mondo, fronti, campagne, missioni e sessioni sono collegati.
    answers:
      - regioni
      - conflitti
      - culture
      - fazioni
      - campagne
      - sessioni
  opportunities:
    runtime_view: renderCampaignBuilderOpportunityQueues
    promise: Portare in tabella le fonti di gioco e i fronti da convertire.
    answers:
      - luoghi pericolosi
      - culture tese
      - conflitti
      - fazioni in pressione
      - fronti
  campaigns:
    runtime_view: renderCampaignBuilderCampaignQueues
    promise: Verificare campagne, sessioni e buchi che bloccano il ponte verso il tavolo.
    answers:
      - campagne create
      - sessioni collegate
      - promessa
      - regione iniziale
      - conflitto centrale
  surfaces:
    runtime_view: renderCampaignBuilderSurfaceLinks
    promise: Aprire la superficie giusta per passare da ambientazione a gioco senza espandere archivio.
    answers:
      - atlante
      - geopolitica
      - mondo vivo
      - preparazione
      - basi operative
queues:
  - id: opportunities
    label: Opportunita Da Giocare
    table_columns:
      - Fonte
      - Tipo
      - Pressione
      - Gancio
      - Poteri
      - Uscita
  - id: fronts
    label: Fronti Di Campagna
    table_columns:
      - Fronte
      - Tipo
      - Pressione
      - Progresso
      - Scadenza
      - Poteri
      - Prossima mossa
  - id: campaigns
    label: Campagne Create
    table_columns:
      - Campagna
      - Stato
      - Profilo
      - Regione
      - Culture
      - Fazioni
      - Conflitti
      - Prossima sessione
  - id: sessions
    label: Sessioni Da Materializzare
    table_columns:
      - Sessione
      - Stato
      - Data
      - Campagna
      - Mondo
      - Obiettivo
  - id: gaps
    label: Buchi Del Ponte Campagna
    table_columns:
      - Nota
      - Problema
      - Azione
      - Stato
surfaces:
  - id: atlas
    label: Atlante del mondo
    plugin: Dataview
    target: Hub/Atlante del Mondo.md
    badge: Atlante
    role: scegliere regione
    action: Apri quando devi trovare il luogo, la rotta o il marker da cui far partire la campagna.
    why: Una campagna nasce meglio da un luogo giocabile che da una lista di lore.
  - id: playable_region
    label: Regione giocabile
    plugin: Dataview
    target: Risorse/Regione Giocabile.md
    badge: Ponte
    role: verificare regione
    action: Apri quando la zona ha lore interessante ma non e ancora chiaro se produce sessioni, fronti e materiale player-safe.
    why: Prima di creare una campagna conviene sapere quali luoghi, poteri, pressioni e segreti arriveranno davvero al tavolo.
  - id: geopolitics
    label: Geopolitica
    plugin: Dataview
    target: Hub/Geopolitical Dashboard.md
    badge: Poteri
    role: scegliere crisi politica
    action: Apri quando il motore della campagna e un confine, trattato, dominio o conflitto diplomatico.
    why: Le campagne lunghe hanno bisogno di poteri che reagiscono e cambiano pressione.
  - id: living_world
    label: Motore Mondo Vivo
    plugin: Dataview
    target: Hub/Motore Mondo Vivo.md
    badge: Fronti
    role: ordinare pressioni
    action: Apri quando il fronte deve avanzare fuori scena o propagare conseguenze.
    why: Un arco di campagna resta vivo solo se le pressioni hanno prossima mossa.
  - id: preparation
    label: Preparazione sessione
    plugin: Dataview
    target: Risorse/Preparazione Sessione.md
    badge: Tavolo
    role: materializzare prima sessione
    action: Apri quando la campagna ha promessa e conflitto ma manca la giocata concreta.
    why: Il ponte e riuscito solo quando produce obiettivo, scelta e scena iniziale.
  - id: dm_dashboard
    label: DM Dashboard
    plugin: Dataview
    target: Hub/1. DM Dashboard.md
    badge: Regia
    role: tornare alla priorita DM
    action: Apri quando devi scegliere se preparare, giocare, chiudere o pulire.
    why: La campagna non deve diventare un archivio parallelo alla regia del tavolo.
  - id: locations_base
    label: Luoghi operativi
    plugin: Bases
    target: z.bases/Luoghi.base
    generated_release: true
    badge: Base
    role: correggere regioni
    action: Apri quando molti luoghi candidati vanno filtrati per mondo, gerarchia o pericolo.
    why: I luoghi restano editabili in tabella senza rendere z.bases sorgente tracciato.
  - id: missions_base
    label: Missioni aperte
    plugin: Bases
    target: z.bases/Missioni.base
    generated_release: true
    badge: Base
    role: collegare obiettivi
    action: Apri quando una campagna produce piu missioni da ordinare.
    why: Le missioni sono il punto in cui ambientazione e scelta dei PG si incontrano.
  - id: worldbuilding_base
    label: Worldbuilding operativo
    plugin: Bases
    target: z.bases/Worldbuilding.base
    generated_release: true
    badge: Base
    role: confrontare culture e conflitti
    action: Apri quando culture, societa o conflitti devono essere allineati prima della campagna.
    why: La profondita serve solo se chiarisce tensioni, scelte e posta.
contracts:
  dashboard_uses_runtime_views: true
  surfaces_must_resolve_to_source_or_generated_release_target: true
  generated_targets_must_stay_release_only: true
  campaign_builder_prioritizes_playable_conversion_before_archive_tables: true
