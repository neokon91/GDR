id: template_blueprints
purpose: Blueprint iniziali per generare template Markdown/Templater con Jinja2.
version: 0.2.0
blueprints:
  world_entity:
    target_family:
      - cultura
      - religione
      - societa
      - cosmologia
      - risorsa
      - creatura
      - evento storico
    jinja_template: ../jinja/entity_template.md.j2
    templater_entry: "<% await tp.user.world_entity(tp) %>"
    required_modules:
      - fields_core
      - plugin_bindings
      - sections
      - callouts
      - tabs
      - dataview_blocks
      - metabind_inputs
      - metabind_buttons
    sections:
      - identita
      - uso_al_tavolo
      - connessioni
      - propagazione
      - player_safe
      - controllo
    plugin_features:
      - templater
      - meta_bind
      - dataview
      - metadata_menu
      - bases
    output:
      folder: z.modelli/worldbuilding
      fallback: markdown_sections
    comparison_targets:
      - z.modelli/worldbuilding/Entita Worldbuilding.md
  session:
    target_family:
      - sessione
    jinja_template: ../jinja/session_template.md.j2
    templater_entry: "<% await tp.user.sessione(tp) %>"
    required_modules:
      - fields_core
      - plugin_bindings
      - sections
      - callouts
      - tabs
      - dataview_blocks
      - metabind_inputs
      - metabind_buttons
    sections:
      - obiettivo
      - prima_scena
      - scelta
      - pressione
      - materiali
      - incontri
      - media
      - post_sessione
    plugin_features:
      - templater
      - meta_bind
      - dataview
      - tasks
      - dice_roller
      - initiative_tracker
      - media_extended
    output:
      folder: z.modelli/dm
      fallback: markdown_checklist
    comparison_targets:
      - z.modelli/dm/Sessione.md
  map_asset:
    target_family:
      - mappa
      - fronte
      - territorio
      - dungeon
    jinja_template: ../jinja/map_template.md.j2
    templater_entry: "<% await tp.user.mappa(tp) %>"
    required_modules:
      - fields_core
      - plugin_bindings
      - sections
      - callouts
      - tabs
      - dataview_blocks
      - metabind_inputs
      - bases_views
    sections:
      - cosa_mostra
      - layer_dm
      - layer_pubblico
      - pin
      - note_collegate
      - fallback_markdown
    plugin_features:
      - excalidraw
      - canvas
      - maps
      - ttrpg_maps
      - hex_cartographer
      - dataview
    output:
      folder: z.modelli/mappe
      fallback: markdown_marker_table
    comparison_targets:
      - z.modelli/mappe/Mappa Zoom.md
      - z.modelli/mappe/Mappa Excalidraw Fronti.excalidraw.md
  creature_encounter:
    target_family:
      - creatura
      - incontro
    jinja_template: ../jinja/encounter_template.md.j2
    templater_entry: "<% await tp.user.incontro(tp) %>"
    required_modules:
      - fields_core
      - plugin_bindings
      - sections
      - callouts
      - tabs
      - dataview_blocks
      - metabind_inputs
    sections:
      - statblock
      - encounter
      - terreno
      - obiettivo
      - complicazioni
      - ricompense
    plugin_features:
      - fantasy_statblocks
      - initiative_tracker
      - dice_roller
      - callout_manager
    output:
      folder: z.modelli/dm
      fallback: markdown_encounter_table
    comparison_targets:
      - z.modelli/dm/Incontro.md
      - z.modelli/Creatura.md
outputs:
  markdown_templates: z.modelli
  fileclasses: z.fileclass
  bases: z.bases
  checks: z.automazioni/check_vault.js
jinja_contract:
  role: generatore_statico
  allowed:
    - scegliere sezioni da YAML
    - comporre callout, tabs, input Meta Bind e blocchi Dataview
    - emettere una sola entry Templater iniziale
    - emettere fallback Markdown leggibile
  forbidden:
    - richiedere Jinja nel vault utente
    - inserire logica Jinja da eseguire in Obsidian
    - duplicare responsabilita degli script in z.automazioni
