id: template_blueprints
purpose: Blueprint per generare tutti i template operativi Markdown/Templater da TemplateFactory.
version: 0.3.0
blueprint_profiles:
  generic:
    jinja_template: ../jinja/generic_template.md.j2
    required_modules:
    - fields_core
    - plugin_bindings
    - sections
    - callouts
    - tabs
    - dataview_blocks
    - metabind_inputs
    - metabind_buttons
    sections:
    - identita
    - uso_al_tavolo
    - connessioni
    - propagazione
    - player_safe
    - controllo
    plugin_features:
    - tabs
    - callouts
    - templater
    - meta_bind
    - dataview
    - js_engine
    - bases
    - tasks
    - excalidraw
    - canvas
    - maps
  action:
    jinja_template: ../jinja/action_template.md.j2
    required_modules:
    - fields_core
    - plugin_bindings
    - sections
    - callouts
    - tabs
    - dataview_blocks
    - metabind_inputs
    - metabind_buttons
    sections:
    - identita
    - uso_al_tavolo
    - connessioni
    - propagazione
    - player_safe
    - controllo
    plugin_features:
    - templater
    - meta_bind
    - dataview
  encounter:
    jinja_template: ../jinja/encounter_template.md.j2
    required_modules:
    - fields_core
    - plugin_bindings
    - sections
    - callouts
    - tabs
    - dataview_blocks
    - metabind_inputs
    - metabind_buttons
    sections:
    - statblock
    - encounter
    - terreno
    - obiettivo
    - complicazioni
    - ricompense
    plugin_features:
    - fantasy_statblocks
    - initiative_tracker
    - dice_roller
    - callout_manager
  map:
    jinja_template: ../jinja/map_template.md.j2
    required_modules:
    - fields_core
    - plugin_bindings
    - sections
    - callouts
    - tabs
    - dataview_blocks
    - metabind_inputs
    - metabind_buttons
    sections:
    - cosa_mostra
    - layer_dm
    - layer_pubblico
    - pin
    - note_collegate
    - fallback_markdown
    plugin_features:
    - excalidraw
    - canvas
    - maps
    - ttrpg_maps
    - hex_cartographer
    - dataview
  session:
    jinja_template: ../jinja/session_template.md.j2
    required_modules:
    - fields_core
    - plugin_bindings
    - sections
    - callouts
    - tabs
    - dataview_blocks
    - metabind_inputs
    - metabind_buttons
    sections:
    - obiettivo
    - prima_scena
    - scelta
    - pressione
    - materiali
    - incontri
    - media
    - post_sessione
    plugin_features:
    - tabs
    - callouts
    - templater
    - meta_bind
    - dataview
    - js_engine
    - bases
    - tasks
    - dice_roller
    - excalidraw
    - canvas
    - maps
    - media_extended
