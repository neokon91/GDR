id: runtime_dataview_contract
purpose: Contratto dichiarativo delle sorgenti Dataview simulate dal runtime check.
version: 0.1.0
fixture: Dev/TemplateFactory/tools/fixtures/runtime_demo_pages.json
source_routes:
  - id: mondi_e_mappe
    when_all:
      - '"Mondi"'
      - '"Risorse/Mappe"'
    include_prefixes:
      - Mondi/
      - Risorse/Mappe/
  - id: sessioni
    contains: '"Mondi/Sessioni"'
    include_prefixes:
      - Mondi/Sessioni/
  - id: missioni
    contains: '"Mondi/Missioni"'
    include_prefixes:
      - Mondi/Missioni/
  - id: personaggi
    contains: '"Mondi/Personaggi"'
    include_prefixes:
      - Mondi/Personaggi/
  - id: fazioni
    contains: '"Mondi/Fazioni"'
    include_prefixes:
      - Mondi/Fazioni/
  - id: conflitti
    contains: '"Mondi/Conflitti"'
    include_prefixes:
      - Mondi/Conflitti/
  - id: tracciati
    contains: '"Mondi/Tracciati"'
    include_prefixes:
      - Mondi/Tracciati/
  - id: incontri
    contains: '"Mondi/Incontri"'
    include_prefixes:
      - Mondi/Incontri/
  - id: creature
    contains: '"Mondi/Creature"'
    include_prefixes:
      - Mondi/Creature/
  - id: oggetti
    contains: '"Mondi/Oggetti"'
    include_prefixes:
      - Mondi/Oggetti/
  - id: luoghi
    contains: '"Mondi/Luoghi"'
    include_prefixes:
      - Mondi/Luoghi/
  - id: rotte
    contains: '"Mondi/Rotte"'
    include_prefixes:
      - Mondi/Rotte/
  - id: risorse
    contains: '"Mondi/Risorse"'
    include_prefixes:
      - Mondi/Risorse/
  - id: mercati
    contains: '"Mondi/Mercati"'
    include_prefixes:
      - Mondi/Mercati/
  - id: relazioni
    contains: '"Mondi/Relazioni"'
    include_prefixes:
      - Mondi/Relazioni/
  - id: religioni
    contains: '"Mondi/Religioni"'
    include_prefixes:
      - Mondi/Religioni/
  - id: segreti
    contains: '"Mondi/Segreti"'
    include_prefixes:
      - Mondi/Segreti/
  - id: compendium
    contains: '"Mondi/Compendium"'
    include_prefixes:
      - Mondi/Compendium/
  - id: culture_lingue
    when_any:
      - '"Mondi/Culture"'
      - '"Mondi/Lingue"'
