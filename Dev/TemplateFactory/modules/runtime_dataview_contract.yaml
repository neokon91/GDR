      - Mondi/Culture/
      - Mondi/Lingue/
  - id: storia_timeline
    when_any:
      - '"Mondi/Storia"'
      - '"Mondi/Timeline"'
    include_prefixes:
      - Mondi/Storia/
      - Mondi/Timeline/
  - id: dispense_mondo
    contains: '"Mondi/Dispense"'
    include_prefixes:
      - Mondi/Dispense/
  - id: mappe
    contains: '"Risorse/Mappe"'
    include_prefixes:
      - Risorse/Mappe/
  - id: media_e_dispense
    when_any:
      - '"Risorse/Audio"'
      - '"Risorse/Video"'
      - '"Risorse/Immagini"'
      - '"Risorse/Dispense"'
    include_prefixes:
      - Risorse/Audio/
      - Risorse/Video/
      - Risorse/Immagini/
      - Risorse/Dispense/
  - id: inbox_generati
    contains: '"Inbox/Generati"'
    include_prefixes:
      - Inbox/Generati/
  - id: campagne_root
    exact: '"Campagne"'
    include_prefixes:
      - Campagne/
  - id: operativi_fallback
    when_any:
      - '"Mondi"'
      - '"Campagne"'
      - '"Inbox"'
    include_prefixes:
      - Mondi/
      - Campagne/
      - Inbox/
