id: user_path
purpose: Percorso utente primario verificato dai check senza tenere workflow e CTA hardcoded in JavaScript.
version: 0.1.0
policy:
  user_workflows_must_use_simple_mode: true
  forbidden_user_block_markers:
    - Plugin coinvolti
    - BUTTON[
required_release_config:
  - .obsidian/app.json
  - .obsidian/core-plugins.json
  - .obsidian/community-plugins.json
  - .obsidian/plugins/obsidian-meta-bind-plugin/data.json
  - .obsidian/plugins/templater-obsidian/data.json
  - .obsidian/plugins/dataview/data.json
primary_path:
  - workflow: onboarding_utente
    page: Inizia Qui.md
    label: Inizia Qui
    required_buttons:
      - prima-sessione-in-15-minuti-risorse-prima-sessione-in-15-minuti
      - regione-giocabile-risorse-regione-giocabile
      - preparazione-sessione-risorse-preparazione-sessione
      - gioca-hub-durante-il-gioco-durante-il-gioco
      - post-sessione-guidato-risorse-post-sessione-guidato
  - workflow: prima_sessione_rapida
    page: Risorse/Prima Sessione In 15 Minuti.md
    label: Prima Sessione In 15 Minuti
    required_buttons:
      - nuova-sessione-z-modelli-dm-sessione-md
      - preparazione-sessione-risorse-preparazione-sessione
      - durante-il-gioco-durante-il-gioco
      - post-sessione-guidato-risorse-post-sessione-guidato
  - workflow: regione_giocabile
    page: Risorse/Regione Giocabile.md
    label: Regione Giocabile
    required_buttons:
      - nuovo-luogo-z-modelli-luogo-router-md
      - nuova-fazione-z-modelli-fazione-router-md
      - nuovo-conflitto-z-modelli-worldbuilding-conflitto-md
      - nuova-missione-z-modelli-dm-missione-md
      - nuova-sessione-z-modelli-dm-sessione-md
  - workflow: prepara_sessione
    page: Risorse/Preparazione Sessione.md
    label: Preparazione Sessione
    required_buttons:
      - nuova-sessione-z-modelli-dm-sessione-md
      - rendi-sessione-attiva
      - durante-il-gioco-durante-il-gioco
  - workflow: gioca_live
    page: Hub/Durante il Gioco.md
    label: Durante il Gioco
    required_buttons:
      - wizard-appunto-live
      - registra-scelta-mondo
      - avanza-clock
      - post-sessione-guidato-risorse-post-sessione-guidato
  - workflow: post_sessione
    page: Risorse/Post Sessione Guidato.md
    label: Post Sessione Guidato
    required_buttons:
      - chiudi-sessione-viva
      - apri-prossima-sessione-viva
      - applica-conseguenza
      - propaga-a-entita
      - fuori-scena-hub-cosa-succede-fuori-scena-cosa-succede-fuori-scena
ux_classification:
  CORE:
    - prima_sessione_rapida
    - regione_giocabile
    - prepara_sessione
    - gioca_live
    - post_sessione
  ADVANCED:
    - dashboard_dm
    - espandi_mondo
    - campagna_ambientazione
    - fuori_scena
    - atlante_mondo
    - economia_rotte
    - lore_hub
    - motore_mondo_vivo
    - bibbia_mondo
    - compendium_mondo
    - iniziativa_combattimenti
  DEV_ONLY:
    - setup_guidato
    - manutenzione
    - controllo_worldbuilding
    - controllo_canone
    - revisione_lore
    - quality_report
contracts:
  new_user_primary_surfaces_are_core_only: true
  onboarding_is_gateway_not_workflow: true
  advanced_surfaces_must_support_core: true
