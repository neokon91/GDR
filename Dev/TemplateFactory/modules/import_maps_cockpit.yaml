id: import_maps_cockpit
purpose: Contratto operativo per trasformare Importare Mappe in cockpit compatto di dry-run, output importati e smistamento controllato.
version: 0.1.0
dashboard:
  page: Risorse/Importare Mappe.md
  workflow: import_mappe
  required_runtime_views:
    - renderMapImportNow
    - renderMapImportReadiness
    - renderMapImportSources
    - renderMapImportQueues
    - renderMapImportSurfaceLinks
  required_visible_sections:
    - Import Prima
    - Stato Import
    - Sorgenti Supportate
    - Bozze E Output
    - Superfici
    - Azioni
panels:
  now:
    runtime_view: renderMapImportNow
    promise: Decidere se fare dry-run, smistare una bozza o correggere un output importato.
    answers:
      - import prima
      - dry-run
      - bozza importata
      - mappa creata
      - smistamento
  readiness:
    runtime_view: renderMapImportReadiness
    promise: Misurare sorgenti configurate, bozze importate, mappe create e buchi di aggancio.
    answers:
      - sorgenti
      - dry-run
      - bozze
      - mappe
      - buchi
      - pronte
  sources:
    runtime_view: renderMapImportSources
    promise: Mostrare solo i comandi supportati e la destinazione prevista, senza guida lunga.
    answers:
      - npm run import:map
      - npm run import:azgaar
      - npm run import:watabou:city
      - npm run import:watabou:dungeon
  queues:
    runtime_view: renderMapImportQueues
    promise: Portare in tabella bozze, mappe e problemi pratici nati dagli importatori.
    answers:
      - bozze importate
      - mappe importate
      - problemi di aggancio
  surfaces:
    runtime_view: renderMapImportSurfaceLinks
    promise: Aprire la superficie giusta per smistare, controllare mappe o verificare player-safe.
    answers:
      - smistamento bozze
      - mappe
      - atlante
      - controllo vault
      - vista giocatori
sources:
  - id: dispatch
    label: Dispatch import mappe
    npm_script: import:map
    source_key: import:map
    accepts:
      - azgaar
      - watabou-city
      - watabou-dungeon
    dry_run_command: npm run import:map -- azgaar Import/Azgaar/export.geojson --world "Mondo" --dry-run
    import_command: npm run import:map -- watabou-city Import/Watabou/city.json --world "Mondo"
    writes_to: Inbox/Generati e Risorse/Mappe
    guardrail: Usa il dispatch quando vuoi una sola interfaccia; esegui prima sempre il dry-run.
  - id: azgaar
    label: Azgaar GeoJSON
    npm_script: import:azgaar
    source_key: azgaar
    accepts:
      - geojson
    dry_run_command: npm run import:azgaar -- Import/Azgaar/export.geojson --world "Mondo" --dry-run
    import_command: npm run import:azgaar -- Import/Azgaar/export.geojson --world "Mondo"
    writes_to: Inbox/Generati
    guardrail: Importa luoghi da GeoJSON come bozze; collega mondo e coordinate prima di canonizzare.
  - id: watabou_city
    label: Watabou City
    npm_script: import:watabou:city
    source_key: watabou-city
    accepts:
      - json
    dry_run_command: npm run import:watabou:city -- Import/Watabou/city.json --world "Mondo" --dry-run
    import_command: npm run import:watabou:city -- Import/Watabou/city.json --world "Mondo"
    writes_to: Inbox/Generati e Risorse/Mappe
    guardrail: Importa citta e mappa come materiale da smistare; separa versione DM e player-safe.
  - id: watabou_dungeon
    label: Watabou Dungeon
    npm_script: import:watabou:dungeon
    source_key: watabou-dungeon
    accepts:
      - json
    dry_run_command: npm run import:watabou:dungeon -- Import/Watabou/dungeon.json --world "Mondo" --dry-run
    import_command: npm run import:watabou:dungeon -- Import/Watabou/dungeon.json --world "Mondo"
    writes_to: Inbox/Generati
    guardrail: Importa dungeon come luogo bozza; collega incontri e uso al tavolo prima di renderlo pronto.
queues:
  - id: imported_drafts
    label: Bozze Importate
    table_columns:
      - Bozza
      - Fonte
      - Aggancio
      - Azione
  - id: imported_maps
    label: Mappe Importate
    table_columns:
      - Mappa
      - Fonte
      - Luogo/coordinate
      - Stato
  - id: import_gaps
    label: Buchi Import
    table_columns:
      - Nota
      - Problema
      - Azione
surfaces:
  - id: draft_triage
    label: Smistamento bozze
    plugin: Dataview
    target: Risorse/Smistamento Bozze Generate.md
    badge: Bozze
    role: decidere cosa diventa canone
    action: Apri quando un import ha creato note in Inbox/Generati.
    why: Gli importatori producono bozze, non canone automatico.
  - id: maps_index
    label: Mappe
    plugin: Dataview
    target: Risorse/Mappe/Mappe.md
    badge: Mappe
    role: controllare uso e player-safe
    action: Apri quando l'import ha generato o collegato una mappa.
    why: Una mappa conta solo se serve sessione, viaggio, fronte o vista giocatori.
  - id: atlas_dashboard
    label: Atlante del mondo
    plugin: Maps
    target: Hub/Atlante del Mondo.md
    badge: Atlante
    role: verificare coordinate e territori
    action: Apri quando luoghi importati devono comparire su marker, rotte o layer.
    why: Coordinate e agganci territoriali rendono l'import giocabile.
  - id: vault_control
    label: Controllo vault
    plugin: Dataview
    target: Risorse/Controllo Vault.md
    badge: Audit
    role: trovare note isolate
    action: Apri dopo lo smistamento per verificare buchi, duplicati e incoerenze.
    why: Un import non deve lasciare note scollegate nel vault.
  - id: player_view
    label: Vista giocatori
    plugin: Dataview
    target: Hub/Vista Giocatori.md
    badge: Player-safe
    role: controllare cosa mostrare
    action: Apri prima di condividere mappe o luoghi importati.
    why: Versione giocatori e segreti DM devono restare separati.
contracts:
  dashboard_uses_runtime_views: true
  page_must_not_use_inline_dataview_queries: true
  importer_scripts_must_exist_in_package_json: true
  import_output_stays_draft_until_triaged: true
