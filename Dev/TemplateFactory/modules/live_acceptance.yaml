id: live_acceptance
purpose: Scenari di accettazione live per Obsidian reale in profilo isolato.
version: 0.1.0
first_run_pages:
  - Inizia Qui.md
  - Risorse/Setup Guidato.md
  - Hub/1. DM Dashboard.md
  - Hub/Durante il Gioco.md
  - Risorse/Post Sessione Guidato.md
  - Hub/Cosa Succede Fuori Scena.md
  - Hub/Worldbuilder Dashboard.md
  - Hub/Vista Giocatori.md
  - Risorse/Quality Report.md
workflow_smoke:
  setup_page: Inizia Qui.md
  button_id: nuovo-mondo-homebrew
  button_label: Nuovo Mondo Homebrew
  template_file: z.modelli/wizard/Nuovo Mondo Homebrew.md
  helper_script: z.automazioni/helpers.js
  user_script: z.automazioni/nuovo_mondo_homebrew.js
  temp_note: Inbox/Live Acceptance Temp.md
  expected_world_path: Mondi/Accettazione Live Obsidian.md
  expected_world_name: Accettazione Live Obsidian
  prompt_answers:
    Nome del mondo: Accettazione Live Obsidian
    Promessa del mondo: Un arcipelago conteso dove ogni faro custodisce un patto antico.
    Tono: Avventura tesa, chiara al tavolo, con segreti leggibili dal DM.
    Genere o contaminazione: Fantasy marittimo politico
    Livello magia: Media, rituale e costosa
    Calendario Calendarium del mondo: Calendario delle Maree
    Scala iniziale: Arcipelago regionale
    Conflitto centrale: Le maree stanno spegnendo i fari sacri e le fazioni cercano colpevoli.
    Vincoli creativi: Niente contenuto proprietario o assi tematici esterni.
    Temi da evitare: Tortura esplicita
    Luogo fondativo 1: Faro di Vetro
    Luogo fondativo 2: Porto delle Campane
    Luogo fondativo 3: Selva dei Giuramenti
    Potere/fazione fondativa 1: Consiglio delle Maree
    Potere/fazione fondativa 2: Ordine della Lanterna
    Potere/fazione fondativa 3: Mercanti del Sigillo
    Cultura fondativa 1: Cantori della Soglia
    Cultura fondativa 2: Naviganti del Sale
    Mistero fondativo: Un faro continua a brillare sott'acqua.
    Pressione iniziale: 6
  suggester_answers:
    Preset creativo: Dark fantasy
  expected_files:
    - Mondi/Accettazione Live Obsidian.md
    - Mondi/Luoghi/Faro di Vetro.md
    - Mondi/Luoghi/Porto delle Campane.md
    - Mondi/Luoghi/Selva dei Giuramenti.md
    - Mondi/Fazioni/Consiglio delle Maree.md
    - Mondi/Fazioni/Ordine della Lanterna.md
    - Mondi/Fazioni/Mercanti del Sigillo.md
    - Mondi/Culture/Cantori della Soglia.md
    - Mondi/Culture/Naviganti del Sale.md
  expected_world_contains:
    - "categoria: mondo"
    - "Accettazione Live Obsidian"
    - "dark fantasy"
    - "Faro di Vetro"
    - "Consiglio delle Maree"
    - "Cantori della Soglia"
  verify_pages_after_workflow:
    - Hub/Worldbuilder Dashboard.md
    - Hub/Atlante del Mondo.md
    - Hub/Vista Giocatori.md
  persistence_pages:
    - Mondi/Accettazione Live Obsidian.md
    - Hub/Worldbuilder Dashboard.md
cycle_smoke:
  setup_page: Risorse/Preparazione Sessione.md
  table_page: Hub/Durante il Gioco.md
  post_session_page: Risorse/Post Sessione Guidato.md
  session_button_id: nuova-sessione-z-modelli-dm-sessione-md
  session_button_label: Nuova Sessione
  session_template_file: z.modelli/dm/Sessione.md
  session_user_script: z.automazioni/sessione.js
  post_session_button_id: wizard-fine-sessione
  post_session_button_label: Fine Sessione
  post_session_template_file: z.modelli/wizard/Fine Sessione.md
  post_session_user_script: z.automazioni/wizard_layer.js
  temp_note: Inbox/Live Session Acceptance Temp.md
  expected_session_path: Mondi/Sessioni/2026-05-26 - Sessione Live Faro Sommerso.md
  expected_session_name: Sessione Live Faro Sommerso
  expected_session_contains:
    - "categoria: sessione"
    - "Sessione Live Faro Sommerso"
    - "Faro di Vetro"
    - "Le maree aprono una camera sotto il faro"
  prompt_answers:
    Titolo della sessione: Sessione Live Faro Sommerso
    Data: "2026-05-26"
    Obiettivo della sessione: Capire perche il Faro di Vetro brilla sotto la marea.
    Prima scena / apertura: Le maree aprono una camera sotto il faro.
    Scelta concreta per i giocatori: Salvare i custodi o inseguire il sigillo sommerso.
    Calendario Calendarium: Calendario delle Maree
    Scelta dei giocatori: Il gruppo salva i custodi e lascia fuggire il messaggero del sigillo.
    Cosa cambia nel mondo: Il Consiglio delle Maree perde controllo sul porto.
    Chi reagisce prima della prossima sessione: Consiglio delle Maree; Mercanti del Sigillo
    Recap pubblico: I custodi del faro sono salvi, ma il sigillo e scomparso.
    Recap DM: Il messaggero porta il sigillo alla Selva dei Giuramenti.
    Prossima apertura: Il porto chiude le campane e accusa i naviganti.
    Output utile per la prossima sessione: Seguire il sigillo verso la Selva dei Giuramenti.
  suggester_answers:
    Vuoi collegare subito cast, luoghi, materiali e media? Scegli No per una sessione rapida.: "No"
    Tipo di sessione: Sessione di campagna
  prepare_frontmatter:
    stato: pronto
    attiva: true
    materiale_pronto:
      - Mappa del Faro di Vetro
      - Conflitto tra custodi e messaggero
    pressioni:
      - Le maree stanno salendo
    luoghi:
      - "[[Faro di Vetro]]"
    fazioni:
      - "[[Consiglio delle Maree]]"
      - "[[Mercanti del Sigillo]]"
  live_frontmatter:
    scena_corrente: Camera sommersa del faro
    decisioni_prese:
      - Il gruppo salva i custodi e lascia fuggire il messaggero del sigillo.
    output_sessione:
      - Il sigillo viene portato verso la Selva dei Giuramenti.
    conseguenze:
      - Il Consiglio delle Maree perde controllo sul porto.
    entita_impattate:
      - "[[Faro di Vetro]]"
      - "[[Consiglio delle Maree]]"
    propaga_a:
      - "[[Mercanti del Sigillo]]"
  expected_session_frontmatter:
    categoria: sessione
    stato: giocata
    attiva: false
    propagazione_stato: aperta
  expected_session_list_contains:
    decisioni_prese:
      - Il gruppo salva i custodi e lascia fuggire il messaggero del sigillo.
    conseguenze:
      - Il Consiglio delle Maree perde controllo sul porto.
    recap_pubblico:
      - I custodi del faro sono salvi, ma il sigillo e scomparso.
    output_sessione:
      - Seguire il sigillo verso la Selva dei Giuramenti.
  verify_pages_after_cycle:
    - Hub/Durante il Gioco.md
    - Risorse/Post Sessione Guidato.md
    - Mondi/Stato del Mondo.md
    - Hub/Vista Giocatori.md
    - Risorse/Quality Report.md
  persistence_pages:
    - Mondi/Sessioni/2026-05-26 - Sessione Live Faro Sommerso.md
    - Risorse/Post Sessione Guidato.md
    - Mondi/Stato del Mondo.md
