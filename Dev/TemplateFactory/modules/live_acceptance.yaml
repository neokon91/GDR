id: live_acceptance
purpose: Scenari di accettazione live per Obsidian reale in profilo isolato.
version: 0.1.0
first_run_pages:
  - Inizia Qui.md
  - Risorse/Setup Guidato.md
  - Hub/1. DM Dashboard.md
  - Hub/Durante il Gioco.md
  - Risorse/Post Sessione Guidato.md
  - Hub/Cosa Succede Fuori Scena.md
  - Hub/Worldbuilder Dashboard.md
  - Hub/Vista Giocatori.md
  - Risorse/Quality Report.md
ux_surface_checks:
  forbidden_visible_text:
    - "BUTTON["
    - "```dataview"
    - "<%"
    - TemplateFactory
    - "node z.automazioni"
    - "z.*"
    - "npm run"
    - "source_lab:"
    - idea_originale_riservata
  forbidden_visible_regex:
    - "\\bBUTTON\\[[^\\]\\n]+\\]"
    - "```dataview(?:js)?"
    - "<%[\\s\\S]*?%>"
  forbidden_visible_selectors:
    - selector: ".metadata-container"
      description: proprieta Obsidian visibili nella nota
    - selector: ".metadata-properties"
      description: pannello proprieta Obsidian visibile nella nota
    - selector: ".metadata-property"
      description: singola proprieta Obsidian visibile nella nota
  required_visible_text_by_page:
    - page: Inizia Qui.md
      all:
        - Inizia Qui
      any:
        - Crea mondo
        - Nuovo Mondo Homebrew
    - page: Risorse/Setup Guidato.md
      all:
        - Setup Guidato
      any:
        - Torna all'inizio
        - Crea mondo
    - page: Hub/1. DM Dashboard.md
      all:
        - DM Dashboard
      any:
        - Durante il gioco
        - Preparazione sessione
    - page: Hub/Durante il Gioco.md
      all:
        - Durante il Gioco
      any:
        - Appunto live
        - Registra scelta
        - Aggiorna scena
    - page: Risorse/Post Sessione Guidato.md
      all:
        - Post Sessione Guidato
      any:
        - Chiudi sessione
        - Recap pubblico
    - page: Hub/Cosa Succede Fuori Scena.md
      all:
        - Cosa Succede Fuori Scena
      any:
        - Post sessione
        - Applica conseguenza
    - page: Hub/Worldbuilder Dashboard.md
      all:
        - Worldbuilder Dashboard
      any:
        - Crea mondo
        - Nuova cultura
        - Nuovo luogo
    - page: Hub/Vista Giocatori.md
      all:
        - Vista Giocatori
      any:
        - Stato Portale
        - Mondo Conosciuto
        - Diario Pubblico
    - page: Risorse/Quality Report.md
      all:
        - Quality Report
      any:
        - Controllo vault
        - Copertura
plugin_runtime_probes:
  - id: dataview
    commands_any:
      - dataview
    api_checks:
      - dataview_page
    source_checks:
      - file: Hub/1. DM Dashboard.md
        contains:
          - "```dataviewjs"
  - id: templater-obsidian
    commands_any:
      - templater
    config_checks:
      - path: .obsidian/plugins/templater-obsidian/data.json
        json_equals:
          templates_folder: z.modelli
          user_scripts_folder: z.automazioni/templater
    source_checks:
      - file: z.modelli/dm/Sessione.md
        contains:
          - "<% await tp.user.sessione(tp) %>"
  - id: obsidian-meta-bind-plugin
    commands_any:
      - meta-bind
    config_checks:
      - path: .obsidian/plugins/obsidian-meta-bind-plugin/data.json
        array_min:
          inputFieldTemplates: 20
          buttonTemplates: 20
    source_checks:
      - file: Inizia Qui.md
        contains:
          - "BUTTON[nuovo-mondo-homebrew]"
  - id: js-engine
    source_checks:
      - file: z.engine/session_views.js
        contains:
          - "JS Engine"
  - id: metadata-menu
    config_checks:
      - path: .obsidian/plugins/metadata-menu/data.json
        json_equals:
          classFilesPath: z.fileclass/
    file_checks:
      - z.fileclass/sessione.md
  - id: folder-notes
    config_checks:
      - path: .obsidian/plugins/folder-notes/data.json
    file_checks:
      - Mondi/Mondo.md
  - id: homepage
    config_checks:
      - path: .obsidian/plugins/homepage/data.json
        contains:
          - Inizia Qui
  - id: callout-manager
    config_checks:
      - path: .obsidian/plugins/callout-manager/data.json
    source_checks:
      - file: Hub/Durante il Gioco.md
        contains:
          - "> [!regia]"
  - id: obsidian-5e-statblocks
    source_checks:
      - file: z.modelli/dm/Incontro.md
        contains:
          - "```statblock"
  - id: obsidian-excalidraw-plugin
    config_checks:
      - path: .obsidian/plugins/obsidian-excalidraw-plugin/data.json
    source_checks:
      - file: Risorse/Mappe/Schema Relazioni GDR.excalidraw.md
        contains:
          - "excalidraw-plugin: parsed"
  - id: obsidian-kanban
    source_checks:
      - file: z.bacheche/Preparazione Sessioni.md
        contains:
          - "kanban-plugin: board"
  - id: obsidian-tasks-plugin
    config_checks:
      - path: .obsidian/plugins/obsidian-tasks-plugin/data.json
        json_equals:
          globalFilter: "#task"
    source_checks:
      - file: Risorse/Task DM.md
        contains:
          - "```tasks"
  - id: maps
    source_checks:
      - file: z.bases/Atlante Mappe.base
        contains:
          - "type: map"
          - "coordinates: note.coordinates"
  - id: initiative-tracker
    config_checks:
      - path: .obsidian/plugins/initiative-tracker/data.json
    source_checks:
      - file: z.modelli/dm/Incontro.md
        contains:
          - "```encounter"
  - id: obsidian-dice-roller
    config_checks:
      - path: .obsidian/plugins/obsidian-dice-roller/data.json
    source_checks:
      - file: Risorse/Tabelle/Tabelle.md
        contains:
          - "dice: [[Risorse/Tabelle/Tabelle#^complicazioni]]"
  - id: calendarium
    config_checks:
      - path: .obsidian/plugins/calendarium/data.json
        contains:
          - Calendario Del Mondo
    source_checks:
      - file: Mondi/Sessioni/2026-05-26 - Sessione Live Faro Sommerso.md
        contains:
          - "fc-calendar"
  - id: advanced-canvas
    source_checks:
      - file: Risorse/Canvas Per GDR.md
        contains:
          - "Canvas serve"
  - id: media-extended
    config_checks:
      - path: .obsidian/plugins/media-extended/data.json
    source_checks:
      - file: Risorse/Materiali Al Tavolo.md
        contains:
          - "audio"
          - "video"
  - id: fantasy-content-generator
    config_checks:
      - path: .obsidian/plugins/fantasy-content-generator/data.json
    source_checks:
      - file: Risorse/Smistamento Bozze Generate.md
        contains:
          - "Fantasy Content Generator"
  - id: obsidian-icon-folder
    config_checks:
      - path: .obsidian/plugins/obsidian-icon-folder/data.json
    file_checks:
      - Inizia Qui.md
  - id: tabs
    source_checks:
      - file: z.modelli/dm/Sessione.md
        contains:
          - "````tabs"
  - id: obsidian-style-settings
    config_checks:
      - path: .obsidian/plugins/obsidian-style-settings/data.json
    source_checks:
      - file: Risorse/Aspetto Vault.md
        contains:
          - "Style Settings"
  - id: table-editor-obsidian
    config_checks:
      - path: .obsidian/plugins/table-editor-obsidian/data.json
    source_checks:
      - file: Risorse/Tabelle/Tabelle.md
        contains:
          - "| d6 | Risultato |"
workflow_smoke:
  setup_page: Inizia Qui.md
  button_id: nuovo-mondo-homebrew
  button_label: Nuovo Mondo Homebrew
  template_file: z.modelli/wizard/Nuovo Mondo Homebrew.md
  helper_script: z.automazioni/helpers.js
  user_script: z.automazioni/nuovo_mondo_homebrew.js
  temp_note: Inbox/Live Acceptance Temp.md
  expected_world_path: Mondi/Accettazione Live Obsidian.md
  expected_world_name: Accettazione Live Obsidian
  prompt_answers:
    Nome del mondo: Accettazione Live Obsidian
    Promessa del mondo: Un arcipelago conteso dove ogni faro custodisce un patto antico.
    Tono: Avventura tesa, chiara al tavolo, con segreti leggibili dal DM.
    Genere o contaminazione: Fantasy marittimo politico
    Livello magia: Media, rituale e costosa
    Calendario Calendarium del mondo: Calendario delle Maree
    Scala iniziale: Arcipelago regionale
    Conflitto centrale: Le maree stanno spegnendo i fari sacri e le fazioni cercano colpevoli.
    Vincoli creativi: Niente contenuto proprietario o assi tematici esterni.
    Temi da evitare: Tortura esplicita
    Luogo fondativo 1: Faro di Vetro
    Luogo fondativo 2: Porto delle Campane
    Luogo fondativo 3: Selva dei Giuramenti
    Potere/fazione fondativa 1: Consiglio delle Maree
    Potere/fazione fondativa 2: Ordine della Lanterna
    Potere/fazione fondativa 3: Mercanti del Sigillo
    Cultura fondativa 1: Cantori della Soglia
    Cultura fondativa 2: Naviganti del Sale
    Mistero fondativo: Un faro continua a brillare sott'acqua.
    Pressione iniziale: 6
  suggester_answers:
    Preset creativo: Dark fantasy
  expected_files:
    - Mondi/Accettazione Live Obsidian.md
    - Mondi/Luoghi/Faro di Vetro.md
    - Mondi/Luoghi/Porto delle Campane.md
    - Mondi/Luoghi/Selva dei Giuramenti.md
    - Mondi/Fazioni/Consiglio delle Maree.md
    - Mondi/Fazioni/Ordine della Lanterna.md
    - Mondi/Fazioni/Mercanti del Sigillo.md
    - Mondi/Culture/Cantori della Soglia.md
    - Mondi/Culture/Naviganti del Sale.md
  expected_world_contains:
    - "categoria: mondo"
    - "Accettazione Live Obsidian"
    - "dark fantasy"
    - "Faro di Vetro"
    - "Consiglio delle Maree"
    - "Cantori della Soglia"
  verify_pages_after_workflow:
    - Hub/Worldbuilder Dashboard.md
    - Hub/Atlante del Mondo.md
    - Hub/Vista Giocatori.md
  persistence_pages:
    - Mondi/Accettazione Live Obsidian.md
    - Hub/Worldbuilder Dashboard.md
cycle_smoke:
  setup_page: Risorse/Preparazione Sessione.md
  table_page: Hub/Durante il Gioco.md
  post_session_page: Risorse/Post Sessione Guidato.md
  session_button_id: nuova-sessione-z-modelli-dm-sessione-md
  session_button_label: Nuova Sessione
  session_template_file: z.modelli/dm/Sessione.md
  session_user_script: z.automazioni/sessione.js
  post_session_button_id: chiudi-sessione-viva
  post_session_button_label: Chiudi Sessione Viva
  post_session_template_file: z.modelli/azioni/Chiudi Sessione Viva.md
  post_session_user_script: z.automazioni/meta_actions.js
  post_session_action: chiudi_sessione_viva
  temp_note: Inbox/Live Session Acceptance Temp.md
  expected_session_path: Mondi/Sessioni/2026-05-26 - Sessione Live Faro Sommerso.md
  expected_session_name: Sessione Live Faro Sommerso
  expected_session_contains:
    - "categoria: sessione"
    - "Sessione Live Faro Sommerso"
    - "Faro di Vetro"
    - "Le maree aprono una camera sotto il faro"
  prompt_answers:
    Titolo della sessione: Sessione Live Faro Sommerso
    Data: "2026-05-26"
    Obiettivo della sessione: Capire perche il Faro di Vetro brilla sotto la marea.
    Prima scena / apertura: Le maree aprono una camera sotto il faro.
    Scelta concreta per i giocatori: Salvare i custodi o inseguire il sigillo sommerso.
    Calendario Calendarium: Calendario delle Maree
    Recap pubblico player-safe: I custodi del faro sono salvi, ma il sigillo e scomparso.
    Recap DM e segreti: Il messaggero porta il sigillo alla Selva dei Giuramenti.
    Svolta o scelta principale: Il gruppo salva i custodi e lascia fuggire il messaggero del sigillo.
    Conseguenza concreta nel mondo: Il Consiglio delle Maree perde controllo sul porto.
    Prossima mossa o reazione: Il Consiglio delle Maree chiude il porto; i Mercanti del Sigillo cercano compratori.
    Apertura prossima sessione: Il porto chiude le campane e accusa i naviganti.
    Aumento pressione sui bersagli: "0"
    Avanzamento tracciati bersaglio: "1"
  suggester_answers:
    Vuoi collegare subito cast, luoghi, materiali e media? Scegli No per una sessione rapida.: "No"
    Tipo di sessione: Sessione di campagna
  prepare_frontmatter:
    stato: pronto
    attiva: true
    materiale_pronto:
      - Mappa del Faro di Vetro
      - Conflitto tra custodi e messaggero
    pressioni:
      - Le maree stanno salendo
    luoghi:
      - "[[Faro di Vetro]]"
    fazioni:
      - "[[Consiglio delle Maree]]"
      - "[[Mercanti del Sigillo]]"
  live_frontmatter:
    scena_corrente: Camera sommersa del faro
    decisioni_prese:
      - Il gruppo salva i custodi e lascia fuggire il messaggero del sigillo.
    output_sessione:
      - Il sigillo viene portato verso la Selva dei Giuramenti.
    conseguenze:
      - Il Consiglio delle Maree perde controllo sul porto.
    entita_impattate:
      - "[[Faro di Vetro]]"
      - "[[Consiglio delle Maree]]"
    propaga_a:
      - "[[Mercanti del Sigillo]]"
  expected_session_frontmatter:
    categoria: sessione
    stato: giocata
    attiva: false
    propagazione_stato: applicata
    prossima_apertura: Il porto chiude le campane e accusa i naviganti.
  expected_session_list_contains:
    decisioni_prese:
      - Il gruppo salva i custodi e lascia fuggire il messaggero del sigillo.
    conseguenze:
      - Il Consiglio delle Maree perde controllo sul porto.
    recap_pubblico:
      - I custodi del faro sono salvi, ma il sigillo e scomparso.
    output_sessione:
      - Il sigillo viene portato verso la Selva dei Giuramenti.
  verify_pages_after_cycle:
    - Hub/Durante il Gioco.md
    - Risorse/Post Sessione Guidato.md
    - Mondi/Stato del Mondo.md
    - Hub/Vista Giocatori.md
    - Risorse/Quality Report.md
  persistence_pages:
    - Mondi/Sessioni/2026-05-26 - Sessione Live Faro Sommerso.md
    - Risorse/Post Sessione Guidato.md
    - Mondi/Stato del Mondo.md
