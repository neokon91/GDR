id: fields_core
purpose: Campi canonici condivisi da template, fileClass, Bases, Dataview e controlli.
version: 0.2.0
fields:
  identity:
    - name: id
      type: text
      required: true
      source: templater
      use: slug stabile della nota
    - name: nome
      type: text
      required: true
      source: templater
      use: titolo leggibile
    - name: descrizione
      type: text
      required: false
      source: templater
      use: descrizione sintetica o testo importato leggibile
    - name: categoria
      type: select
      required: true
      source: taxonomy
      use: famiglia principale della nota
      values:
        - avventura
        - campagna
        - conflitto
        - cosmologia
        - creatura
        - cultura
        - dispensa
        - evento storico
        - fazione
        - incontro
        - lingua
        - lore capture
        - luogo
        - missione
        - mondo
        - nota rapida
        - oggetto
        - personaggio
        - religione
        - relazione
        - risorsa
        - sessione
        - societa
        - srd
        - tracciato
    - name: tipo
      type: select
      required: true
      source: taxonomy
      use: sottotipo giocabile
    - name: stato
      type: select
      required: true
      source: metadata_menu
      use: avanzamento operativo
      values:
        - accettata
        - archiviata
        - attivo
        - bozza
        - canonica
        - canonico
        - collegata
        - completato
        - conclusa
        - da smistare
        - fallito
        - giocata
        - ignorata
        - in corso
        - in gioco
        - in guerra
        - in pausa
        - minacciato
        - morto
        - ostile
        - preparazione
        - pronto
        - proposta
        - scomparso
        - smistata
    - name: fileClass
      type: text
      required: false
      source: metadata_menu
      use: fileClass Metadata Menu da applicare alla famiglia nota
  world_links:
    - name: mondo
      type: wikilink
      required: true
      source: meta_bind
      use: mondo di riferimento
    - name: luoghi
      type: wikilink_list
      required: false
      source: meta_bind
      use: ancore geografiche
    - name: fazioni
      type: wikilink_list
      required: false
      source: meta_bind
      use: poteri coinvolti
    - name: missioni
      type: wikilink_list
      required: false
      source: meta_bind
      use: trasformazione in gioco
    - name: connessioni
      type: wikilink_list
      required: false
      source: meta_bind
      use: rete generale del Codex
    - name: campagne
      type: wikilink_list
      required: false
      source: meta_bind
      use: campagne collegate
    - name: personaggi
      type: wikilink_list
      required: false
      source: meta_bind
      use: PNG o personaggi coinvolti
    - name: tracciati
      type: wikilink_list
      required: false
      source: meta_bind
      use: clock, fronti o progress track collegati
    - name: sessioni
      type: wikilink_list
      required: false
      source: meta_bind
      use: sessioni in cui la nota entra in gioco
    - name: luogo
      type: wikilink
      required: false
      source: meta_bind
      use: luogo principale collegato
  precise_links:
    - name: fonti
      type: wikilink_target_list
      required: false
      source: meta_bind
      use: fonti a note, sezioni o block id
    - name: riferimenti_srd
      type: wikilink_target_list
      required: false
      source: meta_bind
      use: riferimenti puntuali al compendio SRD
    - name: riferimenti_regola
      type: wikilink_target_list
      required: false
      source: meta_bind
      use: regole precise collegate alla scheda
    - name: sezioni_collegate
      type: wikilink_section_list
      required: false
      source: meta_bind
      use: link a sezioni Markdown specifiche
    - name: blocchi_collegati
      type: wikilink_block_list
      required: false
      source: meta_bind
      use: link a block id Obsidian
    - name: tabelle_collegate
      type: wikilink_block_list
      required: false
      source: meta_bind
      use: tabelle o generatori collegati via block id
    - name: tags
      type: tag_list
      required: false
      source: obsidian
      use: tag italiani opzionali e controllati
  table_use:
    - name: identita
      type: text
      required: false
      source: meta_bind
      use: identita narrativa breve
    - name: gancio
      type: text
      required: false
      source: meta_bind
      use: perche entra in gioco
    - name: uso_al_tavolo
      type: text
      required: false
      source: meta_bind
      use: come usarlo in sessione
    - name: player_safe
      type: text
      required: false
      source: meta_bind
      use: testo condivisibile
    - name: segreto
      type: text
      required: false
      source: meta_bind
      use: informazione DM
    - name: abitante_sa
      type: list
      required: false
      source: meta_bind
      use: versione diegetica leggibile nel mondo
    - name: dm_sa
      type: list
      required: false
      source: meta_bind
      use: informazioni private per il DM
    - name: cambia_al_tavolo
      type: list
      required: false
      source: meta_bind
      use: impatto concreto durante la sessione
  entity_depth:
    - name: origine
      type: text
      required: false
      source: meta_bind
      use: origine narrativa, politica o fisica dell'entita
    - name: causa
      type: text
      required: false
      source: meta_bind
      use: causa che spiega perche la situazione esiste
    - name: tensione
      type: text
      required: false
      source: meta_bind
      use: conflitto interno o pressione locale
    - name: dipendenze
      type: list
      required: false
      source: meta_bind
      use: risorse, persone o istituzioni da cui dipende
    - name: simboli_visibili
      type: list
      required: false
      source: meta_bind
      use: segnali estetici o culturali visibili al tavolo
    - name: bisogno_quotidiano
      type: text
      required: false
      source: meta_bind
      use: necessita concreta che rende l'entita viva
    - name: costo_sociale
      type: text
      required: false
      source: meta_bind
      use: costo sociale se la situazione cambia o viene ignorata
    - name: evoluzione_se_ignorata
      type: text
      required: false
      source: meta_bind
      use: sviluppo automatico se i PG non intervengono
    - name: versione_player_safe
      type: text
      required: false
      source: meta_bind
      use: formulazione pubblicabile o condivisibile senza segreti
  pressure:
    - name: pressione
      type: number
      required: false
      source: meta_bind
      use: urgenza fictionale
    - name: prossima_mossa
      type: text
      required: false
      source: meta_bind
      use: cosa accade se ignorato
    - name: conseguenze
      type: wikilink_list
      required: false
      source: meta_bind
      use: risultati o impatti
    - name: entita_impattate
      type: wikilink_list
      required: false
      source: meta_bind
      use: bersagli diretti della conseguenza
    - name: propaga_a
      type: wikilink_list
      required: false
      source: meta_bind
      use: propagazione futura
    - name: conseguenza_potenziale
      type: text
      required: false
      source: meta_bind
      use: risultato se la pressione non viene risolta
    - name: progress_value
      type: number
      required: false
      source: meta_bind
      use: avanzamento corrente di clock, missioni o tracciati
    - name: progress_max
      type: number
      required: false
      source: meta_bind
      use: soglia massima di clock, missioni o tracciati
    - name: innesco
      type: text
      required: false
      source: meta_bind
      use: evento che fa partire o avanzare la pressione
    - name: posta
      type: text
      required: false
      source: meta_bind
      use: cosa si perde o si guadagna se la situazione cambia
    - name: scadenza_mondo
      type: text
      required: false
      source: meta_bind
      use: scadenza diegetica della pressione
    - name: aggiornamenti_richiesti
      type: list
      required: false
      source: meta_bind
      use: note da aggiornare dopo una conseguenza
    - name: propagazione_stato
      type: select
      required: false
      source: metadata_menu
      use: stato operativo della propagazione
      values:
        - da propagare
        - propagata
        - ignorata
  public_safety:
    - name: pubblico
      type: boolean
      required: false
      source: meta_bind
      use: ammissibile in vista giocatori
    - name: canonico
      type: boolean
      required: false
      source: meta_bind
      use: confermato nel mondo
    - name: stato_canonico
      type: select
      required: false
      source: metadata_menu
      use: qualita canonica dell'informazione
      values:
        - canonico
        - rumor
        - leggenda
        - falso
        - retcon
  session:
    - name: data
      type: date
      required: false
      source: meta_bind
      use: data reale della sessione
    - name: data_mondo
      type: text
      required: false
      source: meta_bind
      use: data diegetica leggibile
    - name: attiva
      type: boolean
      required: false
      source: meta_bind
      use: sessione attiva al tavolo
    - name: obiettivo
      type: text
      required: false
      source: meta_bind
      use: obiettivo giocabile della sessione
    - name: apertura
      type: text
      required: false
      source: meta_bind
      use: prima scena
    - name: scelta
      type: text
      required: false
      source: meta_bind
      use: scelta concreta da offrire ai giocatori
    - name: scene_pronte
      type: list
      required: false
      source: meta_bind
      use: scene gia spendibili al tavolo
    - name: ostacoli
      type: list
      required: false
      source: meta_bind
      use: ostacoli pronti per missioni, viaggi o conflitti
    - name: pressioni
      type: list
      required: false
      source: meta_bind
      use: pressioni attive in sessione
    - name: materiale_pronto
      type: list
      required: false
      source: meta_bind
      use: materiali preparati per il tavolo
    - name: recap_pubblico
      type: list
      required: false
      source: meta_bind
      use: riepilogo condivisibile
    - name: recap_dm
      type: list
      required: false
      source: meta_bind
      use: note private post-sessione
    - name: dispense
      type: wikilink_list
      required: false
      source: meta_bind
      use: dispense collegate alla sessione
    - name: mappe
      type: wikilink_list
      required: false
      source: meta_bind
      use: mappe collegate alla sessione
    - name: audio
      type: wikilink_list
      required: false
      source: meta_bind
      use: audio collegati alla sessione
    - name: immagini
      type: wikilink_list
      required: false
      source: meta_bind
      use: immagini collegate alla sessione
    - name: video
      type: wikilink_list
      required: false
      source: meta_bind
      use: video collegati alla sessione
    - name: scena_corrente
      type: text
      required: false
      source: meta_bind
      use: scena attualmente al tavolo
    - name: appunti_live
      type: wikilink_list
      required: false
      source: meta_bind
      use: appunti catturati durante il gioco
    - name: scene
      type: list
      required: false
      source: meta_bind
      use: scaletta o scene previste
    - name: segreti_rivelabili
      type: list
      required: false
      source: meta_bind
      use: segreti che possono emergere al tavolo
    - name: decisioni_prese
      type: list
      required: false
      source: meta_bind
      use: decisioni effettive dei giocatori
    - name: prossima_apertura
      type: text
      required: false
      source: meta_bind
      use: apertura pronta per la sessione seguente
    - name: output_sessione
      type: list
      required: false
      source: meta_bind
      use: risultati finali pronti da riportare nel mondo
    - name: oggetti
      type: wikilink_list
      required: false
      source: meta_bind
      use: oggetti entrati in scena
    - name: domande_al_tavolo
      type: list
      required: false
      source: meta_bind
      use: domande aperte da porre ai giocatori
    - name: decisioni_attese
      type: list
      required: false
      source: meta_bind
      use: decisioni che la preparazione vuole ottenere
    - name: fatti_canonici
      type: list
      required: false
      source: meta_bind
      use: fatti emersi da rendere canonici
    - name: prossime_mosse_fuori_scena
      type: list
      required: false
      source: meta_bind
      use: mosse del mondo dopo la sessione
  calendarium:
    - name: calendario
      type: text
      required: false
      source: calendarium
      use: calendario preferito su mondo o campagna
    - name: fc-calendar
      type: text
      required: false
      source: calendarium
      use: calendario diegetico configurato
    - name: fc-date
      type: text
      required: false
      source: calendarium
      use: data evento nel calendario diegetico
    - name: fc-category
      type: select
      required: false
      source: calendarium
      use: categoria evento calendario
      values:
        - sessione
        - scadenza
        - festa
        - pericolo
        - conseguenza
    - name: fc-display-name
      type: text
      required: false
      source: calendarium
      use: nome mostrato nel calendario
    - name: fc-end
      type: text
      required: false
      source: calendarium
      use: fine evento nel calendario diegetico
  maps:
    - name: cosa_mostra
      type: text
      required: false
      source: meta_bind
      use: descrizione visibile della mappa
    - name: cosa_mostrare
      type: text
      required: false
      source: meta_bind
      use: descrizione player-safe o porzione mostrabile della mappa
    - name: versione_giocatori
      type: wikilink
      required: false
      source: meta_bind
      use: versione separata della mappa destinata ai giocatori
    - name: layer_dm
      type: list
      required: false
      source: meta_bind
      use: elementi nascosti o solo DM
    - name: layer_pubblico
      type: list
      required: false
      source: meta_bind
      use: elementi mostrabili ai giocatori
    - name: cosa_nascondere
      type: text
      required: false
      source: meta_bind
      use: contenuto da non mostrare ai giocatori
    - name: coordinates
      type: coordinates
      required: false
      source: bases_maps
      use: coordinate marker mappa
    - name: icon
      type: text
      required: false
      source: bases_maps
      use: icona marker mappa
    - name: color
      type: text
      required: false
      source: bases_maps
      use: colore marker mappa
    - name: uso
      type: select
      required: false
      source: metadata_menu
      use: uso operativo della risorsa o mappa
    - name: layer_mappa
      type: text
      required: false
      source: bases_maps
      use: layer o gruppo visuale della mappa
    - name: tipo_mappa
      type: text
      required: false
      source: metadata_menu
      use: tipo tecnico o narrativo della mappa
  encounter:
    - name: creature
      type: wikilink_list
      required: false
      source: meta_bind
      use: creature coinvolte
    - name: incontri
      type: wikilink_list
      required: false
      source: meta_bind
      use: incontri collegati
    - name: statblock
      type: boolean
      required: false
      source: fantasy_statblocks
      use: abilita rendering statblock
    - name: name
      type: text
      required: false
      source: fantasy_statblocks
      use: nome tecnico letto da Fantasy Statblocks
    - name: terreno
      type: text
      required: false
      source: meta_bind
      use: terreno o situazione tattica
    - name: complicazioni
      type: list
      required: false
      source: dice_roller
      use: complicazioni casuali o preparate
    - name: ricompense
      type: list
      required: false
      source: meta_bind
      use: ricompense, indizi o conseguenze positive
    - name: pericolo
      type: number
      required: false
      source: meta_bind
      use: intensita di rischio dell'incontro o luogo
    - name: round
      type: number
      required: false
      source: meta_bind
      use: round corrente dell'incontro
    - name: condizioni
      type: list
      required: false
      source: meta_bind
      use: condizioni tattiche attive
    - name: encounter_creatures
      type: list
      required: false
