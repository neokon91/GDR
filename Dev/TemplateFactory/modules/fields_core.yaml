    - name: obiettivo_nascosto
      type: text
      required: false
      source: metadata_menu
      use: obiettivo privato o non dichiarato
    - name: rivali
      type: wikilink_list
      required: false
      source: metadata_menu
      use: rivali o oppositori collegati
    - name: famiglia_luogo
      type: select
      required: false
      source: metadata_menu
      use: famiglia operativa del luogo
    - name: luogo_padre
      type: wikilink
      required: false
