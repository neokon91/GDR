    - name: campagna
      type: wikilink
      required: false
      source: metadata_menu
      use: campagna collegata alla risorsa
    - name: scena
      type: text
      required: false
      source: metadata_menu
      use: scena suggerita per la risorsa
    - name: timestamp
      type: text
      required: false
      source: metadata_menu
      use: punto temporale utile nel media
    - name: file
      type: text
      required: false
      source: metadata_menu
      use: percorso file locale o allegato
    - name: url
      type: text
      required: false
      source: metadata_menu
      use: URL esterno della risorsa
  domain_specific:
    - name: cultura
      type: wikilink
      required: false
      source: metadata_menu
      use: cultura collegata
    - name: culture
      type: wikilink_list
      required: false
      source: metadata_menu
      use: culture collegate
    - name: religioni
      type: wikilink_list
      required: false
      source: metadata_menu
      use: religioni o culti collegati
    - name: regioni
      type: wikilink_list
      required: false
      source: metadata_menu
      use: regioni collegate
    - name: risorse
      type: wikilink_list
      required: false
      source: metadata_menu
      use: risorse materiali o narrative collegate
    - name: eventi_storici
      type: wikilink_list
      required: false
      source: metadata_menu
