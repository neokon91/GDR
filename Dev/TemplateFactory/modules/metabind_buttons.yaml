id: metabind_buttons
purpose: Pulsanti Meta Bind canonici e azioni runtime collegate.
version: 0.1.0
buttons:
  nuova_sessione:
    id: nuova-sessione-z-modelli-dm-sessione-md
    label: Nuova Sessione
    action: templaterCreateNote
    template: z.modelli/dm/Sessione.md
    fallback: '[[z.modelli/dm/Sessione]]'
  nuovo_mondo_homebrew:
    id: nuovo-mondo-homebrew
    label: Nuovo Mondo
    action: runTemplaterFile
    template: z.modelli/wizard/Nuovo Mondo Homebrew.md
    fallback: '[[z.modelli/wizard/Nuovo Mondo Homebrew]]'
  wizard_nuova_entita_viva:
    id: wizard-nuova-entita-viva
    label: Nuova Entita
    action: runTemplaterFile
    template: z.modelli/wizard/Nuova Entita Viva.md
    fallback: '[[z.modelli/wizard/Nuova Entita Viva]]'
  durante_il_gioco:
    id: durante-il-gioco-durante-il-gioco
    label: Durante Il Gioco
    action: open
    link: '[[Hub/Durante il Gioco]]'
    fallback: '[[Hub/Durante il Gioco]]'
  fuori_scena:
    id: fuori-scena-hub-cosa-succede-fuori-scena-cosa-succede-fuori-scena
    label: Fuori Scena
    action: open
    link: '[[Hub/Cosa Succede Fuori Scena|Cosa Succede Fuori Scena]]'
    fallback: '[[Hub/Cosa Succede Fuori Scena]]'
  post_sessione_guidato:
    id: post-sessione-guidato-risorse-post-sessione-guidato
    label: Post Sessione Guidato
    action: open
    link: '[[Risorse/Post Sessione Guidato]]'
    fallback: '[[Risorse/Post Sessione Guidato]]'
  wizard_appunto_live:
    id: wizard-appunto-live
    label: Appunto Live
    action: templaterCreateNote
    template: z.modelli/wizard/Appunto Live.md
    folder: Inbox
    fallback: '[[z.modelli/wizard/Appunto Live]]'
  wizard_conseguenza:
    id: wizard-conseguenza
    label: Conseguenza
    action: templaterCreateNote
    template: z.modelli/wizard/Conseguenza.md
    folder: Inbox
    fallback: '[[z.modelli/wizard/Conseguenza]]'
  aggiorna_scena:
    id: aggiorna-scena-z-modelli-dm-aggiorna-scena-corrente-md
    label: Aggiorna Scena
    action: runTemplaterFile
    template: z.modelli/dm/Aggiorna Scena Corrente.md
    fallback: 'Azione manuale: aggiornare scena_corrente sulla sessione attiva'
  aggiungi_decisione:
    id: aggiungi-decisione-z-modelli-dm-aggiungi-decisione-live-md
    label: Aggiungi Decisione
    action: runTemplaterFile
    template: z.modelli/dm/Aggiungi Decisione Live.md
    fallback: 'Azione manuale: aggiornare decisioni_prese e output_sessione sulla sessione attiva'
  collega_appunto_live:
    id: collega-appunto-z-modelli-dm-collega-appunto-live-md
    label: Collega Appunto
    action: runTemplaterFile
    template: z.modelli/dm/Collega Appunto Live.md
    fallback: 'Azione manuale: collegare un appunto Inbox ad appunti_live della sessione attiva'
  wizard_fine_sessione:
    id: wizard-fine-sessione
    label: Fine Sessione
    action: runTemplaterFile
    template: z.modelli/wizard/Fine Sessione.md
    fallback: '[[z.modelli/wizard/Fine Sessione]]'
  wizard_sessione_da_output:
    id: wizard-sessione-da-output
    label: Prossima Sessione
    action: runTemplaterFile
    template: z.modelli/wizard/Nuova Sessione Da Output Precedente.md
    fallback: '[[z.modelli/wizard/Nuova Sessione Da Output Precedente]]'
  marca_canonico:
    id: marca-canonico
    label: Marca Canonico
    action: runTemplaterFile
    template: z.modelli/azioni/Marca Canonico.md
    fallback: 'Azione manuale: impostare canonico: true'
  marca_rumor:
    id: marca-rumor
    label: Marca Rumor
    action: runTemplaterFile
    template: z.modelli/azioni/Marca Rumor.md
    fallback: 'Azione manuale: impostare stato_canonico: rumor'
  archivia:
    id: archivia-nota
    label: Archivia
    action: runTemplaterFile
    template: z.modelli/azioni/Archivia.md
    fallback: 'Azione manuale: impostare stato: archiviata'
  smista_bozza_generata:
    id: smista-bozza-generata
    label: Smista Bozza
    action: runTemplaterFile
    template: z.modelli/azioni/Smista Bozza Generata.md
    fallback: 'Azione manuale: spostare la bozza generata nella cartella canonica e impostare stato: pronto'
  canonizza_bozza_generata:
    id: canonizza-bozza-generata
    label: Canonizza Bozza
    action: runTemplaterFile
    template: z.modelli/azioni/Canonizza Bozza Generata.md
    fallback: 'Azione manuale: spostare la bozza generata nella cartella canonica e impostare canonico: true'
  avanza_clock:
    id: avanza-clock
    label: Avanza Clock
    action: runTemplaterFile
    template: z.modelli/azioni/Avanza Clock.md
    fallback: 'Azione manuale: aumentare pressione/progress_value'
  applica_conseguenza:
    id: applica-conseguenza
    label: Applica Conseguenza
    action: runTemplaterFile
    template: z.modelli/azioni/Applica Conseguenza.md
    fallback: 'Azione manuale: registrare conseguenza, entita_impattate e propagazione_stato'
  registra_scelta_mondo:
    id: registra-scelta-mondo
    label: Registra Scelta Mondo
    action: runTemplaterFile
    template: z.modelli/azioni/Registra Scelta Mondo.md
    fallback: 'Azione manuale: registrare scelta, conseguenza, entita_impattate, applicata_a e propagazione_stato'
  collega_sessione_attiva:
    id: collega-sessione-attiva
    label: Collega Sessione Attiva
    action: runTemplaterFile
    template: z.modelli/azioni/Collega Sessione Attiva.md
    fallback: 'Azione manuale: aggiungere la sessione attiva nei collegamenti della nota'
  rendi_sessione_attiva:
    id: rendi-sessione-attiva
    label: Rendi Sessione Attiva
    action: runTemplaterFile
    template: z.modelli/azioni/Rendi Sessione Attiva.md
    fallback: 'Azione manuale: impostare attiva: true su una sola sessione e false sulle altre'
  propaga_a_entita:
    id: propaga-a-entita
    label: Propaga A Entita
    action: runTemplaterFile
    template: z.modelli/azioni/Propaga A Entita.md
    fallback: 'Azione manuale: aggiornare propaga_a, entita_impattate e aggiornamenti_richiesti'
  prepara_recap_pubblico:
    id: prepara-recap-pubblico
    label: Prepara Recap Pubblico
    action: runTemplaterFile
    template: z.modelli/azioni/Prepara Recap Pubblico.md
    fallback: 'Azione manuale: scrivere recap pubblico senza segreti o prossime mosse DM'
  nuova_mappa_zoom:
    id: nuova-mappa-zoom-z-modelli-mappe-mappa-zoom-md
    label: Nuova Mappa Zoom
    action: templaterCreateNote
    template: z.modelli/mappe/Mappa Zoom.md
    fallback: '[[z.modelli/mappe/Mappa Zoom]]'
  nuova_mappa_fronti_sessione:
    id: nuova-mappa-fronti-z-modelli-mappe-mappa-excalidraw-fronti-excalidraw-md-2
    label: Nuova Mappa Fronti
    action: templaterCreateNote
    template: z.modelli/mappe/Mappa Excalidraw Fronti.excalidraw.md
    fallback: '[[z.modelli/mappe/Mappa Excalidraw Fronti.excalidraw]]'
contracts:
  button_ids_must_match_meta_bind_config: .obsidian/plugins/obsidian-meta-bind-plugin/data.json
  generated_syntax: '`BUTTON[{{ id }}]`'
  fallback_required: true
