id: obsidian_config
purpose: Configurazione Obsidian utente generata da YAML per mantenere leggibile il setup del vault.
version: 0.1.0
policy:
  source_of_truth: Questo file e la fonte umana per i JSON Obsidian controllati dal progetto.
  native_json_exceptions:
  - .obsidian/**/manifest.json
  - .obsidian/workspace.json
  - .obsidian/plugins/obsidian-meta-bind-plugin/data.json
  rule: 'I JSON dichiarati qui non si editano a mano: modificare YAML e rigenerare.'
configs:
- target: .obsidian/app.json
  data:
    promptDelete: false
    alwaysUpdateLinks: true
    userIgnoreFilters:
    - SRD/
    - z.automazioni/
    - z.bacheche/
    - z.bases/
    - z.engine/
    - z.fileclass/
    - z.modelli/
- target: .obsidian/appearance.json
  data:
    cssTheme: Minimal
    accentColor: ''
    enabledCssSnippets:
    - gdr-vault
- target: .obsidian/bookmarks.json
