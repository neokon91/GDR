      desc:
      - nel cuore del mercato cittadino, tra bancarelle rumorose e strade sempre affollate.
      - ai margini di un villaggio agricolo, con stalle pulite e una sala comune scaldata dal camino.
      - sopra il porto, dove l'odore di salsedine si mescola a quello di zuppa speziata.
      - lungo una strada di pellegrinaggio, frequentata da mercanti, messaggeri e avventurieri in cerca di lavoro.
      - dentro le mura di una rocca di confine, sorvegliata da guardie stanche e sospettose.
      - all'imbocco di una foresta antica, dove i clienti parlano a bassa voce dopo il tramonto.
      - vicino a una miniera abbandonata, con camere economiche e molte porte rinforzate.
      - su una collina battuta dal vento, celebre per il sidro forte e per le mappe appese alle travi.
      - in un quartiere di artigiani, con tavoli lunghi, birra scura e contratti conclusi sottovoce.
      - presso un guado trafficato, rifugio naturale per carovane, cacciatori di taglie e contrabbandieri.
      rumors:
      - Un carovaniere giura di aver visto luci verdi muoversi tra le rovine oltre il vecchio ponte.
      - Il fabbro locale paga bene chi scopre chi ruba ferro benedetto dalla sua forgia.
      - Una nobile decaduta cerca una scorta discreta per raggiungere una cripta di famiglia.
      - Si dice che il pozzo dietro la locanda restituisca monete antiche quando la luna e' piena.
      - Un apprendista speziale e' scomparso dopo aver comprato una mappa macchiata di sangue.
      - Le guardie chiudono gli occhi su un culto che si riunisce sotto il magazzino del grano.
      - Un bardo ubriaco sostiene che il nuovo prete non proietta ombra al tramonto.
      - Ogni notte qualcuno lascia fiori freschi davanti alla casa bruciata del vecchio magistrato.
      - Una creatura enorme e' stata udita sotto le assi del molo, ma i pescatori negano tutto.
      - Un mercante offre una ricompensa per recuperare una cassa consegnata alla persona sbagliata.
