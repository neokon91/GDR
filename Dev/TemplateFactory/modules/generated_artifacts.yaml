id: generated_artifacts
purpose: Contratto dei file MD/JSON generati da YAML/Jinja e codice di rendering.
version: 0.1.0
policy:
  source_layers:
    - Dev/TemplateFactory/modules/*.yaml
    - Dev/TemplateFactory/jinja/**/*.j2
    - z.automazioni/render_*.py
    - z.automazioni/generate_*.js
  generated_layers:
    - z.modelli/**/*.md
    - z.modelli/.templatefactory-manifest.json
    - z.automazioni/data/workflows/quick_actions.json
    - z.automazioni/data/srd/core.json
    - z.automazioni/data/srd/opzioni_personaggio.json
    - Dev/plugin_matrix.json
    - z.automazioni/templater/*.js
    - .obsidian/**/*.json
    - .obsidian/plugins/obsidian-meta-bind-plugin/data.json
  local_debug_outputs:
    - Dev/TemplateFactory/examples/generated/
    - dist/
    - z.modelli/
  rule: I file generati non sono fonte di verita. Se divergono dai sorgenti YAML/Jinja, fallisce npm run check.
artifacts:
  template_materialized:
    source: Dev/TemplateFactory/modules/template_blueprints.yaml
    jinja: Dev/TemplateFactory/jinja
    target_manifest: z.modelli/.templatefactory-manifest.json nella release generata
    check: python3 z.automazioni/check_generation_contract.py
  workflow_data:
    source: Dev/TemplateFactory/modules/workflows.yaml
    target: z.automazioni/data/workflows/quick_actions.json
    check: npm run check:workflow-data
  srd_character_data:
    source: Dev/TemplateFactory/modules/srd_character_build.yaml
    targets:
      - z.automazioni/data/srd/core.json
      - z.automazioni/data/srd/opzioni_personaggio.json
    check: npm run check:srd-character-data
  obsidian_config:
    source: Dev/TemplateFactory/modules/obsidian_config.yaml
    target: .obsidian/**/*.json
    check: npm run check:obsidian-config
  plugin_matrix:
    source: Dev/TemplateFactory/modules/plugin_matrix.yaml
    target: Dev/plugin_matrix.json
    check: npm run check:plugin-matrix
  templater_wrappers:
    source: Dev/TemplateFactory/modules/templater_wrappers.yaml
    target: z.automazioni/templater/*.js
    check: npm run check:templater-wrappers
  workflow_blocks:
    source: z.automazioni/data/workflows/quick_actions.json
    targets: workflow entry_points
    check: npm run check:workflow-render
  metabind_config:
    sources:
      - Dev/TemplateFactory/modules/metabind_config.yaml
      - Dev/TemplateFactory/modules/metabind_inputs.yaml
      - Dev/TemplateFactory/modules/metabind_buttons.yaml
    target: .obsidian/plugins/obsidian-meta-bind-plugin/data.json
    check: npm run check:metabind-config
  metadata_surfaces:
    source: Dev/TemplateFactory/modules/frontmatter_profiles.yaml
    target: Dev/TemplateFactory/examples/generated/metadata_surfaces
    check: npm run check:metadata
