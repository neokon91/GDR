template_routes:
  default_template: z.modelli/worldbuilding/Entita Worldbuilding
  by_kind:
    luogo:
      default_template: z.modelli/luogo/Interesse
      rules:
        - id: luogo_insediamento_subtype
          match:
            subtype: insediamento
          template: z.modelli/luogo/Insediamento
        - id: luogo_insediamento_category
          match:
            category: insediamento
          template: z.modelli/luogo/Insediamento
        - id: luogo_tempio
          match:
            subtype: tempio
          template: z.modelli/luogo/Tempio
        - id: luogo_dungeon
          match:
            subtype: dungeon
          template: z.modelli/luogo/Dungeon
        - id: luogo_rovina
          match:
            subtype: rovina
          template: z.modelli/luogo/Rovina
        - id: luogo_regione_naturale
          match:
            category: regione naturale
          template: z.modelli/luogo/Regione Naturale
        - id: geografia_continente
          match:
            subtype: continente
          template: z.modelli/geografia/Continente
        - id: geografia_isola
          match:
            subtype: isola
          template: z.modelli/geografia/Isola
        - id: geografia_regione
          match:
            category: geografia
          template: z.modelli/geografia/Regione
        - id: politica_regno
          match:
            subtype: regno
          template: z.modelli/politica/Regno
        - id: politica_impero
          match:
            subtype: impero
          template: z.modelli/politica/Impero
        - id: politica_repubblica
          match:
            subtype: repubblica
          template: z.modelli/politica/Repubblica
        - id: politica_oligarchia
          match:
            subtype: oligarchia
          template: z.modelli/politica/Oligarchia
        - id: politica_ducato
          match:
            subtype: ducato
          template: z.modelli/politica/Ducato
        - id: politica_contea
          match:
            subtype: contea
          template: z.modelli/politica/Contea
        - id: politica_baronia
          match:
            subtype: baronia
          template: z.modelli/politica/Baronia
    cultura:
      default_template: z.modelli/worldbuilding/Cultura
    religione:
      default_template: z.modelli/fazione/Culto
    magia:
      default_template: z.modelli/worldbuilding/Cosmologia
    storia:
      default_template: z.modelli/Evento Storico
      rules:
        - id: storia_eta_mitica
          match:
            subtype: eta mitica
          template: z.modelli/worldbuilding/Era Storica
    ecologia:
      default_template: z.modelli/Creatura
    economia:
      default_template: z.modelli/worldbuilding/Risorsa
      rules:
        - id: economia_rotta
          contains:
            subtype: rotta
          template: z.modelli/worldbuilding/Rotta
        - id: economia_mercato
          contains:
            subtype: mercato
          template: z.modelli/worldbuilding/Mercato o Nodo Commerciale
    societa:
      default_template: z.modelli/worldbuilding/Entita Worldbuilding
