  - z.engine/session_views.js
  - z.engine/session_continuity.js
  - z.engine/session_dnd.js
  - z.engine/session_maps.js
  - z.engine/session_player.js
  - z.engine/session_runtime.js
materialized_user_files:
  - path: Campagne/Campagne.md
    title: Campagne
    body: Indice runtime per campagne create dall'utente nella release.
  - path: Giocatori/Giocatori.md
    title: Giocatori
    body: Area runtime per materiali condivisibili e vista giocatori.
  - path: Inbox/Inbox.md
    title: Inbox
    body: Area runtime per appunti grezzi, live e bozze da smistare.
    workflow_blocks:
      - inbox_operativa
  - path: Mondi/Mondo.md
    title: Mondi
    body: Indice runtime dei mondi creati dall'utente.
  - path: Mondi/Calendario.md
    title: Calendario
    body: |
      Vista runtime per date del mondo, sessioni e scadenze.

